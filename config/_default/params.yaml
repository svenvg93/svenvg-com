# Basic site info with SEO
description: "Personal blog by Sven van Ginkel, focused on self-hosting, homelab architecture, networking, and automation. Sharing practical insights, tools, and guides for building reliable and privacy-respecting infrastructure."
keywords: ["Self-Hosting", "Homelab", "Networking", "Linux", "Automation", "Infrastructure", "Ansible", "Docker", "Tailscale"]
defaultAuthor: "Sven van Ginkel"
language: "en-US"
shortName: "Sven van Ginkel"  # PWA
images:
- "/image.png"

favicon:
  svg: "/favicon.svg"

header:
  sticky: true
  logo:
    image: "/image.png"
    link: "/"
  showThemeSwitch: false
  showDarkModeSwitch: true
  showLanguageSwitch: false
  languageSwitchMode: "dropdown"  # dropdown | cycle

author:
  name: "Sven van Ginkel"
  title: "Self-Hosting • Homelab • Network Engineering"
  description: "Sharing practical guides on self-hosting, homelab architecture, networking, and automation — building reliable, privacy-respecting infrastructure."
  avatar: "/image.png"
  social:
    - name: "GitHub"
      url: "https://github.com/svenvg93"
      icon: "github"
    - name: "X"
      url: "https://x.com/svenvginkel"
      icon: "twitter"
    - name: "LinkedIn"
      url: "https://linkedin.com/in/svenvanginkel"
      icon: "linkedin"

colorScheme: "default"

home:
  recentPostsCount: 8
  contentOrder:
    - author-section
    - recent-posts
    - page-content

post:
  showRelated: true
  relatedPostsCount: 3
  license:
    show: true
    author: "Sven van Ginkel"
    name: "CC BY-NC-SA 4.0"
    description: "This work is licensed under a Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International License. Please attribute the source, use non-commercially, and maintain the same license."
    url: "https://creativecommons.org/licenses/by-nc-sa/4.0/"
    displayName: "CC BY-NC-SA 4.0"

# comments
comments:
  enabled: false
  system: "giscus"
  giscus:
    repo: "tom2almighty/hugo-narrow-giscus"
    repoId: "R_kgDOO2gwLg"
    category: "General"
    categoryId: "DIC_kwDOO2gwLs4CrEaf"
    mapping: "pathname"
    strict: "0"
    reactionsEnabled: "1"
    emitMetadata: "0"
    inputPosition: "bottom"
    theme: "preferred_color_scheme"
    lang: "en"
  disqus:
    shortname: ""
  utterances:
    repo: ""
    issueTerm: "pathname"
    label: "comment"
    theme: "preferred-color-scheme"
  waline:
    serverURL: ""
    lang: "en"
  artalk:
    server: ""
    site: ""
    locale: "en"
    darkMode: "auto"
    gravatar:
      mirror: "https://gravatar.com/avatar/"
  twikoo:
    envId: ""
    region: ""
    path: ""
    lang: "en"

analytics:
  enabled: true
  baidu:
    enabled: false
    id: "your-baidu-analytics-id"
  clarity:
    enabled: false
    id: "your-clarity-analytics-id"
  google:
    enabled: true
    id: "G-TY2X9VQNYT"
  umami:
    enabled: true
    id: "9c123874-4534-4290-9af2-76179151baba"
    src: "https://cloud.umami.is/script.js"
    domains: "svenvg.com"

katex:
  enabled: false
  delimiters:
    - left: "$$"
      right: "$$"
      display: true
    - left: "$"
      right: "$"
      display: false
    - left: "\\("
      right: "\\)"
      display: false
    - left: "\\["
      right: "\\]"
      display: true

mermaid:
  enabled: true

gallery:
  enabled: true
  defaultLayout: justified  # justified | masonry | grid
  gap: 10
  targetRowHeight: 200
  lastRowBehavior: center   # left | center | right | fill | hide
  columnWidth: 200
  columns: 4
  lightbox:
    enabled: true
    bgOpacity: 0.8
    showHideAnimationType: zoom
    showAnimationDuration: 333
    hideAnimationDuration: 333

series:
  enabled: true
  position: "left" # card/left/right
  maxWidth: "280px"
  maxHeight: "80vh"
  showProgress: true
  showInHeader: true

codeblock:
  collapse:
    enabled: true
    defaultState: expanded  # expanded | collapsed
    autoCollapseLines: 30
    autoCollapseHeight: 400
    collapsedHeight: 120

readingProgress:
  enabled: true
  showOnHomepage: false

dock: "always" # scroll | always | float

toc:
  enabled: true
  position: "center" # center | side