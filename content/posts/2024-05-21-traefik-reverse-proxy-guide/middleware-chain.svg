<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 210" width="700" height="210"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#ef4444"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
    <marker id="arr-muted" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 6,2.5 0,5" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="700" height="210" fill="url(#bg)" rx="8"/>

  <!-- incoming request stub -->
  <line x1="10" y1="82" x2="38" y2="82" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-muted)"/>

  <!-- IPAllowList -->
  <rect x="40" y="55" width="130" height="54" fill="none" stroke="#ef4444" stroke-width="1.5" rx="5"/>
  <text x="105" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#fca5a5">IPAllowList</text>
  <text x="105" y="92" text-anchor="middle" font-size="10" fill="#ef4444" opacity="0.8">source IP check</text>

  <line x1="170" y1="82" x2="208" y2="82" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- BasicAuth -->
  <rect x="210" y="55" width="115" height="54" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="267" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#bae6fd">BasicAuth</text>
  <text x="267" y="92" text-anchor="middle" font-size="10" fill="#38bdf8" opacity="0.8">credential check</text>

  <line x1="325" y1="82" x2="363" y2="82" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- secure-headers -->
  <rect x="365" y="55" width="140" height="54" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="435" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#86efac">secure-headers</text>
  <text x="435" y="92" text-anchor="middle" font-size="10" fill="#34d399" opacity="0.8">adds security headers</text>

  <line x1="505" y1="82" x2="543" y2="82" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="524" y="74" text-anchor="middle" font-size="8" fill="#4ade80">pass</text>

  <!-- Service -->
  <rect x="545" y="55" width="115" height="54" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="602" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#86efac">Service</text>
  <text x="602" y="92" text-anchor="middle" font-size="10" fill="#34d399" opacity="0.8">your app</text>

  <!-- reject: IPAllowList -->
  <line x1="105" y1="109" x2="105" y2="154" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="105" y="169" text-anchor="middle" font-size="10" font-weight="600" fill="#fca5a5">403</text>
  <text x="105" y="183" text-anchor="middle" font-size="8" fill="#94a3b8">IP not in allowlist</text>

  <!-- reject: BasicAuth -->
  <line x1="267" y1="109" x2="267" y2="154" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="267" y="169" text-anchor="middle" font-size="10" font-weight="600" fill="#fca5a5">401</text>
  <text x="267" y="183" text-anchor="middle" font-size="8" fill="#94a3b8">wrong credentials</text>
</svg>
