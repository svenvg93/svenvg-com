<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 210" width="700" height="210"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#ef4444"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="700" height="210" fill="url(#bg)" rx="8"/>

  <!-- Client (external/untrusted) -->
  <rect x="50" y="55" width="110" height="54" fill="none" stroke="#ef4444" stroke-width="1.5" rx="5"/>
  <text x="105" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#fca5a5">Client</text>
  <text x="105" y="92" text-anchor="middle" font-size="10" fill="#ef4444" opacity="0.8">browser / app</text>

  <line x1="160" y1="82" x2="198" y2="82" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="179" y="74" text-anchor="middle" font-size="8" fill="#94a3b8">request</text>

  <!-- Router (central) -->
  <rect x="200" y="55" width="115" height="54" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="257" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#bae6fd">Router</text>
  <text x="257" y="92" text-anchor="middle" font-size="10" fill="#38bdf8" opacity="0.8">match rules</text>

  <line x1="315" y1="82" x2="353" y2="82" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Middleware (central, decision point) -->
  <rect x="355" y="55" width="140" height="54" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="425" y="76" text-anchor="middle" font-size="14" font-weight="700" fill="#bae6fd">Middleware</text>
  <text x="425" y="92" text-anchor="middle" font-size="10" fill="#38bdf8" opacity="0.8">inspect · modify</text>

  <!-- pass -->
  <line x1="495" y1="82" x2="533" y2="82" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="514" y="74" text-anchor="middle" font-size="8" fill="#4ade80">pass</text>

  <!-- Service (trusted) -->
  <rect x="535" y="55" width="110" height="54" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="590" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#86efac">Service</text>
  <text x="590" y="92" text-anchor="middle" font-size="10" fill="#34d399" opacity="0.8">your app</text>

  <!-- reject branch -->
  <line x1="425" y1="109" x2="425" y2="154" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="425" y="169" text-anchor="middle" font-size="10" font-weight="600" fill="#fca5a5">403 Forbidden</text>
  <text x="425" y="183" text-anchor="middle" font-size="8" fill="#94a3b8">rule violation</text>
</svg>
