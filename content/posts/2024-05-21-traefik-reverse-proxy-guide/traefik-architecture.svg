<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 210" width="700" height="210"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#94a3b8"/>
    </marker>
    <marker id="arr-indigo" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#6366f1"/>
    </marker>
  </defs>

  <rect width="700" height="210" fill="url(#bg)" rx="8"/>
  <line x1="0" y1="36" x2="700" y2="36" stroke="#0d1a2a" stroke-width="1"/>
  <text x="350" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1">TRAEFIK — REQUEST ROUTING &amp; TLS TERMINATION</text>

  <!-- Internet source -->
  <rect x="60" y="65" width="115" height="65" fill="#0b1628" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="117" y="91" text-anchor="middle" font-size="12" font-weight="600" fill="#93c5fd">Internet</text>
  <text x="117" y="108" text-anchor="middle" font-size="9" fill="#64748b">HTTPS · :443</text>
  <text x="117" y="122" text-anchor="middle" font-size="8" fill="#4a4a6a">browser / client</text>

  <!-- Internet → Traefik -->
  <line x1="175" y1="97" x2="228" y2="97" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Traefik box -->
  <rect x="230" y="48" width="220" height="125" fill="#0a0d28" stroke="#6366f1" stroke-width="1.5" rx="5"/>
  <text x="340" y="68" text-anchor="middle" font-size="12" font-weight="600" fill="#a5b4fc">Traefik</text>
  <line x1="240" y1="75" x2="440" y2="75" stroke="#0d1a2a" stroke-width="1"/>
  <text x="340" y="93" text-anchor="middle" font-size="9" fill="#818cf8">EntryPoints · :80 · :443</text>
  <text x="340" y="109" text-anchor="middle" font-size="9" fill="#818cf8">Host-based routing</text>
  <text x="340" y="125" text-anchor="middle" font-size="9" fill="#818cf8">TLS termination</text>
  <text x="340" y="144" text-anchor="middle" font-size="8" fill="#4a4a6a">ACME · Cloudflare DNS-01</text>
  <text x="340" y="158" text-anchor="middle" font-size="8" fill="#4a4a6a">certificates auto-renewed</text>

  <!-- Traefik → Service A -->
  <line x1="450" y1="85" x2="490" y2="85" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr-indigo)"/>
  <!-- Traefik → Service B -->
  <line x1="450" y1="125" x2="490" y2="125" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr-indigo)"/>

  <!-- Service A (green) -->
  <rect x="492" y="62" width="148" height="46" fill="#071810" stroke="#166534" stroke-width="1.5" rx="5"/>
  <text x="566" y="80" text-anchor="middle" font-size="12" font-weight="600" fill="#86efac">service-a</text>
  <text x="566" y="97" text-anchor="middle" font-size="9" fill="#64748b">backend container</text>

  <!-- Service B (green) -->
  <rect x="492" y="103" width="148" height="46" fill="#071810" stroke="#166534" stroke-width="1.5" rx="5"/>
  <text x="566" y="121" text-anchor="middle" font-size="12" font-weight="600" fill="#86efac">service-b</text>
  <text x="566" y="138" text-anchor="middle" font-size="9" fill="#64748b">backend container</text>

  <!-- Footer -->
  <text x="350" y="195" text-anchor="middle" font-size="9" fill="#475569">Traefik discovers Docker containers automatically · certificates issued by Let's Encrypt via Cloudflare DNS-01</text>
</svg>
