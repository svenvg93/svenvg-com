<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 210" width="700" height="210"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#ef4444"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="700" height="210" fill="url(#bg)" rx="8"/>

  <!-- Internet (red zone: external/untrusted) -->
  <rect x="50" y="80" width="130" height="50" fill="none" stroke="#ef4444" stroke-width="1.5" rx="5"/>
  <text x="115" y="102" text-anchor="middle" font-size="13" font-weight="600" fill="#fca5a5">Internet</text>
  <text x="115" y="118" text-anchor="middle" font-size="10" fill="#ef4444" opacity="0.8">HTTPS · :443</text>

  <line x1="180" y1="105" x2="255" y2="105" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- Traefik (blue zone: router/central device) -->
  <rect x="257" y="65" width="185" height="80" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="349" y="93" text-anchor="middle" font-size="14" font-weight="700" fill="#bae6fd">Traefik</text>
  <text x="349" y="113" text-anchor="middle" font-size="10" fill="#38bdf8" opacity="0.8">Routing · TLS termination</text>
  <text x="349" y="129" text-anchor="middle" font-size="10" fill="#38bdf8" opacity="0.8">Let's Encrypt via DNS-01</text>

  <line x1="444" y1="84" x2="519" y2="84" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="444" y1="126" x2="519" y2="126" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Services (green zone: LAN/trusted) -->
  <rect x="521" y="65" width="130" height="38" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="586" y="89" text-anchor="middle" font-size="12" font-weight="600" fill="#86efac">service-a</text>

  <rect x="521" y="107" width="130" height="38" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="586" y="131" text-anchor="middle" font-size="12" font-weight="600" fill="#86efac">service-b</text>
</svg>
