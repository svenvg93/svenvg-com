<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 195" width="700" height="195"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#94a3b8"/>
    </marker>
    <marker id="arr-sm" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 6,2.5 0,5" fill="#6366f1"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="700" height="195" fill="url(#bg)" rx="8"/>
  <line x1="0" y1="36" x2="700" y2="36" stroke="#0d1a2a" stroke-width="1"/>
  <text x="350" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1">TRAEFIK MONITORING PIPELINE</text>

  <!-- Traefik Metrics source -->
  <rect x="50" y="71" width="115" height="40" fill="#0b1628" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="107" y="87" text-anchor="middle" font-size="12" font-weight="600" fill="#93c5fd">Traefik Metrics</text>
  <text x="107" y="101" text-anchor="middle" font-size="9" fill="#64748b">:8082/metrics</text>

  <!-- Traefik Logs source -->
  <rect x="50" y="119" width="115" height="40" fill="#0b1628" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="107" y="135" text-anchor="middle" font-size="12" font-weight="600" fill="#93c5fd">Traefik Logs</text>
  <text x="107" y="149" text-anchor="middle" font-size="9" fill="#64748b">/logs/traefik.log</text>

  <!-- ALLOY big box -->
  <rect x="215" y="48" width="300" height="112" fill="#0a0d28" stroke="#6366f1" stroke-width="1.5" rx="5"/>
  <text x="365" y="65" text-anchor="middle" font-size="12" font-weight="600" fill="#a5b4fc">Grafana Alloy</text>

  <!-- Top sub-pipeline: prometheus.scrape → remote_write -->
  <rect x="225" y="80" width="120" height="22" fill="#151050" rx="3"/>
  <text x="285" y="95" text-anchor="middle" font-size="8" font-weight="600" fill="#818cf8">prometheus.scrape</text>

  <line x1="345" y1="91" x2="360" y2="91" stroke="#6366f1" stroke-width="1" marker-end="url(#arr-sm)"/>

  <rect x="362" y="80" width="100" height="22" fill="#151050" rx="3"/>
  <text x="412" y="95" text-anchor="middle" font-size="8" font-weight="600" fill="#818cf8">remote_write</text>

  <!-- remote_write exit to Prometheus -->
  <line x1="462" y1="91" x2="515" y2="91" stroke="#6366f1" stroke-width="1"/>

  <!-- Bottom sub-pipeline: source.file → process → loki.write -->
  <rect x="225" y="128" width="90" height="22" fill="#151050" rx="3"/>
  <text x="270" y="143" text-anchor="middle" font-size="8" font-weight="600" fill="#818cf8">source.file</text>

  <line x1="315" y1="139" x2="330" y2="139" stroke="#6366f1" stroke-width="1" marker-end="url(#arr-sm)"/>

  <rect x="332" y="128" width="75" height="22" fill="#151050" rx="3"/>
  <text x="369" y="143" text-anchor="middle" font-size="8" font-weight="600" fill="#818cf8">process</text>

  <line x1="407" y1="139" x2="422" y2="139" stroke="#6366f1" stroke-width="1" marker-end="url(#arr-sm)"/>

  <rect x="424" y="128" width="75" height="22" fill="#151050" rx="3"/>
  <text x="461" y="143" text-anchor="middle" font-size="8" font-weight="600" fill="#818cf8">loki.write</text>

  <!-- loki.write exit to Loki -->
  <line x1="499" y1="139" x2="515" y2="139" stroke="#6366f1" stroke-width="1"/>

  <!-- Source → Alloy arrows -->
  <line x1="165" y1="91" x2="215" y2="91" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="165" y1="139" x2="215" y2="139" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Alloy → Prometheus -->
  <line x1="515" y1="91" x2="549" y2="91" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-amber)"/>
  <!-- Alloy → Loki -->
  <line x1="515" y1="139" x2="549" y2="139" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <!-- PROMETHEUS -->
  <rect x="551" y="62" width="115" height="58" fill="#1a1000" stroke="#f59e0b" stroke-width="1.5" rx="5"/>
  <text x="608" y="85" text-anchor="middle" font-size="12" font-weight="600" fill="#fcd34d">Prometheus</text>
  <text x="608" y="102" text-anchor="middle" font-size="9" fill="#78716c">metrics storage</text>
  <text x="608" y="114" text-anchor="middle" font-size="8" fill="#4a4a6a">:9090</text>

  <!-- LOKI -->
  <rect x="551" y="110" width="115" height="50" fill="#1a1000" stroke="#f59e0b" stroke-width="1.5" rx="5"/>
  <text x="608" y="130" text-anchor="middle" font-size="12" font-weight="600" fill="#fcd34d">Loki</text>
  <text x="608" y="147" text-anchor="middle" font-size="9" fill="#78716c">log storage · :3100</text>

  <!-- Footer -->
  <text x="350" y="183" text-anchor="middle" font-size="9" fill="#475569">Traefik metrics scraped via :8082 · access logs collected from file · forwarded to Prometheus and Loki</text>
</svg>
