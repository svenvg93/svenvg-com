<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <radialGradient id="glow" cx="18%" cy="18%" r="42%">
      <stop offset="0%" stop-color="#37BEC3" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#37BEC3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%" stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Stacked layers, abstracting a middleware chain -->
  <g fill="none" stroke="#37BEC3" stroke-width="1.5">
    <rect x="60" y="70" width="150" height="36" rx="6" stroke-opacity="0.30"/>
    <rect x="100" y="120" width="150" height="36" rx="6" stroke-opacity="0.22"/>
    <rect x="140" y="170" width="150" height="36" rx="6" stroke-opacity="0.15"/>
    <rect x="180" y="220" width="150" height="36" rx="6" stroke-opacity="0.10"/>
  </g>

  <!-- Short accent rule, sits right above the eyebrow label -->
  <rect x="576" y="466" width="48" height="4" rx="2" fill="#37BEC3"/>

  <!-- Bottom gradient overlay -->
  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>

  <!-- Series label -->
  <text x="600" y="500" text-anchor="middle" font-size="13" fill="#37BEC3" letter-spacing="3" font-weight="600">TRAEFIK REVERSE PROXY</text>

  <!-- Title -->
  <text x="600" y="545" text-anchor="middle" font-size="40" font-weight="700" fill="#f1f5f9">Middlewares &amp; Dashboard Security</text>
</svg>
