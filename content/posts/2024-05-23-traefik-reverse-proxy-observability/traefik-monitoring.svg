<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" width="700" height="220"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-teal" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#37BEC3"/>
    </marker>
  </defs>

  <rect width="700" height="220" fill="url(#bg)" rx="8"/>

  <!-- Traefik Metrics -->
  <rect x="40" y="45" width="140" height="50" fill="none" stroke="#37BEC3" stroke-width="1.5" rx="5"/>
  <text x="110" y="64" text-anchor="middle" font-size="12" font-weight="600" fill="#8fdfe3">Traefik Metrics</text>
  <text x="110" y="80" text-anchor="middle" font-size="10" fill="#37BEC3" opacity="0.8">:8082/metrics</text>

  <!-- Traefik Logs -->
  <rect x="40" y="125" width="140" height="50" fill="none" stroke="#37BEC3" stroke-width="1.5" rx="5"/>
  <text x="110" y="144" text-anchor="middle" font-size="12" font-weight="600" fill="#8fdfe3">Traefik Logs</text>
  <text x="110" y="160" text-anchor="middle" font-size="10" fill="#37BEC3" opacity="0.8">access log file</text>

  <!-- Alloy -->
  <rect x="225" y="55" width="250" height="110" fill="none" stroke="#37BEC3" stroke-width="1.5" rx="5"/>
  <text x="350" y="104" text-anchor="middle" font-size="14" font-weight="700" fill="#8fdfe3">Grafana Alloy</text>
  <text x="350" y="122" text-anchor="middle" font-size="11" fill="#37BEC3" opacity="0.8">collects &amp; forwards</text>

  <!-- Prometheus -->
  <rect x="520" y="45" width="140" height="50" fill="none" stroke="#37BEC3" stroke-width="1.5" rx="5"/>
  <text x="590" y="64" text-anchor="middle" font-size="12" font-weight="600" fill="#8fdfe3">Prometheus</text>
  <text x="590" y="80" text-anchor="middle" font-size="10" fill="#37BEC3" opacity="0.8">:9090</text>

  <!-- Loki -->
  <rect x="520" y="125" width="140" height="50" fill="none" stroke="#37BEC3" stroke-width="1.5" rx="5"/>
  <text x="590" y="144" text-anchor="middle" font-size="12" font-weight="600" fill="#8fdfe3">Loki</text>
  <text x="590" y="160" text-anchor="middle" font-size="10" fill="#37BEC3" opacity="0.8">:3100</text>

  <!-- arrows -->
  <line x1="180" y1="70" x2="223" y2="70" stroke="#37BEC3" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <line x1="180" y1="150" x2="223" y2="150" stroke="#37BEC3" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <line x1="477" y1="70" x2="518" y2="70" stroke="#37BEC3" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <line x1="477" y1="150" x2="518" y2="150" stroke="#37BEC3" stroke-width="1.5" marker-end="url(#arr-teal)"/>
</svg>
