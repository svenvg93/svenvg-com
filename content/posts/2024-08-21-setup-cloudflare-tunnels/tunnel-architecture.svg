<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 190" width="700" height="190"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="700" height="190" fill="url(#bg)" rx="8"/>

  <!-- cloudflared / home network (trusted) -->
  <rect x="70" y="60" width="150" height="70" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="145" y="90" text-anchor="middle" font-size="13" font-weight="600" fill="#86efac">cloudflared</text>
  <text x="145" y="106" text-anchor="middle" font-size="10" fill="#34d399" opacity="0.8">no inbound ports open</text>

  <line x1="220" y1="95" x2="263" y2="95" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="241" y="87" text-anchor="middle" font-size="8" fill="#94a3b8">outbound TLS</text>

  <!-- Cloudflare Edge (central) -->
  <rect x="265" y="48" width="190" height="94" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="360" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#bae6fd">Cloudflare Edge</text>
  <text x="360" y="104" text-anchor="middle" font-size="10" fill="#38bdf8" opacity="0.8">global anycast network</text>
  <text x="360" y="120" text-anchor="middle" font-size="10" fill="#38bdf8" opacity="0.8">TLS · DDoS protection</text>

  <line x1="455" y1="95" x2="498" y2="95" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="476" y="87" text-anchor="middle" font-size="8" fill="#94a3b8">HTTPS</text>

  <!-- Browser (external) -->
  <rect x="500" y="65" width="130" height="60" fill="none" stroke="#ef4444" stroke-width="1.5" rx="5"/>
  <text x="565" y="90" text-anchor="middle" font-size="13" font-weight="600" fill="#fca5a5">Browser</text>
  <text x="565" y="106" text-anchor="middle" font-size="10" fill="#ef4444" opacity="0.8">internet user</text>
</svg>
