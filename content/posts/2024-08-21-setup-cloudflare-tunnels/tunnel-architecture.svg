<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 190" width="700" height="190"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-indigo" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#6366f1"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#f59e0b"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#166534"/>
    </marker>
  </defs>

  <rect width="700" height="190" fill="url(#bg)" rx="8"/>
  <line x1="0" y1="36" x2="700" y2="36" stroke="#0d1a2a" stroke-width="1"/>
  <text x="350" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1">CLOUDFLARE TUNNEL — OUTBOUND-ONLY ARCHITECTURE</text>

  <!-- Home Network zone -->
  <rect x="43" y="50" width="175" height="105" fill="#060c18" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="130" y="66" text-anchor="middle" font-size="9" font-weight="600" fill="#3b82f6" letter-spacing="1">HOME NETWORK</text>

  <!-- cloudflared box -->
  <rect x="53" y="73" width="155" height="70" fill="#0a0d28" stroke="#6366f1" stroke-width="1.5" rx="5"/>
  <text x="130" y="96" text-anchor="middle" font-size="12" font-weight="600" fill="#a5b4fc">cloudflared</text>
  <text x="130" y="113" text-anchor="middle" font-size="9" fill="#64748b">tunnel daemon</text>
  <text x="130" y="129" text-anchor="middle" font-size="8" fill="#4a4a6a">outbound-only TLS</text>

  <!-- cloudflared → Cloudflare Edge -->
  <line x1="208" y1="108" x2="278" y2="98" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr-indigo)"/>

  <!-- Cloudflare Edge box -->
  <rect x="280" y="52" width="165" height="95" fill="#1a1000" stroke="#f59e0b" stroke-width="1.5" rx="5"/>
  <text x="362" y="78" text-anchor="middle" font-size="12" font-weight="600" fill="#fcd34d">Cloudflare Edge</text>
  <text x="362" y="95" text-anchor="middle" font-size="9" fill="#78716c">global network</text>
  <text x="362" y="112" text-anchor="middle" font-size="8" fill="#4a4a6a">DDoS protection · TLS</text>
  <text x="362" y="127" text-anchor="middle" font-size="8" fill="#4a4a6a">:443</text>

  <!-- Cloudflare Edge → User -->
  <line x1="445" y1="98" x2="520" y2="98" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-amber)"/>
  <text x="482" y="90" text-anchor="middle" font-size="8" fill="#fbbf24">HTTPS</text>

  <!-- User/Browser box -->
  <rect x="522" y="68" width="135" height="60" fill="#071810" stroke="#166534" stroke-width="1.5" rx="5"/>
  <text x="589" y="93" text-anchor="middle" font-size="12" font-weight="600" fill="#86efac">Browser</text>
  <text x="589" y="110" text-anchor="middle" font-size="9" fill="#64748b">internet user</text>

  <!-- No open ports note -->
  <text x="130" y="168" text-anchor="middle" font-size="8" fill="#475569">no inbound ports</text>

  <!-- Footer -->
  <text x="350" y="178" text-anchor="middle" font-size="9" fill="#475569">cloudflared opens outbound connections only · no router ports need to be forwarded or firewall rules opened</text>
</svg>
