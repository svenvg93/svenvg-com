<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%" stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="hex-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e2040"/>
      <stop offset="100%" stop-color="#071428"/>
    </linearGradient>
    <!-- Zone glows -->
    <radialGradient id="glow-red" cx="16%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-green" cx="82%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <!-- Gradient arrows -->
    <linearGradient id="arr-wan" x1="265" y1="210" x2="519" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="arr-lan" x1="680" y1="210" x2="870" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-red)"/>
  <rect width="1200" height="630" fill="url(#glow-blue)"/>
  <rect width="1200" height="630" fill="url(#glow-green)"/>

  <!-- Subtle grid -->
  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0"   y1="95"  x2="1200" y2="95"/>
    <line x1="0"   y1="315" x2="1200" y2="315"/>
    <line x1="400" y1="0"   x2="400"  y2="390"/>
    <line x1="800" y1="0"   x2="800"  y2="390"/>
  </g>

  <!-- === Internet / WAN (left, RED) === -->
  <circle cx="190" cy="210" r="74" fill="#150808" stroke="#7f1d1d" stroke-width="1.5"/>
  <ellipse cx="190" cy="210" rx="37" ry="74" fill="none" stroke="#7f1d1d" stroke-width="1"/>
  <line x1="116" y1="210" x2="264" y2="210" stroke="#7f1d1d" stroke-width="1"/>
  <line x1="122" y1="173" x2="258" y2="173" stroke="#7f1d1d" stroke-width="1" opacity="0.4"/>
  <line x1="122" y1="247" x2="258" y2="247" stroke="#7f1d1d" stroke-width="1" opacity="0.4"/>
  <text x="190" y="216" text-anchor="middle" font-size="14" fill="#f87171" font-weight="600">Internet</text>
  <!-- ether1 badge -->
  <rect x="140" y="299" width="100" height="22" fill="#150808" stroke="#7f1d1d" stroke-width="1" rx="3"/>
  <text x="190" y="314" text-anchor="middle" font-size="10" fill="#f87171" letter-spacing="1">WAN · ether1</text>

  <!-- Arrow WAN → Router (red→blue gradient) -->
  <line x1="265" y1="210" x2="519" y2="210" stroke="url(#arr-wan)" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr-blue)"/>
  <text x="392" y="198" text-anchor="middle" font-size="9" fill="#6b2020" letter-spacing="1">DHCP · PPPoE · Static</text>

  <!-- === MikroTik Router hexagon, center (600,210), pointy-top, r=90 (BLUE) === -->
  <polygon points="600,120 678,165 678,255 600,300 522,255 522,165"
           fill="url(#hex-fill)" stroke="#38bdf8" stroke-width="2.5"/>
  <polygon points="600,134 666,172 666,248 600,286 534,248 534,172"
           fill="none" stroke="#38bdf8" stroke-width="0.8" stroke-opacity="0.3"/>

  <text x="600" y="199" text-anchor="middle" font-size="22" font-weight="700" fill="#bae6fd" letter-spacing="1">MikroTik</text>
  <text x="600" y="222" text-anchor="middle" font-size="10" fill="#38bdf8" letter-spacing="3" opacity="0.8">RouterOS v7</text>

  <!-- Config pills below hexagon -->
  <g font-size="10" font-weight="600" letter-spacing="1" text-anchor="middle">
    <rect x="484" y="318" width="48" height="22" fill="#071428" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.5" rx="3"/>
    <text x="508" y="333" fill="#7dd3fc">NAT</text>
    <rect x="542" y="318" width="72" height="22" fill="#071428" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.5" rx="3"/>
    <text x="578" y="333" fill="#7dd3fc">Firewall</text>
    <rect x="624" y="318" width="56" height="22" fill="#071428" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.5" rx="3"/>
    <text x="652" y="333" fill="#7dd3fc">DHCP</text>
    <rect x="690" y="318" width="48" height="22" fill="#071428" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.5" rx="3"/>
    <text x="714" y="333" fill="#7dd3fc">DNS</text>
  </g>

  <!-- Arrow Router → LAN (blue→green gradient) -->
  <line x1="680" y1="210" x2="869" y2="210" stroke="url(#arr-lan)" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="775" y="198" text-anchor="middle" font-size="9" fill="#0a4040" letter-spacing="1">192.168.1.0/24</text>

  <!-- === LAN (right, GREEN) === -->
  <!-- Bridge block -->
  <rect x="874" y="180" width="168" height="58" fill="#071810" stroke="#166534" stroke-width="1.5" rx="5"/>
  <text x="958" y="205" text-anchor="middle" font-size="13" fill="#86efac" font-weight="600">bridge1</text>
  <text x="958" y="224" text-anchor="middle" font-size="9" fill="#4ade80" letter-spacing="1">ether2 – ether16</text>

  <!-- Vertical drop lines to devices -->
  <line x1="918" y1="238" x2="918" y2="278" stroke="#14532d" stroke-width="1.5"/>
  <line x1="958" y1="238" x2="958" y2="278" stroke="#14532d" stroke-width="1.5"/>
  <line x1="998" y1="238" x2="998" y2="278" stroke="#14532d" stroke-width="1.5"/>

  <!-- Device nodes -->
  <circle cx="918" cy="290" r="13" fill="#071810" stroke="#166534" stroke-width="1.5"/>
  <circle cx="958" cy="290" r="13" fill="#071810" stroke="#166534" stroke-width="1.5"/>
  <circle cx="998" cy="290" r="13" fill="#071810" stroke="#166534" stroke-width="1.5"/>
  <text x="918" y="294" text-anchor="middle" font-size="7" fill="#4ade80">PC</text>
  <text x="958" y="294" text-anchor="middle" font-size="7" fill="#4ade80">PC</text>
  <text x="998" y="294" text-anchor="middle" font-size="7" fill="#4ade80">PC</text>

  <!-- DHCP range label -->
  <text x="958" y="330" text-anchor="middle" font-size="10" fill="#166534" letter-spacing="1">DHCP 192.168.1.100–254</text>

  <!-- Bottom gradient overlay -->
  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>

  <!-- Series label -->
  <text x="600" y="500" text-anchor="middle" font-size="13" fill="#ef4444" letter-spacing="3" font-weight="600">MikroTik</text>

  <!-- Title -->
  <text x="600" y="538" text-anchor="middle" font-size="34" font-weight="700" fill="#f1f5f9">Setting Up a MikroTik Router</text>
</svg>
