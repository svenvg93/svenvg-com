<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" width="700" height="260"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#3b82f6"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="700" height="260" fill="url(#bg)" rx="8"/>

  <line x1="0" y1="36" x2="700" y2="36" stroke="#0d1a2a" stroke-width="1"/>
  <text x="350" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1">MIKROTIK — WAN TO LAN TOPOLOGY</text>

  <!-- Internet / ISP -->
  <rect x="90" y="88" width="110" height="60" fill="none" stroke="#ef4444" stroke-width="1.5" rx="5"/>
  <text x="145" y="112" text-anchor="middle" font-size="12" font-weight="600" fill="#fca5a5">Internet</text>
  <text x="145" y="128" text-anchor="middle" font-size="9" fill="#ef4444" opacity="0.8">ISP / WAN</text>

  <!-- MikroTik Router -->
  <rect x="245" y="68" width="190" height="100" fill="none" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="340" y="94" text-anchor="middle" font-size="12" font-weight="600" fill="#93c5fd">MikroTik Router</text>
  <text x="340" y="112" text-anchor="middle" font-size="9" fill="#3b82f6" opacity="0.8">ether1 (WAN)</text>
  <text x="340" y="128" text-anchor="middle" font-size="9" fill="#3b82f6" opacity="0.8">NAT + Firewall</text>

  <!-- bridge1 LAN -->
  <rect x="480" y="88" width="130" height="60" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="545" y="112" text-anchor="middle" font-size="12" font-weight="600" fill="#86efac">bridge1 (LAN)</text>
  <text x="545" y="128" text-anchor="middle" font-size="9" fill="#34d399" opacity="0.8" font-family="'Courier New',monospace">192.168.1.0/24</text>

  <!-- LAN Devices -->
  <rect x="480" y="168" width="130" height="50" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3" rx="5"/>
  <text x="545" y="188" text-anchor="middle" font-size="12" font-weight="600" fill="#86efac">LAN Devices</text>
  <text x="545" y="204" text-anchor="middle" font-size="9" fill="#34d399" opacity="0.8">DHCP leases</text>

  <!-- Arrows -->
  <line x1="200" y1="118" x2="245" y2="118" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="435" y1="118" x2="480" y2="118" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="545" y1="148" x2="545" y2="168" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>
</svg>
