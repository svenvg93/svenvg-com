<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#dc2626"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#4ade80"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0"    y1="100" x2="1200" y2="100"/>
    <line x1="0"    y1="200" x2="1200" y2="200"/>
    <line x1="0"    y1="300" x2="1200" y2="300"/>
    <line x1="0"    y1="400" x2="1200" y2="400"/>
    <line x1="200"  y1="0"   x2="200"  y2="500"/>
    <line x1="400"  y1="0"   x2="400"  y2="500"/>
    <line x1="600"  y1="0"   x2="600"  y2="500"/>
    <line x1="800"  y1="0"   x2="800"  y2="500"/>
    <line x1="1000" y1="0"   x2="1000" y2="500"/>
  </g>

  <!-- Left: variable sources (stacked) -->
  <!-- group_vars/all.yml -->
  <rect x="60" y="108" width="300" height="64" fill="#0a1628" stroke="#7f1d1d" stroke-width="1.5" rx="6"/>
  <rect x="60" y="108" width="300" height="20" fill="#3b0808" rx="6"/>
  <rect x="60" y="118" width="300" height="10" fill="#3b0808"/>
  <text x="210" y="122" text-anchor="middle" font-size="8" fill="#f87171">group_vars/all.yml</text>
  <g font-family="'Courier New',monospace" font-size="9">
    <text x="76" y="145" fill="#7dd3fc">ntp_server: </text><text x="152" y="145" fill="#fb923c">"pool.ntp.org"</text>
    <text x="76" y="161" fill="#7dd3fc">timezone: </text><text x="140" y="161" fill="#fb923c">"Europe/Amsterdam"</text>
  </g>

  <!-- group_vars/servers.yml -->
  <rect x="60" y="188" width="300" height="64" fill="#0a1628" stroke="#7f1d1d" stroke-width="1" rx="6"/>
  <rect x="60" y="188" width="300" height="20" fill="#2a0c0c" rx="6"/>
  <rect x="60" y="198" width="300" height="10" fill="#2a0c0c"/>
  <text x="210" y="202" text-anchor="middle" font-size="8" fill="#f87171">group_vars/servers.yml</text>
  <g font-family="'Courier New',monospace" font-size="9">
    <text x="76" y="225" fill="#7dd3fc">http_port: </text><text x="148" y="225" fill="#fb923c">80</text>
    <text x="76" y="241" fill="#7dd3fc">log_level: </text><text x="148" y="241" fill="#fb923c">"info"</text>
  </g>

  <!-- host_vars/web01.yml -->
  <rect x="60" y="268" width="300" height="64" fill="#0a1628" stroke="#dc2626" stroke-width="1.5" rx="6"/>
  <rect x="60" y="268" width="300" height="20" fill="#200808" rx="6"/>
  <rect x="60" y="278" width="300" height="10" fill="#200808"/>
  <text x="210" y="282" text-anchor="middle" font-size="8" fill="#f87171">host_vars/web01.yml</text>
  <g font-family="'Courier New',monospace" font-size="9">
    <text x="76" y="305" fill="#7dd3fc">http_port: </text><text x="148" y="305" fill="#fb923c">8080</text>
    <text x="76" y="321" fill="#7dd3fc">ansible_host: </text><text x="172" y="321" fill="#fb923c">"192.168.1.10"</text>
  </g>

  <text x="210" y="378" text-anchor="middle" font-size="11" fill="#64748b">Variable Sources</text>

  <!-- Arrow left → center -->
  <path d="M 362,235 L 452,235" fill="none" stroke="#dc2626" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Center: setup / facts box -->
  <rect x="454" y="145" width="292" height="195" fill="#0a1628" stroke="#475569" stroke-width="1" rx="8"/>
  <rect x="454" y="145" width="292" height="26" fill="#1a0808" rx="8"/>
  <rect x="454" y="159" width="292" height="12" fill="#1a0808"/>
  <text x="600" y="162" text-anchor="middle" font-size="9" fill="#dc2626">ansible.builtin.setup</text>

  <!-- Facts labels -->
  <text x="600" y="196" text-anchor="middle" font-size="10" fill="#94a3b8" letter-spacing="1">GATHER FACTS</text>

  <g font-family="'Courier New',monospace" font-size="9" fill="#64748b">
    <text x="474" y="218">ansible_hostname</text>
    <text x="474" y="234">ansible_distribution</text>
    <text x="474" y="250">ansible_os_family</text>
    <text x="474" y="266">ansible_default_ipv4</text>
    <text x="474" y="282">ansible_memtotal_mb</text>
    <text x="474" y="298">ansible_interfaces</text>
    <text x="474" y="314">...</text>
  </g>

  <text x="600" y="378" text-anchor="middle" font-size="11" fill="#64748b">Facts</text>

  <!-- Arrow center → right -->
  <path d="M 748,235 L 828,235" fill="none" stroke="#4ade80" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Right: task using variables + debug output -->
  <rect x="838" y="110" width="302" height="250" fill="#0a1628" stroke="#14532d" stroke-width="1.5" rx="8"/>
  <rect x="838" y="110" width="302" height="24" fill="#052e16" rx="8"/>
  <rect x="838" y="122" width="302" height="12" fill="#052e16"/>
  <text x="989" y="126" text-anchor="middle" font-size="9" fill="#4ade80">tasks/main.yml</text>

  <g font-family="'Courier New',monospace" font-size="9">
    <text x="854" y="156" fill="#94a3b8">- name: Show host info</text>
    <text x="854" y="172" fill="#7dd3fc">  debug:</text>
    <text x="854" y="188" fill="#7dd3fc">    msg: "{{</text>
    <text x="854" y="204" fill="#fb923c">      ansible_hostname</text>
    <text x="854" y="220" fill="#7dd3fc">    }} runs {{</text>
    <text x="854" y="236" fill="#fb923c">      ansible_distribution</text>
    <text x="854" y="252" fill="#7dd3fc">    }}"</text>

    <text x="854" y="278" fill="#94a3b8">  when: ansible_os_family</text>
    <text x="854" y="294" fill="#94a3b8">    == "Debian"</text>
    <text x="854" y="314" fill="#4ade80">ok: [web01] =&gt;</text>
    <text x="854" y="330" fill="#4ade80">  web01 runs Ubuntu</text>
    <text x="854" y="346" fill="#4ade80">  24.04</text>
  </g>
  <text x="989" y="378" text-anchor="middle" font-size="11" fill="#64748b">Task</text>

  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>
  <text x="600" y="500" text-anchor="middle" font-size="13"
        fill="#dc2626" letter-spacing="3" font-weight="600">Ansible Essentials</text>
  <text x="600" y="538" text-anchor="middle" font-size="34"
        font-weight="700" fill="#f1f5f9">Variables &amp; Facts</text>
</svg>
