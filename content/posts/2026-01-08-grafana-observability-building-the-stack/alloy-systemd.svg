<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" width="700" height="260"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#f97316"/>
    </marker>
  </defs>

  <rect width="700" height="260" fill="url(#bg)" rx="8"/>

  <!-- systemd -->
  <rect x="40" y="90" width="110" height="60" fill="none" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="95" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#fed7aa">systemd</text>
  <text x="95" y="132" text-anchor="middle" font-size="9" fill="#f97316" opacity="0.8">alloy.service</text>

  <!-- systemd -> Alloy -->
  <line x1="150" y1="120" x2="200" y2="120" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="175" y="112" text-anchor="middle" font-size="8" fill="#fdba74">starts</text>

  <!-- Grafana Alloy (systemd unit) -->
  <rect x="200" y="55" width="190" height="130" fill="none" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="295" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#fed7aa">Grafana Alloy</text>
  <text x="295" y="132" text-anchor="middle" font-size="9" fill="#f97316" opacity="0.8">user: alloy · :12345</text>

  <!-- Alloy -> Prometheus -->
  <line x1="390" y1="67.5" x2="490" y2="67.5" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="440" y="59.5" text-anchor="middle" font-size="8" fill="#fdba74">remote_write</text>

  <!-- Alloy -> Loki -->
  <line x1="390" y1="172.5" x2="490" y2="172.5" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="440" y="189.5" text-anchor="middle" font-size="8" fill="#fdba74">push logs</text>

  <!-- Prometheus (remote) -->
  <rect x="490" y="40" width="140" height="55" fill="none" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="560" y="62" text-anchor="middle" font-size="13" font-weight="700" fill="#fed7aa">Prometheus</text>
  <text x="560" y="79" text-anchor="middle" font-size="9" fill="#f97316" opacity="0.8">remote · :9090</text>

  <!-- Loki (remote) -->
  <rect x="490" y="145" width="140" height="55" fill="none" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="560" y="167" text-anchor="middle" font-size="13" font-weight="700" fill="#fed7aa">Loki</text>
  <text x="560" y="184" text-anchor="middle" font-size="9" fill="#f97316" opacity="0.8">remote · :3100</text>

  <!-- Permission grants (host access) -->
  <line x1="230" y1="230" x2="230" y2="185" stroke="#f97316" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.7" marker-end="url(#arr-orange)"/>
  <text x="230" y="245" text-anchor="middle" font-size="8" fill="#fdba74">/var/log · adm group</text>

  <line x1="370" y1="230" x2="370" y2="185" stroke="#f97316" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.7" marker-end="url(#arr-orange)"/>
  <text x="370" y="245" text-anchor="middle" font-size="8" fill="#fdba74">docker.sock · CAP_DAC_READ_SEARCH</text>
</svg>
