<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" width="700" height="260"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#f97316"/>
    </marker>
  </defs>

  <rect width="700" height="260" fill="url(#bg)" rx="8"/>

  <!-- Host Filesystem -->
  <rect x="40" y="60" width="150" height="55" fill="none" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="115" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="#fed7aa">Host Filesystem</text>
  <text x="115" y="99" text-anchor="middle" font-size="9" fill="#f97316" opacity="0.8">/proc · /sys · /rootfs</text>

  <!-- Docker Socket -->
  <rect x="40" y="145" width="150" height="55" fill="none" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="115" y="167" text-anchor="middle" font-size="13" font-weight="700" fill="#fed7aa">Docker Socket</text>
  <text x="115" y="184" text-anchor="middle" font-size="9" fill="#f97316" opacity="0.8">/var/run/docker.sock</text>

  <!-- Host FS -> Alloy -->
  <line x1="190" y1="87.5" x2="280" y2="87.5" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="235" y="79" text-anchor="middle" font-size="8" fill="#fdba74">unix exporter</text>

  <!-- Docker -> Alloy -->
  <line x1="190" y1="172.5" x2="280" y2="172.5" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="235" y="189" text-anchor="middle" font-size="8" fill="#fdba74">cadvisor exporter</text>

  <!-- Alloy -->
  <rect x="280" y="70" width="170" height="120" fill="none" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="365" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="#fed7aa">Grafana Alloy</text>
  <text x="365" y="143" text-anchor="middle" font-size="9" fill="#f97316" opacity="0.8">host + container exporters</text>

  <!-- Alloy -> Prometheus -->
  <line x1="450" y1="130" x2="540" y2="130" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="495" y="122" text-anchor="middle" font-size="8" fill="#fdba74">relabel + remote_write</text>

  <!-- Prometheus -->
  <rect x="540" y="95" width="120" height="70" fill="none" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="600" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#fed7aa">Prometheus</text>
  <text x="600" y="141" text-anchor="middle" font-size="9" fill="#f97316" opacity="0.8">metrics · :9090</text>
</svg>
