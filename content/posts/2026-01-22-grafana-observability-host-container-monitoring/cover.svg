<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="hex-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e2040"/>
      <stop offset="100%" stop-color="#071428"/>
    </linearGradient>
    <linearGradient id="prom-area" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%" stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <!-- Left-to-Alloy gradient arrows (green → blue) -->
    <linearGradient id="arr-host-alloy" x1="330" y1="195" x2="531" y2="205" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="arr-ctr-alloy" x1="330" y1="328" x2="531" y2="248" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <!-- Alloy-to-right gradient arrows (blue → destination color) -->
    <linearGradient id="arr-alloy-prom" x1="671" y1="192" x2="850" y2="155" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="arr-alloy-graf" x1="671" y1="238" x2="850" y2="275" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <!-- Zone glows -->
    <radialGradient id="glow-green" cx="17%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="18%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-red" cx="83%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <!-- Arrow markers -->
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#ef4444"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-green)"/>
  <rect width="1200" height="630" fill="url(#glow-blue)"/>
  <rect width="1200" height="630" fill="url(#glow-red)"/>

  <!-- Subtle line grid -->
  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0"    y1="100" x2="1200" y2="100"/>
    <line x1="0"    y1="200" x2="1200" y2="200"/>
    <line x1="0"    y1="300" x2="1200" y2="300"/>
    <line x1="200"  y1="0"   x2="200"  y2="500"/>
    <line x1="400"  y1="0"   x2="400"  y2="500"/>
    <line x1="600"  y1="0"   x2="600"  y2="500"/>
    <line x1="800"  y1="0"   x2="800"  y2="500"/>
    <line x1="1000" y1="0"   x2="1000" y2="500"/>
  </g>

  <!-- ===== LEFT ZONE — source infrastructure ===== -->

  <!-- Host server card -->
  <rect x="120" y="108" width="210" height="172" fill="#0d1e30" stroke="#34d399" stroke-width="1.5" rx="8"/>
  <rect x="120" y="108" width="6"   height="172" fill="#34d399" rx="4"/>
  <text x="160" y="130" font-size="11" font-weight="700" fill="#34d399" letter-spacing="2">HOST</text>
  <text x="160" y="143" font-size="8"  fill="#64748b" font-family="'Courier New',monospace">ubuntu 24.04 · x86_64</text>
  <!-- CPU row -->
  <rect x="136" y="150" width="178" height="22" fill="#0a1a2c" stroke="#1e3a50" stroke-width="1" rx="3"/>
  <text x="144" y="165" font-size="8" fill="#94a3b8" font-family="'Courier New',monospace">CPU </text>
  <rect x="168" y="154" width="90" height="5" fill="#1e3a50" rx="2"/>
  <rect x="168" y="154" width="34" height="5" fill="#38bdf8" rx="2"/>
  <text x="266" y="165" font-size="8" fill="#7dd3fc" font-family="'Courier New',monospace">38%</text>
  <!-- MEM row -->
  <rect x="136" y="177" width="178" height="22" fill="#0a1a2c" stroke="#1e3a50" stroke-width="1" rx="3"/>
  <text x="144" y="192" font-size="8" fill="#94a3b8" font-family="'Courier New',monospace">MEM </text>
  <rect x="168" y="181" width="90" height="5" fill="#1e3a50" rx="2"/>
  <rect x="168" y="181" width="67" height="5" fill="#38bdf8" rx="2"/>
  <text x="266" y="192" font-size="8" fill="#7dd3fc" font-family="'Courier New',monospace">74%</text>
  <!-- DISK row -->
  <rect x="136" y="204" width="178" height="22" fill="#0a1a2c" stroke="#1e3a50" stroke-width="1" rx="3"/>
  <text x="144" y="219" font-size="8" fill="#94a3b8" font-family="'Courier New',monospace">DISK</text>
  <rect x="168" y="208" width="90" height="5" fill="#1e3a50" rx="2"/>
  <rect x="168" y="208" width="38" height="5" fill="#38bdf8" rx="2"/>
  <text x="266" y="219" font-size="8" fill="#7dd3fc" font-family="'Courier New',monospace">42%</text>
  <!-- NET row -->
  <rect x="136" y="231" width="178" height="22" fill="#0a1a2c" stroke="#1e3a50" stroke-width="1" rx="3"/>
  <text x="144" y="246" font-size="8" fill="#94a3b8" font-family="'Courier New',monospace">NET </text>
  <text x="168" y="246" font-size="8" fill="#4ade80" font-family="'Courier New',monospace">12 MB/s  48 MB/s</text>
  <!-- node_exporter label -->
  <text x="225" y="275" text-anchor="middle" font-size="8" fill="#334155" font-family="'Courier New',monospace">prometheus.exporter.unix</text>

  <!-- Docker containers card -->
  <rect x="120" y="295" width="210" height="82" fill="#0d1e30" stroke="#34d399" stroke-width="1.5" rx="8"/>
  <rect x="120" y="295" width="6"   height="82" fill="#34d399" rx="4"/>
  <text x="160" y="315" font-size="11" font-weight="700" fill="#34d399" letter-spacing="2">CONTAINERS</text>
  <g font-size="8.5" font-family="'Courier New',monospace">
    <circle cx="143" cy="331" r="4" fill="#4ade80" fill-opacity="0.85"/>
    <text x="153" y="334" fill="#94a3b8">nginx</text>
    <circle cx="143" cy="349" r="4" fill="#4ade80" fill-opacity="0.85"/>
    <text x="153" y="352" fill="#94a3b8">traefik</text>
    <circle cx="225" cy="331" r="4" fill="#4ade80" fill-opacity="0.85"/>
    <text x="235" y="334" fill="#94a3b8">grafana</text>
    <circle cx="225" cy="349" r="4" fill="#4ade80" fill-opacity="0.85"/>
    <text x="235" y="352" fill="#94a3b8">alloy</text>
  </g>
  <!-- cadvisor label -->
  <text x="225" y="372" text-anchor="middle" font-size="8" fill="#334155" font-family="'Courier New',monospace">prometheus.exporter.cadvisor</text>

  <!-- Arrows: left sources → Alloy (pointy-top hex, left face at x=531) -->
  <!-- Host → Alloy -->
  <path d="M 330,195 C 390,195 470,206 531,208"
        fill="none" stroke="url(#arr-host-alloy)" stroke-width="2" marker-end="url(#arr-blue)"/>
  <!-- Containers → Alloy -->
  <path d="M 330,328 C 390,328 470,248 531,226"
        fill="none" stroke="url(#arr-ctr-alloy)" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- ===== CENTER ZONE — Alloy hexagon (pointy-top, center 600,215, r=82) ===== -->
  <!-- Vertices: top(600,133) top-right(671,174) bottom-right(671,256) bottom(600,297) bottom-left(529,256) top-left(529,174) -->
  <polygon points="600,133 671,174 671,256 600,297 529,256 529,174"
           fill="url(#hex-fill)" stroke="#38bdf8" stroke-width="2.5"/>
  <polygon points="600,141 663,179 663,251 600,289 537,251 537,179"
           fill="none" stroke="#38bdf8" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="600" y="209" text-anchor="middle" font-size="22" font-weight="700" fill="#7dd3fc" letter-spacing="2">ALLOY</text>
  <text x="600" y="230" text-anchor="middle" font-size="11" fill="#38bdf8" letter-spacing="3" opacity="0.8">collector</text>

  <!-- Arrows: Alloy → right tool hexagons -->
  <path d="M 671,192 C 730,180 780,155 850,155"
        fill="none" stroke="url(#arr-alloy-prom)" stroke-width="2" marker-end="url(#arr-red)"/>
  <path d="M 671,238 C 730,250 780,275 850,275"
        fill="none" stroke="url(#arr-alloy-graf)" stroke-width="2" marker-end="url(#arr-amber)"/>

  <!-- ===== RIGHT ZONE: tool nodes as mini hexagons (pointy-top, r=35) ===== -->

  <!-- Prometheus (cx=880, cy=155) — vertices: 880,120 910,138 910,172 880,190 850,172 850,138 -->
  <polygon points="880,120 910,138 910,172 880,190 850,172 850,138"
           fill="#200808" stroke="#ef4444" stroke-width="2"/>
  <polygon points="880,125 906,140 906,170 880,185 854,170 854,140"
           fill="none" stroke="#ef4444" stroke-width="0.7" stroke-opacity="0.3"/>
  <text x="880" y="160" text-anchor="middle" font-size="18" font-weight="800" fill="#ef4444">P</text>
  <text x="922" y="152" font-size="12" font-weight="700" fill="#ef4444" letter-spacing="1">PROMETHEUS</text>
  <text x="922" y="166" font-size="9" fill="#64748b" font-family="'Courier New',monospace">metrics · time-series db</text>

  <!-- Grafana (cx=880, cy=275) — vertices: 880,240 910,258 910,292 880,310 850,292 850,258 -->
  <polygon points="880,240 910,258 910,292 880,310 850,292 850,258"
           fill="#1a1000" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="880,245 906,260 906,290 880,305 854,290 854,260"
           fill="none" stroke="#f59e0b" stroke-width="0.7" stroke-opacity="0.3"/>
  <text x="880" y="281" text-anchor="middle" font-size="18" font-weight="800" fill="#f59e0b">G</text>
  <text x="922" y="272" font-size="12" font-weight="700" fill="#f59e0b" letter-spacing="1">GRAFANA</text>
  <text x="922" y="286" font-size="9" fill="#64748b" font-family="'Courier New',monospace">visualization · dashboards</text>

  <!-- Bottom gradient overlay -->
  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>

  <!-- Series label -->
  <text x="600" y="500" text-anchor="middle" font-size="13" fill="#f97316" letter-spacing="3" font-weight="600">GRAFANA OBSERVABILITY</text>

  <!-- Post title -->
  <text x="600" y="538" text-anchor="middle" font-size="34" font-weight="700" fill="#f1f5f9">Host &amp; Container Monitoring with Grafana Alloy</text>
</svg>
