<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" width="700" height="260"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#94a3b8"/>
    </marker>
    <marker id="arr-sm" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 6,2.5 0,5" fill="#6366f1"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="700" height="260" fill="url(#bg)" rx="8"/>
  <line x1="0" y1="36" x2="700" y2="36" stroke="#0d1a2a" stroke-width="1"/>
  <text x="350" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1">LOG COLLECTION PIPELINE</text>

  <!-- System logs source -->
  <rect x="50" y="65" width="115" height="50" fill="#0b1628" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="107" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#93c5fd">System Logs</text>
  <text x="107" y="102" text-anchor="middle" font-size="9" fill="#64748b">/var/log/*.log</text>

  <!-- Docker source -->
  <rect x="50" y="165" width="115" height="50" fill="#0b1628" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="107" y="186" text-anchor="middle" font-size="10" font-weight="600" fill="#93c5fd">Docker Socket</text>
  <text x="107" y="202" text-anchor="middle" font-size="8" fill="#64748b">/var/run/docker.sock</text>

  <!-- ALLOY big box -->
  <rect x="215" y="48" width="300" height="184" fill="#0a0d28" stroke="#6366f1" stroke-width="1.5" rx="5"/>
  <text x="365" y="65" text-anchor="middle" font-size="11" font-weight="600" fill="#a5b4fc">Grafana Alloy</text>

  <!-- Top sub-pipeline: file.match → loki.source.file → loki.process -->
  <rect x="225" y="80" width="80" height="22" fill="#151050" rx="3"/>
  <text x="265" y="95" text-anchor="middle" font-size="8" font-weight="600" fill="#818cf8">file.match</text>

  <line x1="305" y1="91" x2="318" y2="91" stroke="#6366f1" stroke-width="1" marker-end="url(#arr-sm)"/>

  <rect x="320" y="80" width="75" height="22" fill="#151050" rx="3"/>
  <text x="357" y="95" text-anchor="middle" font-size="8" font-weight="600" fill="#818cf8">source.file</text>

  <line x1="395" y1="91" x2="408" y2="91" stroke="#6366f1" stroke-width="1" marker-end="url(#arr-sm)"/>

  <rect x="410" y="80" width="60" height="22" fill="#151050" rx="3"/>
  <text x="440" y="95" text-anchor="middle" font-size="8" font-weight="600" fill="#818cf8">process</text>

  <text x="312" y="113" text-anchor="middle" font-size="8" fill="#4a4a6a">static labels: job · host · unit</text>

  <!-- Bottom sub-pipeline: docker.relabel → loki.source.docker → loki.process -->
  <rect x="225" y="178" width="80" height="22" fill="#151050" rx="3"/>
  <text x="265" y="193" text-anchor="middle" font-size="8" font-weight="600" fill="#818cf8">docker.relabel</text>

  <line x1="305" y1="189" x2="318" y2="189" stroke="#6366f1" stroke-width="1" marker-end="url(#arr-sm)"/>

  <rect x="320" y="178" width="75" height="22" fill="#151050" rx="3"/>
  <text x="357" y="193" text-anchor="middle" font-size="8" font-weight="600" fill="#818cf8">source.docker</text>

  <line x1="395" y1="189" x2="408" y2="189" stroke="#6366f1" stroke-width="1" marker-end="url(#arr-sm)"/>

  <rect x="410" y="178" width="60" height="22" fill="#151050" rx="3"/>
  <text x="440" y="193" text-anchor="middle" font-size="8" font-weight="600" fill="#818cf8">process</text>

  <text x="312" y="213" text-anchor="middle" font-size="8" fill="#4a4a6a">labels: container_name · stream</text>

  <!-- Vertical merge bus -->
  <line x1="470" y1="91" x2="470" y2="189" stroke="#6366f1" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- loki.write stage -->
  <rect x="480" y="124" width="55" height="22" fill="#151050" rx="3"/>
  <text x="507" y="139" text-anchor="middle" font-size="8" font-weight="600" fill="#818cf8">loki.write</text>
  <line x1="470" y1="135" x2="480" y2="135" stroke="#6366f1" stroke-width="1" marker-end="url(#arr-sm)"/>

  <!-- Source → Alloy arrows -->
  <line x1="165" y1="90" x2="215" y2="91" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="165" y1="190" x2="215" y2="189" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Alloy → Loki -->
  <line x1="515" y1="135" x2="545" y2="135" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <!-- LOKI -->
  <rect x="547" y="95" width="115" height="80" fill="#1a1000" stroke="#f59e0b" stroke-width="1.5" rx="5"/>
  <text x="604" y="126" text-anchor="middle" font-size="12" font-weight="600" fill="#fcd34d">Loki</text>
  <text x="604" y="143" text-anchor="middle" font-size="9" fill="#78716c">log storage</text>
  <text x="604" y="158" text-anchor="middle" font-size="8" fill="#4a4a6a">:3100</text>

  <!-- Footer -->
  <text x="350" y="243" text-anchor="middle" font-size="9" fill="#475569">system logs collected from files · container logs via Docker socket · both enriched with labels before push</text>
</svg>
