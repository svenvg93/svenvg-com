<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" width="700" height="260"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#94a3b8"/>
    </marker>
    <marker id="arr-sm" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 6,2.5 0,5" fill="#6366f1"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="700" height="260" fill="url(#bg)" rx="8"/>
  <line x1="0" y1="36" x2="700" y2="36" stroke="#0d1a2a" stroke-width="1"/>
  <text x="350" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1">METRICS COLLECTION PIPELINE</text>

  <!-- HOST FS source -->
  <rect x="50" y="65" width="115" height="50" fill="#0b1628" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="107" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#93c5fd">Host Filesystem</text>
  <text x="107" y="102" text-anchor="middle" font-size="9" fill="#64748b">/proc · /sys · /rootfs</text>

  <!-- DOCKER source -->
  <rect x="50" y="135" width="115" height="50" fill="#0b1628" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="107" y="156" text-anchor="middle" font-size="12" font-weight="600" fill="#93c5fd">Docker Socket</text>
  <text x="107" y="172" text-anchor="middle" font-size="9" fill="#64748b">/var/run/docker.sock</text>

  <!-- ALLOY big box -->
  <rect x="215" y="48" width="300" height="132" fill="#0a0d28" stroke="#6366f1" stroke-width="1.5" rx="5"/>
  <text x="365" y="65" text-anchor="middle" font-size="11" font-weight="600" fill="#a5b4fc">Grafana Alloy</text>

  <!-- Top sub-pipeline: exporter.unix → scrape → relabel -->
  <rect x="225" y="80" width="92" height="22" fill="#151050" rx="3"/>
  <text x="271" y="95" text-anchor="middle" font-size="8" font-weight="600" fill="#818cf8">exporter.unix</text>

  <line x1="317" y1="91" x2="330" y2="91" stroke="#6366f1" stroke-width="1" marker-end="url(#arr-sm)"/>

  <rect x="332" y="80" width="48" height="22" fill="#151050" rx="3"/>
  <text x="356" y="95" text-anchor="middle" font-size="8" font-weight="600" fill="#818cf8">scrape</text>

  <line x1="380" y1="91" x2="393" y2="91" stroke="#6366f1" stroke-width="1" marker-end="url(#arr-sm)"/>

  <rect x="395" y="80" width="48" height="22" fill="#151050" rx="3"/>
  <text x="419" y="95" text-anchor="middle" font-size="8" font-weight="600" fill="#818cf8">relabel</text>

  <!-- Bottom sub-pipeline: exporter.cadvisor → scrape → relabel -->
  <rect x="225" y="148" width="92" height="22" fill="#151050" rx="3"/>
  <text x="271" y="163" text-anchor="middle" font-size="8" font-weight="600" fill="#818cf8">exporter.cadvisor</text>

  <line x1="317" y1="159" x2="330" y2="159" stroke="#6366f1" stroke-width="1" marker-end="url(#arr-sm)"/>

  <rect x="332" y="148" width="48" height="22" fill="#151050" rx="3"/>
  <text x="356" y="163" text-anchor="middle" font-size="8" font-weight="600" fill="#818cf8">scrape</text>

  <line x1="380" y1="159" x2="393" y2="159" stroke="#6366f1" stroke-width="1" marker-end="url(#arr-sm)"/>

  <rect x="395" y="148" width="48" height="22" fill="#151050" rx="3"/>
  <text x="419" y="163" text-anchor="middle" font-size="8" font-weight="600" fill="#818cf8">relabel</text>

  <!-- Vertical merge bus -->
  <line x1="443" y1="91" x2="443" y2="159" stroke="#6366f1" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- remote_write stage -->
  <rect x="453" y="114" width="55" height="22" fill="#151050" rx="3"/>
  <text x="480" y="129" text-anchor="middle" font-size="8" font-weight="600" fill="#818cf8">remote_write</text>
  <line x1="443" y1="125" x2="453" y2="125" stroke="#6366f1" stroke-width="1" marker-end="url(#arr-sm)"/>

  <!-- Source → Alloy arrows -->
  <line x1="165" y1="90" x2="215" y2="91" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="165" y1="160" x2="215" y2="159" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Alloy → Prometheus -->
  <line x1="515" y1="125" x2="545" y2="125" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <!-- PROMETHEUS -->
  <rect x="547" y="85" width="115" height="80" fill="#1a1000" stroke="#f59e0b" stroke-width="1.5" rx="5"/>
  <text x="604" y="116" text-anchor="middle" font-size="12" font-weight="600" fill="#fcd34d">Prometheus</text>
  <text x="604" y="133" text-anchor="middle" font-size="9" fill="#78716c">metrics storage</text>
  <text x="604" y="148" text-anchor="middle" font-size="8" fill="#4a4a6a">:9090</text>

  <!-- Footer -->
  <text x="350" y="243" text-anchor="middle" font-size="9" fill="#475569">host: CPU · mem · disk · network · container: CPU · mem · net · relabel filters veth/calico/docker interfaces</text>
</svg>
