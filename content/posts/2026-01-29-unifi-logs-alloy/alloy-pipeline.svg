<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 180" width="700" height="180"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#f97316"/>
    </marker>
  </defs>

  <rect width="700" height="180" fill="url(#bg)" rx="8"/>

  <!-- UniFi -->
  <rect x="28" y="55" width="130" height="70" fill="none" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="93" y="86" text-anchor="middle" font-size="13" font-weight="600" fill="#fed7aa">UniFi</text>
  <text x="93" y="103" text-anchor="middle" font-size="10" fill="#f97316" opacity="0.8">network devices</text>

  <line x1="158" y1="90" x2="186" y2="90" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="172" y="82" text-anchor="middle" font-size="8" fill="#94a3b8">UDP :514</text>

  <!-- Grafana Alloy (central, taller) -->
  <rect x="188" y="45" width="200" height="90" fill="none" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="288" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#fed7aa">Grafana Alloy</text>
  <text x="288" y="98" text-anchor="middle" font-size="10" fill="#f97316" opacity="0.8">relabel → process → write</text>

  <line x1="388" y1="90" x2="416" y2="90" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="402" y="82" text-anchor="middle" font-size="8" fill="#94a3b8">HTTP push</text>

  <!-- Loki -->
  <rect x="418" y="55" width="110" height="70" fill="none" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="473" y="86" text-anchor="middle" font-size="13" font-weight="600" fill="#fed7aa">Loki</text>
  <text x="473" y="103" text-anchor="middle" font-size="10" fill="#f97316" opacity="0.8">log storage</text>

  <line x1="528" y1="90" x2="556" y2="90" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="542" y="82" text-anchor="middle" font-size="8" fill="#94a3b8">query</text>

  <!-- Grafana -->
  <rect x="558" y="55" width="115" height="70" fill="none" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="615" y="86" text-anchor="middle" font-size="13" font-weight="600" fill="#fed7aa">Grafana</text>
  <text x="615" y="103" text-anchor="middle" font-size="10" fill="#f97316" opacity="0.8">visualization</text>
</svg>
