<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="hex-fill-unifi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1a3a"/>
      <stop offset="100%" stop-color="#07102a"/>
    </linearGradient>
    <linearGradient id="hex-fill-alloy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e2040"/>
      <stop offset="100%" stop-color="#071428"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%" stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <!-- UniFi → Alloy gradient (blue → sky) -->
    <linearGradient id="arr-unifi-alloy" x1="281" y1="215" x2="529" y2="215" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <!-- Alloy → Loki gradient (sky → purple) -->
    <linearGradient id="arr-alloy-loki" x1="671" y1="215" x2="861" y2="215" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <!-- Zone glows -->
    <radialGradient id="glow-blue" cx="17%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-sky" cx="50%" cy="50%" r="18%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-purple" cx="83%" cy="50%" r="24%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <!-- Arrow markers -->
    <marker id="arr-sky" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-blue)"/>
  <rect width="1200" height="630" fill="url(#glow-sky)"/>
  <rect width="1200" height="630" fill="url(#glow-purple)"/>

  <!-- Subtle line grid -->
  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0"    y1="100" x2="1200" y2="100"/>
    <line x1="0"    y1="200" x2="1200" y2="200"/>
    <line x1="0"    y1="300" x2="1200" y2="300"/>
    <line x1="200"  y1="0"   x2="200"  y2="500"/>
    <line x1="400"  y1="0"   x2="400"  y2="500"/>
    <line x1="600"  y1="0"   x2="600"  y2="500"/>
    <line x1="800"  y1="0"   x2="800"  y2="500"/>
    <line x1="1000" y1="0"   x2="1000" y2="500"/>
  </g>

  <!-- ===== LEFT ZONE — UniFi device hexagon (pointy-top, center 220,215, r=70) ===== -->
  <!-- Vertices: top(220,145) tr(281,180) br(281,250) bot(220,285) bl(159,250) tl(159,180) -->
  <polygon points="220,145 281,180 281,250 220,285 159,250 159,180"
           fill="url(#hex-fill-unifi)" stroke="#3b82f6" stroke-width="2.5"/>
  <polygon points="220,153 274,184 274,246 220,277 166,246 166,184"
           fill="none" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="220" y="209" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd" letter-spacing="1">UniFi</text>
  <text x="220" y="228" text-anchor="middle" font-size="10" fill="#3b82f6" letter-spacing="3" opacity="0.8">syslog</text>

  <!-- Arrow: UniFi → Alloy -->
  <path d="M 281,215 L 529,215"
        fill="none" stroke="url(#arr-unifi-alloy)" stroke-width="2" marker-end="url(#arr-sky)"/>
  <text x="405" y="207" text-anchor="middle" font-size="9" fill="#334155" font-family="'Courier New',monospace">UDP/514</text>

  <!-- ===== CENTER ZONE — Alloy hexagon (pointy-top, center 600,215, r=82) ===== -->
  <!-- Vertices: top(600,133) tr(671,174) br(671,256) bot(600,297) bl(529,256) tl(529,174) -->
  <polygon points="600,133 671,174 671,256 600,297 529,256 529,174"
           fill="url(#hex-fill-alloy)" stroke="#38bdf8" stroke-width="2.5"/>
  <polygon points="600,141 663,179 663,251 600,289 537,251 537,179"
           fill="none" stroke="#38bdf8" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="600" y="209" text-anchor="middle" font-size="22" font-weight="700" fill="#7dd3fc" letter-spacing="2">ALLOY</text>
  <text x="600" y="230" text-anchor="middle" font-size="11" fill="#38bdf8" letter-spacing="3" opacity="0.8">collector</text>

  <!-- Arrow: Alloy → Loki -->
  <path d="M 671,215 L 861,215"
        fill="none" stroke="url(#arr-alloy-loki)" stroke-width="2.5" marker-end="url(#arr-purple)"/>

  <!-- ===== RIGHT ZONE — Loki solo hexagon (pointy-top, r=45, center 900,215) ===== -->
  <!-- Vertices: 900,170 939,192 939,238 900,260 861,238 861,192 -->
  <polygon points="900,170 939,192 939,238 900,260 861,238 861,192"
           fill="#160a2a" stroke="#a78bfa" stroke-width="2.5"/>
  <polygon points="900,176 934,195 934,235 900,254 866,235 866,195"
           fill="none" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="900" y="222" text-anchor="middle" font-size="22" font-weight="800" fill="#a78bfa">L</text>
  <text x="952" y="209" font-size="13" font-weight="700" fill="#a78bfa" letter-spacing="1">LOKI</text>
  <text x="952" y="224" font-size="9" fill="#64748b" font-family="'Courier New',monospace">logs · label-indexed</text>
  <!-- LogQL badge -->
  <rect x="952" y="234" width="112" height="15" fill="#1e1040" stroke="#a78bfa" stroke-width="1" rx="3"/>
  <text x="1008" y="245" text-anchor="middle" font-size="7.5" fill="#c4b5fd" font-family="'Courier New',monospace">{job="unifi-syslog"}</text>

  <!-- Bottom gradient overlay -->
  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>

  <!-- Series label -->
  <text x="600" y="500" text-anchor="middle" font-size="13" fill="#f97316" letter-spacing="3" font-weight="600">GRAFANA OBSERVABILITY</text>

  <!-- Post title -->
  <text x="600" y="538" text-anchor="middle" font-size="34" font-weight="700" fill="#f1f5f9">Unifi Syslog with Alloy and Loki</text>
</svg>
