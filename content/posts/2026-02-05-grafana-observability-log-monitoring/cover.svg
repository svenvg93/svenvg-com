<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="hex-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e2040"/>
      <stop offset="100%" stop-color="#071428"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%" stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <!-- Left-to-Alloy gradient arrows (green → blue) -->
    <linearGradient id="arr-syslog-alloy" x1="290" y1="190" x2="529" y2="205" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="arr-docker-alloy" x1="290" y1="325" x2="529" y2="248" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <!-- Alloy-to-Loki gradient arrow (blue → purple) -->
    <linearGradient id="arr-alloy-loki" x1="671" y1="215" x2="720" y2="215" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <!-- Zone glows -->
    <radialGradient id="glow-green" cx="17%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="18%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-purple" cx="83%" cy="50%" r="24%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <!-- Arrow markers -->
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-green)"/>
  <rect width="1200" height="630" fill="url(#glow-blue)"/>
  <rect width="1200" height="630" fill="url(#glow-purple)"/>

  <!-- Subtle line grid -->
  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0"    y1="100" x2="1200" y2="100"/>
    <line x1="0"    y1="200" x2="1200" y2="200"/>
    <line x1="0"    y1="300" x2="1200" y2="300"/>
    <line x1="200"  y1="0"   x2="200"  y2="500"/>
    <line x1="400"  y1="0"   x2="400"  y2="500"/>
    <line x1="600"  y1="0"   x2="600"  y2="500"/>
    <line x1="800"  y1="0"   x2="800"  y2="500"/>
    <line x1="1000" y1="0"   x2="1000" y2="500"/>
  </g>

  <!-- ===== LEFT ZONE — log sources ===== -->

  <!-- System logs card (syslog / auth.log) -->
  <rect x="80" y="108" width="210" height="158" fill="#0d1e30" stroke="#34d399" stroke-width="1.5" rx="8"/>
  <rect x="80" y="108" width="6"   height="158" fill="#34d399" rx="4"/>
  <text x="120" y="130" font-size="11" font-weight="700" fill="#34d399" letter-spacing="2">SYSTEM LOGS</text>
  <text x="120" y="143" font-size="8"  fill="#64748b" font-family="'Courier New',monospace">/var/log</text>
  <!-- File rows -->
  <rect x="96" y="150" width="178" height="20" fill="#0a1a2c" stroke="#1e3a50" stroke-width="1" rx="3"/>
  <text x="104" y="164" font-size="8" fill="#94a3b8" font-family="'Courier New',monospace">auth.log</text>
  <text x="236" y="164" font-size="7" fill="#4ade80" font-family="'Courier New',monospace" text-anchor="end">active</text>
  <rect x="96" y="175" width="178" height="20" fill="#0a1a2c" stroke="#1e3a50" stroke-width="1" rx="3"/>
  <text x="104" y="189" font-size="8" fill="#94a3b8" font-family="'Courier New',monospace">syslog</text>
  <text x="236" y="189" font-size="7" fill="#4ade80" font-family="'Courier New',monospace" text-anchor="end">active</text>
  <!-- Sample log preview -->
  <g font-size="7.5" fill="#475569" font-family="'Courier New',monospace">
    <text x="96" y="211">Apr 19 08:14:33 sshd: Accepted</text>
    <text x="96" y="224">Apr 19 08:14:34 systemd: Started</text>
    <text x="96" y="237">Apr 19 08:14:35 kernel: eth0 up</text>
    <text x="96" y="250">Apr 19 08:14:36 sshd: session open</text>
  </g>
  <!-- collector label -->
  <text x="185" y="263" text-anchor="middle" font-size="8" fill="#334155" font-family="'Courier New',monospace">loki.source.file</text>

  <!-- Docker container logs card -->
  <rect x="80" y="280" width="210" height="88" fill="#0d1e30" stroke="#34d399" stroke-width="1.5" rx="8"/>
  <rect x="80" y="280" width="6"   height="88" fill="#34d399" rx="4"/>
  <text x="120" y="300" font-size="11" font-weight="700" fill="#34d399" letter-spacing="2">DOCKER LOGS</text>
  <g font-size="8.5" font-family="'Courier New',monospace">
    <circle cx="103" cy="318" r="4" fill="#4ade80" fill-opacity="0.85"/>
    <text x="113" y="321" fill="#94a3b8">nginx</text>
    <circle cx="103" cy="338" r="4" fill="#4ade80" fill-opacity="0.85"/>
    <text x="113" y="341" fill="#94a3b8">traefik</text>
    <circle cx="185" cy="318" r="4" fill="#4ade80" fill-opacity="0.85"/>
    <text x="195" y="321" fill="#94a3b8">alloy</text>
    <circle cx="185" cy="338" r="4" fill="#4ade80" fill-opacity="0.85"/>
    <text x="195" y="341" fill="#94a3b8">grafana</text>
  </g>
  <!-- collector label -->
  <text x="185" y="365" text-anchor="middle" font-size="8" fill="#334155" font-family="'Courier New',monospace">loki.source.docker</text>

  <!-- Arrows: left sources → Alloy -->
  <path d="M 290,187 C 390,187 468,204 529,208"
        fill="none" stroke="url(#arr-syslog-alloy)" stroke-width="2" marker-end="url(#arr-blue)"/>
  <path d="M 290,324 C 390,324 468,248 529,228"
        fill="none" stroke="url(#arr-docker-alloy)" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- ===== CENTER ZONE — Alloy hexagon (pointy-top, center 600,215, r=82) ===== -->
  <polygon points="600,133 671,174 671,256 600,297 529,256 529,174"
           fill="url(#hex-fill)" stroke="#38bdf8" stroke-width="2.5"/>
  <polygon points="600,141 663,179 663,251 600,289 537,251 537,179"
           fill="none" stroke="#38bdf8" stroke-width="0.8" stroke-opacity="0.3"/>
  <!-- Converging lines from left face -->
  <path d="M 529,200 C 548,200 560,213 572,215" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.55" stroke-linecap="round"/>
  <path d="M 529,215 L 572,215"                  fill="none" stroke="#ffffff" stroke-width="3"   stroke-opacity="0.75" stroke-linecap="round"/>
  <path d="M 529,230 C 548,230 560,217 572,215" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.55" stroke-linecap="round"/>
  <circle cx="572" cy="215" r="8" fill="#38bdf8" fill-opacity="0.25"/>
  <circle cx="572" cy="215" r="4" fill="#ffffff"/>
  <!-- Diverging lines to right face -->
  <path d="M 572,215 C 584,213 614,200 671,200" fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-opacity="0.75" stroke-linecap="round"/>
  <path d="M 572,215 L 671,215"                  fill="none" stroke="#38bdf8" stroke-width="3"   stroke-linecap="round"/>
  <path d="M 572,215 C 584,217 614,230 671,230" fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-opacity="0.75" stroke-linecap="round"/>
  <text x="600" y="318" text-anchor="middle" font-size="13" font-weight="700" fill="#38bdf8" letter-spacing="4">ALLOY</text>

  <!-- Arrow: Alloy → Loki (right face to panel left edge) -->
  <path d="M 671,215 L 720,215"
        fill="none" stroke="url(#arr-alloy-loki)" stroke-width="2.5" marker-end="url(#arr-purple)"/>

  <!-- ===== RIGHT ZONE — Loki log panel ===== -->
  <rect x="720" y="68" width="390" height="308" fill="#0d1e30" stroke="#a78bfa" stroke-width="1.5" rx="8"/>
  <rect x="720" y="68" width="6"   height="308" fill="#a78bfa" rx="4"/>
  <text x="758" y="90" font-size="11" font-weight="700" fill="#a78bfa" letter-spacing="1">LOKI</text>
  <text x="758" y="103" font-size="8" fill="#64748b" font-family="'Courier New',monospace">log storage · label-indexed</text>

  <!-- LogQL label badges -->
  <rect x="738" y="112" width="70" height="16" fill="#1e1040" stroke="#a78bfa" stroke-width="1" rx="3"/>
  <text x="773" y="124" text-anchor="middle" font-size="8" fill="#c4b5fd" font-family="'Courier New',monospace">{job="authlog"}</text>
  <rect x="814" y="112" width="65" height="16" fill="#1e1040" stroke="#a78bfa" stroke-width="1" rx="3"/>
  <text x="846" y="124" text-anchor="middle" font-size="8" fill="#c4b5fd" font-family="'Courier New',monospace">{job="syslog"}</text>
  <rect x="885" y="112" width="65" height="16" fill="#1e1040" stroke="#a78bfa" stroke-width="1" rx="3"/>
  <text x="917" y="124" text-anchor="middle" font-size="8" fill="#c4b5fd" font-family="'Courier New',monospace">{job="docker"}</text>

  <!-- Divider -->
  <line x1="738" y1="133" x2="1100" y2="133" stroke="#1e2040" stroke-width="1"/>

  <!-- Log stream lines -->
  <g font-size="8.5" font-family="'Courier New',monospace">
    <text x="738" y="150" fill="#64748b">
      <tspan fill="#c4b5fd">authlog</tspan>
      <tspan fill="#475569"> | </tspan>
      <tspan fill="#4ade80">INFO </tspan>
      <tspan>sshd: Accepted publickey for deploy</tspan>
    </text>
    <text x="738" y="166" fill="#64748b">
      <tspan fill="#c4b5fd">syslog </tspan>
      <tspan fill="#475569"> | </tspan>
      <tspan fill="#7dd3fc">INFO </tspan>
      <tspan>systemd: Started docker.service</tspan>
    </text>
    <text x="738" y="182" fill="#64748b">
      <tspan fill="#c4b5fd">docker </tspan>
      <tspan fill="#475569"> | </tspan>
      <tspan fill="#4ade80">INFO </tspan>
      <tspan>nginx: 200 GET /api/health</tspan>
    </text>
    <text x="738" y="198" fill="#64748b">
      <tspan fill="#c4b5fd">docker </tspan>
      <tspan fill="#475569"> | </tspan>
      <tspan fill="#fb923c">WARN </tspan>
      <tspan>traefik: 404 GET /favicon.ico</tspan>
    </text>
    <text x="738" y="214" fill="#64748b">
      <tspan fill="#c4b5fd">syslog </tspan>
      <tspan fill="#475569"> | </tspan>
      <tspan fill="#7dd3fc">INFO </tspan>
      <tspan>kernel: eth0: renamed to ens3</tspan>
    </text>
    <text x="738" y="230" fill="#64748b">
      <tspan fill="#c4b5fd">authlog</tspan>
      <tspan fill="#475569"> | </tspan>
      <tspan fill="#4ade80">INFO </tspan>
      <tspan>sshd: Disconnected from user deploy</tspan>
    </text>
    <text x="738" y="246" fill="#64748b">
      <tspan fill="#c4b5fd">docker </tspan>
      <tspan fill="#475569"> | </tspan>
      <tspan fill="#c4b5fd">DEBUG</tspan>
      <tspan> alloy: flush complete  streams=8</tspan>
    </text>
    <text x="738" y="262" fill="#64748b">
      <tspan fill="#c4b5fd">docker </tspan>
      <tspan fill="#475569"> | </tspan>
      <tspan fill="#4ade80">INFO </tspan>
      <tspan>grafana: HTTP server listen</tspan>
    </text>
    <text x="738" y="278" fill="#64748b">
      <tspan fill="#c4b5fd">syslog </tspan>
      <tspan fill="#475569"> | </tspan>
      <tspan fill="#f87171">ERROR</tspan>
      <tspan> kernel: NFS: server not responding</tspan>
    </text>
    <text x="738" y="294" fill="#64748b">
      <tspan fill="#c4b5fd">authlog</tspan>
      <tspan fill="#475569"> | </tspan>
      <tspan fill="#4ade80">INFO </tspan>
      <tspan>sshd: Accepted publickey for sven</tspan>
    </text>
    <text x="738" y="310" fill="#64748b">
      <tspan fill="#c4b5fd">docker </tspan>
      <tspan fill="#475569"> | </tspan>
      <tspan fill="#4ade80">INFO </tspan>
      <tspan>traefik: 200 POST /api/v1/write</tspan>
    </text>
    <text x="738" y="326" fill="#64748b">
      <tspan fill="#c4b5fd">syslog </tspan>
      <tspan fill="#475569"> | </tspan>
      <tspan fill="#7dd3fc">INFO </tspan>
      <tspan>cron: pam_unix session opened</tspan>
    </text>
    <text x="738" y="342" fill="#64748b">
      <tspan fill="#c4b5fd">docker </tspan>
      <tspan fill="#475569"> | </tspan>
      <tspan fill="#4ade80">INFO </tspan>
      <tspan>nginx: 200 GET /dashboard</tspan>
    </text>
    <text x="738" y="358" fill="#64748b">
      <tspan fill="#c4b5fd">authlog</tspan>
      <tspan fill="#475569"> | </tspan>
      <tspan fill="#c4b5fd">DEBUG</tspan>
      <tspan> sshd: userauth-request  user=sven</tspan>
    </text>
  </g>
  <!-- Cursor blink indicator (static) -->
  <rect x="738" y="364" width="6" height="11" fill="#a78bfa" fill-opacity="0.7" rx="1"/>

  <!-- Bottom gradient overlay -->
  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>

  <!-- Series label -->
  <text x="600" y="500" text-anchor="middle" font-size="13" fill="#f97316" letter-spacing="3" font-weight="600">GRAFANA OBSERVABILITY</text>

  <!-- Post title -->
  <text x="600" y="538" text-anchor="middle" font-size="34" font-weight="700" fill="#f1f5f9">Log Monitoring with Grafana Alloy and Loki</text>
</svg>
