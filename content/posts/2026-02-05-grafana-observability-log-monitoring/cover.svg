<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="hex-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e2040"/>
      <stop offset="100%" stop-color="#071428"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%" stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <!-- Left-to-Alloy gradient arrows (green → blue) -->
    <linearGradient id="arr-syslog-alloy" x1="330" y1="190" x2="529" y2="205" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="arr-docker-alloy" x1="330" y1="325" x2="529" y2="248" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <!-- Alloy-to-Loki gradient arrow (blue → purple) -->
    <linearGradient id="arr-alloy-loki" x1="671" y1="215" x2="850" y2="215" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <!-- Zone glows -->
    <radialGradient id="glow-green" cx="17%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="18%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-purple" cx="83%" cy="50%" r="24%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <!-- Arrow markers -->
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-green)"/>
  <rect width="1200" height="630" fill="url(#glow-blue)"/>
  <rect width="1200" height="630" fill="url(#glow-purple)"/>

  <!-- Subtle line grid -->
  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0"    y1="100" x2="1200" y2="100"/>
    <line x1="0"    y1="200" x2="1200" y2="200"/>
    <line x1="0"    y1="300" x2="1200" y2="300"/>
    <line x1="200"  y1="0"   x2="200"  y2="500"/>
    <line x1="400"  y1="0"   x2="400"  y2="500"/>
    <line x1="600"  y1="0"   x2="600"  y2="500"/>
    <line x1="800"  y1="0"   x2="800"  y2="500"/>
    <line x1="1000" y1="0"   x2="1000" y2="500"/>
  </g>

  <!-- ===== LEFT ZONE — log sources ===== -->

  <!-- System logs card (syslog / auth.log) -->
  <rect x="120" y="108" width="210" height="158" fill="#0d1e30" stroke="#34d399" stroke-width="1.5" rx="8"/>
  <rect x="120" y="108" width="6"   height="158" fill="#34d399" rx="4"/>
  <text x="160" y="130" font-size="11" font-weight="700" fill="#34d399" letter-spacing="2">SYSTEM LOGS</text>
  <text x="160" y="143" font-size="8"  fill="#64748b" font-family="'Courier New',monospace">/var/log</text>
  <!-- File rows -->
  <rect x="136" y="150" width="178" height="20" fill="#0a1a2c" stroke="#1e3a50" stroke-width="1" rx="3"/>
  <text x="144" y="164" font-size="8" fill="#94a3b8" font-family="'Courier New',monospace">auth.log</text>
  <text x="276" y="164" font-size="7" fill="#4ade80" font-family="'Courier New',monospace" text-anchor="end">active</text>
  <rect x="136" y="175" width="178" height="20" fill="#0a1a2c" stroke="#1e3a50" stroke-width="1" rx="3"/>
  <text x="144" y="189" font-size="8" fill="#94a3b8" font-family="'Courier New',monospace">syslog</text>
  <text x="276" y="189" font-size="7" fill="#4ade80" font-family="'Courier New',monospace" text-anchor="end">active</text>
  <!-- Sample log preview -->
  <g font-size="7.5" fill="#475569" font-family="'Courier New',monospace">
    <text x="136" y="211">Apr 19 08:14:33 sshd: Accepted</text>
    <text x="136" y="224">Apr 19 08:14:34 systemd: Started</text>
    <text x="136" y="237">Apr 19 08:14:35 kernel: eth0 up</text>
    <text x="136" y="250">Apr 19 08:14:36 sshd: session open</text>
  </g>
  <!-- collector label -->
  <text x="225" y="263" text-anchor="middle" font-size="8" fill="#334155" font-family="'Courier New',monospace">loki.source.file</text>

  <!-- Docker container logs card -->
  <rect x="120" y="280" width="210" height="88" fill="#0d1e30" stroke="#34d399" stroke-width="1.5" rx="8"/>
  <rect x="120" y="280" width="6"   height="88" fill="#34d399" rx="4"/>
  <text x="160" y="300" font-size="11" font-weight="700" fill="#34d399" letter-spacing="2">DOCKER LOGS</text>
  <g font-size="8.5" font-family="'Courier New',monospace">
    <circle cx="143" cy="318" r="4" fill="#4ade80" fill-opacity="0.85"/>
    <text x="153" y="321" fill="#94a3b8">nginx</text>
    <circle cx="143" cy="338" r="4" fill="#4ade80" fill-opacity="0.85"/>
    <text x="153" y="341" fill="#94a3b8">traefik</text>
    <circle cx="225" cy="318" r="4" fill="#4ade80" fill-opacity="0.85"/>
    <text x="235" y="321" fill="#94a3b8">alloy</text>
    <circle cx="225" cy="338" r="4" fill="#4ade80" fill-opacity="0.85"/>
    <text x="235" y="341" fill="#94a3b8">grafana</text>
  </g>
  <!-- collector label -->
  <text x="225" y="365" text-anchor="middle" font-size="8" fill="#334155" font-family="'Courier New',monospace">loki.source.docker</text>

  <!-- Arrows: left sources → Alloy -->
  <path d="M 330,187 C 390,187 468,204 529,208"
        fill="none" stroke="url(#arr-syslog-alloy)" stroke-width="2" marker-end="url(#arr-blue)"/>
  <path d="M 330,324 C 390,324 468,248 529,228"
        fill="none" stroke="url(#arr-docker-alloy)" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- ===== CENTER ZONE — Alloy hexagon (pointy-top, center 600,215, r=82) ===== -->
  <polygon points="600,133 671,174 671,256 600,297 529,256 529,174"
           fill="url(#hex-fill)" stroke="#38bdf8" stroke-width="2.5"/>
  <polygon points="600,141 663,179 663,251 600,289 537,251 537,179"
           fill="none" stroke="#38bdf8" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="600" y="209" text-anchor="middle" font-size="22" font-weight="700" fill="#7dd3fc" letter-spacing="2">ALLOY</text>
  <text x="600" y="230" text-anchor="middle" font-size="11" fill="#38bdf8" letter-spacing="3" opacity="0.8">collector</text>

  <!-- Arrow: Alloy → Loki hexagon -->
  <path d="M 671,215 L 850,215"
        fill="none" stroke="url(#arr-alloy-loki)" stroke-width="2.5" marker-end="url(#arr-purple)"/>

  <!-- ===== RIGHT ZONE: Loki as mini hexagon (pointy-top, r=45, larger since it's solo) ===== -->

  <!-- Loki (cx=900, cy=215, r=45) — vertices: 900,170 939,192 939,238 900,260 861,238 861,192 -->
  <polygon points="900,170 939,192 939,238 900,260 861,238 861,192"
           fill="#160a2a" stroke="#a78bfa" stroke-width="2.5"/>
  <polygon points="900,176 934,195 934,235 900,254 866,235 866,195"
           fill="none" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="900" y="222" text-anchor="middle" font-size="22" font-weight="800" fill="#a78bfa">L</text>
  <!-- Label and subtitle to the right -->
  <text x="952" y="209" font-size="13" font-weight="700" fill="#a78bfa" letter-spacing="1">LOKI</text>
  <text x="952" y="224" font-size="9" fill="#64748b" font-family="'Courier New',monospace">logs · label-indexed</text>
  <!-- LogQL badges below label -->
  <rect x="952" y="234" width="70" height="15" fill="#1e1040" stroke="#a78bfa" stroke-width="1" rx="3"/>
  <text x="987" y="245" text-anchor="middle" font-size="7.5" fill="#c4b5fd" font-family="'Courier New',monospace">{job="authlog"}</text>
  <rect x="1030" y="234" width="65" height="15" fill="#1e1040" stroke="#a78bfa" stroke-width="1" rx="3"/>
  <text x="1062" y="245" text-anchor="middle" font-size="7.5" fill="#c4b5fd" font-family="'Courier New',monospace">{job="syslog"}</text>
  <rect x="952" y="254" width="65" height="15" fill="#1e1040" stroke="#a78bfa" stroke-width="1" rx="3"/>
  <text x="984" y="265" text-anchor="middle" font-size="7.5" fill="#c4b5fd" font-family="'Courier New',monospace">{job="docker"}</text>

  <!-- Bottom gradient overlay -->
  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>

  <!-- Series label -->
  <text x="600" y="500" text-anchor="middle" font-size="13" fill="#f97316" letter-spacing="3" font-weight="600">GRAFANA OBSERVABILITY</text>

  <!-- Post title -->
  <text x="600" y="538" text-anchor="middle" font-size="34" font-weight="700" fill="#f1f5f9">Log Monitoring with Grafana Alloy and Loki</text>
</svg>
