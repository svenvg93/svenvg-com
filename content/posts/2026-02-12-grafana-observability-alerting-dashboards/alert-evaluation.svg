<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 160" width="700" height="160"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#f97316"/>
    </marker>
  </defs>

  <rect width="700" height="160" fill="url(#bg)" rx="8"/>

  <!-- Query A -->
  <rect x="48" y="50" width="140" height="60" fill="none" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="118" y="74" text-anchor="middle" font-size="13" font-weight="600" fill="#fed7aa">Query A</text>
  <text x="118" y="92" text-anchor="middle" font-size="10" fill="#f97316" opacity="0.8">PromQL · time series</text>

  <line x1="188" y1="80" x2="226" y2="80" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <!-- Reduce -->
  <rect x="228" y="50" width="115" height="60" fill="none" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="285" y="74" text-anchor="middle" font-size="13" font-weight="600" fill="#fed7aa">Reduce</text>
  <text x="285" y="92" text-anchor="middle" font-size="8" fill="#f97316" opacity="0.8">last / mean → scalar</text>

  <line x1="343" y1="80" x2="381" y2="80" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <!-- Query B -->
  <rect x="383" y="50" width="140" height="60" fill="none" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="453" y="74" text-anchor="middle" font-size="13" font-weight="600" fill="#fed7aa">Query B</text>
  <text x="453" y="92" text-anchor="middle" font-size="10" fill="#f97316" opacity="0.8">scalar &gt; threshold?</text>

  <line x1="523" y1="80" x2="561" y2="80" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <!-- Alert State (outcome, neutral border) -->
  <rect x="563" y="50" width="90" height="60" fill="none" stroke="#94a3b8" stroke-width="1.5" rx="5"/>
  <text x="608" y="74" text-anchor="middle" font-size="11" font-weight="600" fill="#f87171">FIRING</text>
  <line x1="573" y1="80" x2="643" y2="80" stroke="#1e293b" stroke-width="1"/>
  <text x="608" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#4ade80">NORMAL</text>
</svg>
