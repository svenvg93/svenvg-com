<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 225" width="700" height="225"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#f97316"/>
    </marker>
  </defs>

  <rect width="700" height="225" fill="url(#bg)" rx="8"/>

  <!-- scope=system -->
  <rect x="32" y="30" width="130" height="40" fill="none" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="97" y="50" text-anchor="middle" font-size="10" font-weight="600" fill="#fed7aa">scope=system</text>
  <text x="97" y="63" text-anchor="middle" font-size="8" fill="#f97316" opacity="0.8">CPU · memory · disk</text>

  <!-- scope=infra -->
  <rect x="32" y="90" width="130" height="40" fill="none" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="97" y="110" text-anchor="middle" font-size="10" font-weight="600" fill="#fed7aa">scope=infra</text>
  <text x="97" y="123" text-anchor="middle" font-size="8" fill="#f97316" opacity="0.8">Traefik · containers</text>

  <!-- scope=docker -->
  <rect x="32" y="150" width="130" height="40" fill="none" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="97" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#fed7aa">scope=docker</text>
  <text x="97" y="183" text-anchor="middle" font-size="8" fill="#f97316" opacity="0.8">container health</text>

  <!-- converging arrows -->
  <line x1="162" y1="50" x2="197" y2="70" stroke="#f97316" stroke-width="1.2" marker-end="url(#arr-orange)"/>
  <line x1="162" y1="110" x2="197" y2="110" stroke="#f97316" stroke-width="1.2" marker-end="url(#arr-orange)"/>
  <line x1="162" y1="170" x2="197" y2="150" stroke="#f97316" stroke-width="1.2" marker-end="url(#arr-orange)"/>

  <!-- Notification Policy -->
  <rect x="199" y="55" width="170" height="110" fill="none" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="284" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#fed7aa">Notification Policy</text>
  <text x="284" y="123" text-anchor="middle" font-size="10" fill="#f97316" opacity="0.8">routes by scope label</text>

  <line x1="369" y1="110" x2="404" y2="110" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <!-- Contact Point -->
  <rect x="406" y="80" width="130" height="60" fill="none" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="471" y="104" text-anchor="middle" font-size="12" font-weight="600" fill="#fed7aa">Contact Point</text>
  <text x="471" y="122" text-anchor="middle" font-size="10" fill="#f97316" opacity="0.8">Discord webhook</text>

  <line x1="536" y1="110" x2="571" y2="110" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <!-- Discord -->
  <rect x="573" y="85" width="100" height="50" fill="none" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="623" y="107" text-anchor="middle" font-size="13" font-weight="600" fill="#fed7aa">Discord</text>
  <text x="623" y="123" text-anchor="middle" font-size="10" fill="#f97316" opacity="0.8">channel alert</text>
</svg>
