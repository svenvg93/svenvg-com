<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 190" width="700" height="190"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#f97316"/>
    </marker>
    <marker id="arr-muted" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 6,2.5 0,5" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="700" height="190" fill="url(#bg)" rx="8"/>

  <!-- Dashboard Files -->
  <rect x="85" y="60" width="150" height="70" fill="none" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="160" y="90" text-anchor="middle" font-size="12" font-weight="600" fill="#fed7aa">Dashboard Files</text>
  <text x="160" y="106" text-anchor="middle" font-size="10" fill="#f97316" opacity="0.8">dashboards/*.json</text>

  <line x1="235" y1="95" x2="278" y2="95" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="257" y="87" text-anchor="middle" font-size="8" fill="#94a3b8">reads</text>

  <!-- Provisioner -->
  <rect x="280" y="60" width="150" height="70" fill="none" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="355" y="90" text-anchor="middle" font-size="13" font-weight="600" fill="#fed7aa">Provisioner</text>
  <text x="355" y="106" text-anchor="middle" font-size="10" fill="#f97316" opacity="0.8">polls every 30 s</text>

  <line x1="430" y1="95" x2="473" y2="95" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="451" y="87" text-anchor="middle" font-size="8" fill="#94a3b8">loads</text>

  <!-- Grafana -->
  <rect x="475" y="60" width="140" height="70" fill="none" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="545" y="90" text-anchor="middle" font-size="13" font-weight="600" fill="#fed7aa">Grafana</text>
  <text x="545" y="106" text-anchor="middle" font-size="10" fill="#f97316" opacity="0.8">loads dashboards</text>

  <!-- poll loop -->
  <path d="M 355,130 Q 257,170 160,130" fill="none" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-muted)"/>
  <text x="257" y="163" text-anchor="middle" font-size="8" fill="#475569">re-polls on file change</text>
</svg>
