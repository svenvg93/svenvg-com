<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="hex-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e3040"/>
      <stop offset="100%" stop-color="#071e2a"/>
    </linearGradient>
    <!-- Gradient arrows: Traefik teal → tool colors -->
    <linearGradient id="arr-trf-prom" x1="697" y1="243" x2="850" y2="165" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#37BEC3"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="arr-trf-loki" x1="697" y1="255" x2="850" y2="255" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#37BEC3"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="arr-trf-graf" x1="697" y1="267" x2="850" y2="345" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#37BEC3"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#ef4444"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#a78bfa"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#f97316"/>
    </marker>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%" stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#37BEC3"/>
    </marker>
    <marker id="arr-dim" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#37BEC3" fill-opacity="0.4"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/>
  </g>

  <!-- === Internet / web traffic (left) === -->
  <text x="105" y="200" text-anchor="middle" font-size="12" fill="#475569" letter-spacing="2">INTERNET</text>
  <circle cx="105" cy="255" r="38" fill="none" stroke="#1e3a52" stroke-width="2"/>
  <ellipse cx="105" cy="255" rx="18" ry="38" fill="none" stroke="#1e3a52" stroke-width="1.5"/>
  <line x1="67" y1="255" x2="143" y2="255" stroke="#1e3a52" stroke-width="1.5"/>
  <line x1="72" y1="230" x2="138" y2="230" stroke="#1e3a52" stroke-width="1"/>
  <line x1="72" y1="280" x2="138" y2="280" stroke="#1e3a52" stroke-width="1"/>

  <!-- Incoming request paths -->
  <path d="M 148,215 C 270,215 370,255 503,255" fill="none" stroke="#37BEC3" stroke-width="2.5" stroke-opacity="0.5" marker-end="url(#arr-dim)"/>
  <text x="290" y="207" text-anchor="middle" font-size="11" fill="#475569">HTTP</text>
  <path d="M 148,255 L 503,255" fill="none" stroke="#37BEC3" stroke-width="3" marker-end="url(#arr)"/>
  <text x="300" y="247" text-anchor="middle" font-size="11" fill="#37BEC3" font-weight="600">HTTPS</text>
  <path d="M 148,295 C 270,295 370,255 503,255" fill="none" stroke="#37BEC3" stroke-width="2.5" stroke-opacity="0.5" marker-end="url(#arr-dim)"/>
  <text x="290" y="313" text-anchor="middle" font-size="11" fill="#475569">HTTPS</text>

  <!-- === Traefik Hexagon (flat-top) center (600,255) radius 95 === -->
  <polygon points="695,255 647,172 553,172 505,255 553,338 647,338"
           fill="url(#hex-fill)" stroke="#37BEC3" stroke-width="2.5"/>
  <text x="600" y="249" text-anchor="middle" font-size="22" font-weight="700" fill="#67e8f9" letter-spacing="2">traefik</text>
  <text x="600" y="270" text-anchor="middle" font-size="11" fill="#37BEC3" letter-spacing="3" opacity="0.8">reverse proxy</text>

  <!-- Arrows from Traefik to tool hexagons -->
  <path d="M 697,243 C 730,220 780,165 850,165" fill="none" stroke="url(#arr-trf-prom)" stroke-width="2" marker-end="url(#arr-red)"/>
  <path d="M 697,255 L 850,255"                 fill="none" stroke="url(#arr-trf-loki)" stroke-width="2" marker-end="url(#arr-purple)"/>
  <path d="M 697,267 C 730,290 780,345 850,345" fill="none" stroke="url(#arr-trf-graf)" stroke-width="2" marker-end="url(#arr-orange)"/>

  <!-- === RIGHT ZONE: tool nodes as mini hexagons (pointy-top, r=35) === -->

  <!-- Prometheus (cx=880, cy=165) — vertices: 880,130 910,148 910,182 880,200 850,182 850,148 -->
  <polygon points="880,130 910,148 910,182 880,200 850,182 850,148"
           fill="#200808" stroke="#ef4444" stroke-width="2"/>
  <polygon points="880,135 906,150 906,180 880,195 854,180 854,150"
           fill="none" stroke="#ef4444" stroke-width="0.7" stroke-opacity="0.3"/>
  <text x="880" y="170" text-anchor="middle" font-size="18" font-weight="800" fill="#ef4444">P</text>
  <text x="922" y="162" font-size="12" font-weight="700" fill="#ef4444" letter-spacing="1">PROMETHEUS</text>
  <text x="922" y="176" font-size="9" fill="#64748b" font-family="'Courier New',monospace">metrics · time-series db</text>

  <!-- Loki (cx=880, cy=255) — vertices: 880,220 910,238 910,272 880,290 850,272 850,238 -->
  <polygon points="880,220 910,238 910,272 880,290 850,272 850,238"
           fill="#160a2a" stroke="#a78bfa" stroke-width="2"/>
  <polygon points="880,225 906,240 906,270 880,285 854,270 854,240"
           fill="none" stroke="#a78bfa" stroke-width="0.7" stroke-opacity="0.3"/>
  <text x="880" y="261" text-anchor="middle" font-size="18" font-weight="800" fill="#a78bfa">L</text>
  <text x="922" y="252" font-size="12" font-weight="700" fill="#a78bfa" letter-spacing="1">LOKI</text>
  <text x="922" y="266" font-size="9" fill="#64748b" font-family="'Courier New',monospace">logs · label-indexed</text>

  <!-- Grafana (cx=880, cy=345) — vertices: 880,310 910,328 910,362 880,380 850,362 850,328 -->
  <polygon points="880,310 910,328 910,362 880,380 850,362 850,328"
           fill="#1a0c00" stroke="#f97316" stroke-width="2"/>
  <polygon points="880,315 906,330 906,360 880,375 854,360 854,330"
           fill="none" stroke="#f97316" stroke-width="0.7" stroke-opacity="0.3"/>
  <text x="880" y="351" text-anchor="middle" font-size="18" font-weight="800" fill="#f97316">G</text>
  <text x="922" y="342" font-size="12" font-weight="700" fill="#f97316" letter-spacing="1">GRAFANA</text>
  <text x="922" y="356" font-size="9" fill="#64748b" font-family="'Courier New',monospace">visualization · dashboards</text>

  <!-- Bottom gradient overlay -->
  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>

  <!-- Series label -->
  <text x="600" y="500" text-anchor="middle" font-size="13" fill="#37BEC3" letter-spacing="3" font-weight="600">Traefik Essentials</text>

  <!-- Title -->
  <text x="600" y="538" text-anchor="middle" font-size="34" font-weight="700" fill="#f1f5f9">Monitoring with Grafana, Prometheus &amp; Loki</text>
</svg>
