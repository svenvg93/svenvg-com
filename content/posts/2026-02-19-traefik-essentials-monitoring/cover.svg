<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="hex-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e3040"/>
      <stop offset="100%" stop-color="#071e2a"/>
    </linearGradient>
    <linearGradient id="prom-grad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="loki-grad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="graf-grad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%" stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#37BEC3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/>
  </g>

  <!-- === Traefik Hexagon (flat-top) center (340,255) radius 90 === -->
  <polygon points="430,255 385,177 295,177 250,255 295,333 385,333"
           fill="url(#hex-fill)" stroke="#37BEC3" stroke-width="2.5"/>
  <!-- Converging flow mark -->
  <path d="M 278,235 C 308,235 328,253 340,255" fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.55" stroke-linecap="round"/>
  <path d="M 278,255 L 340,255"               fill="none" stroke="#ffffff" stroke-width="3.5" stroke-opacity="0.75" stroke-linecap="round"/>
  <path d="M 278,275 C 308,275 328,257 340,255" fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.55" stroke-linecap="round"/>
  <circle cx="340" cy="255" r="9" fill="#37BEC3" fill-opacity="0.25"/>
  <circle cx="340" cy="255" r="4.5" fill="#ffffff"/>
  <path d="M 340,255 C 352,253 372,235 402,235" fill="none" stroke="#37BEC3" stroke-width="3" stroke-opacity="0.75" stroke-linecap="round"/>
  <path d="M 340,255 L 402,255"               fill="none" stroke="#37BEC3" stroke-width="3.5" stroke-opacity="1" stroke-linecap="round"/>
  <path d="M 340,255 C 352,257 372,275 402,275" fill="none" stroke="#37BEC3" stroke-width="3" stroke-opacity="0.75" stroke-linecap="round"/>
  <!-- wordmark -->
  <text x="340" y="356" text-anchor="middle" font-size="14" font-weight="700" fill="#37BEC3" letter-spacing="4">traefik</text>

  <!-- Arrows from Traefik to observability tools -->
  <!-- To Prometheus (top right) -->
  <path d="M 432,220 C 530,180 620,165 680,165" fill="none" stroke="#37BEC3" stroke-width="2" marker-end="url(#arr)"/>
  <!-- To Loki (mid right) -->
  <path d="M 432,255 L 680,255" fill="none" stroke="#37BEC3" stroke-width="2" marker-end="url(#arr)"/>
  <!-- To Grafana (bottom right) -->
  <path d="M 432,290 C 530,330 620,345 680,345" fill="none" stroke="#37BEC3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- === Prometheus panel === -->
  <rect x="680" y="100" width="460" height="120" fill="#0d1e30" stroke="#ef4444" stroke-width="1.5" rx="8"/>
  <rect x="680" y="100" width="6" height="120" fill="#ef4444" rx="4"/>
  <text x="720" y="122" font-size="11" font-weight="700" fill="#ef4444" letter-spacing="1">PROMETHEUS</text>
  <!-- Metric sparkline area fill -->
  <polygon points="700,200 700,170 720,168 740,175 760,155 780,162 800,150 820,158 840,145 860,153 880,142 900,148 920,138 940,146 960,135 980,143 1000,132 1020,140 1040,128 1060,136 1080,124 1100,132 1120,122 1130,200"
           fill="url(#prom-grad)"/>
  <!-- Metric sparkline -->
  <polyline points="700,170 720,168 740,175 760,155 780,162 800,150 820,158 840,145 860,153 880,142 900,148 920,138 940,146 960,135 980,143 1000,132 1020,140 1040,128 1060,136 1080,124 1100,132 1120,122"
            fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Baseline -->
  <line x1="700" y1="200" x2="1130" y2="200" stroke="#1e3040" stroke-width="1"/>
  <!-- Y-axis ticks -->
  <line x1="700" y1="150" x2="705" y2="150" stroke="#334155" stroke-width="1"/>
  <line x1="700" y1="175" x2="705" y2="175" stroke="#334155" stroke-width="1"/>
  <text x="710" y="154" font-size="8" fill="#475569">100</text>
  <text x="710" y="179" font-size="8" fill="#475569">50</text>

  <!-- === Loki panel === -->
  <rect x="680" y="195" width="460" height="120" fill="#0d1e30" stroke="#a78bfa" stroke-width="1.5" rx="8"/>
  <rect x="680" y="195" width="6" height="120" fill="#a78bfa" rx="4"/>
  <text x="720" y="217" font-size="11" font-weight="700" fill="#a78bfa" letter-spacing="1">LOKI</text>
  <!-- Log stream lines -->
  <g font-size="9" fill="#64748b" font-family="'Courier New',monospace">
    <text x="700" y="233">time=2026-02-19T10:42:01Z level=info msg="Started listening" entryPoints=</text>
    <text x="700" y="247"><tspan fill="#4ade80">200</tspan> GET /api/health router=web@docker service=frontend</text>
    <text x="700" y="261"><tspan fill="#37BEC3">302</tspan> GET /  router=http-catchall middleware=redirect-to-https</text>
    <text x="700" y="275"><tspan fill="#f97316">404</tspan> GET /favicon.ico router=web@docker service=frontend</text>
    <text x="700" y="289"><tspan fill="#4ade80">200</tspan> POST /api/v1/metrics router=api@docker service=backend</text>
    <text x="700" y="303"><tspan fill="#4ade80">200</tspan> GET /dashboard router=dash@docker service=dashboard</text>
  </g>

  <!-- === Grafana panel === -->
  <rect x="680" y="290" width="460" height="120" fill="#0d1e30" stroke="#f97316" stroke-width="1.5" rx="8"/>
  <rect x="680" y="290" width="6" height="120" fill="#f97316" rx="4"/>
  <text x="720" y="312" font-size="11" font-weight="700" fill="#f97316" letter-spacing="1">GRAFANA</text>
  <!-- Dashboard mini bars -->
  <g fill="#f97316" fill-opacity="0.7">
    <rect x="700" y="360" width="18" height="30"/>
    <rect x="724" y="348" width="18" height="42"/>
    <rect x="748" y="352" width="18" height="38"/>
    <rect x="772" y="338" width="18" height="52"/>
    <rect x="796" y="345" width="18" height="45"/>
    <rect x="820" y="332" width="18" height="58"/>
    <rect x="844" y="340" width="18" height="50"/>
    <rect x="868" y="325" width="18" height="65"/>
    <rect x="892" y="335" width="18" height="55"/>
    <rect x="916" y="320" width="18" height="70"/>
    <rect x="940" y="330" width="18" height="60"/>
    <rect x="964" y="316" width="18" height="74"/>
    <rect x="988" y="324" width="18" height="66"/>
    <rect x="1012" y="310" width="18" height="80"/>
    <rect x="1036" y="318" width="18" height="72"/>
    <rect x="1060" y="305" width="18" height="85"/>
    <rect x="1084" y="314" width="18" height="76"/>
    <rect x="1108" y="300" width="18" height="90"/>
  </g>
  <!-- Baseline -->
  <line x1="700" y1="392" x2="1130" y2="392" stroke="#1e3040" stroke-width="1"/>

  <!-- Label: "req/s" -->
  <text x="700" y="325" font-size="9" fill="#475569">req/s</text>

  <!-- Bottom gradient overlay -->
  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>

  <!-- Series label -->
  <text x="600" y="572" text-anchor="middle" font-size="13" fill="#37BEC3" letter-spacing="3" font-weight="600">Traefik Essentials</text>

  <!-- Title -->
  <text x="600" y="608" text-anchor="middle" font-size="34" font-weight="700" fill="#f0f6fc">Monitoring with Grafana, Prometheus &amp; Loki</text>
</svg>
