<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="hex-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e3040"/>
      <stop offset="100%" stop-color="#071e2a"/>
    </linearGradient>
    <linearGradient id="prom-grad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%" stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#37BEC3"/>
    </marker>
    <marker id="arr-dim" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#37BEC3" fill-opacity="0.4"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/>
  </g>

  <!-- === Internet / web traffic (left) === -->
  <text x="105" y="200" text-anchor="middle" font-size="12" fill="#475569" letter-spacing="2">INTERNET</text>
  <circle cx="105" cy="255" r="38" fill="none" stroke="#1e3a52" stroke-width="2"/>
  <ellipse cx="105" cy="255" rx="18" ry="38" fill="none" stroke="#1e3a52" stroke-width="1.5"/>
  <line x1="67" y1="255" x2="143" y2="255" stroke="#1e3a52" stroke-width="1.5"/>
  <line x1="72" y1="230" x2="138" y2="230" stroke="#1e3a52" stroke-width="1"/>
  <line x1="72" y1="280" x2="138" y2="280" stroke="#1e3a52" stroke-width="1"/>

  <!-- Incoming request paths -->
  <path d="M 148,215 C 270,215 370,255 503,255" fill="none" stroke="#37BEC3" stroke-width="2.5" stroke-opacity="0.5" marker-end="url(#arr-dim)"/>
  <text x="290" y="207" text-anchor="middle" font-size="11" fill="#475569">HTTP</text>
  <path d="M 148,255 L 503,255" fill="none" stroke="#37BEC3" stroke-width="3" marker-end="url(#arr)"/>
  <text x="300" y="247" text-anchor="middle" font-size="11" fill="#37BEC3" font-weight="600">HTTPS</text>
  <path d="M 148,295 C 270,295 370,255 503,255" fill="none" stroke="#37BEC3" stroke-width="2.5" stroke-opacity="0.5" marker-end="url(#arr-dim)"/>
  <text x="290" y="313" text-anchor="middle" font-size="11" fill="#475569">HTTPS</text>

  <!-- === Traefik Hexagon (flat-top) center (600,255) radius 95 === -->
  <polygon points="695,255 647,172 553,172 505,255 553,338 647,338"
           fill="url(#hex-fill)" stroke="#37BEC3" stroke-width="2.5"/>
  <!-- Converging flow mark -->
  <path d="M 538,233 C 568,233 588,253 600,255" fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.55" stroke-linecap="round"/>
  <path d="M 538,255 L 600,255"               fill="none" stroke="#ffffff" stroke-width="3.5" stroke-opacity="0.75" stroke-linecap="round"/>
  <path d="M 538,277 C 568,277 588,257 600,255" fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.55" stroke-linecap="round"/>
  <circle cx="600" cy="255" r="9" fill="#37BEC3" fill-opacity="0.25"/>
  <circle cx="600" cy="255" r="4.5" fill="#ffffff"/>
  <path d="M 600,255 C 612,253 632,233 662,233" fill="none" stroke="#37BEC3" stroke-width="3" stroke-opacity="0.75" stroke-linecap="round"/>
  <path d="M 600,255 L 662,255"               fill="none" stroke="#37BEC3" stroke-width="3.5" stroke-opacity="1" stroke-linecap="round"/>
  <path d="M 600,255 C 612,257 632,277 662,277" fill="none" stroke="#37BEC3" stroke-width="3" stroke-opacity="0.75" stroke-linecap="round"/>
  <!-- wordmark -->
  <text x="600" y="356" text-anchor="middle" font-size="14" font-weight="700" fill="#37BEC3" letter-spacing="4">traefik</text>

  <!-- Arrows from Traefik to monitoring panels -->
  <path d="M 697,243 C 718,243 718,165 748,165" fill="none" stroke="#37BEC3" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 697,255 L 748,255"               fill="none" stroke="#37BEC3" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 697,267 C 718,267 718,347 748,347" fill="none" stroke="#37BEC3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- === Prometheus panel (y=123, height=83) === -->
  <rect x="750" y="123" width="380" height="83" fill="#0d1e30" stroke="#ef4444" stroke-width="1.5" rx="8"/>
  <rect x="750" y="123" width="6" height="83" fill="#ef4444" rx="4"/>
  <text x="770" y="139" font-size="11" font-weight="700" fill="#ef4444" letter-spacing="1">PROMETHEUS</text>
  <!-- Sparkline fill -->
  <polygon points="764,200 764,195 788,192 812,189 836,182 860,185 884,177 908,180 932,171 956,174 980,166 1004,169 1028,161 1052,163 1076,157 1100,153 1122,150 1122,200"
           fill="url(#prom-grad)"/>
  <!-- Sparkline -->
  <polyline points="764,195 788,192 812,189 836,182 860,185 884,177 908,180 932,171 956,174 980,166 1004,169 1028,161 1052,163 1076,157 1100,153 1122,150"
            fill="none" stroke="#ef4444" stroke-width="2" stroke-linejoin="round"/>
  <!-- Baseline -->
  <line x1="764" y1="200" x2="1122" y2="200" stroke="#1e3040" stroke-width="1"/>

  <!-- === Loki panel (y=214, height=83) === -->
  <rect x="750" y="214" width="380" height="83" fill="#0d1e30" stroke="#a78bfa" stroke-width="1.5" rx="8"/>
  <rect x="750" y="214" width="6" height="83" fill="#a78bfa" rx="4"/>
  <text x="770" y="230" font-size="11" font-weight="700" fill="#a78bfa" letter-spacing="1">LOKI</text>
  <g font-size="8.5" fill="#64748b" font-family="'Courier New',monospace">
    <text x="764" y="245">level=info  msg="Started listening"  entryPoints=[web,websecure]</text>
    <text x="764" y="259"><tspan fill="#4ade80">200</tspan> GET /api/health  router=web@docker  service=frontend</text>
    <text x="764" y="273"><tspan fill="#37BEC3">302</tspan> GET /  router=http-catchall  middleware=redirect-to-https</text>
  </g>

  <!-- === Grafana panel (y=305, height=83) === -->
  <rect x="750" y="305" width="380" height="83" fill="#0d1e30" stroke="#f97316" stroke-width="1.5" rx="8"/>
  <rect x="750" y="305" width="6" height="83" fill="#f97316" rx="4"/>
  <text x="770" y="321" font-size="11" font-weight="700" fill="#f97316" letter-spacing="1">GRAFANA</text>
  <text x="764" y="332" font-size="8" fill="#64748b" font-family="'Courier New',monospace">traefik_requests_total / s</text>
  <!-- Bar chart (baseline y=383) -->
  <g fill="#f97316" fill-opacity="0.7">
    <rect x="764" y="368" width="14" height="15"/>
    <rect x="785" y="365" width="14" height="18"/>
    <rect x="806" y="367" width="14" height="16"/>
    <rect x="827" y="361" width="14" height="22"/>
    <rect x="848" y="363" width="14" height="20"/>
    <rect x="869" y="357" width="14" height="26"/>
    <rect x="890" y="360" width="14" height="23"/>
    <rect x="911" y="354" width="14" height="29"/>
    <rect x="932" y="356" width="14" height="27"/>
    <rect x="953" y="350" width="14" height="33"/>
    <rect x="974" y="353" width="14" height="30"/>
    <rect x="995" y="347" width="14" height="36"/>
    <rect x="1016" y="349" width="14" height="34"/>
    <rect x="1037" y="343" width="14" height="40"/>
    <rect x="1058" y="339" width="14" height="44"/>
    <rect x="1079" y="340" width="14" height="43"/>
    <rect x="1100" y="336" width="14" height="47"/>
  </g>
  <line x1="764" y1="383" x2="1122" y2="383" stroke="#1e3040" stroke-width="1"/>

  <!-- Bottom gradient overlay -->
  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>

  <!-- Series label -->
  <text x="600" y="500" text-anchor="middle" font-size="13" fill="#37BEC3" letter-spacing="3" font-weight="600">Traefik Essentials</text>

  <!-- Title -->
  <text x="600" y="538" text-anchor="middle" font-size="34" font-weight="700" fill="#f1f5f9">Monitoring with Grafana, Prometheus &amp; Loki</text>
</svg>
