<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="hex-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e4030"/>
      <stop offset="100%" stop-color="#072a1e"/>
    </linearGradient>
    <linearGradient id="hex-fill-alloy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e2040"/>
      <stop offset="100%" stop-color="#071428"/>
    </linearGradient>
    <radialGradient id="glow-green" cx="18%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-sky" cx="50%" cy="50%" r="18%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <!-- GL.iNet → Alloy gradient (green → sky), horizontal -->
    <linearGradient id="arr-gl-alloy" x1="281" y1="255" x2="529" y2="255" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <!-- Alloy → tool gradients (sky → tool color) -->
    <linearGradient id="arr-alloy-prom" x1="671" y1="240" x2="850" y2="165" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="arr-alloy-loki" x1="671" y1="255" x2="850" y2="255" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="arr-alloy-graf" x1="671" y1="270" x2="850" y2="345" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <!-- Arrow markers -->
    <marker id="arr-sky" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#ef4444"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#a78bfa"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#f97316"/>
    </marker>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%" stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-green)"/>
  <rect width="1200" height="630" fill="url(#glow-sky)"/>

  <!-- Subtle grid -->
  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/>
  </g>

  <!-- === GL.iNet hexagon (pointy-top, center 220,255, r=70) === -->
  <!-- Vertices: top(220,185) tr(281,220) br(281,290) bot(220,325) bl(159,290) tl(159,220) -->
  <polygon points="220,185 281,220 281,290 220,325 159,290 159,220"
           fill="url(#hex-fill)" stroke="#34d399" stroke-width="2.5"/>
  <polygon points="220,193 274,224 274,286 220,317 166,286 166,224"
           fill="none" stroke="#34d399" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="220" y="249" text-anchor="middle" font-size="18" font-weight="700" fill="#86efac" letter-spacing="1">GL.iNet</text>
  <text x="220" y="268" text-anchor="middle" font-size="10" fill="#34d399" letter-spacing="3" opacity="0.8">OpenWrt</text>

  <!-- Arrow: GL.iNet → Alloy (horizontal) -->
  <path d="M 281,255 L 529,255"
        fill="none" stroke="url(#arr-gl-alloy)" stroke-width="2" marker-end="url(#arr-sky)"/>

  <!-- === CENTER ZONE — Alloy hexagon (pointy-top, center 600,255, r=82) === -->
  <!-- Vertices: top(600,173) tr(671,214) br(671,296) bot(600,337) bl(529,296) tl(529,214) -->
  <polygon points="600,173 671,214 671,296 600,337 529,296 529,214"
           fill="url(#hex-fill-alloy)" stroke="#38bdf8" stroke-width="2.5"/>
  <polygon points="600,181 663,219 663,291 600,329 537,291 537,219"
           fill="none" stroke="#38bdf8" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="600" y="249" text-anchor="middle" font-size="22" font-weight="700" fill="#7dd3fc" letter-spacing="2">ALLOY</text>
  <text x="600" y="270" text-anchor="middle" font-size="11" fill="#38bdf8" letter-spacing="3" opacity="0.8">collector</text>

  <!-- Diverging arrows: Alloy → tool hexagons (symmetric ±90px from cy=255) -->
  <path d="M 671,240 C 720,210 780,165 850,165" fill="none" stroke="url(#arr-alloy-prom)" stroke-width="2" marker-end="url(#arr-red)"/>
  <path d="M 671,255 L 850,255"                 fill="none" stroke="url(#arr-alloy-loki)" stroke-width="2" marker-end="url(#arr-purple)"/>
  <path d="M 671,270 C 720,300 780,345 850,345" fill="none" stroke="url(#arr-alloy-graf)" stroke-width="2" marker-end="url(#arr-orange)"/>

  <!-- === RIGHT ZONE: tool nodes as mini hexagons (pointy-top, r=35) === -->

  <!-- Prometheus (cx=880, cy=165) -->
  <polygon points="880,130 910,148 910,182 880,200 850,182 850,148"
           fill="#200808" stroke="#ef4444" stroke-width="2"/>
  <polygon points="880,135 906,150 906,180 880,195 854,180 854,150"
           fill="none" stroke="#ef4444" stroke-width="0.7" stroke-opacity="0.3"/>
  <text x="880" y="170" text-anchor="middle" font-size="18" font-weight="800" fill="#ef4444">P</text>
  <text x="922" y="162" font-size="12" font-weight="700" fill="#ef4444" letter-spacing="1">PROMETHEUS</text>
  <text x="922" y="176" font-size="9" fill="#64748b" font-family="'Courier New',monospace">metrics · time-series db</text>

  <!-- Loki (cx=880, cy=255) -->
  <polygon points="880,220 910,238 910,272 880,290 850,272 850,238"
           fill="#160a2a" stroke="#a78bfa" stroke-width="2"/>
  <polygon points="880,225 906,240 906,270 880,285 854,270 854,240"
           fill="none" stroke="#a78bfa" stroke-width="0.7" stroke-opacity="0.3"/>
  <text x="880" y="261" text-anchor="middle" font-size="18" font-weight="800" fill="#a78bfa">L</text>
  <text x="922" y="252" font-size="12" font-weight="700" fill="#a78bfa" letter-spacing="1">LOKI</text>
  <text x="922" y="266" font-size="9" fill="#64748b" font-family="'Courier New',monospace">logs · label-indexed</text>

  <!-- Grafana (cx=880, cy=345) -->
  <polygon points="880,310 910,328 910,362 880,380 850,362 850,328"
           fill="#1a0c00" stroke="#f97316" stroke-width="2"/>
  <polygon points="880,315 906,330 906,360 880,375 854,360 854,330"
           fill="none" stroke="#f97316" stroke-width="0.7" stroke-opacity="0.3"/>
  <text x="880" y="351" text-anchor="middle" font-size="18" font-weight="800" fill="#f97316">G</text>
  <text x="922" y="342" font-size="12" font-weight="700" fill="#f97316" letter-spacing="1">GRAFANA</text>
  <text x="922" y="356" font-size="9" fill="#64748b" font-family="'Courier New',monospace">visualization · dashboards</text>

  <!-- Bottom gradient overlay -->
  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>

  <!-- Series label -->
  <text x="600" y="500" text-anchor="middle" font-size="13" fill="#34d399" letter-spacing="3" font-weight="600">NETWORKING</text>

  <!-- Title -->
  <text x="600" y="538" text-anchor="middle" font-size="34" font-weight="700" fill="#f1f5f9">Monitoring GL.iNet with Grafana</text>
</svg>
