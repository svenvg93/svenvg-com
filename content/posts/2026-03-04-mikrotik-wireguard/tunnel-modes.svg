<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 290" width="700" height="290"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#f97316"/>
    </marker>
    <marker id="arr-muted" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="700" height="290" fill="url(#bg)" rx="8"/>

  <line x1="0" y1="36" x2="700" y2="36" stroke="#0d1a2a" stroke-width="1"/>
  <text x="350" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1">MIKROTIK WIREGUARD — SPLIT-TUNNEL VS FULL-TUNNEL</text>

  <line x1="350" y1="44" x2="350" y2="270" stroke="#1e3a5f" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ===== Left: Split-Tunnel ===== -->
  <text x="175" y="56" text-anchor="middle" font-size="12" font-weight="700" fill="#94a3b8">Split-Tunnel (default)</text>

  <rect x="105" y="66" width="140" height="40" fill="none" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="175" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#93c5fd">Remote Client</text>
  <text x="175" y="100" text-anchor="middle" font-size="9" fill="#3b82f6" opacity="0.8">phone / laptop</text>

  <rect x="105" y="126" width="140" height="42" fill="none" stroke="#c2410c" stroke-width="1.5" rx="5"/>
  <text x="175" y="147" text-anchor="middle" font-size="12" font-weight="600" fill="#fb923c">MikroTik (WG)</text>
  <text x="175" y="162" text-anchor="middle" font-size="9" fill="#fb923c" opacity="0.8">wireguard1</text>

  <rect x="25" y="200" width="125" height="50" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="87" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#86efac">LAN</text>
  <text x="87" y="238" text-anchor="middle" font-size="9" fill="#34d399" opacity="0.8">via VPN tunnel</text>

  <rect x="170" y="200" width="125" height="50" fill="none" stroke="#ef4444" stroke-width="1.5" rx="5"/>
  <text x="232" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#fca5a5">Internet</text>
  <text x="232" y="238" text-anchor="middle" font-size="9" fill="#ef4444" opacity="0.8">direct (no VPN)</text>

  <line x1="175" y1="106" x2="175" y2="126" stroke="#c2410c" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <line x1="175" y1="168" x2="100" y2="200" stroke="#c2410c" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <path d="M 225,106 Q 300,145 232,200" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-muted)"/>

  <text x="175" y="270" text-anchor="middle" font-size="9" fill="#94a3b8">Only LAN traffic enters the tunnel — internet goes direct</text>

  <!-- ===== Right: Full-Tunnel ===== -->
  <text x="525" y="56" text-anchor="middle" font-size="12" font-weight="700" fill="#94a3b8">Full-Tunnel (0.0.0.0/0)</text>

  <rect x="455" y="66" width="140" height="40" fill="none" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="525" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#93c5fd">Remote Client</text>
  <text x="525" y="100" text-anchor="middle" font-size="9" fill="#3b82f6" opacity="0.8">phone / laptop</text>

  <rect x="455" y="126" width="140" height="42" fill="none" stroke="#c2410c" stroke-width="1.5" rx="5"/>
  <text x="525" y="147" text-anchor="middle" font-size="12" font-weight="600" fill="#fb923c">MikroTik (WG)</text>
  <text x="525" y="162" text-anchor="middle" font-size="9" fill="#fb923c" opacity="0.8">wireguard1</text>

  <rect x="405" y="200" width="125" height="50" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="467" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#86efac">LAN</text>
  <text x="467" y="238" text-anchor="middle" font-size="9" fill="#34d399" opacity="0.8">via VPN tunnel</text>

  <rect x="550" y="200" width="125" height="50" fill="none" stroke="#ef4444" stroke-width="1.5" rx="5"/>
  <text x="612" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#fca5a5">Internet</text>
  <text x="612" y="238" text-anchor="middle" font-size="9" fill="#ef4444" opacity="0.8">via VPN tunnel</text>

  <line x1="525" y1="106" x2="525" y2="126" stroke="#c2410c" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <line x1="500" y1="168" x2="450" y2="200" stroke="#c2410c" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <line x1="550" y1="168" x2="600" y2="200" stroke="#c2410c" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <text x="525" y="270" text-anchor="middle" font-size="9" fill="#94a3b8">All traffic — including internet — routes through the VPN</text>
</svg>
