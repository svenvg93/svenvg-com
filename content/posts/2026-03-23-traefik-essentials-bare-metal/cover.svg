<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="hex-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e3040"/>
      <stop offset="100%" stop-color="#071e2a"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%" stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#37BEC3"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/>
  </g>

  <!-- === Stage 1: Binary download — terminal box === -->
  <rect x="60" y="175" width="240" height="160" fill="#0a1628" stroke="#334155" stroke-width="1.5" rx="8"/>
  <!-- Terminal title bar -->
  <rect x="60" y="175" width="240" height="26" fill="#1e293b" rx="8"/>
  <rect x="60" y="189" width="240" height="12" fill="#1e293b"/>
  <!-- Traffic light dots -->
  <circle cx="82" cy="188" r="5" fill="#ef4444" fill-opacity="0.7"/>
  <circle cx="97" cy="188" r="5" fill="#f59e0b" fill-opacity="0.7"/>
  <circle cx="112" cy="188" r="5" fill="#4ade80" fill-opacity="0.7"/>
  <!-- Terminal label -->
  <text x="180" y="193" text-anchor="middle" font-size="9" fill="#64748b">bash</text>
  <!-- Terminal content -->
  <g font-family="'Courier New',monospace" font-size="9.5" fill="#94a3b8">
    <text x="76" y="218"><tspan fill="#4ade80">$</tspan> wget traefik_v3.tar.gz</text>
    <text x="76" y="234"><tspan fill="#4ade80">$</tspan> tar -xzf traefik_v3.tar.gz</text>
    <text x="76" y="250"><tspan fill="#4ade80">$</tspan> mv traefik /usr/local/bin/</text>
    <text x="76" y="266"><tspan fill="#4ade80">$</tspan> chmod +x /usr/local/bin/traefik</text>
    <text x="76" y="285" fill="#64748b">Verifying binary…</text>
    <text x="76" y="300" fill="#4ade80">✓ traefik version 3.3.4</text>
  </g>
  <!-- Label below -->
  <text x="180" y="354" text-anchor="middle" font-size="11" fill="#64748b">Binary Install</text>

  <!-- Arrow 1 → 2 -->
  <path d="M 302,255 L 368,255" fill="none" stroke="#37BEC3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- === Stage 2: systemd unit === -->
  <rect x="370" y="175" width="220" height="160" fill="#0a1628" stroke="#334155" stroke-width="1.5" rx="8"/>
  <!-- File tab -->
  <rect x="370" y="175" width="220" height="26" fill="#1e293b" rx="8"/>
  <rect x="370" y="189" width="220" height="12" fill="#1e293b"/>
  <text x="480" y="193" text-anchor="middle" font-size="9" fill="#64748b">traefik.service</text>
  <!-- systemd unit content -->
  <g font-family="'Courier New',monospace" font-size="9" fill="#94a3b8">
    <text x="386" y="218" fill="#7dd3fc">[Unit]</text>
    <text x="386" y="231">Description=Traefik</text>
    <text x="386" y="244">After=network.target</text>
    <text x="386" y="261" fill="#7dd3fc">[Service]</text>
    <text x="386" y="274">User=traefik</text>
    <text x="386" y="287">ExecStart=/usr/local/bin/\</text>
    <text x="394" y="300">  traefik --configFile=\</text>
    <text x="394" y="313">  /etc/traefik/traefik.yml</text>
  </g>
  <!-- Label below -->
  <text x="480" y="354" text-anchor="middle" font-size="11" fill="#64748b">systemd Service</text>

  <!-- Arrow 2 → 3 -->
  <path d="M 592,255 L 650,255" fill="none" stroke="#37BEC3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- === Stage 3: Traefik Hexagon center (760,255) radius 85 === -->
  <polygon points="845,255 800,181 720,181 675,255 720,329 800,329"
           fill="url(#hex-fill)" stroke="#37BEC3" stroke-width="2.5"/>
  <!-- Converging flow mark -->
  <path d="M 698,235 C 728,235 748,253 760,255" fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.55" stroke-linecap="round"/>
  <path d="M 698,255 L 760,255"               fill="none" stroke="#ffffff" stroke-width="3.5" stroke-opacity="0.75" stroke-linecap="round"/>
  <path d="M 698,275 C 728,275 748,257 760,255" fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.55" stroke-linecap="round"/>
  <circle cx="760" cy="255" r="9" fill="#37BEC3" fill-opacity="0.25"/>
  <circle cx="760" cy="255" r="4.5" fill="#ffffff"/>
  <path d="M 760,255 C 772,253 792,235 822,235" fill="none" stroke="#37BEC3" stroke-width="3" stroke-opacity="0.75" stroke-linecap="round"/>
  <path d="M 760,255 L 822,255"               fill="none" stroke="#37BEC3" stroke-width="3.5" stroke-opacity="1" stroke-linecap="round"/>
  <path d="M 760,255 C 772,257 792,275 822,275" fill="none" stroke="#37BEC3" stroke-width="3" stroke-opacity="0.75" stroke-linecap="round"/>
  <!-- wordmark -->
  <text x="760" y="350" text-anchor="middle" font-size="13" font-weight="700" fill="#37BEC3" letter-spacing="4">traefik</text>

  <!-- Arrow 3 → systemctl status box -->
  <path d="M 847,255 L 978,255" fill="none" stroke="#37BEC3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- === systemctl status traefik output === -->
  <rect x="980" y="160" width="178" height="190" fill="#0a1628" stroke="#334155" stroke-width="1.5" rx="8"/>
  <rect x="980" y="160" width="178" height="26" fill="#1e293b" rx="8"/>
  <rect x="980" y="174" width="178" height="12" fill="#1e293b"/>
  <text x="1069" y="179" text-anchor="middle" font-size="9" fill="#64748b">bash</text>
  <g font-family="'Courier New',monospace" font-size="8.5" fill="#94a3b8">
    <text x="994" y="202"><tspan fill="#4ade80">●</tspan> traefik.service</text>
    <text x="994" y="216">  Loaded: loaded</text>
    <text x="994" y="230">  Active: <tspan fill="#4ade80">active (running)</tspan></text>
    <text x="994" y="244">    Docs: https://doc.traefik.io</text>
    <text x="994" y="261" fill="#64748b">Main PID: 1823 (traefik)</text>
    <text x="994" y="275" fill="#64748b">  Memory: 42.1 MB</text>
    <text x="994" y="289" fill="#4ade80">   Tasks: 12 (limit: 4915)</text>
    <text x="994" y="303" fill="#64748b">    CPU: 0.3%</text>
    <text x="994" y="323" fill="#37BEC3">Listening :80 :443</text>
  </g>

  <!-- Cloudflare DNS badge -->
  <rect x="325" y="96" width="240" height="32" fill="#0c1a2e" stroke="#f97316" stroke-width="1.5" rx="16"/>
  <text x="445" y="117" text-anchor="middle" font-size="12" fill="#f97316" font-weight="600" letter-spacing="1">Cloudflare DNS Challenge</text>

  <!-- TLS badge -->
  <rect x="605" y="96" width="188" height="32" fill="#052e16" stroke="#4ade80" stroke-width="1.5" rx="16"/>
  <text x="699" y="117" text-anchor="middle" font-size="12" fill="#4ade80" font-weight="600" letter-spacing="1">TLS · Let's Encrypt</text>

  <!-- Bottom gradient overlay -->
  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>

  <!-- Series label -->
  <text x="600" y="500" text-anchor="middle" font-size="13" fill="#37BEC3" letter-spacing="3" font-weight="600">Traefik Essentials</text>

  <!-- Title -->
  <text x="600" y="538" text-anchor="middle" font-size="34" font-weight="700" fill="#f1f5f9">Bare Metal Install</text>
</svg>
