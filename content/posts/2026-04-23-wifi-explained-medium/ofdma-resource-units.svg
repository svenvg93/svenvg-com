  <line x1="356" y1="50" x2="356" y2="168" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="506" y1="50" x2="506" y2="168" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Caption -->
  <text x="350" y="214" text-anchor="middle" font-size="11" fill="#6b7280">Four clients transmit or receive simultaneously — one contention event, four deliveries</text>
