<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 210" width="700" height="210"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="g-jg" x1="210" y1="107" x2="290" y2="107" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="g-pg" x1="420" y1="107" x2="500" y2="107" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <marker id="arr-indigo" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#6366f1"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#f97316"/>
    </marker>
    <marker id="arr-muted" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="700" height="210" fill="url(#bg)" rx="8"/>
  <line x1="0" y1="36" x2="700" y2="36" stroke="#0d1a2a" stroke-width="1"/>
  <text x="350" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1">DASHBOARD PROVISIONING — FILE-BASED LOADING</text>

  <!-- JSON Files box -->
  <rect x="80" y="72" width="130" height="70" fill="#0a0d28" stroke="#6366f1" stroke-width="1.5" rx="5"/>
  <text x="145" y="93" text-anchor="middle" font-size="10" font-weight="600" fill="#a5b4fc">Dashboard Files</text>
  <text x="145" y="108" text-anchor="middle" font-size="8" fill="#64748b">provisioning/</text>
  <text x="145" y="121" text-anchor="middle" font-size="8" fill="#64748b">dashboards/*.json</text>
  <text x="145" y="135" text-anchor="middle" font-size="8" fill="#4a4a6a">version-controlled</text>

  <!-- JSON Files → Provisioner -->
  <line x1="210" y1="107" x2="290" y2="107" stroke="url(#g-jg)" stroke-width="1.5" marker-end="url(#arr-indigo)"/>
  <text x="250" y="99" text-anchor="middle" font-size="8" fill="#94a3b8">reads</text>

  <!-- Provisioner box -->
  <rect x="292" y="72" width="130" height="70" fill="#1a1000" stroke="#d97706" stroke-width="1.5" rx="5"/>
  <text x="357" y="93" text-anchor="middle" font-size="10" font-weight="600" fill="#fcd34d">Provisioner</text>
  <text x="357" y="108" text-anchor="middle" font-size="8" fill="#78716c">YAML config</text>
  <text x="357" y="121" text-anchor="middle" font-size="8" fill="#78716c">polls every 30 s</text>
  <text x="357" y="135" text-anchor="middle" font-size="8" fill="#4a4a6a">detects file changes</text>

  <!-- Provisioner → Grafana -->
  <line x1="422" y1="107" x2="498" y2="107" stroke="url(#g-pg)" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="460" y="99" text-anchor="middle" font-size="8" fill="#94a3b8">loads / reloads</text>

  <!-- Grafana box -->
  <rect x="500" y="72" width="120" height="70" fill="#1a0c06" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="560" y="93" text-anchor="middle" font-size="10" font-weight="600" fill="#fb923c">Grafana</text>
  <text x="560" y="108" text-anchor="middle" font-size="8" fill="#78716c">stores in SQLite</text>
  <text x="560" y="121" text-anchor="middle" font-size="8" fill="#78716c">serves dashboards</text>
  <text x="560" y="135" text-anchor="middle" font-size="8" fill="#4a4a6a">:3000</text>

  <!-- Poll loop: curved dashed arrow from Provisioner back to JSON files -->
  <path d="M 357,142 Q 250,178 145,142" fill="none" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-muted)"/>
  <text x="251" y="172" text-anchor="middle" font-size="8" fill="#475569">polls every 30 s for file changes</text>

  <!-- Footer -->
  <text x="350" y="197" text-anchor="middle" font-size="9" fill="#475569">dashboards are loaded at startup and reloaded automatically when JSON files change on disk</text>
</svg>
