<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="hex-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e3040"/>
      <stop offset="100%" stop-color="#071e2a"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#37BEC3"/>
    </marker>
    <marker id="arr-dim" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#37BEC3" fill-opacity="0.4"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0"    y1="100" x2="1200" y2="100"/>
    <line x1="0"    y1="200" x2="1200" y2="200"/>
    <line x1="0"    y1="300" x2="1200" y2="300"/>
    <line x1="0"    y1="400" x2="1200" y2="400"/>
    <line x1="200"  y1="0"   x2="200"  y2="500"/>
    <line x1="400"  y1="0"   x2="400"  y2="500"/>
    <line x1="600"  y1="0"   x2="600"  y2="500"/>
    <line x1="800"  y1="0"   x2="800"  y2="500"/>
    <line x1="1000" y1="0"   x2="1000" y2="500"/>
  </g>

  <!-- LEFT: CLIENT globe -->
  <text x="105" y="162" text-anchor="middle" font-size="11" fill="#475569" letter-spacing="2">CLIENT</text>
  <circle cx="105" cy="215" r="38" fill="none" stroke="#1e3a52" stroke-width="2"/>
  <ellipse cx="105" cy="215" rx="18" ry="38" fill="none" stroke="#1e3a52" stroke-width="1.5"/>
  <line x1="67"  y1="215" x2="143" y2="215" stroke="#1e3a52" stroke-width="1.5"/>
  <line x1="72"  y1="190" x2="138" y2="190" stroke="#1e3a52" stroke-width="1"/>
  <line x1="72"  y1="240" x2="138" y2="240" stroke="#1e3a52" stroke-width="1"/>

  <!-- Incoming request arrows -->
  <path d="M 148,175 C 270,175 370,215 503,215" fill="none" stroke="#37BEC3" stroke-width="2.5" stroke-opacity="0.5" marker-end="url(#arr-dim)"/>
  <text x="290" y="167" text-anchor="middle" font-size="11" fill="#475569">HTTP</text>
  <path d="M 148,215 L 503,215" fill="none" stroke="#37BEC3" stroke-width="3" marker-end="url(#arr)"/>
  <text x="300" y="207" text-anchor="middle" font-size="11" fill="#37BEC3" font-weight="600">HTTPS</text>
  <path d="M 148,255 C 270,255 370,215 503,215" fill="none" stroke="#37BEC3" stroke-width="2.5" stroke-opacity="0.5" marker-end="url(#arr-dim)"/>

  <!-- TRAEFIK HEX: flat-top, center (600,215), r=95 -->
  <polygon points="695,215 647,132 553,132 505,215 553,298 647,298"
           fill="url(#hex-fill)" stroke="#37BEC3" stroke-width="2.5"/>
  <text x="600" y="209" text-anchor="middle" font-size="22" font-weight="700" fill="#67e8f9" letter-spacing="2">traefik</text>
  <text x="600" y="230" text-anchor="middle" font-size="11" fill="#37BEC3" letter-spacing="3" opacity="0.8">middlewares</text>

  <!-- Arrows: Traefik → middleware cards -->
  <path d="M 697,203 C 730,183 790,152 850,152" fill="none" stroke="#37BEC3" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 697,215 L 850,215"                 fill="none" stroke="#37BEC3" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 697,227 C 730,247 790,278 850,278" fill="none" stroke="#37BEC3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Middleware card 1: IPAllowList -->
  <rect x="858" y="125" width="290" height="55" fill="#071e2a" stroke="#37BEC3" stroke-width="1.5" rx="5"/>
  <rect x="858" y="125" width="5"   height="55" fill="#37BEC3" rx="3"/>
  <text x="874" y="147" font-size="13" font-weight="700" fill="#67e8f9">IPAllowList</text>
  <text x="874" y="166" font-size="10" fill="#64748b" font-family="'Courier New',monospace">sourceRange: 192.168.0.0/16</text>

  <!-- Middleware card 2: BasicAuth -->
  <rect x="858" y="188" width="290" height="55" fill="#071e2a" stroke="#37BEC3" stroke-width="1.5" rx="5"/>
  <rect x="858" y="188" width="5"   height="55" fill="#37BEC3" rx="3"/>
  <text x="874" y="210" font-size="13" font-weight="700" fill="#67e8f9">BasicAuth</text>
  <text x="874" y="229" font-size="10" fill="#64748b" font-family="'Courier New',monospace">users: admin:$apr1$…</text>

  <!-- Middleware card 3: SecurityHeaders -->
  <rect x="858" y="251" width="290" height="55" fill="#071e2a" stroke="#37BEC3" stroke-width="1.5" rx="5"/>
  <rect x="858" y="251" width="5"   height="55" fill="#37BEC3" rx="3"/>
  <text x="874" y="273" font-size="13" font-weight="700" fill="#67e8f9">SecurityHeaders</text>
  <text x="874" y="292" font-size="10" fill="#64748b" font-family="'Courier New',monospace">HSTS · X-Frame · CSP</text>

  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>
  <text x="600" y="500" text-anchor="middle" font-size="13"
        fill="#37BEC3" letter-spacing="3" font-weight="600">TRAEFIK ESSENTIALS</text>
  <text x="600" y="538" text-anchor="middle" font-size="34"
        font-weight="700" fill="#f1f5f9">Middlewares</text>
</svg>
