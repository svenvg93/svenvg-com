<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" width="700" height="260" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="260" fill="url(#bg)" rx="8"/>

  <!-- Grid lines -->
  <line x1="90" y1="90" x2="690" y2="90" stroke="#0d1a2a" stroke-width="1"/>
  <line x1="90" y1="148" x2="690" y2="148" stroke="#0d1a2a" stroke-width="1"/>

  <!-- Header label -->
  <text x="350" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1">CSMA/CA — CONTENTION AND FRAME EXCHANGE</text>

  <!-- Device A label -->
  <text x="16" y="65" font-size="11" font-weight="600" fill="#7dd3fc">Device A</text>

  <!-- Channel busy -->
  <rect x="90" y="49" width="80" height="30" fill="#0a1020" stroke="#334155" stroke-width="1.5" rx="5"/>
  <text x="130" y="67" text-anchor="middle" font-size="10" fill="#94a3b8">Busy</text>

  <!-- DIFS -->
  <rect x="174" y="49" width="36" height="30" fill="#1a0e3a" stroke="#7c3aed" stroke-width="1.5" rx="5"/>
  <text x="192" y="67" text-anchor="middle" font-size="9" font-weight="600" fill="#c4b5fd">DIFS</text>

  <!-- Backoff A -->
  <rect x="214" y="49" width="48" height="30" fill="#1a1000" stroke="#fcd34d" stroke-width="1.5" rx="5"/>
  <text x="238" y="64" text-anchor="middle" font-size="9" font-weight="600" fill="#fcd34d">Backoff</text>
  <text x="238" y="75" text-anchor="middle" font-size="8" fill="#fcd34d">3 slots</text>

  <!-- DATA A -->
  <rect x="266" y="49" width="120" height="30" fill="#0e2040" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="326" y="64" text-anchor="middle" font-size="11" font-weight="600" fill="#bae6fd">DATA</text>
  <text x="326" y="75" text-anchor="middle" font-size="9" fill="#7dd3fc">frame transmission</text>

  <!-- SIFS -->
  <rect x="390" y="49" width="28" height="30" fill="#1a0e3a" stroke="#7c3aed" stroke-width="1.5" rx="5"/>
  <text x="404" y="67" text-anchor="middle" font-size="9" font-weight="600" fill="#c4b5fd">SIFS</text>

  <!-- ACK -->
  <rect x="422" y="49" width="52" height="30" fill="#071810" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="448" y="67" text-anchor="middle" font-size="10" font-weight="600" fill="#a7f3d0">ACK</text>

  <!-- Device B label -->
  <text x="16" y="123" font-size="11" font-weight="600" fill="#7dd3fc">Device B</text>

  <!-- Channel busy B -->
  <rect x="90" y="107" width="80" height="30" fill="#0a1020" stroke="#334155" stroke-width="1.5" rx="5"/>
  <text x="130" y="125" text-anchor="middle" font-size="10" fill="#94a3b8">Busy</text>

  <!-- DIFS B -->
  <rect x="174" y="107" width="36" height="30" fill="#1a0e3a" stroke="#7c3aed" stroke-width="1.5" rx="5"/>
  <text x="192" y="125" text-anchor="middle" font-size="9" font-weight="600" fill="#c4b5fd">DIFS</text>

  <!-- Backoff B longer -->
  <rect x="214" y="107" width="88" height="30" fill="#1a1000" stroke="#fcd34d" stroke-width="1.5" rx="5"/>
  <text x="258" y="122" text-anchor="middle" font-size="9" font-weight="600" fill="#fcd34d">Backoff</text>
  <text x="258" y="133" text-anchor="middle" font-size="8" fill="#fcd34d">7 slots</text>

  <!-- Deferred -->
  <rect x="306" y="107" width="118" height="30" fill="#0d1520" stroke="#1e3a5f" stroke-width="1.5" rx="5" stroke-dasharray="4,2"/>
  <text x="365" y="125" text-anchor="middle" font-size="9" fill="#94a3b8">deferred (channel busy)</text>

  <!-- Backoff B resumed -->
  <rect x="428" y="107" width="36" height="30" fill="#1a1000" stroke="#fcd34d" stroke-width="1.5" rx="5"/>
  <text x="446" y="122" text-anchor="middle" font-size="9" font-weight="600" fill="#fcd34d">Back-</text>
  <text x="446" y="133" text-anchor="middle" font-size="9" font-weight="600" fill="#fcd34d">off</text>

  <!-- Device B DATA -->
  <rect x="468" y="107" width="100" height="30" fill="#0e2040" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="518" y="125" text-anchor="middle" font-size="11" font-weight="600" fill="#bae6fd">DATA</text>

  <!-- Vertical divider at A transmission start -->
  <line x1="266" y1="42" x2="266" y2="143" stroke="#334155" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Time axis -->
  <line x1="90" y1="155" x2="672" y2="155" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="677" y="159" font-size="10" fill="#94a3b8">time</text>
  <line x1="90" y1="151" x2="90" y2="159" stroke="#475569" stroke-width="1.5"/>
  <text x="90" y="170" text-anchor="middle" font-size="9" fill="#94a3b8">0</text>

  <!-- Legend -->
  <rect x="90" y="185" width="14" height="12" fill="#0a1020" stroke="#334155" stroke-width="1" rx="2"/>
  <text x="110" y="195" font-size="10" fill="#94a3b8">Busy / deferred</text>

  <rect x="210" y="185" width="14" height="12" fill="#1a0e3a" stroke="#7c3aed" stroke-width="1" rx="2"/>
  <text x="230" y="195" font-size="10" fill="#c4b5fd">IFS gaps</text>

  <rect x="310" y="185" width="14" height="12" fill="#1a1000" stroke="#fcd34d" stroke-width="1" rx="2"/>
  <text x="330" y="195" font-size="10" fill="#fcd34d">Backoff</text>

  <rect x="400" y="185" width="14" height="12" fill="#0e2040" stroke="#38bdf8" stroke-width="1" rx="2"/>
  <text x="420" y="195" font-size="10" fill="#bae6fd">DATA</text>

  <rect x="460" y="185" width="14" height="12" fill="#071810" stroke="#34d399" stroke-width="1" rx="2"/>
  <text x="480" y="195" font-size="10" fill="#a7f3d0">ACK</text>

  <!-- Footer captions -->
  <text x="350" y="230" text-anchor="middle" font-size="9" fill="#94a3b8">Device B draws a longer backoff and must pause again while Device A transmits</text>
  <text x="350" y="246" text-anchor="middle" font-size="9" fill="#94a3b8">Only one device transmits at a time — the rest wait</text>
</svg>
