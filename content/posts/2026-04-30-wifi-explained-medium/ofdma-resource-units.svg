  <line x1="356" y1="50" x2="356" y2="168" stroke="#1e3a5f" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="506" y1="50" x2="506" y2="168" stroke="#1e3a5f" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Footer captions -->
