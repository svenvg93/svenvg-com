<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050814"/>
      <stop offset="100%" stop-color="#0a1028"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050814" stop-opacity="0"/>
      <stop offset="65%" stop-color="#050814" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#050814" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="merge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#c084fc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <g fill="#0f1f44" opacity="0.7">
    <circle cx="180" cy="90" r="1.5"/><circle cx="280" cy="90" r="1.5"/><circle cx="380" cy="90" r="1.5"/>
    <circle cx="180" cy="150" r="1.5"/><circle cx="280" cy="150" r="1.5"/><circle cx="380" cy="150" r="1.5"/>
  </g>

  <!-- Band labels -->
  <text x="120" y="180" font-size="13" font-weight="600" fill="#fed7aa" letter-spacing="1.5">2.4 GHz</text>
  <text x="120" y="256" font-size="13" font-weight="600" fill="#bae6fd" letter-spacing="1.5">5 GHz</text>
  <text x="120" y="332" font-size="13" font-weight="600" fill="#a7f3d0" letter-spacing="1.5">6 GHz</text>

  <!-- Three independent band lines converging into one link -->
  <path d="M 220,170 C 480,170 560,244 700,244" fill="none" stroke="#f97316" stroke-width="16" stroke-linecap="round"/>
  <path d="M 220,246 C 480,246 560,244 700,244" fill="none" stroke="#38bdf8" stroke-width="26" stroke-linecap="round"/>
  <path d="M 220,322 C 480,322 560,244 700,244" fill="none" stroke="#34d399" stroke-width="36" stroke-linecap="round"/>

  <!-- Merged MLO link -->
  <path d="M 700,244 L 980,244" fill="none" stroke="url(#merge)" stroke-width="40" stroke-linecap="round" marker-end="url(#arr)"/>

  <!-- Client + AP nodes -->
  <circle cx="220" cy="244" r="7" fill="#7dd3fc"/>
  <rect x="1000" y="216" width="120" height="56" rx="8" fill="#150a2e" stroke="#c084fc" stroke-width="1.5"/>
  <text x="1060" y="250" text-anchor="middle" font-size="13" font-weight="600" fill="#e9d5ff" letter-spacing="1.5">MLO</text>

  <!-- Bottom gradient overlay -->
  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>

  <!-- Series label -->
  <text x="600" y="500" text-anchor="middle" font-size="13" fill="#38bdf8" letter-spacing="3" font-weight="600">WIFI EXPLAINED</text>

  <!-- Title -->
  <text x="600" y="538" text-anchor="middle" font-size="34" font-weight="700" fill="#f1f5f9">Spectrum &amp; Multi-Link Operation</text>
</svg>
