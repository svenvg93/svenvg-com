<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" width="700" height="260"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="700" height="260" fill="url(#bg)" rx="8"/>

  <line x1="350" y1="20" x2="350" y2="240" stroke="#1e3a5f" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ===== Left: WiFi 6 ===== -->
  <text x="175" y="38" text-anchor="middle" font-size="12" font-weight="700" fill="#94a3b8">WiFi 6 — one band active</text>
  <text x="80" y="56" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8">CLIENT</text>
  <text x="270" y="56" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8">ACCESS POINT</text>

  <rect x="25" y="64" width="110" height="34" fill="none" stroke="#475569" stroke-width="1.5" rx="5"/>
  <text x="80" y="86" text-anchor="middle" font-size="12" fill="#94a3b8">2.4 GHz</text>

  <rect x="25" y="104" width="110" height="34" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="80" y="126" text-anchor="middle" font-size="12" font-weight="600" fill="#bae6fd">5 GHz</text>

  <rect x="25" y="144" width="110" height="34" fill="none" stroke="#475569" stroke-width="1.5" rx="5"/>
  <text x="80" y="166" text-anchor="middle" font-size="12" fill="#94a3b8">6 GHz</text>

  <rect x="195" y="64" width="110" height="34" fill="none" stroke="#475569" stroke-width="1.5" rx="5"/>
  <text x="250" y="86" text-anchor="middle" font-size="12" fill="#94a3b8">2.4 GHz</text>

  <rect x="195" y="104" width="110" height="34" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="250" y="126" text-anchor="middle" font-size="12" font-weight="600" fill="#bae6fd">5 GHz</text>

  <rect x="195" y="144" width="110" height="34" fill="none" stroke="#475569" stroke-width="1.5" rx="5"/>
  <text x="250" y="166" text-anchor="middle" font-size="12" fill="#94a3b8">6 GHz</text>

  <line x1="135" y1="81" x2="195" y2="81" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="135" y1="121" x2="195" y2="121" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-a)"/>
  <line x1="135" y1="161" x2="195" y2="161" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>

  <text x="175" y="204" text-anchor="middle" font-size="9" fill="#94a3b8">1 band active, 2 idle — the client picks one and stays</text>

  <!-- ===== Right: WiFi 7 MLO ===== -->
  <text x="545" y="38" text-anchor="middle" font-size="12" font-weight="700" fill="#94a3b8">WiFi 7 — MLO, all bands active</text>
  <text x="450" y="56" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8">CLIENT</text>
  <text x="640" y="56" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8">ACCESS POINT</text>

  <rect x="395" y="64" width="110" height="34" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="450" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#bae6fd">2.4 GHz</text>

  <rect x="395" y="104" width="110" height="34" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="450" y="126" text-anchor="middle" font-size="12" font-weight="600" fill="#bae6fd">5 GHz</text>

  <rect x="395" y="144" width="110" height="34" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="450" y="166" text-anchor="middle" font-size="12" font-weight="600" fill="#bae6fd">6 GHz</text>

  <rect x="565" y="64" width="110" height="34" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="620" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#bae6fd">2.4 GHz</text>

  <rect x="565" y="104" width="110" height="34" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="620" y="126" text-anchor="middle" font-size="12" font-weight="600" fill="#bae6fd">5 GHz</text>

  <rect x="565" y="144" width="110" height="34" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="620" y="166" text-anchor="middle" font-size="12" font-weight="600" fill="#bae6fd">6 GHz</text>

  <line x1="505" y1="81" x2="565" y2="81" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-a)"/>
  <line x1="505" y1="121" x2="565" y2="121" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-a)"/>
  <line x1="505" y1="161" x2="565" y2="161" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-a)"/>

  <text x="545" y="204" text-anchor="middle" font-size="9" fill="#94a3b8">all 3 bands active as one logical link</text>
</svg>
