<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" width="700" height="260"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
    <marker id="arr-n" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#475569"/>
    </marker>
  </defs>

  <rect width="700" height="260" fill="url(#bg)" rx="8"/>

  <!-- Divider between the two modes -->
  <line x1="350" y1="20" x2="350" y2="240" stroke="#1e3a5f" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ===== Left: MLSR ===== -->
  <rect x="30" y="106" width="140" height="48" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="100" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="#bae6fd">MLSR</text>
  <text x="100" y="142" text-anchor="middle" font-size="10" fill="#38bdf8">full channel switch</text>

  <rect x="220" y="52" width="120" height="48" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="280" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#bae6fd">5 GHz</text>
  <text x="280" y="88" text-anchor="middle" font-size="10" fill="#38bdf8">active</text>

  <rect x="220" y="160" width="120" height="48" fill="none" stroke="#475569" stroke-width="1.5" rx="5"/>
  <text x="280" y="180" text-anchor="middle" font-size="13" font-weight="600" fill="#94a3b8">6 GHz</text>
  <text x="280" y="196" text-anchor="middle" font-size="10" fill="#94a3b8">standby — off</text>

  <line x1="170" y1="122" x2="220" y2="78" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-a)"/>
  <line x1="170" y1="138" x2="220" y2="184" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-n)"/>

  <!-- ===== Right: eMLSR ===== -->
  <rect x="360" y="106" width="140" height="48" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="430" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="#bae6fd">eMLSR</text>
  <text x="430" y="142" text-anchor="middle" font-size="10" fill="#38bdf8">passive multi-RX</text>

  <rect x="550" y="52" width="120" height="48" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="610" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#bae6fd">5 GHz</text>
  <text x="610" y="88" text-anchor="middle" font-size="10" fill="#38bdf8">active TX</text>

  <rect x="550" y="160" width="120" height="48" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="610" y="180" text-anchor="middle" font-size="13" font-weight="600" fill="#bae6fd">6 GHz</text>
  <text x="610" y="196" text-anchor="middle" font-size="10" fill="#38bdf8">listening (RX)</text>

  <line x1="500" y1="122" x2="550" y2="78" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-a)"/>
  <line x1="500" y1="138" x2="550" y2="184" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-a)"/>
</svg>
