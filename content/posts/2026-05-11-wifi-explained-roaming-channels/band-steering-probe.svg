<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250" width="700" height="250" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="bs-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#94a3b8"/>
    </marker>
    <marker id="bs-arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="700" height="250" fill="url(#bg)" rx="8"/>

  <!-- Divider -->
  <line x1="350" y1="14" x2="350" y2="232" stroke="#0d1a2a" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- LEFT — Dual-band client (success) -->
  <text x="175" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#94a3b8">Dual-Band Client (Steered)</text>

  <rect x="14" y="36" width="86" height="38" fill="#0e1a3a" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="57" y="52" text-anchor="middle" font-size="10" font-weight="600" fill="#93c5fd">Dual-Band</text>
  <text x="57" y="66" text-anchor="middle" font-size="10" font-weight="600" fill="#93c5fd">Client</text>

  <rect x="230" y="36" width="90" height="38" fill="#0e1a3a" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="275" y="52" text-anchor="middle" font-size="10" font-weight="600" fill="#38bdf8">AP</text>
  <text x="275" y="66" text-anchor="middle" font-size="9" fill="#38bdf8">(steering on)</text>

  <line x1="57" y1="74" x2="57" y2="210" stroke="#1e293b" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="275" y1="74" x2="275" y2="210" stroke="#1e293b" stroke-width="2" stroke-dasharray="3,3"/>

  <!-- Probe 2.4GHz → suppressed -->
  <line x1="65" y1="86" x2="265" y2="86" stroke="#475569" stroke-width="1.5" marker-end="url(#bs-arr)"/>
  <text x="161" y="82" text-anchor="middle" font-size="9" fill="#94a3b8">Probe 2.4 GHz</text>
  <rect x="245" y="92" width="60" height="18" fill="none" stroke="#92400e" stroke-width="1" rx="3"/>
  <text x="275" y="105" text-anchor="middle" font-size="9" font-weight="600" fill="#fcd34d">ignored</text>

  <!-- Probe 2.4GHz again → suppressed -->
  <line x1="65" y1="126" x2="265" y2="126" stroke="#475569" stroke-width="1.5" marker-end="url(#bs-arr)"/>
  <text x="161" y="122" text-anchor="middle" font-size="9" fill="#94a3b8">Probe 2.4 GHz (retry)</text>
  <rect x="245" y="132" width="60" height="18" fill="none" stroke="#92400e" stroke-width="1" rx="3"/>
  <text x="275" y="145" text-anchor="middle" font-size="9" font-weight="600" fill="#fcd34d">ignored</text>

  <!-- Client falls back to 5GHz -->
  <line x1="65" y1="166" x2="265" y2="166" stroke="#34d399" stroke-width="1.5" marker-end="url(#bs-arr-g)"/>
  <text x="161" y="162" text-anchor="middle" font-size="9" fill="#34d399">Probe 5 GHz</text>
  <line x1="265" y1="182" x2="65" y2="182" stroke="#34d399" stroke-width="1.5" marker-end="url(#bs-arr-g)"/>
  <text x="161" y="195" text-anchor="middle" font-size="9" fill="#34d399">Response &#8212; connects on 5 GHz</text>

  <!-- RIGHT — 2.4GHz-only IoT (failure) -->
  <text x="525" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#94a3b8">2.4 GHz-Only IoT Device (Fails)</text>

  <rect x="364" y="36" width="86" height="38" fill="#1a0a00" stroke="#92400e" stroke-width="1.5" rx="5"/>
  <text x="407" y="52" text-anchor="middle" font-size="10" font-weight="600" fill="#fcd34d">IoT Device</text>
  <text x="407" y="66" text-anchor="middle" font-size="9" fill="#f97316">(2.4GHz only)</text>

  <rect x="580" y="36" width="90" height="38" fill="#0e1a3a" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="625" y="52" text-anchor="middle" font-size="10" font-weight="600" fill="#38bdf8">AP</text>
  <text x="625" y="66" text-anchor="middle" font-size="9" fill="#38bdf8">(steering on)</text>

  <line x1="407" y1="74" x2="407" y2="210" stroke="#1e293b" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="625" y1="74" x2="625" y2="210" stroke="#1e293b" stroke-width="2" stroke-dasharray="3,3"/>

  <!-- Probe 2.4GHz → suppressed x3 -->
  <line x1="415" y1="86" x2="615" y2="86" stroke="#475569" stroke-width="1.5" marker-end="url(#bs-arr)"/>
  <text x="511" y="82" text-anchor="middle" font-size="9" fill="#94a3b8">Probe 2.4 GHz</text>
  <rect x="595" y="92" width="60" height="18" fill="none" stroke="#92400e" stroke-width="1" rx="3"/>
  <text x="625" y="105" text-anchor="middle" font-size="9" font-weight="600" fill="#fcd34d">ignored</text>

  <line x1="415" y1="118" x2="615" y2="118" stroke="#475569" stroke-width="1.5" marker-end="url(#bs-arr)"/>
  <text x="511" y="114" text-anchor="middle" font-size="9" fill="#94a3b8">Probe 2.4 GHz (retry 1)</text>
  <rect x="595" y="124" width="60" height="18" fill="none" stroke="#92400e" stroke-width="1" rx="3"/>
  <text x="625" y="137" text-anchor="middle" font-size="9" font-weight="600" fill="#fcd34d">ignored</text>

  <line x1="415" y1="150" x2="615" y2="150" stroke="#475569" stroke-width="1.5" marker-end="url(#bs-arr)"/>
  <text x="511" y="146" text-anchor="middle" font-size="9" fill="#94a3b8">Probe 2.4 GHz (retry 2)</text>
  <rect x="595" y="156" width="60" height="18" fill="none" stroke="#92400e" stroke-width="1" rx="3"/>
  <text x="625" y="169" text-anchor="middle" font-size="9" font-weight="600" fill="#fcd34d">ignored</text>

  <!-- Device gives up -->
  <rect x="364" y="186" width="310" height="20" fill="none" stroke="#7f1d1d" stroke-width="1" rx="3"/>
  <text x="519" y="200" text-anchor="middle" font-size="9" font-weight="600" fill="#f87171">device gives up &#8212; "network not found"</text>
</svg>
