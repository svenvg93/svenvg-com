<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 305" width="700" height="305" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
  </defs>

  <rect width="700" height="305" fill="url(#bg)" rx="8"/>

  <!-- Coverage radii are proportional to the stated ~130 m / ~90 m ranges -->
  <!-- 2.4 GHz coverage circle — r=130, centered at (350, 155) -->
  <circle cx="350" cy="155" r="130" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="8,4"/>

  <!-- 5 GHz coverage circle — r=75 -->
  <circle cx="350" cy="155" r="75" fill="none" stroke="#34d399" stroke-width="2"/>

  <!-- AP icon -->
  <circle cx="350" cy="155" r="18" fill="#0e1a3a" stroke="#3b82f6" stroke-width="2"/>
  <text x="350" y="159" text-anchor="middle" font-size="10" font-weight="700" fill="#93c5fd">AP</text>

  <!-- Legend (top left) -->
  <line x1="30" y1="26" x2="54" y2="26" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="60" y="30" font-size="10" fill="#38bdf8">2.4 GHz range</text>
  <line x1="30" y1="44" x2="54" y2="44" stroke="#34d399" stroke-width="2"/>
  <text x="60" y="48" font-size="10" fill="#34d399">5 GHz range</text>

  <!-- Client A — inside 5 GHz (distance ~65) -->
  <circle cx="285" cy="155" r="10" fill="#071810" stroke="#34d399" stroke-width="2"/>
  <text x="285" y="159" text-anchor="middle" font-size="8" font-weight="700" fill="#34d399">A</text>
  <rect x="195" y="173" width="190" height="34" fill="none" stroke="#166534" stroke-width="1" rx="4"/>
  <text x="290" y="187" text-anchor="middle" font-size="9" font-weight="600" fill="#86efac">Client A &#8212; steered to 5 GHz</text>
  <text x="290" y="200" text-anchor="middle" font-size="9" fill="#34d399">inside 5 GHz range &#8212; strong signal</text>

  <!-- Client B — outside 5 GHz, inside 2.4 GHz (distance ~122) -->
  <circle cx="450" cy="85" r="10" fill="#150808" stroke="#f87171" stroke-width="2"/>
  <text x="450" y="89" text-anchor="middle" font-size="8" font-weight="700" fill="#f87171">B</text>
  <rect x="450" y="44" width="190" height="34" fill="none" stroke="#7f1d1d" stroke-width="1" rx="4"/>
  <text x="545" y="58" text-anchor="middle" font-size="9" font-weight="600" fill="#f87171">Client B &#8212; steered to 5 GHz</text>
  <text x="545" y="71" text-anchor="middle" font-size="9" fill="#f87171">outside 5 GHz range &#8212; weak signal</text>
</svg>
