<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 244" width="700" height="244" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
  </defs>

  <rect width="700" height="244" fill="url(#bg)" rx="8"/>

  <!-- Divider -->
  <line x1="350" y1="16" x2="350" y2="212" stroke="#0d1a2a" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- === Left column: Band Steering === -->
  <text x="185" y="36" text-anchor="middle" font-size="12" font-weight="700" fill="#f97316">Band Steering</text>
  <text x="185" y="50" text-anchor="middle" font-size="10" fill="#fb923c">(vendor-specific, no standard)</text>

  <!-- Step 1 -->
  <rect x="56" y="60" width="258" height="34" fill="none" stroke="#f97316" stroke-width="1" rx="4"/>
  <text x="185" y="76" text-anchor="middle" font-size="10" font-weight="600" fill="#fdba74">Client probes 2.4 GHz</text>
  <text x="185" y="88" text-anchor="middle" font-size="9" fill="#f97316">AP suppresses or rejects the probe</text>

  <text x="185" y="108" text-anchor="middle" font-size="14" fill="#94a3b8">&#8595;</text>

  <!-- Step 2 -->
  <rect x="56" y="114" width="258" height="34" fill="none" stroke="#f97316" stroke-width="1" rx="4"/>
  <text x="185" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#fdba74">Client retries on 5 GHz</text>
  <text x="185" y="142" text-anchor="middle" font-size="9" fill="#f97316">Finds AP there, associates</text>

  <text x="185" y="162" text-anchor="middle" font-size="14" fill="#94a3b8">&#8595;</text>

  <!-- Risk -->
  <rect x="56" y="168" width="258" height="34" fill="none" stroke="#7f1d1d" stroke-width="1" rx="4"/>
  <text x="185" y="184" text-anchor="middle" font-size="10" font-weight="600" fill="#f87171">Risk: IoT devices may fail</text>
  <text x="185" y="196" text-anchor="middle" font-size="9" fill="#f87171">Connection loops, timeouts on strict clients</text>

  <!-- === Right column: 802.11v BSS TM === -->
  <text x="515" y="36" text-anchor="middle" font-size="12" font-weight="700" fill="#34d399">802.11v BSS Transition</text>
  <text x="515" y="50" text-anchor="middle" font-size="10" fill="#86efac">(standardised, post-association)</text>

  <!-- Step 1 -->
  <rect x="386" y="60" width="258" height="34" fill="none" stroke="#34d399" stroke-width="1" rx="4"/>
  <text x="515" y="76" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">Client already associated</text>
  <text x="515" y="88" text-anchor="middle" font-size="9" fill="#34d399">AP detects a better band/AP is available</text>

  <text x="515" y="108" text-anchor="middle" font-size="14" fill="#94a3b8">&#8595;</text>

  <!-- Step 2 -->
  <rect x="386" y="114" width="258" height="34" fill="none" stroke="#34d399" stroke-width="1" rx="4"/>
  <text x="515" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">AP sends BSS TM Request</text>
  <text x="515" y="142" text-anchor="middle" font-size="9" fill="#34d399">Suggests target AP; client can accept or ignore</text>

  <text x="515" y="162" text-anchor="middle" font-size="14" fill="#94a3b8">&#8595;</text>

  <!-- Result -->
  <rect x="386" y="168" width="258" height="34" fill="none" stroke="#166534" stroke-width="1" rx="4"/>
  <text x="515" y="184" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">Client roams gracefully</text>
  <text x="515" y="196" text-anchor="middle" font-size="9" fill="#34d399">No failed associations, no loops</text>
</svg>
