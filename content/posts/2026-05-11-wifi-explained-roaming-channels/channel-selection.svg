<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" width="700" height="300"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
  </defs>

  <rect width="700" height="300" fill="url(#bg)" rx="8"/>

  <!-- 2.4 GHz: 13 channels, 5 MHz spacing, only 1/6/11 non-overlapping -->
  <text x="20" y="54" font-size="12" font-weight="700" fill="#94a3b8">2.4 GHz — only 1, 6, 11 don't overlap</text>

  <rect x="60"  y="64" width="42" height="36" fill="none" stroke="#34d399" stroke-width="2" rx="3"/>
  <text x="81"  y="86" text-anchor="middle" font-size="11" font-weight="700" fill="#34d399">1</text>
  <rect x="105" y="64" width="42" height="36" fill="none" stroke="#1e3a5f" stroke-width="1" rx="3"/>
  <text x="126" y="86" text-anchor="middle" font-size="10" fill="#94a3b8">2</text>
  <rect x="150" y="64" width="42" height="36" fill="none" stroke="#1e3a5f" stroke-width="1" rx="3"/>
  <text x="171" y="86" text-anchor="middle" font-size="10" fill="#94a3b8">3</text>
  <rect x="195" y="64" width="42" height="36" fill="none" stroke="#1e3a5f" stroke-width="1" rx="3"/>
  <text x="216" y="86" text-anchor="middle" font-size="10" fill="#94a3b8">4</text>
  <rect x="240" y="64" width="42" height="36" fill="none" stroke="#1e3a5f" stroke-width="1" rx="3"/>
  <text x="261" y="86" text-anchor="middle" font-size="10" fill="#94a3b8">5</text>
  <rect x="285" y="64" width="42" height="36" fill="none" stroke="#34d399" stroke-width="2" rx="3"/>
  <text x="306" y="86" text-anchor="middle" font-size="11" font-weight="700" fill="#34d399">6</text>
  <rect x="330" y="64" width="42" height="36" fill="none" stroke="#1e3a5f" stroke-width="1" rx="3"/>
  <text x="351" y="86" text-anchor="middle" font-size="10" fill="#94a3b8">7</text>
  <rect x="375" y="64" width="42" height="36" fill="none" stroke="#1e3a5f" stroke-width="1" rx="3"/>
  <text x="396" y="86" text-anchor="middle" font-size="10" fill="#94a3b8">8</text>
  <rect x="420" y="64" width="42" height="36" fill="none" stroke="#1e3a5f" stroke-width="1" rx="3"/>
  <text x="441" y="86" text-anchor="middle" font-size="10" fill="#94a3b8">9</text>
  <rect x="465" y="64" width="42" height="36" fill="none" stroke="#1e3a5f" stroke-width="1" rx="3"/>
  <text x="486" y="86" text-anchor="middle" font-size="10" fill="#94a3b8">10</text>
  <rect x="510" y="64" width="42" height="36" fill="none" stroke="#34d399" stroke-width="2" rx="3"/>
  <text x="531" y="86" text-anchor="middle" font-size="11" font-weight="700" fill="#34d399">11</text>
  <rect x="555" y="64" width="42" height="36" fill="none" stroke="#1e3a5f" stroke-width="1" rx="3"/>
  <text x="576" y="86" text-anchor="middle" font-size="10" fill="#94a3b8">12</text>
  <rect x="600" y="64" width="42" height="36" fill="none" stroke="#1e3a5f" stroke-width="1" rx="3"/>
  <text x="621" y="86" text-anchor="middle" font-size="10" fill="#94a3b8">13</text>

  <!-- 5 GHz: three sub-bands, boxes proportional to channel count -->
  <text x="20" y="134" font-size="12" font-weight="700" fill="#94a3b8">5 GHz — three sub-bands</text>

  <rect x="60" y="144" width="90" height="42" fill="none" stroke="#34d399" stroke-width="1.5" rx="4"/>
  <text x="105" y="162" text-anchor="middle" font-size="10" font-weight="700" fill="#34d399">UNII-1</text>
  <text x="105" y="175" text-anchor="middle" font-size="8" fill="#86efac">36–48 · no DFS</text>

  <rect x="162" y="144" width="330" height="42" fill="none" stroke="#f97316" stroke-width="1.5" rx="4"/>
  <text x="327" y="162" text-anchor="middle" font-size="10" font-weight="700" fill="#f97316">UNII-2</text>
  <text x="327" y="175" text-anchor="middle" font-size="8" fill="#fed7aa">ch 52–144 · DFS required — up to 60s outage if radar detected</text>

  <rect x="504" y="144" width="138" height="42" fill="none" stroke="#34d399" stroke-width="1.5" rx="4"/>
  <text x="573" y="162" text-anchor="middle" font-size="10" font-weight="700" fill="#34d399">UNII-3</text>
  <text x="573" y="175" text-anchor="middle" font-size="8" fill="#86efac">149–177 · no DFS</text>

  <!-- 6 GHz: single clean band, no legacy devices -->
  <text x="20" y="204" font-size="12" font-weight="700" fill="#94a3b8">6 GHz — the cleanest band</text>

  <rect x="60" y="214" width="582" height="52" fill="none" stroke="#34d399" stroke-width="1.5" rx="4"/>
  <text x="351" y="235" text-anchor="middle" font-size="11" font-weight="700" fill="#34d399">5.925 – 7.125 GHz</text>
  <text x="351" y="250" text-anchor="middle" font-size="9" fill="#86efac">Up to 59 non-overlapping channels — no DFS, no legacy devices</text>
</svg>
