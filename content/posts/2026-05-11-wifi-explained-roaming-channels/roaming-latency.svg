<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 180" width="700" height="180" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="rl-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="700" height="180" fill="url(#bg)" rx="8"/>

  <!-- WITHOUT 802.11r -->
  <text x="30" y="22" font-size="11" font-weight="600" fill="#94a3b8">Without 802.11r</text>
  <text x="670" y="22" text-anchor="end" font-size="11" font-weight="600" fill="#f87171">200&#8211;500 ms</text>

  <!-- Segments row 1 -->
  <rect x="30" y="28" width="230" height="34" fill="none" stroke="#7f1d1d" stroke-width="1.5" rx="4"/>
  <text x="145" y="42" text-anchor="middle" font-size="11" font-weight="600" fill="#f87171">Channel Scan</text>
  <text x="145" y="55" text-anchor="middle" font-size="9" fill="#f87171">all channels (~150ms)</text>

  <rect x="264" y="28" width="190" height="34" fill="none" stroke="#92400e" stroke-width="1.5" rx="4"/>
  <text x="359" y="42" text-anchor="middle" font-size="11" font-weight="600" fill="#fcd34d">Authentication</text>
  <text x="359" y="55" text-anchor="middle" font-size="9" fill="#f97316">full exchange (~200ms)</text>

  <rect x="458" y="28" width="212" height="34" fill="none" stroke="#92400e" stroke-width="1.5" rx="4"/>
  <text x="564" y="42" text-anchor="middle" font-size="11" font-weight="600" fill="#fcd34d">Reassociation</text>
  <text x="564" y="55" text-anchor="middle" font-size="9" fill="#f97316">~50&#8211;150ms</text>

  <!-- WITH 802.11r -->
  <text x="30" y="92" font-size="11" font-weight="600" fill="#94a3b8">With 802.11r</text>
  <text x="670" y="92" text-anchor="end" font-size="11" font-weight="600" fill="#34d399">&lt;50 ms</text>

  <!-- Segments row 2 -->
  <rect x="30" y="98" width="80" height="34" fill="none" stroke="#166534" stroke-width="1.5" rx="4"/>
  <text x="70" y="112" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">Scan</text>
  <text x="70" y="125" text-anchor="middle" font-size="9" fill="#34d399">~20ms</text>

  <rect x="114" y="98" width="190" height="34" fill="none" stroke="#166534" stroke-width="1.5" rx="4" stroke-dasharray="4,2"/>
  <text x="209" y="112" text-anchor="middle" font-size="10" font-weight="500" fill="#86efac">Pre-auth (already done)</text>
  <text x="209" y="125" text-anchor="middle" font-size="9" fill="#34d399">keys negotiated in background</text>

  <rect x="308" y="98" width="80" height="34" fill="none" stroke="#166534" stroke-width="1.5" rx="4"/>
  <text x="348" y="112" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">Reassoc</text>
  <text x="348" y="125" text-anchor="middle" font-size="9" fill="#34d399">~10ms</text>

  <!-- "Done" marker -->
  <line x1="392" y1="98" x2="392" y2="132" stroke="#34d399" stroke-width="2"/>
  <text x="400" y="112" font-size="10" font-weight="600" fill="#34d399">done</text>

  <!-- Time axis -->
  <line x1="30" y1="149" x2="672" y2="149" stroke="#334155" stroke-width="1.5" marker-end="url(#rl-arr)"/>
  <text x="676" y="153" font-size="10" fill="#94a3b8">time</text>
  <line x1="30" y1="145" x2="30" y2="153" stroke="#334155" stroke-width="1.5"/>
  <text x="30" y="164" text-anchor="middle" font-size="9" fill="#94a3b8">0</text>
  <line x1="263" y1="145" x2="263" y2="153" stroke="#334155" stroke-width="1"/>
  <text x="263" y="164" text-anchor="middle" font-size="9" fill="#94a3b8">150ms</text>
  <line x1="457" y1="145" x2="457" y2="153" stroke="#334155" stroke-width="1"/>
  <text x="457" y="164" text-anchor="middle" font-size="9" fill="#94a3b8">350ms</text>
</svg>
