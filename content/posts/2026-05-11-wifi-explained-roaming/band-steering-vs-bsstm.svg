<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" width="700" height="300" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="700" height="300" fill="url(#bg)" rx="8"/>

  <!-- Subtle grid line -->
  <line x1="0" y1="140" x2="700" y2="140" stroke="#0d1a2a" stroke-width="1"/>

  <!-- Header label -->
  <text x="350" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1">BAND STEERING VS 802.11v BSS TRANSITION — MECHANISM COMPARISON</text>

  <!-- === Left column: Band Steering === -->
  <rect x="40" y="36" width="290" height="208" fill="#1a0a00" stroke="#f97316" stroke-width="1.5" rx="8"/>
  <text x="185" y="56" text-anchor="middle" font-size="12" font-weight="700" fill="#f97316">Band Steering</text>
  <text x="185" y="70" text-anchor="middle" font-size="10" fill="#fb923c">(vendor-specific, no standard)</text>

  <!-- Step 1 -->
  <rect x="56" y="80" width="258" height="34" fill="#150a00" stroke="#f97316" stroke-width="1" rx="4"/>
  <text x="185" y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#fdba74">Client probes 2.4 GHz</text>
  <text x="185" y="108" text-anchor="middle" font-size="9" fill="#f97316">AP suppresses or rejects the probe</text>

  <text x="185" y="128" text-anchor="middle" font-size="14" fill="#94a3b8">&#x2193;</text>

  <!-- Step 2 -->
  <rect x="56" y="134" width="258" height="34" fill="#150a00" stroke="#f97316" stroke-width="1" rx="4"/>
  <text x="185" y="150" text-anchor="middle" font-size="10" font-weight="600" fill="#fdba74">Client retries on 5 GHz</text>
  <text x="185" y="162" text-anchor="middle" font-size="9" fill="#f97316">Finds AP there, associates</text>

  <text x="185" y="182" text-anchor="middle" font-size="14" fill="#94a3b8">&#x2193;</text>

  <!-- Risk -->
  <rect x="56" y="188" width="258" height="34" fill="#150808" stroke="#7f1d1d" stroke-width="1" rx="4"/>
  <text x="185" y="204" text-anchor="middle" font-size="10" font-weight="600" fill="#f87171">Risk: IoT devices may fail</text>
  <text x="185" y="216" text-anchor="middle" font-size="9" fill="#f87171">Connection loops, timeouts on strict clients</text>

  <!-- === Right column: 802.11v BSS TM === -->
  <rect x="370" y="36" width="290" height="208" fill="#071810" stroke="#34d399" stroke-width="1.5" rx="8"/>
  <text x="515" y="56" text-anchor="middle" font-size="12" font-weight="700" fill="#34d399">802.11v BSS Transition</text>
  <text x="515" y="70" text-anchor="middle" font-size="10" fill="#86efac">(standardised, post-association)</text>

  <!-- Step 1 -->
  <rect x="386" y="80" width="258" height="34" fill="#041008" stroke="#34d399" stroke-width="1" rx="4"/>
  <text x="515" y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">Client already associated</text>
  <text x="515" y="108" text-anchor="middle" font-size="9" fill="#34d399">AP detects it could be on a better band/AP</text>

  <text x="515" y="128" text-anchor="middle" font-size="14" fill="#94a3b8">&#x2193;</text>

  <!-- Step 2 -->
  <rect x="386" y="134" width="258" height="34" fill="#041008" stroke="#34d399" stroke-width="1" rx="4"/>
  <text x="515" y="150" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">AP sends BSS TM Request</text>
  <text x="515" y="162" text-anchor="middle" font-size="9" fill="#34d399">Suggests target AP; client can accept or ignore</text>

  <text x="515" y="182" text-anchor="middle" font-size="14" fill="#94a3b8">&#x2193;</text>

  <!-- Result -->
  <rect x="386" y="188" width="258" height="34" fill="#071810" stroke="#166534" stroke-width="1" rx="4"/>
  <text x="515" y="204" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">Client roams gracefully</text>
  <text x="515" y="216" text-anchor="middle" font-size="9" fill="#34d399">No failed associations, no loops</text>

  <!-- Footer caption -->
  <text x="350" y="272" text-anchor="middle" font-size="9" fill="#94a3b8">802.11v BSS TM steers already-connected clients with no risk of broken associations —</text>
  <text x="350" y="286" text-anchor="middle" font-size="9" fill="#94a3b8">prefer it over probe-suppression band steering where possible</text>
</svg>
