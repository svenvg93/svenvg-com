<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" width="700" height="220" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <marker id="rl-arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="220" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Roaming Latency — With vs Without 802.11r</text>

  <!-- ── WITHOUT 802.11r ── -->
  <text x="30" y="58" font-size="11" font-weight="600" fill="#374151">Without 802.11r</text>
  <text x="670" y="58" text-anchor="end" font-size="11" font-weight="600" fill="#ef4444">200–500 ms</text>

  <!-- Segments row 1 (y=64 to y=98, height=34) -->
  <!-- Channel Scan: wide, red -->
  <rect x="30" y="64" width="230" height="34" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5" rx="4"/>
  <text x="145" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">Channel Scan</text>
  <text x="145" y="91" text-anchor="middle" font-size="9" fill="#dc2626">all channels (~150ms)</text>

  <!-- Authentication: medium, orange -->
  <rect x="264" y="64" width="190" height="34" fill="#ffedd5" stroke="#fdba74" stroke-width="1.5" rx="4"/>
  <text x="359" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#ea580c">Authentication</text>
  <text x="359" y="91" text-anchor="middle" font-size="9" fill="#ea580c">full exchange (~200ms)</text>

  <!-- Reassociation: smaller -->
  <rect x="458" y="64" width="212" height="34" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5" rx="4"/>
  <text x="564" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Reassociation</text>
  <text x="564" y="91" text-anchor="middle" font-size="9" fill="#92400e">~50–150ms</text>

  <!-- ── WITH 802.11r ── -->
  <text x="30" y="128" font-size="11" font-weight="600" fill="#374151">With 802.11r</text>
  <text x="670" y="128" text-anchor="end" font-size="11" font-weight="600" fill="#10b981">&lt;50 ms</text>

  <!-- Segments row 2 (y=134 to y=168, height=34) -->
  <!-- Channel Scan: narrow (802.11k helps) -->
  <rect x="30" y="134" width="80" height="34" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="4"/>
  <text x="70" y="148" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">Scan</text>
  <text x="70" y="161" text-anchor="middle" font-size="9" fill="#16a34a">~20ms</text>

  <!-- Pre-auth already done label -->
  <rect x="114" y="134" width="190" height="34" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" rx="4" stroke-dasharray="4,2"/>
  <text x="209" y="148" text-anchor="middle" font-size="10" font-weight="500" fill="#16a34a">Pre-auth (already done)</text>
  <text x="209" y="161" text-anchor="middle" font-size="9" fill="#10b981">keys negotiated in background</text>

  <!-- Reassociation: fast -->
  <rect x="308" y="134" width="80" height="34" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="4"/>
  <text x="348" y="148" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">Reassoc</text>
  <text x="348" y="161" text-anchor="middle" font-size="9" fill="#16a34a">~10ms</text>

  <!-- "Done" marker -->
  <line x1="392" y1="134" x2="392" y2="168" stroke="#10b981" stroke-width="2"/>
  <text x="400" y="148" font-size="10" font-weight="600" fill="#10b981">✓ done</text>

  <!-- Time axis -->
  <line x1="30" y1="185" x2="672" y2="185" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#rl-arr)"/>
  <text x="676" y="189" font-size="10" fill="#9ca3af">time</text>
  <!-- Tick marks -->
  <line x1="30" y1="181" x2="30" y2="189" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="30" y="200" text-anchor="middle" font-size="9" fill="#9ca3af">0</text>
  <line x1="263" y1="181" x2="263" y2="189" stroke="#9ca3af" stroke-width="1"/>
  <text x="263" y="200" text-anchor="middle" font-size="9" fill="#9ca3af">150ms</text>
  <line x1="457" y1="181" x2="457" y2="189" stroke="#9ca3af" stroke-width="1"/>
  <text x="457" y="200" text-anchor="middle" font-size="9" fill="#9ca3af">350ms</text>

  <!-- Caption -->
  <text x="350" y="215" text-anchor="middle" font-size="11" fill="#6b7280">802.11r pre-negotiates keys while connected — the handoff itself takes under 10ms</text>
</svg>
