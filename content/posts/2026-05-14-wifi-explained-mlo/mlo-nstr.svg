<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" width="700" height="360" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="nstr-ag-l" markerWidth="12" markerHeight="8" refX="0" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="12,0 0,4 12,8" fill="#34d399"/>
    </marker>
    <marker id="nstr-ag-r" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 12,4 0,8" fill="#34d399"/>
    </marker>
    <marker id="nstr-aa-l" markerWidth="12" markerHeight="8" refX="0" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="12,0 0,4 12,8" fill="#38bdf8"/>
    </marker>
    <marker id="nstr-aa-r" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 12,4 0,8" fill="#38bdf8"/>
    </marker>
    <marker id="nstr-time-arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 10,3.5 0,7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="360" fill="url(#bg)" rx="8"/>

  <!-- Subtle grid -->
  <line x1="0" y1="180" x2="700" y2="180" stroke="#0d1a2a" stroke-width="1"/>

  <!-- Header label -->
  <text x="350" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1">NSTR — NON-SIMULTANEOUS TRANSMIT AND RECEIVE</text>

  <!-- CLIENT box -->
  <text x="120" y="46" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8">CLIENT</text>
  <rect x="20" y="52" width="200" height="148" fill="#0a1628" stroke="#1e3a5f" stroke-width="1.5" rx="5"/>

  <rect x="36" y="66" width="168" height="48" fill="#071810" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="120" y="86" text-anchor="middle" font-size="13" font-weight="600" fill="#a7f3d0">5 GHz</text>
  <text x="120" y="104" text-anchor="middle" font-size="10" fill="#34d399">Radio 1</text>

  <rect x="36" y="124" width="168" height="48" fill="#0e1a3a" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="120" y="144" text-anchor="middle" font-size="13" font-weight="600" fill="#bae6fd">6 GHz</text>
  <text x="120" y="162" text-anchor="middle" font-size="10" fill="#38bdf8">Radio 2</text>

  <!-- ACCESS POINT box -->
  <text x="580" y="46" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8">ACCESS POINT</text>
  <rect x="480" y="52" width="200" height="148" fill="#0a1628" stroke="#1e3a5f" stroke-width="1.5" rx="5"/>

  <rect x="496" y="66" width="168" height="48" fill="#071810" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="580" y="86" text-anchor="middle" font-size="13" font-weight="600" fill="#a7f3d0">5 GHz</text>
  <text x="580" y="104" text-anchor="middle" font-size="10" fill="#34d399">Radio 1</text>

  <rect x="496" y="124" width="168" height="48" fill="#0e1a3a" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="580" y="144" text-anchor="middle" font-size="13" font-weight="600" fill="#bae6fd">6 GHz</text>
  <text x="580" y="162" text-anchor="middle" font-size="10" fill="#38bdf8">Radio 2</text>

  <!-- Links -->
  <line x1="220" y1="90" x2="480" y2="90" stroke="#34d399" stroke-width="1.5" marker-start="url(#nstr-ag-l)" marker-end="url(#nstr-ag-r)"/>
  <line x1="220" y1="148" x2="480" y2="148" stroke="#38bdf8" stroke-width="1.5" marker-start="url(#nstr-aa-l)" marker-end="url(#nstr-aa-r)"/>

  <!-- Coordination bracket in the middle -->
  <line x1="348" y1="84" x2="352" y2="84" stroke="#475569" stroke-width="1"/>
  <line x1="350" y1="84" x2="350" y2="154" stroke="#475569" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="348" y1="154" x2="352" y2="154" stroke="#475569" stroke-width="1"/>
  <text x="363" y="122" font-size="9" fill="#94a3b8">coordinated</text>

  <!-- TIMING CHART -->
  <text x="350" y="224" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">Coordination Timeline</text>

  <!-- Row labels -->
  <text x="212" y="253" text-anchor="end" font-size="11" font-weight="500" fill="#34d399">5 GHz</text>
  <text x="212" y="288" text-anchor="end" font-size="11" font-weight="500" fill="#38bdf8">6 GHz</text>

  <!-- 5 GHz: TX, WAIT, TX, WAIT -->
  <rect x="218" y="237" width="56" height="24" fill="#071810" stroke="#34d399" stroke-width="1.5" rx="3"/>
  <text x="246" y="253" text-anchor="middle" font-size="10" font-weight="600" fill="#a7f3d0">TX</text>

  <rect x="278" y="237" width="56" height="24" fill="#0d1520" stroke="#1e3a5f" stroke-width="1.5" rx="3"/>
  <text x="306" y="253" text-anchor="middle" font-size="10" fill="#94a3b8">WAIT</text>

  <rect x="338" y="237" width="56" height="24" fill="#071810" stroke="#34d399" stroke-width="1.5" rx="3"/>
  <text x="366" y="253" text-anchor="middle" font-size="10" font-weight="600" fill="#a7f3d0">TX</text>

  <rect x="398" y="237" width="56" height="24" fill="#0d1520" stroke="#1e3a5f" stroke-width="1.5" rx="3"/>
  <text x="426" y="253" text-anchor="middle" font-size="10" fill="#94a3b8">WAIT</text>

  <!-- 6 GHz: WAIT, TX, WAIT, TX -->
  <rect x="218" y="273" width="56" height="24" fill="#0d1520" stroke="#1e3a5f" stroke-width="1.5" rx="3"/>
  <text x="246" y="289" text-anchor="middle" font-size="10" fill="#94a3b8">WAIT</text>

  <rect x="278" y="273" width="56" height="24" fill="#0e1a3a" stroke="#38bdf8" stroke-width="1.5" rx="3"/>
  <text x="306" y="289" text-anchor="middle" font-size="10" font-weight="600" fill="#bae6fd">TX</text>

  <rect x="338" y="273" width="56" height="24" fill="#0d1520" stroke="#1e3a5f" stroke-width="1.5" rx="3"/>
  <text x="366" y="289" text-anchor="middle" font-size="10" fill="#94a3b8">WAIT</text>

  <rect x="398" y="273" width="56" height="24" fill="#0e1a3a" stroke="#38bdf8" stroke-width="1.5" rx="3"/>
  <text x="426" y="289" text-anchor="middle" font-size="10" font-weight="600" fill="#bae6fd">TX</text>

  <!-- Time axis -->
  <line x1="218" y1="310" x2="468" y2="310" stroke="#475569" stroke-width="1.5" marker-end="url(#nstr-time-arr)"/>
  <text x="474" y="314" font-size="10" fill="#94a3b8">time</text>

  <!-- Footer caption -->
  <text x="350" y="345" text-anchor="middle" font-size="9" fill="#94a3b8">Transmissions are coordinated — one link waits while the other is active</text>
</svg>
