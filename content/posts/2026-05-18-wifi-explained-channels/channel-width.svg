<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" width="700" height="300" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">

  <!-- Background -->
  <rect width="700" height="300" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="350" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Channel Width — Throughput vs Available Channels</text>

  <!-- ══════════════════════════════════
       LEFT: 5 GHz (~500 MHz usable)
  ══════════════════════════════════ -->
  <text x="175" y="50" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">5 GHz band (~500 MHz)</text>

  <!-- Band baseline -->
  <line x1="30" y1="240" x2="320" y2="240" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="30"  y="254" font-size="8" fill="#9ca3af">5.180</text>
  <text x="270" y="254" font-size="8" fill="#9ca3af">5.825 GHz</text>

  <!-- 20 MHz: fits ~25, show 6 blocks as representative -->
  <text x="30" y="74" font-size="10" font-weight="600" fill="#374151">20 MHz</text>
  <text x="175" y="74" text-anchor="middle" font-size="9" fill="#15803d">~25 channels</text>
  <rect x="30"  y="78" width="18" height="18" fill="#bbf7d0" stroke="#22c55e" stroke-width="1" rx="2"/>
  <rect x="50"  y="78" width="18" height="18" fill="#bbf7d0" stroke="#22c55e" stroke-width="1" rx="2"/>
  <rect x="70"  y="78" width="18" height="18" fill="#bbf7d0" stroke="#22c55e" stroke-width="1" rx="2"/>
  <rect x="90"  y="78" width="18" height="18" fill="#bbf7d0" stroke="#22c55e" stroke-width="1" rx="2"/>
  <rect x="110" y="78" width="18" height="18" fill="#bbf7d0" stroke="#22c55e" stroke-width="1" rx="2"/>
  <rect x="130" y="78" width="18" height="18" fill="#bbf7d0" stroke="#22c55e" stroke-width="1" rx="2"/>
  <text x="155" y="91" font-size="9" fill="#6b7280">· · · ~19 more</text>

  <!-- 40 MHz: fits ~12 -->
  <text x="30" y="116" font-size="10" font-weight="600" fill="#374151">40 MHz</text>
  <text x="175" y="116" text-anchor="middle" font-size="9" fill="#15803d">~12 channels</text>
  <rect x="30"  y="120" width="36" height="18" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1" rx="2"/>
  <rect x="68"  y="120" width="36" height="18" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1" rx="2"/>
  <rect x="106" y="120" width="36" height="18" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1" rx="2"/>
  <rect x="144" y="120" width="36" height="18" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1" rx="2"/>
  <text x="188" y="133" font-size="9" fill="#6b7280">· · · ~8 more</text>

  <!-- 80 MHz: fits ~6 -->
  <text x="30" y="158" font-size="10" font-weight="600" fill="#374151">80 MHz ✓</text>
  <text x="175" y="158" text-anchor="middle" font-size="9" fill="#15803d">~6 channels</text>
  <rect x="30"  y="162" width="72" height="18" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.5" rx="2"/>
  <rect x="104" y="162" width="72" height="18" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.5" rx="2"/>
  <rect x="178" y="162" width="72" height="18" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.5" rx="2"/>
  <text x="257" y="175" font-size="9" fill="#6b7280">~3 more</text>

  <!-- 160 MHz: fits ~2-3 -->
  <text x="30" y="200" font-size="10" font-weight="600" fill="#374151">160 MHz</text>
  <text x="175" y="200" text-anchor="middle" font-size="9" fill="#ef4444">~2–3 channels (incl. DFS)</text>
  <rect x="30"  y="204" width="144" height="18" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5" rx="2"/>
  <rect x="176" y="204" width="144" height="18" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5" rx="2"/>

  <!-- Divider -->
  <line x1="345" y1="44" x2="345" y2="262" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- ══════════════════════════════════
       RIGHT: 6 GHz (~1200 MHz usable)
  ══════════════════════════════════ -->
  <text x="522" y="50" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">6 GHz band (~1200 MHz)</text>

  <!-- Band baseline -->
  <line x1="370" y1="240" x2="670" y2="240" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="370" y="254" font-size="8" fill="#9ca3af">5.925</text>
  <text x="620" y="254" font-size="8" fill="#9ca3af">7.125 GHz</text>

  <!-- 20 MHz: ~59 channels -->
  <text x="370" y="74" font-size="10" font-weight="600" fill="#374151">20 MHz</text>
  <text x="522" y="74" text-anchor="middle" font-size="9" fill="#15803d">~59 channels</text>
  <rect x="370" y="78" width="8"  height="18" fill="#bbf7d0" stroke="#22c55e" stroke-width="0.5" rx="1"/>
  <rect x="380" y="78" width="8"  height="18" fill="#bbf7d0" stroke="#22c55e" stroke-width="0.5" rx="1"/>
  <rect x="390" y="78" width="8"  height="18" fill="#bbf7d0" stroke="#22c55e" stroke-width="0.5" rx="1"/>
  <rect x="400" y="78" width="8"  height="18" fill="#bbf7d0" stroke="#22c55e" stroke-width="0.5" rx="1"/>
  <rect x="410" y="78" width="8"  height="18" fill="#bbf7d0" stroke="#22c55e" stroke-width="0.5" rx="1"/>
  <rect x="420" y="78" width="8"  height="18" fill="#bbf7d0" stroke="#22c55e" stroke-width="0.5" rx="1"/>
  <text x="436" y="91" font-size="9" fill="#6b7280">· · · ~53 more</text>

  <!-- 80 MHz: ~14 channels -->
  <text x="370" y="116" font-size="10" font-weight="600" fill="#374151">80 MHz</text>
  <text x="522" y="116" text-anchor="middle" font-size="9" fill="#15803d">~14 channels</text>
  <rect x="370" y="120" width="36" height="18" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1" rx="2"/>
  <rect x="408" y="120" width="36" height="18" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1" rx="2"/>
  <rect x="446" y="120" width="36" height="18" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1" rx="2"/>
  <rect x="484" y="120" width="36" height="18" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1" rx="2"/>
  <text x="528" y="133" font-size="9" fill="#6b7280">· · · ~10 more</text>

  <!-- 160 MHz ✓: ~7 channels -->
  <text x="370" y="158" font-size="10" font-weight="600" fill="#374151">160 MHz ✓</text>
  <text x="522" y="158" text-anchor="middle" font-size="9" fill="#15803d">~7 channels</text>
  <rect x="370" y="162" width="72" height="18" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <rect x="444" y="162" width="72" height="18" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <rect x="518" y="162" width="72" height="18" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="598" y="175" font-size="9" fill="#6b7280">~4 more</text>

  <!-- 320 MHz: ~3 channels -->
  <text x="370" y="200" font-size="10" font-weight="600" fill="#374151">320 MHz</text>
  <text x="522" y="200" text-anchor="middle" font-size="9" fill="#15803d">~3 channels</text>
  <rect x="370" y="204" width="144" height="18" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5" rx="2"/>
  <rect x="516" y="204" width="144" height="18" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5" rx="2"/>

  <!-- Caption -->
  <text x="350" y="276" text-anchor="middle" font-size="11" fill="#6b7280">Wider channels deliver more throughput per device but leave fewer independent channels</text>
  <text x="350" y="291" text-anchor="middle" font-size="11" fill="#6b7280">The 6 GHz band's extra width makes 160 MHz practical where 5 GHz 160 MHz is risky</text>
</svg>
