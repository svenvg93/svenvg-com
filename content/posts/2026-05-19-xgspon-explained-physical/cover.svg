<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>

    <!-- Text overlay gradient -->
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>

    <!-- Hex fill (blue variant for splitter) -->
    <linearGradient id="hex-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e2040"/>
      <stop offset="100%" stop-color="#071428"/>
    </linearGradient>

    <!-- OLT globe fill -->
    <radialGradient id="globe-fill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0808"/>
      <stop offset="100%" stop-color="#0d0404"/>
    </radialGradient>

    <!-- Zone glows -->
    <radialGradient id="glow-red" cx="16%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-green" cx="84%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>

    <!-- Arrow markers -->
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>

    <!-- Gradient arrows -->
    <linearGradient id="arr-wan" x1="265" y1="210" x2="522" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="arr-lan-top" x1="678" y1="180" x2="840" y2="155" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="arr-lan-mid" x1="678" y1="210" x2="840" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="arr-lan-bot" x1="678" y1="240" x2="840" y2="305" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Zone glows -->
  <rect width="1200" height="630" fill="url(#glow-red)"/>
  <rect width="1200" height="630" fill="url(#glow-blue)"/>
  <rect width="1200" height="630" fill="url(#glow-green)"/>

  <!-- Subtle dot grid texture -->
  <g fill="#0f1f44" opacity="0.5">
    <circle cx="200" cy="80" r="1.5"/><circle cx="400" cy="80" r="1.5"/><circle cx="600" cy="80" r="1.5"/>
    <circle cx="800" cy="80" r="1.5"/><circle cx="1000" cy="80" r="1.5"/>
    <circle cx="100" cy="160" r="1.5"/><circle cx="300" cy="160" r="1.5"/><circle cx="500" cy="160" r="1.5"/>
    <circle cx="700" cy="160" r="1.5"/><circle cx="900" cy="160" r="1.5"/><circle cx="1100" cy="160" r="1.5"/>
    <circle cx="200" cy="240" r="1.5"/><circle cx="400" cy="240" r="1.5"/><circle cx="800" cy="240" r="1.5"/>
    <circle cx="1000" cy="240" r="1.5"/>
    <circle cx="100" cy="320" r="1.5"/><circle cx="300" cy="320" r="1.5"/><circle cx="900" cy="320" r="1.5"/>
    <circle cx="1100" cy="320" r="1.5"/>
  </g>

  <!-- ── LEFT ZONE: OLT Globe ── -->
  <!-- Globe body -->
  <circle cx="190" cy="210" r="74" fill="url(#globe-fill)" stroke="#7f1d1d" stroke-width="1.5"/>
  <!-- Globe meridian/latitude lines -->
  <ellipse cx="190" cy="210" rx="37" ry="74" fill="none" stroke="#7f1d1d" stroke-width="1"/>
  <line x1="116" y1="210" x2="264" y2="210" stroke="#7f1d1d" stroke-width="1"/>
  <line x1="122" y1="173" x2="258" y2="173" stroke="#7f1d1d" stroke-width="1" opacity="0.4"/>
  <line x1="122" y1="247" x2="258" y2="247" stroke="#7f1d1d" stroke-width="1" opacity="0.4"/>
  <!-- OLT label inside globe -->
  <text x="190" y="204" text-anchor="middle" font-size="16" fill="#f87171" font-weight="700">OLT</text>
  <text x="190" y="222" text-anchor="middle" font-size="10" fill="#fca5a5" letter-spacing="1" opacity="0.8">ISP Central</text>
  <!-- Badge below globe -->
  <rect x="130" y="299" width="120" height="22" fill="#150808" stroke="#7f1d1d" stroke-width="1" rx="3"/>
  <text x="190" y="314" text-anchor="middle" font-size="10" fill="#f87171" letter-spacing="1">XGS-PON OLT Port</text>

  <!-- ── FEEDER FIBER ARROW (OLT → Splitter) ── -->
  <line x1="265" y1="210" x2="522" y2="210"
        stroke="url(#arr-wan)" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr-blue)"/>
  <text x="393" y="198" text-anchor="middle" font-size="9" fill="#6b2020" letter-spacing="1">1577 nm · 1270 nm</text>
  <text x="393" y="228" text-anchor="middle" font-size="9" fill="#1e3a5f" letter-spacing="1">feeder fiber</text>

  <!-- ── CENTER ZONE: Passive Splitter Hexagon ── -->
  <!-- r=82 at (600,210) — pointy-top -->
  <polygon points="600,128 671,169 671,251 600,292 529,251 529,169"
           fill="url(#hex-fill)" stroke="#38bdf8" stroke-width="2.5"/>
  <polygon points="600,136 663,174 663,246 600,284 537,246 537,174"
           fill="none" stroke="#38bdf8" stroke-width="0.8" stroke-opacity="0.3"/>
  <!-- Labels inside hex -->
  <text x="600" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#bae6fd" letter-spacing="2">SPLITTER</text>
  <text x="600" y="218" text-anchor="middle" font-size="10" fill="#38bdf8" letter-spacing="1" opacity="0.8">passive ODN</text>
  <text x="600" y="238" text-anchor="middle" font-size="10" fill="#7dd3fc" opacity="0.6">1 : 32</text>
  <!-- Badge below hex -->
  <rect x="520" y="305" width="160" height="22" fill="#071428" stroke="#1e3a5f" stroke-width="1" rx="3"/>
  <text x="600" y="320" text-anchor="middle" font-size="10" fill="#38bdf8" letter-spacing="1">no power · no config</text>

  <!-- ── DROP FIBER ARROWS (Splitter → ONTs) ── -->
  <!-- Top drop → ONT 1 -->
  <path d="M 678,185 C 740,175 780,155 840,155"
        fill="none" stroke="url(#arr-lan-top)" stroke-width="2" marker-end="url(#arr-green)"/>
  <!-- Middle drop → ONT 2 -->
  <path d="M 678,210 C 740,218 780,228 840,230"
        fill="none" stroke="url(#arr-lan-mid)" stroke-width="2" marker-end="url(#arr-green)"/>
  <!-- Bottom drop → ONT 3 -->
  <path d="M 678,235 C 740,258 780,300 840,308"
        fill="none" stroke="url(#arr-lan-bot)" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- ── RIGHT ZONE: ONT Nodes ── -->
  <!-- ONT 1 -->
  <rect x="843" y="133" width="148" height="44" fill="#071810" stroke="#166534" stroke-width="1.5" rx="5"/>
  <text x="917" y="153" text-anchor="middle" font-size="12" fill="#86efac" font-weight="600">ONT</text>
  <text x="917" y="169" text-anchor="middle" font-size="9" fill="#4ade80" letter-spacing="1">Home 1 · 10G</text>

  <!-- ONT 2 -->
  <rect x="843" y="208" width="148" height="44" fill="#071810" stroke="#166534" stroke-width="1.5" rx="5"/>
  <text x="917" y="228" text-anchor="middle" font-size="12" fill="#86efac" font-weight="600">ONT</text>
  <text x="917" y="244" text-anchor="middle" font-size="9" fill="#4ade80" letter-spacing="1">Home 2 · 10G</text>

  <!-- ONT 3 (with ellipsis to imply more) -->
  <rect x="843" y="285" width="148" height="44" fill="#071810" stroke="#166534" stroke-width="1.5" rx="5"/>
  <text x="917" y="305" text-anchor="middle" font-size="12" fill="#86efac" font-weight="600">ONT</text>
  <text x="917" y="321" text-anchor="middle" font-size="9" fill="#4ade80" letter-spacing="1">Home N · 10G</text>

  <!-- "up to 32" callout -->
  <text x="1020" y="228" font-size="10" fill="#166534" letter-spacing="1">up to 32</text>
  <text x="1020" y="242" font-size="10" fill="#166534" letter-spacing="1">subscribers</text>

  <!-- Text overlay (must be at y=390, height=240) -->
  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>

  <!-- Series label -->
  <text x="600" y="500" text-anchor="middle" font-size="13"
        font-weight="600" fill="#38bdf8" letter-spacing="3">XGS-PON EXPLAINED</text>
  <!-- Post title -->
  <text x="600" y="538" text-anchor="middle" font-size="34"
        font-weight="700" fill="#f1f5f9">The Physical Layer</text>
</svg>
