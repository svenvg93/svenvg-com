<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" width="700" height="320"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
    <marker id="arr-muted" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#475569"/>
    </marker>
  </defs>

  <rect width="700" height="320" fill="url(#bg)" rx="8"/>

  <!-- OLT (red zone: broadcasts to all ONTs) -->
  <rect x="30" y="130" width="140" height="70" fill="none" stroke="#ef4444" stroke-width="1.5" rx="5"/>
  <text x="100" y="160" text-anchor="middle" font-size="13" font-weight="700" fill="#fca5a5">OLT</text>
  <text x="100" y="178" text-anchor="middle" font-size="10" fill="#ef4444" opacity="0.8">broadcast source</text>

  <!-- Accepted (green) -->
  <line x1="170" y1="165" x2="517" y2="72.5" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Discarded (muted, dashed) -->
  <line x1="170" y1="165" x2="517" y2="162.5" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-muted)"/>
  <line x1="170" y1="165" x2="517" y2="252.5" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-muted)"/>

  <!-- ONT 1 — accepted -->
  <rect x="520" y="40" width="150" height="65" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="595" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#86efac">ONT 1</text>
  <text x="595" y="86" text-anchor="middle" font-size="10" fill="#34d399" opacity="0.8">accepted — key match</text>

  <!-- ONT 2 — discarded -->
  <rect x="520" y="130" width="150" height="65" fill="none" stroke="#475569" stroke-width="1.5" rx="5"/>
  <text x="595" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#94a3b8">ONT 2</text>
  <text x="595" y="176" text-anchor="middle" font-size="10" fill="#94a3b8" opacity="0.8">discarded (mismatch)</text>

  <!-- ONT 3 — discarded -->
  <rect x="520" y="220" width="150" height="65" fill="none" stroke="#475569" stroke-width="1.5" rx="5"/>
  <text x="595" y="248" text-anchor="middle" font-size="13" font-weight="700" fill="#94a3b8">ONT 3</text>
  <text x="595" y="266" text-anchor="middle" font-size="10" fill="#94a3b8" opacity="0.8">discarded (mismatch)</text>
</svg>
