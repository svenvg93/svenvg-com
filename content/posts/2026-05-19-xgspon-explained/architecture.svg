<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 310" width="700" height="310"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#ef4444"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="700" height="310" fill="url(#bg)" rx="8"/>

  <!-- OLT (red zone: ISP / external source) -->
  <rect x="30" y="120" width="130" height="70" fill="none" stroke="#ef4444" stroke-width="1.5" rx="5"/>
  <text x="95" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#fca5a5">OLT</text>
  <text x="95" y="168" text-anchor="middle" font-size="10" fill="#ef4444" opacity="0.8">ISP Central Office</text>

  <line x1="160" y1="155" x2="283" y2="155" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- Splitter (blue zone: passive ODN) -->
  <rect x="290" y="100" width="130" height="110" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="355" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#bae6fd">Splitter</text>
  <text x="355" y="168" text-anchor="middle" font-size="10" fill="#38bdf8" opacity="0.8">1:32 passive</text>

  <line x1="420" y1="155" x2="553" y2="76" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="420" y1="155" x2="553" y2="154.5" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="420" y1="155" x2="553" y2="233" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- ONT 1 (green zone: subscriber) -->
  <rect x="560" y="45" width="120" height="55" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="620" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#86efac">ONT</text>
  <text x="620" y="86" text-anchor="middle" font-size="10" fill="#34d399" opacity="0.8">Home 1</text>

  <!-- ONT 2 -->
  <rect x="560" y="127" width="120" height="55" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="620" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#86efac">ONT</text>
  <text x="620" y="168" text-anchor="middle" font-size="10" fill="#34d399" opacity="0.8">Home 2</text>

  <!-- ONT 3 -->
  <rect x="560" y="209" width="120" height="55" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="620" y="232" text-anchor="middle" font-size="13" font-weight="700" fill="#86efac">ONT</text>
  <text x="620" y="250" text-anchor="middle" font-size="10" fill="#34d399" opacity="0.8">Home 3 of 32</text>
</svg>
