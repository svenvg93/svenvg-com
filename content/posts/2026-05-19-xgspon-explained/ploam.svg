<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" width="700" height="320"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <!-- Step 1: ONT -> OLT -->
    <linearGradient id="g1" x1="108" y1="95" x2="592" y2="95" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <!-- Step 2: OLT -> ONT -->
    <linearGradient id="g2" x1="592" y1="130" x2="108" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <!-- Step 3: OLT -> ONT -->
    <linearGradient id="g3" x1="592" y1="165" x2="108" y2="165" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <!-- Step 4: ONT -> OLT -->
    <linearGradient id="g4" x1="108" y1="200" x2="592" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <!-- Step 5: OLT -> ONT -->
    <linearGradient id="g5" x1="592" y1="235" x2="108" y2="235" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="700" height="320" fill="url(#bg)" rx="8"/>

  <!-- ONT (green zone) -->
  <rect x="40" y="25" width="120" height="44" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="100" y="52" text-anchor="middle" font-size="14" font-weight="700" fill="#86efac">ONT</text>

  <!-- OLT (red zone) -->
  <rect x="540" y="25" width="120" height="44" fill="none" stroke="#ef4444" stroke-width="1.5" rx="5"/>
  <text x="600" y="52" text-anchor="middle" font-size="14" font-weight="700" fill="#fca5a5">OLT</text>

  <!-- Lifelines -->
  <line x1="100" y1="69" x2="100" y2="250" stroke="#34d399" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="600" y1="69" x2="600" y2="250" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Step 1: Serial Number discovery (ONT -> OLT) -->
  <line x1="108" y1="95" x2="592" y2="95" stroke="url(#g1)" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="350" y="87" text-anchor="middle" font-size="9" fill="#86efac">1 · Serial Number discovery</text>

  <!-- Step 2: ALLOC-ID assignment (OLT -> ONT) -->
  <line x1="592" y1="130" x2="108" y2="130" stroke="url(#g2)" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="350" y="122" text-anchor="middle" font-size="9" fill="#fca5a5">2 · ALLOC-ID assignment</text>

  <!-- Step 3: Ranging request -> EqD calibration (OLT -> ONT) -->
  <line x1="592" y1="165" x2="108" y2="165" stroke="url(#g3)" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="350" y="157" text-anchor="middle" font-size="9" fill="#fca5a5">3 · Ranging request &#8594; EqD calibration</text>

  <!-- Step 4: Round-trip delay measured / EqD set (ONT -> OLT) -->
  <line x1="108" y1="200" x2="592" y2="200" stroke="url(#g4)" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="350" y="192" text-anchor="middle" font-size="9" fill="#86efac">4 · Round-trip delay measured &#183; EqD set</text>

  <!-- Step 5: AES-128 key provisioned (OLT -> ONT) -->
  <line x1="592" y1="235" x2="108" y2="235" stroke="url(#g5)" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="350" y="227" text-anchor="middle" font-size="9" fill="#fca5a5">5 · AES-128 key provisioned</text>

  <!-- Final state (post accent) -->
  <rect x="250" y="260" width="200" height="40" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="350" y="279" text-anchor="middle" font-size="12" font-weight="700" fill="#bae6fd">Registration complete</text>
  <text x="350" y="293" text-anchor="middle" font-size="9" fill="#38bdf8" opacity="0.8">data path active</text>
</svg>
