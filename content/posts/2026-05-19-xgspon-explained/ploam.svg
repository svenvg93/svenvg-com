<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" width="700" height="300"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <!-- ONT → OLT arrows (green → blue) -->
    <linearGradient id="arr-up1" x1="178" y1="100" x2="522" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="arr-up2" x1="178" y1="190" x2="522" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- OLT → ONT arrows (blue → green) -->
    <linearGradient id="arr-dn1" x1="522" y1="125" x2="178" y2="125" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="arr-dn2" x1="522" y1="155" x2="178" y2="155" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="arr-dn3" x1="522" y1="220" x2="178" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <!-- Arrow markers -->
    <marker id="arr-right" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#3b82f6"/>
    </marker>
    <marker id="arr-left" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="300" fill="url(#bg)" rx="8"/>

  <!-- Header -->
  <text x="350" y="22" text-anchor="middle" font-size="11" font-weight="600"
        fill="#94a3b8" letter-spacing="1">PLOAM REGISTRATION — ONT BRING-UP SEQUENCE</text>
  <line x1="0" y1="36" x2="700" y2="36" stroke="#0d1a2a" stroke-width="1"/>

  <!-- ── Lifeline headers ── -->
  <!-- ONT (green, left) -->
  <rect x="90" y="46" width="100" height="30" fill="#071810" stroke="#166534" stroke-width="1.5" rx="4"/>
  <text x="140" y="65" text-anchor="middle" font-size="12" font-weight="600" fill="#86efac">ONT</text>

  <!-- OLT (blue, right) -->
  <rect x="510" y="46" width="100" height="30" fill="#0e1a3a" stroke="#3b82f6" stroke-width="1.5" rx="4"/>
  <text x="560" y="65" text-anchor="middle" font-size="12" font-weight="600" fill="#93c5fd">OLT</text>

  <!-- Lifelines (dashed vertical) -->
  <line x1="140" y1="76" x2="140" y2="258" stroke="#166534" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="560" y1="76" x2="560" y2="258" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>

  <!-- ── Step 1: Serial Number → OLT ── -->
  <line x1="148" y1="100" x2="552" y2="100"
        stroke="url(#arr-up1)" stroke-width="1.5" marker-end="url(#arr-right)"/>
  <text x="350" y="92" text-anchor="middle" font-size="9" fill="#86efac">1 · Serial Number discovery</text>

  <!-- ── Step 2: ALLOC-ID ← OLT ── -->
  <line x1="552" y1="125" x2="148" y2="125"
        stroke="url(#arr-dn1)" stroke-width="1.5" marker-end="url(#arr-left)"/>
  <text x="350" y="117" text-anchor="middle" font-size="9" fill="#93c5fd">2 · ALLOC-ID assignment</text>

  <!-- ── Step 3: Ranging ← OLT ── -->
  <line x1="552" y1="155" x2="148" y2="155"
        stroke="url(#arr-dn2)" stroke-width="1.5" marker-end="url(#arr-left)"/>
  <text x="350" y="147" text-anchor="middle" font-size="9" fill="#93c5fd">3 · Ranging request → EqD calibration</text>

  <!-- ── Step 4: RTT response → OLT ── -->
  <line x1="148" y1="190" x2="552" y2="190"
        stroke="url(#arr-up2)" stroke-width="1.5" marker-end="url(#arr-right)"/>
  <text x="350" y="182" text-anchor="middle" font-size="9" fill="#86efac">4 · Round-trip delay measured · EqD set</text>

  <!-- ── Step 5: AES-128 key ← OLT ── -->
  <line x1="552" y1="220" x2="148" y2="220"
        stroke="url(#arr-dn3)" stroke-width="1.5" marker-end="url(#arr-left)"/>
  <text x="350" y="212" text-anchor="middle" font-size="9" fill="#93c5fd">5 · AES-128 key provisioned</text>

  <!-- ── Registration complete badge ── -->
  <rect x="215" y="238" width="270" height="26" fill="#071428" stroke="#3b82f6" stroke-width="1.5" rx="4"/>
  <text x="350" y="254" text-anchor="middle" font-size="10" font-weight="600" fill="#38bdf8" letter-spacing="1">registration complete · data path active</text>

  <!-- Footer -->
  <text x="350" y="284" text-anchor="middle" font-size="9" fill="#94a3b8">
    serial number + LOID must match OLT provisioning · third-party ONTs must replicate this exchange
  </text>
</svg>
