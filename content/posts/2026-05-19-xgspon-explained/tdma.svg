<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" width="700" height="260"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-axis" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="700" height="260" fill="url(#bg)" rx="8"/>

  <!-- Label column separator -->
  <line x1="90" y1="24" x2="90" y2="190" stroke="#0d1a2a" stroke-width="1"/>
  <!-- Lane separators -->
  <line x1="90" y1="77" x2="683" y2="77" stroke="#0d1a2a" stroke-width="1"/>
  <line x1="90" y1="127" x2="683" y2="127" stroke="#0d1a2a" stroke-width="1"/>

  <!-- Lane labels -->
  <text x="45" y="56" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">ONT 1</text>
  <text x="45" y="106" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">ONT 2</text>
  <text x="45" y="156" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">ONT 3</text>

  <!-- Row 1 slots — TX in slot 1 and 4 -->
  <rect x="97"  y="34" width="94" height="36" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="2"/>
  <text x="144" y="56" text-anchor="middle" font-size="10" font-weight="600" fill="#bae6fd">TX</text>
  <rect x="195" y="34" width="94" height="36" fill="none" stroke="#1e3650" stroke-width="0.5" rx="2"/>
  <rect x="293" y="34" width="94" height="36" fill="none" stroke="#1e3650" stroke-width="0.5" rx="2"/>
  <rect x="391" y="34" width="94" height="36" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="2"/>
  <text x="438" y="56" text-anchor="middle" font-size="10" font-weight="600" fill="#bae6fd">TX</text>
  <rect x="489" y="34" width="94" height="36" fill="none" stroke="#1e3650" stroke-width="0.5" rx="2"/>
  <rect x="587" y="34" width="94" height="36" fill="none" stroke="#1e3650" stroke-width="0.5" rx="2"/>

  <!-- Row 2 slots — TX in slot 2 and 5 -->
  <rect x="97"  y="84" width="94" height="36" fill="none" stroke="#1e3650" stroke-width="0.5" rx="2"/>
  <rect x="195" y="84" width="94" height="36" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="2"/>
  <text x="242" y="106" text-anchor="middle" font-size="10" font-weight="600" fill="#bae6fd">TX</text>
  <rect x="293" y="84" width="94" height="36" fill="none" stroke="#1e3650" stroke-width="0.5" rx="2"/>
  <rect x="391" y="84" width="94" height="36" fill="none" stroke="#1e3650" stroke-width="0.5" rx="2"/>
  <rect x="489" y="84" width="94" height="36" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="2"/>
  <text x="536" y="106" text-anchor="middle" font-size="10" font-weight="600" fill="#bae6fd">TX</text>
  <rect x="587" y="84" width="94" height="36" fill="none" stroke="#1e3650" stroke-width="0.5" rx="2"/>

  <!-- Row 3 slots — TX in slot 3 and 6 -->
  <rect x="97"  y="134" width="94" height="36" fill="none" stroke="#1e3650" stroke-width="0.5" rx="2"/>
  <rect x="195" y="134" width="94" height="36" fill="none" stroke="#1e3650" stroke-width="0.5" rx="2"/>
  <rect x="293" y="134" width="94" height="36" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="2"/>
  <text x="340" y="156" text-anchor="middle" font-size="10" font-weight="600" fill="#bae6fd">TX</text>
  <rect x="391" y="134" width="94" height="36" fill="none" stroke="#1e3650" stroke-width="0.5" rx="2"/>
  <rect x="489" y="134" width="94" height="36" fill="none" stroke="#1e3650" stroke-width="0.5" rx="2"/>
  <rect x="587" y="134" width="94" height="36" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="2"/>
  <text x="634" y="156" text-anchor="middle" font-size="10" font-weight="600" fill="#bae6fd">TX</text>

  <!-- Time axis -->
  <line x1="90" y1="190" x2="678" y2="190" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr-axis)"/>
  <line x1="95"  y1="186" x2="95"  y2="194" stroke="#94a3b8" stroke-width="0.5"/>
  <line x1="193" y1="186" x2="193" y2="194" stroke="#94a3b8" stroke-width="0.5"/>
  <line x1="291" y1="186" x2="291" y2="194" stroke="#94a3b8" stroke-width="0.5"/>
  <line x1="389" y1="186" x2="389" y2="194" stroke="#94a3b8" stroke-width="0.5"/>
  <line x1="487" y1="186" x2="487" y2="194" stroke="#94a3b8" stroke-width="0.5"/>
  <line x1="585" y1="186" x2="585" y2="194" stroke="#94a3b8" stroke-width="0.5"/>
  <line x1="683" y1="186" x2="683" y2="194" stroke="#94a3b8" stroke-width="0.5"/>

  <!-- Frame bracket: 1 frame = 3 slots = 125 µs -->
  <line x1="95"  y1="200" x2="389" y2="200" stroke="#94a3b8" stroke-width="0.5"/>
  <line x1="95"  y1="196" x2="95"  y2="204" stroke="#94a3b8" stroke-width="0.5"/>
  <line x1="389" y1="196" x2="389" y2="204" stroke="#94a3b8" stroke-width="0.5"/>
  <text x="242" y="217" text-anchor="middle" font-size="10" fill="#94a3b8">125 µs frame</text>
</svg>
