<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" width="700" height="220"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#ef4444"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="700" height="220" fill="url(#bg)" rx="8"/>

  <!-- OLT (red zone) -->
  <rect x="40" y="75" width="150" height="70" fill="none" stroke="#ef4444" stroke-width="1.5" rx="5"/>
  <text x="115" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#fca5a5">OLT</text>
  <text x="115" y="124" text-anchor="middle" font-size="10" fill="#ef4444" opacity="0.8">ISP Central Office</text>

  <!-- Downstream: OLT -> ONT -->
  <line x1="190" y1="100" x2="502" y2="100" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="350" y="88" text-anchor="middle" font-size="9" fill="#fca5a5">1577 nm — downstream</text>

  <!-- Upstream: ONT -> OLT -->
  <line x1="505" y1="130" x2="193" y2="130" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="350" y="146" text-anchor="middle" font-size="9" fill="#86efac">1270 nm — upstream</text>

  <!-- ONT (green zone) -->
  <rect x="510" y="75" width="150" height="70" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="585" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#86efac">ONT</text>
  <text x="585" y="124" text-anchor="middle" font-size="10" fill="#34d399" opacity="0.8">Subscriber Home</text>
</svg>
