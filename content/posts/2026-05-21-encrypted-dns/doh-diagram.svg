<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 190" width="700" height="190"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">

  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <!-- Arrow: client → HTTPS tunnel (client blue → HTTPS indigo) -->
    <linearGradient id="arrowLeft" x1="160" y1="86" x2="228" y2="86" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <!-- Arrow: HTTPS tunnel → resolver (HTTPS indigo → resolver blue) -->
    <linearGradient id="arrowRight" x1="468" y1="86" x2="536" y2="86" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- Arrowhead markers -->
    <marker id="arrowheadLeft" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#818cf8"/>
    </marker>
    <marker id="arrowheadRight" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="190" fill="url(#bg)" rx="8"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="95" x2="700" y2="95" stroke="#0d1a2a" stroke-width="1"/>
  <line x1="350" y1="0" x2="350" y2="190" stroke="#0d1a2a" stroke-width="1"/>

  <!-- Header label -->
  <text x="350" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1">DNS-OVER-HTTPS (DoH) — DNS INSIDE HTTPS, PORT 443</text>

  <!-- CLIENT -->
  <rect x="40" y="58" width="120" height="56" fill="#0a1020" stroke="#334155" stroke-width="1.5" rx="5"/>
  <text x="100" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">CLIENT</text>
  <text x="100" y="101" text-anchor="middle" font-size="9" fill="#94a3b8">stub resolver</text>

  <!-- ARROW client → tunnel (solid: encrypted from client) -->
  <line x1="160" y1="86" x2="226" y2="86" stroke="url(#arrowLeft)" stroke-width="1.5" marker-end="url(#arrowheadLeft)"/>

  <!-- HTTPS TUNNEL outer box -->
  <rect x="232" y="44" width="236" height="84" fill="#0e0a2e" stroke="#818cf8" stroke-width="1.5" rx="5"/>
  <!-- Port badge -->
  <rect x="290" y="36" width="120" height="18" fill="#1e1b4b" rx="4"/>
  <text x="350" y="49" text-anchor="middle" font-size="9" font-weight="700" fill="#c7d2fe">443 / TCP · HTTPS</text>
  <!-- HTTPS label -->
  <text x="248" y="62" font-size="9" font-weight="700" fill="#818cf8" letter-spacing="1">HTTPS</text>
  <!-- Inner DNS packet box -->
  <rect x="258" y="66" width="184" height="40" fill="#13103a" stroke="#a5b4fc" stroke-width="1" rx="5"/>
  <text x="350" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#c7d2fe">DNS Query</text>
  <text x="350" y="98" text-anchor="middle" font-size="8" fill="#818cf8" font-family="'Courier New',monospace">POST /dns-query</text>

  <!-- ARROW tunnel → resolver (solid: encrypted) -->
  <line x1="468" y1="86" x2="534" y2="86" stroke="url(#arrowRight)" stroke-width="1.5" marker-end="url(#arrowheadRight)"/>

  <!-- RESOLVER -->
  <rect x="540" y="58" width="120" height="56" fill="#0e1a3a" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="600" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#93c5fd">RESOLVER</text>
  <text x="600" y="101" text-anchor="middle" font-size="9" fill="#3b82f6">1.1.1.1</text>

  <!-- Footer captions -->
  <text x="350" y="152" text-anchor="middle" font-size="9" fill="#94a3b8">Runs on port 443 — indistinguishable from regular HTTPS traffic on the wire</text>
  <text x="350" y="166" text-anchor="middle" font-size="9" fill="#94a3b8">Cannot be blocked without blocking HTTPS broadly, or using SNI-based filtering</text>
</svg>
