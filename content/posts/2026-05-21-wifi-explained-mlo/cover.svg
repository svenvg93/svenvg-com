<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050814"/>
      <stop offset="100%" stop-color="#0a1028"/>
    </linearGradient>
    <!-- Band stream gradients -->
    <linearGradient id="s24" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="s5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="s6" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.4"/>
    </linearGradient>
    <!-- Merged stream -->
    <linearGradient id="merged" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e2e8f0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f8fafc" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050814" stop-opacity="0"/>
      <stop offset="65%" stop-color="#050814" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#050814" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Background subtle diagonal lines -->
  <g stroke="#0d1535" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/>
  </g>

  <!-- === Three incoming band streams from left === -->

  <!-- 2.4 GHz stream (orange) — top lane, y center=170 -->
  <!-- Horizontal beam with wave-like oscillation represented by thick path -->
  <path d="M 60,170 C 200,170 200,170 380,170" fill="none" stroke="#f97316" stroke-width="22" stroke-opacity="0.7" stroke-linecap="round"/>
  <path d="M 60,170 C 200,170 200,170 380,170" fill="none" stroke="#fed7aa" stroke-width="4" stroke-linecap="round"/>
  <!-- Band label -->
  <text x="40" y="165" text-anchor="end" font-size="16" font-weight="700" fill="#f97316">2.4</text>
  <text x="40" y="182" text-anchor="end" font-size="11" fill="#f97316" opacity="0.7">GHz</text>

  <!-- 5 GHz stream (blue) — middle lane, y center=315 -->
  <path d="M 60,315 C 200,315 200,315 380,315" fill="none" stroke="#38bdf8" stroke-width="30" stroke-opacity="0.7" stroke-linecap="round"/>
  <path d="M 60,315 C 200,315 200,315 380,315" fill="none" stroke="#bae6fd" stroke-width="5" stroke-linecap="round"/>
  <text x="40" y="309" text-anchor="end" font-size="16" font-weight="700" fill="#38bdf8">5</text>
  <text x="40" y="326" text-anchor="end" font-size="11" fill="#38bdf8" opacity="0.7">GHz</text>

  <!-- 6 GHz stream (green) — bottom lane, y center=460 -->
  <path d="M 60,460 C 200,460 200,460 380,460" fill="none" stroke="#34d399" stroke-width="20" stroke-opacity="0.7" stroke-linecap="round"/>
  <path d="M 60,460 C 200,460 200,460 380,460" fill="none" stroke="#a7f3d0" stroke-width="3.5" stroke-linecap="round"/>
  <text x="40" y="454" text-anchor="end" font-size="16" font-weight="700" fill="#34d399">6</text>
  <text x="40" y="471" text-anchor="end" font-size="11" fill="#34d399" opacity="0.7">GHz</text>

  <!-- === Converging curves toward merge point (700, 315) === -->

  <!-- 2.4 GHz converging -->
  <path d="M 380,170 C 540,170 560,315 700,315"
        fill="none" stroke="#f97316" stroke-width="22" stroke-opacity="0.6" stroke-linecap="round"/>
  <path d="M 380,170 C 540,170 560,315 700,315"
        fill="none" stroke="#fed7aa" stroke-width="4" stroke-linecap="round"/>

  <!-- 5 GHz straight through -->
  <path d="M 380,315 L 700,315"
        fill="none" stroke="#38bdf8" stroke-width="30" stroke-opacity="0.6" stroke-linecap="round"/>
  <path d="M 380,315 L 700,315"
        fill="none" stroke="#bae6fd" stroke-width="5" stroke-linecap="round"/>

  <!-- 6 GHz converging -->
  <path d="M 380,460 C 540,460 560,315 700,315"
        fill="none" stroke="#34d399" stroke-width="20" stroke-opacity="0.6" stroke-linecap="round"/>
  <path d="M 380,460 C 540,460 560,315 700,315"
        fill="none" stroke="#a7f3d0" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Merge point glow -->
  <circle cx="700" cy="315" r="50" fill="#1e3a5f" fill-opacity="0.6"/>
  <circle cx="700" cy="315" r="35" fill="#0f2a4a" fill-opacity="0.8"/>
  <circle cx="700" cy="315" r="20" fill="#172554" stroke="#38bdf8" stroke-width="2" stroke-opacity="0.6"/>
  <!-- MLO label in circle -->
  <text x="700" y="320" text-anchor="middle" font-size="13" font-weight="800" fill="#e0f2fe" letter-spacing="1">MLO</text>

  <!-- === Merged stream to the right === -->
  <path d="M 700,315 L 1140,315"
        fill="none" stroke="url(#merged)" stroke-width="36" stroke-opacity="0.85" stroke-linecap="round"/>
  <!-- Bright core of merged stream -->
  <path d="M 720,315 L 1140,315"
        fill="none" stroke="#f8fafc" stroke-width="6" stroke-opacity="0.9" stroke-linecap="round"/>

  <!-- "Single logical link" label -->
  <text x="920" y="272" text-anchor="middle" font-size="13" fill="#94a3b8" letter-spacing="2">SINGLE LOGICAL LINK</text>
  <line x1="760" y1="280" x2="1100" y2="280" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Throughput + latency callouts -->
  <text x="1100" y="298" text-anchor="middle" font-size="11" fill="#38bdf8">↑ throughput</text>
  <text x="1100" y="336" text-anchor="middle" font-size="11" fill="#34d399">↓ latency</text>

  <!-- Bottom gradient overlay -->
  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>

  <!-- Series label -->
  <text x="600" y="572" text-anchor="middle" font-size="13" fill="#7dd3fc" letter-spacing="3" font-weight="600">WiFi Explained</text>

  <!-- Title -->
  <text x="600" y="610" text-anchor="middle" font-size="38" font-weight="700" fill="#f1f5f9">WiFi 7: Multi-Link Operation</text>
</svg>
