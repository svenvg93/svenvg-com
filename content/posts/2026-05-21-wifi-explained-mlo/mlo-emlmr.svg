<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 330" width="700" height="330" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <marker id="emlmr-ab-l" markerWidth="12" markerHeight="8" refX="0" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="12,0 0,4 12,8" fill="#3b82f6"/>
    </marker>
    <marker id="emlmr-ab-r" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 12,4 0,8" fill="#3b82f6"/>
    </marker>
    <marker id="emlmr-ag-l" markerWidth="12" markerHeight="8" refX="0" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="12,0 0,4 12,8" fill="#10b981"/>
    </marker>
    <marker id="emlmr-ag-r" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 12,4 0,8" fill="#10b981"/>
    </marker>
    <marker id="emlmr-aa-l" markerWidth="12" markerHeight="8" refX="0" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="12,0 0,4 12,8" fill="#f59e0b"/>
    </marker>
    <marker id="emlmr-aa-r" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 12,4 0,8" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="330" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">eMLMR — Enhanced Multi-Link Multi-Radio</text>

  <!-- CLIENT box -->
  <text x="120" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#9ca3af">CLIENT</text>
  <rect x="20" y="56" width="200" height="200" fill="white" stroke="#e5e7eb" stroke-width="1.5" rx="8"/>

  <rect x="36" y="70" width="168" height="48" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="120" y="90" text-anchor="middle" font-size="13" font-weight="600" fill="#1d4ed8">2.4 GHz</text>
  <text x="120" y="108" text-anchor="middle" font-size="10" fill="#3b82f6">Radio 1</text>

  <rect x="36" y="128" width="168" height="48" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" rx="5"/>
  <text x="120" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#065f46">5 GHz</text>
  <text x="120" y="166" text-anchor="middle" font-size="10" fill="#10b981">Radio 2</text>

  <rect x="36" y="186" width="168" height="48" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" rx="5"/>
  <text x="120" y="206" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">6 GHz</text>
  <text x="120" y="224" text-anchor="middle" font-size="10" fill="#f59e0b">Radio 3</text>

  <!-- ACCESS POINT box -->
  <text x="580" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#9ca3af">ACCESS POINT</text>
  <rect x="480" y="56" width="200" height="200" fill="white" stroke="#e5e7eb" stroke-width="1.5" rx="8"/>

  <rect x="496" y="70" width="168" height="48" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="580" y="90" text-anchor="middle" font-size="13" font-weight="600" fill="#1d4ed8">2.4 GHz</text>
  <text x="580" y="108" text-anchor="middle" font-size="10" fill="#3b82f6">Radio 1</text>

  <rect x="496" y="128" width="168" height="48" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" rx="5"/>
  <text x="580" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#065f46">5 GHz</text>
  <text x="580" y="166" text-anchor="middle" font-size="10" fill="#10b981">Radio 2</text>

  <rect x="496" y="186" width="168" height="48" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" rx="5"/>
  <text x="580" y="206" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">6 GHz</text>
  <text x="580" y="224" text-anchor="middle" font-size="10" fill="#f59e0b">Radio 3</text>

  <!-- Bidirectional links — 5 GHz split around the scheduler block -->
  <line x1="220" y1="94"  x2="480" y2="94"  stroke="#3b82f6" stroke-width="2.5" marker-start="url(#emlmr-ab-l)" marker-end="url(#emlmr-ab-r)"/>
  <line x1="220" y1="152" x2="282" y2="152" stroke="#10b981" stroke-width="2.5" marker-start="url(#emlmr-ag-l)"/>
  <line x1="418" y1="152" x2="480" y2="152" stroke="#10b981" stroke-width="2.5" marker-end="url(#emlmr-ag-r)"/>
  <line x1="220" y1="210" x2="480" y2="210" stroke="#f59e0b" stroke-width="2.5" marker-start="url(#emlmr-aa-l)" marker-end="url(#emlmr-aa-r)"/>

  <!-- Intelligent Scheduler block (drawn after lines so fill sits on top) -->
  <rect x="284" y="118" width="132" height="68" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5" rx="6"/>
  <text x="350" y="141" text-anchor="middle" font-size="10" font-weight="700" fill="#6d28d9">Smart</text>
  <text x="350" y="156" text-anchor="middle" font-size="10" font-weight="700" fill="#6d28d9">Scheduler</text>
  <text x="350" y="172" text-anchor="middle" font-size="8" fill="#8b5cf6">interference-aware</text>

  <!-- Caption -->
  <text x="350" y="280" text-anchor="middle" font-size="11" fill="#6b7280">All links active — scheduler dynamically steers traffic by load and interference</text>


</svg>
