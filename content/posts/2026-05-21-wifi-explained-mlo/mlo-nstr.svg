<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" width="700" height="360" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <marker id="nstr-ag-l" markerWidth="12" markerHeight="8" refX="0" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="12,0 0,4 12,8" fill="#10b981"/>
    </marker>
    <marker id="nstr-ag-r" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 12,4 0,8" fill="#10b981"/>
    </marker>
    <marker id="nstr-aa-l" markerWidth="12" markerHeight="8" refX="0" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="12,0 0,4 12,8" fill="#f59e0b"/>
    </marker>
    <marker id="nstr-aa-r" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 12,4 0,8" fill="#f59e0b"/>
    </marker>
    <marker id="nstr-time-arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 10,3.5 0,7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="360" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">NSTR — Non-Simultaneous Transmit and Receive</text>

  <!-- CLIENT box -->
  <text x="120" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#9ca3af">CLIENT</text>
  <rect x="20" y="56" width="200" height="148" fill="white" stroke="#e5e7eb" stroke-width="1.5" rx="8"/>

  <rect x="36" y="70" width="168" height="48" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" rx="5"/>
  <text x="120" y="90" text-anchor="middle" font-size="13" font-weight="600" fill="#065f46">5 GHz</text>
  <text x="120" y="108" text-anchor="middle" font-size="10" fill="#10b981">Radio 1</text>

  <rect x="36" y="128" width="168" height="48" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" rx="5"/>
  <text x="120" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">6 GHz</text>
  <text x="120" y="166" text-anchor="middle" font-size="10" fill="#f59e0b">Radio 2</text>

  <!-- ACCESS POINT box -->
  <text x="580" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#9ca3af">ACCESS POINT</text>
  <rect x="480" y="56" width="200" height="148" fill="white" stroke="#e5e7eb" stroke-width="1.5" rx="8"/>

  <rect x="496" y="70" width="168" height="48" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" rx="5"/>
  <text x="580" y="90" text-anchor="middle" font-size="13" font-weight="600" fill="#065f46">5 GHz</text>
  <text x="580" y="108" text-anchor="middle" font-size="10" fill="#10b981">Radio 1</text>

  <rect x="496" y="128" width="168" height="48" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" rx="5"/>
  <text x="580" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">6 GHz</text>
  <text x="580" y="166" text-anchor="middle" font-size="10" fill="#f59e0b">Radio 2</text>

  <!-- Links -->
  <line x1="220" y1="94" x2="480" y2="94" stroke="#10b981" stroke-width="2.5" marker-start="url(#nstr-ag-l)" marker-end="url(#nstr-ag-r)"/>
  <line x1="220" y1="152" x2="480" y2="152" stroke="#f59e0b" stroke-width="2.5" marker-start="url(#nstr-aa-l)" marker-end="url(#nstr-aa-r)"/>

  <!-- Coordination bracket in the middle -->
  <line x1="348" y1="88" x2="352" y2="88" stroke="#6b7280" stroke-width="1"/>
  <line x1="350" y1="88" x2="350" y2="158" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="348" y1="158" x2="352" y2="158" stroke="#6b7280" stroke-width="1"/>
  <text x="363" y="126" font-size="9" fill="#9ca3af">coordinated</text>

  <!-- ── TIMING CHART ── -->
  <text x="350" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Coordination Timeline</text>

  <!-- Row labels -->
  <text x="212" y="257" text-anchor="end" font-size="11" font-weight="500" fill="#10b981">5 GHz</text>
  <text x="212" y="292" text-anchor="end" font-size="11" font-weight="500" fill="#f59e0b">6 GHz</text>

  <!-- Block positions: x=218, 278, 338, 398 — width=56, gap=4 -->
  <!-- 5 GHz: TX, WAIT, TX, WAIT -->
  <rect x="218" y="241" width="56" height="24" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" rx="3"/>
  <text x="246" y="257" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">TX</text>

  <rect x="278" y="241" width="56" height="24" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5" rx="3"/>
  <text x="306" y="257" text-anchor="middle" font-size="10" fill="#9ca3af">WAIT</text>

  <rect x="338" y="241" width="56" height="24" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" rx="3"/>
  <text x="366" y="257" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">TX</text>

  <rect x="398" y="241" width="56" height="24" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5" rx="3"/>
  <text x="426" y="257" text-anchor="middle" font-size="10" fill="#9ca3af">WAIT</text>

  <!-- 6 GHz: WAIT, TX, WAIT, TX -->
  <rect x="218" y="277" width="56" height="24" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5" rx="3"/>
  <text x="246" y="293" text-anchor="middle" font-size="10" fill="#9ca3af">WAIT</text>

  <rect x="278" y="277" width="56" height="24" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" rx="3"/>
  <text x="306" y="293" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">TX</text>

  <rect x="338" y="277" width="56" height="24" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5" rx="3"/>
  <text x="366" y="293" text-anchor="middle" font-size="10" fill="#9ca3af">WAIT</text>

  <rect x="398" y="277" width="56" height="24" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" rx="3"/>
  <text x="426" y="293" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">TX</text>

  <!-- Time axis -->
  <line x1="218" y1="314" x2="468" y2="314" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#nstr-time-arr)"/>
  <text x="474" y="318" font-size="10" fill="#9ca3af">time</text>

  <!-- Caption -->
  <text x="350" y="345" text-anchor="middle" font-size="11" fill="#6b7280">Transmissions are coordinated — one link waits while the other is active</text>
</svg>
