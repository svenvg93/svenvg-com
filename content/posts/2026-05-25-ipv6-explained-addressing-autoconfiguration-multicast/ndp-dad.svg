<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 285" width="700" height="285"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="arr-green-h" x1="134" y1="75" x2="558" y2="75" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
    <linearGradient id="arr-ok" x1="175" y1="172" x2="175" y2="252" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="arr-fail" x1="525" y1="172" x2="525" y2="252" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <marker id="arr-indigo" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#6366f1"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#4ade80"/>
    </marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="700" height="285" fill="url(#bg)" rx="8"/>

  <!-- subtle grid -->
  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0" y1="93" x2="700" y2="93"/>
    <line x1="350" y1="0" x2="350" y2="285"/>
  </g>

  <!-- header -->
  <text x="350" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1">DUPLICATE ADDRESS DETECTION (DAD)</text>

  <!-- DEVICE box -->
  <rect x="220" y="34" width="260" height="50" fill="#0a0a1f" stroke="#6366f1" stroke-width="1.5" rx="5"/>
  <text x="350" y="53" text-anchor="middle" font-size="11" font-weight="600" fill="#a5b4fc">DEVICE</text>
  <text x="350" y="70" text-anchor="middle" font-size="9" fill="#818cf8" font-family="'Courier New',monospace">candidate address: 2001:db8::a1</text>

  <!-- NS description -->
  <text x="350" y="103" text-anchor="middle" font-size="9" fill="#94a3b8">NS to ff02::1:ff00:00a1 · source = ::</text>
  <line x1="350" y1="107" x2="350" y2="120" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-indigo)"/>

  <!-- Solicited-node multicast box -->
  <rect x="188" y="122" width="324" height="36" fill="#1a1000" stroke="#92400e" stroke-width="1.5" rx="5"/>
  <text x="350" y="137" text-anchor="middle" font-size="9" font-weight="600" fill="#fcd34d">SOLICITED-NODE MULTICAST</text>
  <text x="350" y="151" text-anchor="middle" font-size="8" fill="#f59e0b" font-family="'Courier New',monospace">ff02::1:ff00:00a1  (last 24 bits of candidate)</text>

  <!-- Wait label -->
  <text x="350" y="172" text-anchor="middle" font-size="9" fill="#94a3b8">wait ~1 second</text>

  <!-- Fork horizontal line -->
  <line x1="175" y1="180" x2="525" y2="180" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Left branch dot + arrow -->
  <circle cx="175" cy="180" r="3" fill="#4ade80"/>
  <line x1="175" y1="183" x2="175" y2="198" stroke="url(#arr-ok)" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="100" y="192" text-anchor="end" font-size="9" font-weight="600" fill="#4ade80">no reply received</text>

  <!-- Right branch dot + arrow -->
  <circle cx="525" cy="180" r="3" fill="#f87171"/>
  <line x1="525" y1="183" x2="525" y2="198" stroke="url(#arr-fail)" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="600" y="192" text-anchor="start" font-size="9" font-weight="600" fill="#f87171">NA reply received</text>

  <!-- Success outcome -->
  <rect x="40" y="202" width="270" height="56" fill="#071810" stroke="#166534" stroke-width="1.5" rx="5"/>
  <text x="175" y="221" text-anchor="middle" font-size="11" font-weight="600" fill="#86efac">Address is unique</text>
  <text x="175" y="236" text-anchor="middle" font-size="9" fill="#4ade80">2001:db8::a1 assigned</text>
  <text x="175" y="249" text-anchor="middle" font-size="9" fill="#166534">device begins using it</text>

  <!-- Failure outcome -->
  <rect x="390" y="202" width="270" height="56" fill="#150808" stroke="#7f1d1d" stroke-width="1.5" rx="5"/>
  <text x="525" y="221" text-anchor="middle" font-size="11" font-weight="600" fill="#f87171">DAD failure</text>
  <text x="525" y="236" text-anchor="middle" font-size="9" fill="#ef4444">another device already has this address</text>
  <text x="525" y="249" text-anchor="middle" font-size="9" fill="#7f1d1d">address NOT assigned — try another</text>

  <!-- Footer -->
  <text x="350" y="271" text-anchor="middle" font-size="9" fill="#94a3b8">DAD runs for every new address — link-local, SLAAC-generated, DHCPv6-assigned, and manual</text>
  <text x="350" y="282" text-anchor="middle" font-size="9" fill="#94a3b8">The brief delay after interface up is DAD completing on the link-local address</text>
</svg>
