<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" width="700" height="220"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="arr-rs" x1="134" y1="75" x2="558" y2="75" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="arr-ra" x1="566" y1="130" x2="142" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#3b82f6"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#4ade80"/>
    </marker>
  </defs>

  <rect width="700" height="220" fill="url(#bg)" rx="8"/>

  <!-- subtle grid -->
  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0" y1="46" x2="700" y2="46"/>
  </g>

  <!-- header -->
  <text x="350" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1">NDP ROUTER DISCOVERY — RS AND RA EXCHANGE</text>

  <!-- Column labels -->
  <text x="130" y="42" text-anchor="middle" font-size="11" font-weight="600" fill="#a5b4fc">HOST</text>
  <text x="570" y="42" text-anchor="middle" font-size="11" font-weight="600" fill="#93c5fd">ROUTER</text>

  <!-- Lifelines -->
  <line x1="130" y1="50" x2="130" y2="205" stroke="#1e293b" stroke-width="2"/>
  <line x1="570" y1="50" x2="570" y2="205" stroke="#1e293b" stroke-width="2"/>

  <!-- RS -->
  <circle cx="130" cy="75" r="4" fill="#6366f1"/>
  <line x1="134" y1="75" x2="558" y2="75" stroke="url(#arr-rs)" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="350" y="68" text-anchor="middle" font-size="10" font-weight="600" fill="#818cf8">Router Solicitation (RS · type 133)</text>
  <text x="350" y="88" text-anchor="middle" font-size="9" fill="#94a3b8">dst ff02::2 — are there any routers?</text>

  <!-- RA -->
  <circle cx="570" cy="130" r="4" fill="#4ade80"/>
  <line x1="566" y1="130" x2="142" y2="130" stroke="url(#arr-ra)" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="350" y="123" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">Router Advertisement (RA · type 134)</text>
  <text x="350" y="145" text-anchor="middle" font-size="9" fill="#94a3b8">prefix 2001:db8::/64 · gateway fe80::1 · MTU 1500 · M=0 O=0</text>

  <!-- RA content box -->
  <rect x="290" y="158" width="260" height="50" fill="#071810" stroke="#166534" stroke-width="1.5" rx="5"/>
  <text x="310" y="173" font-size="9" fill="#86efac" font-weight="600">RA carries:</text>
  <text x="310" y="187" font-size="9" fill="#4ade80">Network prefix + prefix length</text>
  <text x="310" y="201" font-size="9" fill="#4ade80">Router link-local (default gateway)</text>
</svg>
