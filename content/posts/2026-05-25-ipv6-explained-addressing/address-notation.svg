<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 230" width="700" height="230"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
  </defs>

  <rect width="700" height="230" fill="url(#bg)" rx="8"/>

  <!-- Full form -->
  <rect x="40" y="30" width="620" height="44" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="60" y="47" font-size="9" fill="#86efac" font-weight="600" letter-spacing="1">FULL</text>
  <text x="350" y="65" text-anchor="middle" font-size="13" font-family="'Courier New',monospace" fill="#86efac">2001:0db8:0000:0000:0000:0000:0000:0001</text>

  <text x="350" y="92" text-anchor="middle" font-size="10" fill="#94a3b8">&#x2193;  drop leading zeros within each group</text>

  <!-- Leading zeros removed -->
  <rect x="40" y="100" width="620" height="44" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="60" y="117" font-size="9" fill="#86efac" font-weight="600" letter-spacing="1">LEADING ZEROS REMOVED</text>
  <text x="350" y="135" text-anchor="middle" font-size="13" font-family="'Courier New',monospace" fill="#86efac">2001:db8:0:0:0:0:0:1</text>

  <text x="350" y="162" text-anchor="middle" font-size="10" fill="#94a3b8">&#x2193;  replace one run of all-zero groups with ::</text>

  <!-- Double-colon form -->
  <rect x="40" y="170" width="620" height="44" fill="none" stroke="#34d399" stroke-width="2" rx="5"/>
  <text x="60" y="187" font-size="9" fill="#86efac" font-weight="600" letter-spacing="1">DOUBLE-COLON SHORTHAND</text>
  <text x="350" y="205" text-anchor="middle" font-size="13" font-family="'Courier New',monospace" fill="#86efac">2001:db8::1</text>
</svg>
