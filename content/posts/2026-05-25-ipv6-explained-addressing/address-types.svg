<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" width="700" height="220"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
  </defs>

  <rect width="700" height="220" fill="url(#bg)" rx="8"/>

  <!-- GUA -->
  <rect x="20" y="65" width="200" height="90" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="120" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#86efac">GUA — Global Unicast</text>
  <text x="120" y="133" text-anchor="middle" font-size="9" fill="#34d399" opacity="0.85">2000::/3 · public, ISP-assigned</text>

  <!-- ULA -->
  <rect x="250" y="65" width="200" height="90" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="350" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#86efac">ULA — Unique Local</text>
  <text x="350" y="133" text-anchor="middle" font-size="9" fill="#34d399" opacity="0.85">fd00::/8 · private, internal use</text>

  <!-- Link-Local -->
  <rect x="480" y="65" width="200" height="90" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="580" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#86efac">Link-Local</text>
  <text x="580" y="133" text-anchor="middle" font-size="9" fill="#34d399" opacity="0.85">fe80::/10 · link-only, automatic</text>
</svg>
