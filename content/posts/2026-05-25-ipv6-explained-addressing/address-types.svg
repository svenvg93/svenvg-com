<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" width="700" height="220"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <rect width="700" height="220" fill="#f8fafc" rx="12"/>
  <text x="350" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">IPv6 Unicast Address Types</text>

  <!-- GUA -->
  <rect x="30" y="36" width="200" height="160" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5" rx="8"/>
  <text x="130" y="60" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">GUA</text>
  <text x="130" y="77" text-anchor="middle" font-size="9" fill="#059669" letter-spacing="1">GLOBAL UNICAST</text>
  <rect x="50" y="88" width="160" height="22" fill="#dcfce7" stroke="#10b981" stroke-width="1" rx="3"/>
  <text x="130" y="103" text-anchor="middle" font-size="10" fill="#065f46" font-family="'Courier New',monospace">2000::/3</text>
  <text x="130" y="132" text-anchor="middle" font-size="10" fill="#15803d">Publicly routable</text>
  <text x="130" y="148" text-anchor="middle" font-size="10" fill="#15803d">Globally unique</text>
  <text x="130" y="164" text-anchor="middle" font-size="10" fill="#15803d">Internet-reachable</text>
  <text x="130" y="184" text-anchor="middle" font-size="9" fill="#64748b">assigned by ISP</text>

  <!-- ULA -->
  <rect x="250" y="36" width="200" height="160" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5" rx="8"/>
  <text x="350" y="60" text-anchor="middle" font-size="13" font-weight="700" fill="#713f12">ULA</text>
  <text x="350" y="77" text-anchor="middle" font-size="9" fill="#a16207" letter-spacing="1">UNIQUE LOCAL</text>
  <rect x="270" y="88" width="160" height="22" fill="#fef9c3" stroke="#ca8a04" stroke-width="1" rx="3"/>
  <text x="350" y="103" text-anchor="middle" font-size="10" fill="#713f12" font-family="'Courier New',monospace">fd00::/8</text>
  <text x="350" y="132" text-anchor="middle" font-size="10" fill="#92400e">Not internet-routed</text>
  <text x="350" y="148" text-anchor="middle" font-size="10" fill="#92400e">Site-local scope</text>
  <text x="350" y="164" text-anchor="middle" font-size="10" fill="#92400e">Stable internal use</text>
  <text x="350" y="184" text-anchor="middle" font-size="9" fill="#64748b">like RFC 1918 in IPv4</text>

  <!-- Link-Local -->
  <rect x="470" y="36" width="200" height="160" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" rx="8"/>
  <text x="570" y="60" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">LINK-LOCAL</text>
  <text x="570" y="77" text-anchor="middle" font-size="9" fill="#1d4ed8" letter-spacing="1">LINK SCOPE ONLY</text>
  <rect x="490" y="88" width="160" height="22" fill="#dbeafe" stroke="#3b82f6" stroke-width="1" rx="3"/>
  <text x="570" y="103" text-anchor="middle" font-size="10" fill="#1e3a8a" font-family="'Courier New',monospace">fe80::/10</text>
  <text x="570" y="132" text-anchor="middle" font-size="10" fill="#1d4ed8">Never forwarded</text>
  <text x="570" y="148" text-anchor="middle" font-size="10" fill="#1d4ed8">Auto-configured</text>
  <text x="570" y="164" text-anchor="middle" font-size="10" fill="#1d4ed8">Always present</text>
  <text x="570" y="184" text-anchor="middle" font-size="9" fill="#64748b">used by NDP and routing</text>
</svg>
