<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="hex-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e4030"/>
      <stop offset="100%" stop-color="#072a1e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="44%" r="36%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle hex grid -->
  <g stroke="#0a2016" stroke-width="1" fill="none" opacity="0.6">
    <polygon points="600,40 660,75 660,145 600,180 540,145 540,75"/>
    <polygon points="720,75 780,110 780,180 720,215 660,180 660,110"/>
    <polygon points="480,75 540,110 540,180 480,215 420,180 420,110"/>
    <polygon points="840,40 900,75 900,145 840,180 780,145 780,75"/>
    <polygon points="360,40 420,75 420,145 360,180 300,145 300,75"/>
    <polygon points="960,75 1020,110 1020,180 960,215 900,180 900,110"/>
    <polygon points="240,75 300,110 300,180 240,215 180,180 180,110"/>
  </g>

  <!-- Central hex r=130, cy=200 -->
  <!-- Outer: top(600,70) tr(713,135) br(713,265) bot(600,330) bl(487,265) tl(487,135) -->
  <polygon points="600,70 713,135 713,265 600,330 487,265 487,135"
           fill="url(#hex-fill)" stroke="#34d399" stroke-width="2.5"/>
  <polygon points="600,78 706,140 706,260 600,322 494,260 494,140"
           fill="none" stroke="#34d399" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- Address prefix -->
  <text x="600" y="178" text-anchor="middle" font-size="20" font-weight="700"
        fill="#86efac" letter-spacing="2" font-family="'Courier New',monospace">2001:db8:abcd::</text>

  <!-- /64 split divider -->
  <line x1="500" y1="200" x2="700" y2="200"
        stroke="#34d399" stroke-width="1.5" stroke-opacity="0.5" stroke-dasharray="5,4"/>
  <text x="600" y="196" text-anchor="middle" font-size="9"
        fill="#34d399" letter-spacing="3" opacity="0.8">/ 64</text>

  <!-- Interface ID -->
  <text x="600" y="228" text-anchor="middle" font-size="20" font-weight="700"
        fill="#34d399" letter-spacing="2" font-family="'Courier New',monospace">::1</text>

  <!-- 128 bits label -->
  <text x="600" y="270" text-anchor="middle" font-size="10"
        fill="#34d399" letter-spacing="6" opacity="0.6">128 BITS</text>

  <!-- Address type pills — outside hex, below -->
  <rect x="436" y="344" width="100" height="24" fill="#072a1e" stroke="#34d399" stroke-width="1" stroke-opacity="0.8" rx="4"/>
  <text x="486" y="361" text-anchor="middle" font-size="11" font-weight="600" fill="#86efac" letter-spacing="1">GUA</text>

  <rect x="550" y="344" width="100" height="24" fill="#072a1e" stroke="#34d399" stroke-width="1" stroke-opacity="0.5" rx="4"/>
  <text x="600" y="361" text-anchor="middle" font-size="11" font-weight="600" fill="#86efac" letter-spacing="1">ULA</text>

  <rect x="664" y="344" width="100" height="24" fill="#072a1e" stroke="#34d399" stroke-width="1" stroke-opacity="0.5" rx="4"/>
  <text x="714" y="361" text-anchor="middle" font-size="11" font-weight="600" fill="#86efac" letter-spacing="0">LINK-LOCAL</text>

  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>
  <text x="600" y="500" text-anchor="middle" font-size="13"
        fill="#34d399" letter-spacing="3" font-weight="600">IPv6 EXPLAINED</text>
  <text x="600" y="538" text-anchor="middle" font-size="34"
        font-weight="700" fill="#f1f5f9">Addressing</text>
</svg>
