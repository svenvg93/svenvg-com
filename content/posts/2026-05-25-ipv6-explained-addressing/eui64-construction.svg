<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 245" width="700" height="245"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
  </defs>

  <rect width="700" height="245" fill="url(#bg)" rx="8"/>

  <!-- Row 1: 48-bit MAC address -->
  <text x="350" y="24" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1">48-BIT MAC ADDRESS</text>

  <rect x="40" y="30" width="310" height="38" fill="none" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="195" y="44" text-anchor="middle" font-size="9" font-weight="600" fill="#93c5fd">OUI — 24 bits (vendor)</text>
  <text x="195" y="58" text-anchor="middle" font-size="11" font-family="'Courier New',monospace" fill="#93c5fd">aa : bb : cc</text>

  <rect x="350" y="30" width="310" height="38" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="505" y="44" text-anchor="middle" font-size="9" font-weight="600" fill="#86efac">NIC — 24 bits (device)</text>
  <text x="505" y="58" text-anchor="middle" font-size="11" font-family="'Courier New',monospace" fill="#86efac">dd : ee : ff</text>

  <!-- Transition 1 -->
  <text x="350" y="84" text-anchor="middle" font-size="9" fill="#94a3b8">&#x2193;  insert ff:fe between OUI and NIC</text>

  <!-- Row 2: 64-bit with ff:fe inserted -->
  <text x="350" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1">64 BITS — ff:fe INSERTED</text>

  <rect x="40" y="106" width="233" height="38" fill="none" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="156" y="120" text-anchor="middle" font-size="9" font-weight="600" fill="#93c5fd">OUI</text>
  <text x="156" y="134" text-anchor="middle" font-size="10" font-family="'Courier New',monospace" fill="#93c5fd">aa : bb : cc</text>

  <rect x="273" y="106" width="154" height="38" fill="none" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="350" y="120" text-anchor="middle" font-size="9" font-weight="700" fill="#fcd34d">INSERTED</text>
  <text x="350" y="134" text-anchor="middle" font-size="10" font-family="'Courier New',monospace" fill="#fcd34d">ff : fe</text>

  <rect x="427" y="106" width="233" height="38" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="543" y="120" text-anchor="middle" font-size="9" font-weight="600" fill="#86efac">NIC</text>
  <text x="543" y="134" text-anchor="middle" font-size="10" font-family="'Courier New',monospace" fill="#86efac">dd : ee : ff</text>

  <!-- Transition 2 -->
  <text x="350" y="160" text-anchor="middle" font-size="9" fill="#94a3b8">&#x2193;  flip bit 6 (U/L bit): 0xaa &#x2192; 0xa8, then group into 16-bit hextets</text>

  <!-- Row 3: 64-bit Interface Identifier -->
  <text x="350" y="188" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1">64-BIT INTERFACE IDENTIFIER</text>

  <rect x="40" y="196" width="155" height="34" fill="none" stroke="#8b5cf6" stroke-width="1.5" rx="5"/>
  <text x="117" y="218" text-anchor="middle" font-size="13" font-weight="700" font-family="'Courier New',monospace" fill="#c4b5fd">a8bb</text>

  <rect x="195" y="196" width="155" height="34" fill="none" stroke="#8b5cf6" stroke-width="1.5" rx="5"/>
  <text x="272" y="218" text-anchor="middle" font-size="13" font-weight="700" font-family="'Courier New',monospace" fill="#c4b5fd">ccff</text>

  <rect x="350" y="196" width="155" height="34" fill="none" stroke="#8b5cf6" stroke-width="1.5" rx="5"/>
  <text x="427" y="218" text-anchor="middle" font-size="13" font-weight="700" font-family="'Courier New',monospace" fill="#c4b5fd">fedd</text>

  <rect x="505" y="196" width="155" height="34" fill="none" stroke="#8b5cf6" stroke-width="1.5" rx="5"/>
  <text x="582" y="218" text-anchor="middle" font-size="13" font-weight="700" font-family="'Courier New',monospace" fill="#c4b5fd">eeff</text>
</svg>
