<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250" width="700" height="250"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="700" height="250" fill="url(#bg)" rx="8"/>

  <!-- ── Example A: no extension headers ── -->
  <text x="40" y="24" font-size="10" font-weight="600" fill="#64748b">A — no extension headers</text>

  <rect x="40" y="30" width="140" height="44" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="4"/>
  <text x="110" y="48" text-anchor="middle" font-size="10" font-weight="600" fill="#bae6fd">IPv6 Header</text>
  <text x="110" y="63" text-anchor="middle" font-size="9" fill="#38bdf8" font-family="'Courier New',monospace">Next Header: 6</text>

  <line x1="180" y1="52" x2="236" y2="52" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <rect x="237" y="30" width="100" height="44" fill="none" stroke="#34d399" stroke-width="1.5" rx="4"/>
  <text x="287" y="48" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">TCP</text>
  <text x="287" y="63" text-anchor="middle" font-size="9" fill="#34d399">upper layer</text>

  <line x1="40" y1="90" x2="660" y2="90" stroke="#1e293b" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ── Example B: one extension header ── -->
  <text x="40" y="106" font-size="10" font-weight="600" fill="#64748b">B — Fragment extension header (e.g. source-fragmented UDP)</text>

  <rect x="40" y="112" width="140" height="44" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="4"/>
  <text x="110" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#bae6fd">IPv6 Header</text>
  <text x="110" y="145" text-anchor="middle" font-size="9" fill="#38bdf8" font-family="'Courier New',monospace">Next Header: 44</text>

  <line x1="180" y1="134" x2="236" y2="134" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <rect x="237" y="112" width="148" height="44" fill="none" stroke="#f59e0b" stroke-width="1.5" rx="4"/>
  <text x="311" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#fcd34d">Fragment Header</text>
  <text x="311" y="145" text-anchor="middle" font-size="9" fill="#f59e0b" font-family="'Courier New',monospace">Next Header: 17</text>

  <line x1="385" y1="134" x2="441" y2="134" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <rect x="442" y="112" width="100" height="44" fill="none" stroke="#34d399" stroke-width="1.5" rx="4"/>
  <text x="492" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">UDP</text>
  <text x="492" y="145" text-anchor="middle" font-size="9" fill="#34d399">upper layer</text>

  <line x1="40" y1="172" x2="660" y2="172" stroke="#1e293b" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ── Example C: ESP (IPsec) ── -->
  <text x="40" y="188" font-size="10" font-weight="600" fill="#64748b">C — ESP extension header (IPsec encrypted tunnel)</text>

  <rect x="40" y="194" width="140" height="44" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="4"/>
  <text x="110" y="212" text-anchor="middle" font-size="10" font-weight="600" fill="#bae6fd">IPv6 Header</text>
  <text x="110" y="227" text-anchor="middle" font-size="9" fill="#38bdf8" font-family="'Courier New',monospace">Next Header: 50</text>

  <line x1="180" y1="216" x2="236" y2="216" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <rect x="237" y="194" width="130" height="44" fill="none" stroke="#8b5cf6" stroke-width="1.5" rx="4"/>
  <text x="302" y="212" text-anchor="middle" font-size="10" font-weight="600" fill="#c4b5fd">ESP Header</text>
  <text x="302" y="227" text-anchor="middle" font-size="9" fill="#8b5cf6">encrypted payload</text>
</svg>
