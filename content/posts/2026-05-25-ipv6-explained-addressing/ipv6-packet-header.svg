<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" width="700" height="200"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
  </defs>

  <rect width="700" height="200" fill="url(#bg)" rx="8"/>

  <!-- bit ruler labels -->
  <text x="40"  y="20" font-size="8" fill="#475569">0</text>
  <text x="111" y="20" font-size="8" fill="#475569">4</text>
  <text x="263" y="20" font-size="8" fill="#475569">12</text>
  <text x="651" y="20" font-size="8" fill="#475569">31</text>

  <!-- Row 1: Version(4b) | Traffic Class(8b) | Flow Label(20b) -->
  <rect x="40" y="26" width="77" height="36" fill="none" stroke="#4f46e5" stroke-width="1.5" rx="2"/>
  <text x="78"  y="40" text-anchor="middle" font-size="10" font-weight="600" fill="#a5b4fc">Ver</text>
  <text x="78"  y="54" text-anchor="middle" font-size="8" fill="#6366f1">4 b</text>

  <rect x="117" y="26" width="155" height="36" fill="none" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="194" y="40" text-anchor="middle" font-size="10" font-weight="600" fill="#93c5fd">Traffic Class</text>
  <text x="194" y="54" text-anchor="middle" font-size="8" fill="#3b82f6">8 b · DSCP + ECN</text>

  <rect x="272" y="26" width="388" height="36" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="2"/>
  <text x="466" y="40" text-anchor="middle" font-size="10" font-weight="600" fill="#bae6fd">Flow Label</text>
  <text x="466" y="54" text-anchor="middle" font-size="8" fill="#38bdf8">20 b · ECMP path selection</text>

  <text x="662" y="40" font-size="8" fill="#475569" text-anchor="start">4 B</text>

  <!-- Row 2: Payload Length(16b) | Next Header(8b) | Hop Limit(8b) -->
  <rect x="40" y="66" width="310" height="36" fill="none" stroke="#f59e0b" stroke-width="1.5" rx="2"/>
  <text x="195" y="80" text-anchor="middle" font-size="10" font-weight="600" fill="#fcd34d">Payload Length</text>
  <text x="195" y="94" text-anchor="middle" font-size="8" fill="#f59e0b">16 b · bytes after this header</text>

  <rect x="350" y="66" width="155" height="36" fill="none" stroke="#34d399" stroke-width="1.5" rx="2"/>
  <text x="427" y="80" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">Next Header</text>
  <text x="427" y="94" text-anchor="middle" font-size="8" fill="#34d399">8 b · 6=TCP 17=UDP 58=ICMPv6</text>

  <rect x="505" y="66" width="155" height="36" fill="none" stroke="#f97316" stroke-width="1.5" rx="2"/>
  <text x="582" y="80" text-anchor="middle" font-size="10" font-weight="600" fill="#fed7aa">Hop Limit</text>
  <text x="582" y="94" text-anchor="middle" font-size="8" fill="#f97316">8 b · equiv. to IPv4 TTL</text>

  <text x="662" y="80" font-size="8" fill="#475569" text-anchor="start">4 B</text>

  <!-- Row 3: Source Address (128b) -->
  <rect x="40" y="106" width="620" height="36" fill="none" stroke="#8b5cf6" stroke-width="1.5" rx="2"/>
  <text x="350" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#c4b5fd">Source Address</text>
  <text x="350" y="134" text-anchor="middle" font-size="8" fill="#8b5cf6">128 b</text>

  <text x="662" y="120" font-size="8" fill="#475569" text-anchor="start">16 B</text>

  <!-- Row 4: Destination Address (128b) -->
  <rect x="40" y="146" width="620" height="36" fill="none" stroke="#8b5cf6" stroke-width="1.5" rx="2"/>
  <text x="350" y="160" text-anchor="middle" font-size="10" font-weight="600" fill="#c4b5fd">Destination Address</text>
  <text x="350" y="174" text-anchor="middle" font-size="8" fill="#8b5cf6">128 b</text>

  <text x="662" y="160" font-size="8" fill="#475569" text-anchor="start">16 B</text>
</svg>
