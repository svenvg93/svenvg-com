<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>

    <!-- Text overlay gradient -->
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>

    <!-- ONT box fill (green) -->
    <linearGradient id="ont-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#071810"/>
      <stop offset="100%" stop-color="#040f08"/>
    </linearGradient>

    <!-- OLT hex fill (blue) -->
    <linearGradient id="olt-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1a3a"/>
      <stop offset="100%" stop-color="#071428"/>
    </linearGradient>

    <!-- ISP globe fill (red) -->
    <radialGradient id="isp-fill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0808"/>
      <stop offset="100%" stop-color="#0d0404"/>
    </radialGradient>

    <!-- Zone glows -->
    <radialGradient id="glow-green" cx="18%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-red" cx="82%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>

    <!-- PLOAM arrows: ONT → OLT and OLT → ISP -->
    <linearGradient id="arr-ont-olt" x1="290" y1="210" x2="520" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="arr-olt-isp" x1="690" y1="210" x2="920" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>

    <!-- Arrow markers -->
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Zone glows -->
  <rect width="1200" height="630" fill="url(#glow-green)"/>
  <rect width="1200" height="630" fill="url(#glow-blue)"/>
  <rect width="1200" height="630" fill="url(#glow-red)"/>

  <!-- Subtle dot grid -->
  <g fill="#0f1f44" opacity="0.5">
    <circle cx="200" cy="80" r="1.5"/><circle cx="400" cy="80" r="1.5"/><circle cx="600" cy="80" r="1.5"/>
    <circle cx="800" cy="80" r="1.5"/><circle cx="1000" cy="80" r="1.5"/>
    <circle cx="100" cy="160" r="1.5"/><circle cx="300" cy="160" r="1.5"/><circle cx="500" cy="160" r="1.5"/>
    <circle cx="700" cy="160" r="1.5"/><circle cx="900" cy="160" r="1.5"/><circle cx="1100" cy="160" r="1.5"/>
    <circle cx="200" cy="240" r="1.5"/><circle cx="400" cy="240" r="1.5"/><circle cx="800" cy="240" r="1.5"/>
    <circle cx="1000" cy="240" r="1.5"/>
    <circle cx="100" cy="320" r="1.5"/><circle cx="300" cy="320" r="1.5"/><circle cx="900" cy="320" r="1.5"/>
    <circle cx="1100" cy="320" r="1.5"/>
  </g>

  <!-- ── LEFT ZONE: ONT (green) ── -->
  <!-- ONT box -->
  <rect x="108" y="170" width="168" height="80" fill="url(#ont-fill)" stroke="#166534" stroke-width="2" rx="6"/>
  <text x="192" y="204" text-anchor="middle" font-size="18" font-weight="700" fill="#86efac">ONT</text>
  <text x="192" y="222" text-anchor="middle" font-size="10" fill="#4ade80" letter-spacing="1">Subscriber Home</text>
  <text x="192" y="238" text-anchor="middle" font-size="9" fill="#166534">serial · LOID · AES key</text>
  <!-- Badge -->
  <rect x="120" y="267" width="144" height="22" fill="#040f08" stroke="#166534" stroke-width="1" rx="3"/>
  <text x="192" y="282" text-anchor="middle" font-size="10" fill="#34d399" letter-spacing="1">GEM · T-CONT · DBA</text>

  <!-- ── Arrow: ONT → OLT (PLOAM + data) ── -->
  <line x1="278" y1="204" x2="518" y2="204"
        stroke="url(#arr-ont-olt)" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr-blue)"/>
  <text x="398" y="196" text-anchor="middle" font-size="9" fill="#34d399" letter-spacing="1">PLOAM registration</text>
  <text x="398" y="220" text-anchor="middle" font-size="9" fill="#1e3a5f" letter-spacing="1">upstream grants · SR</text>

  <!-- ── CENTER ZONE: OLT Hexagon (blue) ── -->
  <!-- r=82 at (600,210) pointy-top -->
  <polygon points="600,128 671,169 671,251 600,292 529,251 529,169"
           fill="url(#olt-fill)" stroke="#38bdf8" stroke-width="2.5"/>
  <polygon points="600,136 663,174 663,246 600,284 537,246 537,174"
           fill="none" stroke="#38bdf8" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="600" y="196" text-anchor="middle" font-size="13" font-weight="700" fill="#bae6fd" letter-spacing="2">OLT</text>
  <text x="600" y="214" text-anchor="middle" font-size="10" fill="#38bdf8" letter-spacing="1" opacity="0.8">TDMA scheduler</text>
  <text x="600" y="232" text-anchor="middle" font-size="10" fill="#7dd3fc" opacity="0.6">DBA engine</text>
  <!-- Badge -->
  <rect x="520" y="305" width="160" height="22" fill="#071428" stroke="#1e3a5f" stroke-width="1" rx="3"/>
  <text x="600" y="320" text-anchor="middle" font-size="10" fill="#38bdf8" letter-spacing="1">grants bandwidth · keys ONTs</text>

  <!-- ── Arrow: OLT → ISP (aggregated traffic) ── -->
  <line x1="682" y1="204" x2="922" y2="204"
        stroke="url(#arr-olt-isp)" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="802" y="196" text-anchor="middle" font-size="9" fill="#38bdf8" letter-spacing="1">aggregated upstream</text>
  <text x="802" y="220" text-anchor="middle" font-size="9" fill="#7f1d1d" letter-spacing="1">downstream broadcast</text>

  <!-- ── RIGHT ZONE: ISP Globe (red) ── -->
  <circle cx="1008" cy="210" r="74" fill="url(#isp-fill)" stroke="#7f1d1d" stroke-width="1.5"/>
  <ellipse cx="1008" cy="210" rx="37" ry="74" fill="none" stroke="#7f1d1d" stroke-width="1"/>
  <line x1="934" y1="210" x2="1082" y2="210" stroke="#7f1d1d" stroke-width="1"/>
  <line x1="940" y1="173" x2="1076" y2="173" stroke="#7f1d1d" stroke-width="1" opacity="0.4"/>
  <line x1="940" y1="247" x2="1076" y2="247" stroke="#7f1d1d" stroke-width="1" opacity="0.4"/>
  <text x="1008" y="204" text-anchor="middle" font-size="16" fill="#f87171" font-weight="700">ISP</text>
  <text x="1008" y="222" text-anchor="middle" font-size="10" fill="#fca5a5" letter-spacing="1" opacity="0.8">Central Office</text>
  <!-- Badge -->
  <rect x="948" y="299" width="120" height="22" fill="#150808" stroke="#7f1d1d" stroke-width="1" rx="3"/>
  <text x="1008" y="314" text-anchor="middle" font-size="10" fill="#f87171" letter-spacing="1">XGS-PON OLT Port</text>

  <!-- Text overlay -->
  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>

  <!-- Series label -->
  <text x="600" y="500" text-anchor="middle" font-size="13"
        font-weight="600" fill="#38bdf8" letter-spacing="3">XGS-PON EXPLAINED</text>
  <!-- Post title -->
  <text x="600" y="538" text-anchor="middle" font-size="34"
        font-weight="700" fill="#f1f5f9">Traffic and Protocol</text>
</svg>
