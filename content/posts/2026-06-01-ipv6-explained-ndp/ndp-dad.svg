<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 285" width="700" height="285"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">

  <rect width="700" height="285" fill="#f8fafc" rx="12"/>
  <text x="350" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Duplicate Address Detection (DAD)</text>

  <!-- DEVICE box -->
  <rect x="220" y="34" width="260" height="44" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5" rx="6"/>
  <text x="350" y="52" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">DEVICE</text>
  <text x="350" y="69" text-anchor="middle" font-size="9" fill="#7c3aed" font-family="'Courier New',monospace">candidate address: 2001:db8::a1</text>

  <!-- NS step -->
  <text x="350" y="92" text-anchor="middle" font-size="9" fill="#94a3b8">NS to ff02::1:ff00:00a1 · source = ::</text>
  <text x="350" y="109" text-anchor="middle" font-size="16" fill="#cbd5e1">↓</text>

  <!-- Solicited-node box -->
  <rect x="188" y="116" width="324" height="36" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" rx="5"/>
  <text x="350" y="131" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">solicited-node multicast</text>
  <text x="350" y="144" text-anchor="middle" font-size="8" fill="#b45309" font-family="'Courier New',monospace">ff02::1:ff00:00a1  (last 24 bits of candidate)</text>

  <!-- Wait -->
  <text x="350" y="164" text-anchor="middle" font-size="9" fill="#94a3b8">wait ~1 second</text>

  <!-- Fork horizontal line -->
  <line x1="175" y1="172" x2="525" y2="172" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Left branch: green ↓ + label -->
  <text x="175" y="172" text-anchor="middle" font-size="16" fill="#4ade80">↓</text>
  <text x="175" y="190" text-anchor="middle" font-size="9" font-weight="600" fill="#059669">no reply received</text>

  <!-- Right branch: red ↓ + label -->
  <text x="525" y="172" text-anchor="middle" font-size="16" fill="#fca5a5">↓</text>
  <text x="525" y="190" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">NA reply received</text>

  <!-- Success outcome -->
  <rect x="40" y="196" width="270" height="56" fill="#f0fdf4" stroke="#4ade80" stroke-width="2" rx="6"/>
  <text x="175" y="216" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">✓  Address is unique</text>
  <text x="175" y="231" text-anchor="middle" font-size="9" fill="#15803d">2001:db8::a1 assigned</text>
  <text x="175" y="244" text-anchor="middle" font-size="9" fill="#15803d">device begins using it</text>

  <!-- Failure outcome -->
  <rect x="390" y="196" width="270" height="56" fill="#fef2f2" stroke="#fca5a5" stroke-width="2" rx="6"/>
  <text x="525" y="216" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">✗  DAD failure</text>
  <text x="525" y="231" text-anchor="middle" font-size="9" fill="#dc2626">another device already has this address</text>
  <text x="525" y="244" text-anchor="middle" font-size="9" fill="#dc2626">address NOT assigned — try another</text>

  <!-- Footer -->
  <text x="350" y="267" text-anchor="middle" font-size="9" fill="#94a3b8">DAD runs for every new address — link-local, SLAAC-generated, DHCPv6-assigned, and manual</text>
  <text x="350" y="280" text-anchor="middle" font-size="9" fill="#94a3b8">The brief delay after interface up is DAD completing on the link-local address</text>
</svg>
