<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250" width="700" height="250"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="700" height="250" fill="url(#bg)" rx="8"/>

  <!-- Client (blue: device initiating) -->
  <rect x="30" y="20" width="150" height="42" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="105" y="46" text-anchor="middle" font-size="13" font-weight="700" fill="#bae6fd">Client</text>

  <!-- DHCPv6 Server (green: trusted responder) -->
  <rect x="520" y="20" width="150" height="42" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="595" y="46" text-anchor="middle" font-size="13" font-weight="700" fill="#86efac">DHCPv6 Server</text>

  <!-- Lifelines -->
  <line x1="105" y1="62" x2="105" y2="232" stroke="#334155" stroke-width="1.5"/>
  <line x1="595" y1="62" x2="595" y2="232" stroke="#334155" stroke-width="1.5"/>

  <!-- Solicit: client to server -->
  <line x1="109" y1="100" x2="591" y2="100" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="350" y="93" text-anchor="middle" font-size="10" font-weight="600" fill="#bae6fd">Solicit</text>
  <text x="350" y="113" text-anchor="middle" font-size="9" fill="#94a3b8">ff02::1:2 — requesting an address (IA_NA)</text>

  <!-- Advertise: server to client -->
  <line x1="591" y1="140" x2="109" y2="140" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="350" y="133" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">Advertise</text>
  <text x="350" y="153" text-anchor="middle" font-size="9" fill="#94a3b8">offers 2001:db8::a3f · T1/T2 lease</text>

  <!-- Request: client to server -->
  <line x1="109" y1="180" x2="591" y2="180" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="350" y="173" text-anchor="middle" font-size="10" font-weight="600" fill="#bae6fd">Request</text>
  <text x="350" y="193" text-anchor="middle" font-size="9" fill="#94a3b8">confirming 2001:db8::a3f</text>

  <!-- Reply: server to client -->
  <line x1="591" y1="220" x2="109" y2="220" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="350" y="213" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">Reply</text>
  <text x="350" y="233" text-anchor="middle" font-size="9" fill="#94a3b8">confirmed · DNS servers · lease granted</text>
</svg>
