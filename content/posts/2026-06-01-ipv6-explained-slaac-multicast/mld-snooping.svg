<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="700" height="350"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#ef4444"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="700" height="350" fill="url(#bg)" rx="8"/>

  <!-- Divider between the two scenarios -->
  <line x1="350" y1="20" x2="350" y2="290" stroke="#1e293b" stroke-width="1"/>

  <!-- ── LEFT: Without MLD Snooping ── -->
  <text x="175" y="38" text-anchor="middle" font-size="12" font-weight="700" fill="#ef4444">Without MLD Snooping</text>
  <text x="175" y="53" text-anchor="middle" font-size="9" fill="#64748b">multicast flooded to every port</text>

  <rect x="130" y="64" width="90" height="38" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="175" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#bae6fd">Switch</text>

  <line x1="90" y1="102" x2="90" y2="136" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>
  <line x1="175" y1="102" x2="175" y2="136" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>
  <line x1="260" y1="102" x2="260" y2="136" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>

  <rect x="50" y="140" width="70" height="36" fill="none" stroke="#64748b" stroke-width="1.5" rx="4"/>
  <text x="85" y="155" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8">Host A</text>
  <text x="85" y="169" text-anchor="middle" font-size="8" fill="#64748b">not subscribed</text>

  <rect x="135" y="140" width="80" height="36" fill="none" stroke="#34d399" stroke-width="1.5" rx="4"/>
  <text x="175" y="155" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">Host B</text>
  <text x="175" y="169" text-anchor="middle" font-size="8" fill="#34d399">subscribed</text>

  <rect x="220" y="140" width="70" height="36" fill="none" stroke="#64748b" stroke-width="1.5" rx="4"/>
  <text x="255" y="155" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8">Host C</text>
  <text x="255" y="169" text-anchor="middle" font-size="8" fill="#64748b">not subscribed</text>

  <!-- ── RIGHT: With MLD Snooping ── -->
  <text x="525" y="38" text-anchor="middle" font-size="12" font-weight="700" fill="#34d399">With MLD Snooping</text>
  <text x="525" y="53" text-anchor="middle" font-size="9" fill="#64748b">only subscribed ports receive it</text>

  <rect x="480" y="64" width="90" height="38" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="525" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#bae6fd">Switch</text>

  <line x1="440" y1="102" x2="440" y2="136" stroke="#334155" stroke-width="1.5"/>
  <line x1="525" y1="102" x2="525" y2="136" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="610" y1="102" x2="610" y2="136" stroke="#334155" stroke-width="1.5"/>

  <rect x="400" y="140" width="70" height="36" fill="none" stroke="#64748b" stroke-width="1.5" rx="4"/>
  <text x="435" y="155" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8">Host A</text>
  <text x="435" y="169" text-anchor="middle" font-size="8" fill="#64748b">not subscribed</text>

  <rect x="485" y="140" width="80" height="36" fill="none" stroke="#34d399" stroke-width="1.5" rx="4"/>
  <text x="525" y="155" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">Host B</text>
  <text x="525" y="169" text-anchor="middle" font-size="8" fill="#34d399">subscribed</text>

  <rect x="570" y="140" width="70" height="36" fill="none" stroke="#64748b" stroke-width="1.5" rx="4"/>
  <text x="605" y="155" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8">Host C</text>
  <text x="605" y="169" text-anchor="middle" font-size="8" fill="#64748b">not subscribed</text>

  <!-- Legend / table — plain text, not part of the diagram flow -->
  <rect x="40" y="300" width="620" height="40" fill="none" stroke="#334155" stroke-width="1" rx="4"/>
  <text x="350" y="316" text-anchor="middle" font-size="9" font-weight="600" fill="#86efac">MLD Snooping Table:  ff02::1:ff48:1234 → port 2 (Host B)</text>
  <text x="350" y="331" text-anchor="middle" font-size="8" fill="#94a3b8">Solicited-node multicast (ff02::1:ff00:0/104) must always be forwarded, or NDP resolution breaks</text>
</svg>
