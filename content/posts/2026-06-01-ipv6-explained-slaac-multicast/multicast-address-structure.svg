<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 310" width="700" height="310"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
  </defs>

  <rect width="700" height="310" fill="url(#bg)" rx="8"/>

  <!-- Field layout — flags/scope given minimum readable width, not strictly proportional -->
  <!-- ff(8b)=60px | flags(4b)=70px | scope(4b)=70px | group ID(112b)=420px = 620px total -->

  <rect x="40" y="36" width="60" height="44" fill="none" stroke="#34d399" stroke-width="1.5" rx="2"/>
  <text x="70" y="55" text-anchor="middle" font-size="12" font-weight="700" fill="#86efac">ff</text>
  <text x="70" y="71" text-anchor="middle" font-size="8" fill="#34d399">8 b</text>

  <rect x="100" y="36" width="70" height="44" fill="none" stroke="#34d399" stroke-width="1.5" rx="2"/>
  <text x="135" y="55" text-anchor="middle" font-size="10" font-weight="700" fill="#86efac">Flags</text>
  <text x="135" y="71" text-anchor="middle" font-size="8" fill="#34d399">4 b</text>

  <rect x="170" y="36" width="70" height="44" fill="none" stroke="#34d399" stroke-width="1.5" rx="2"/>
  <text x="205" y="55" text-anchor="middle" font-size="10" font-weight="700" fill="#86efac">Scope</text>
  <text x="205" y="71" text-anchor="middle" font-size="8" fill="#34d399">4 b</text>

  <rect x="240" y="36" width="420" height="44" fill="none" stroke="#34d399" stroke-width="1.5" rx="2"/>
  <text x="450" y="55" text-anchor="middle" font-size="12" font-weight="700" fill="#86efac">Group ID</text>
  <text x="450" y="71" text-anchor="middle" font-size="8" fill="#34d399">112 b — identifies the multicast group</text>

  <!-- Flags detail -->
  <rect x="40" y="96" width="290" height="90" fill="none" stroke="#34d399" stroke-width="1" rx="4"/>
  <text x="185" y="113" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">Flags (4 bits)</text>
  <text x="52" y="130" font-size="9" fill="#94a3b8">bit 0</text>
  <text x="90" y="130" font-size="9" fill="#64748b">reserved (0)</text>
  <text x="52" y="146" font-size="9" fill="#34d399">R</text>
  <text x="90" y="146" font-size="9" fill="#94a3b8">Rendezvous Point embedded</text>
  <text x="52" y="162" font-size="9" fill="#34d399">P</text>
  <text x="90" y="162" font-size="9" fill="#94a3b8">Prefix-based address</text>
  <text x="52" y="178" font-size="9" fill="#34d399">T</text>
  <text x="90" y="178" font-size="9" fill="#94a3b8">Transient (1) / permanent (0)</text>

  <!-- Scope detail -->
  <rect x="370" y="96" width="290" height="90" fill="none" stroke="#34d399" stroke-width="1" rx="4"/>
  <text x="515" y="113" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">Scope (4 bits)</text>
  <text x="382" y="130" font-size="9" fill="#34d399" font-family="'Courier New',monospace">1</text>
  <text x="400" y="130" font-size="9" fill="#94a3b8">Interface-local (loopback)</text>
  <text x="382" y="146" font-size="9" fill="#34d399" font-family="'Courier New',monospace">2</text>
  <text x="400" y="146" font-size="9" fill="#94a3b8">Link-local (never routed)</text>
  <text x="382" y="162" font-size="9" fill="#34d399" font-family="'Courier New',monospace">5</text>
  <text x="400" y="162" font-size="9" fill="#94a3b8">Site-local</text>
  <text x="382" y="178" font-size="9" fill="#34d399" font-family="'Courier New',monospace">e</text>
  <text x="400" y="178" font-size="9" fill="#94a3b8">Global</text>

  <!-- Examples -->
  <rect x="40" y="196" width="620" height="90" fill="none" stroke="#334155" stroke-width="1.5" rx="4"/>
  <text x="350" y="213" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8">Examples</text>

  <text x="52" y="230" font-size="9" fill="#34d399" font-family="'Courier New',monospace">ff02::1</text>
  <text x="160" y="230" font-size="9" fill="#94a3b8">all nodes, link-local — scope=2, T=0, group=1</text>

  <text x="52" y="246" font-size="9" fill="#34d399" font-family="'Courier New',monospace">ff02::2</text>
  <text x="160" y="246" font-size="9" fill="#94a3b8">all routers, link-local</text>

  <text x="52" y="262" font-size="9" fill="#34d399" font-family="'Courier New',monospace">ff02::1:ff48:1234</text>
  <text x="210" y="262" font-size="9" fill="#94a3b8">solicited-node multicast — last 24 bits of unicast addr</text>

  <text x="52" y="278" font-size="9" fill="#34d399" font-family="'Courier New',monospace">ff3e::1:2</text>
  <text x="160" y="278" font-size="9" fill="#94a3b8">SSM address — scope=e (global), P=1, R=1</text>
</svg>
