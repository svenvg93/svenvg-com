<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" width="700" height="260"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#64748b"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="700" height="260" fill="url(#bg)" rx="8"/>

  <!-- Device (blue: subject performing DAD) -->
  <rect x="270" y="24" width="160" height="44" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="350" y="46" text-anchor="middle" font-size="12" font-weight="700" fill="#bae6fd">Device</text>
  <text x="350" y="61" text-anchor="middle" font-size="9" fill="#38bdf8" font-family="'Courier New',monospace">candidate 2001:db8::a1</text>

  <line x1="350" y1="68" x2="350" y2="94" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-gray)"/>
  <text x="350" y="86" text-anchor="middle" font-size="9" fill="#94a3b8">NS · source = ::</text>

  <!-- Solicited-node multicast (neutral network hop) -->
  <rect x="190" y="96" width="320" height="34" fill="none" stroke="#64748b" stroke-width="1.5" rx="5"/>
  <text x="350" y="113" text-anchor="middle" font-size="10" font-weight="600" fill="#cbd5e1">Solicited-node multicast</text>
  <text x="350" y="125" text-anchor="middle" font-size="8" fill="#94a3b8">ff02::1:ff00:00a1 — last 24 bits of candidate</text>

  <text x="350" y="143" text-anchor="middle" font-size="9" fill="#94a3b8">wait ~1 second</text>

  <!-- Fork -->
  <line x1="175" y1="150" x2="525" y2="150" stroke="#334155" stroke-width="1.5"/>
  <circle cx="175" cy="150" r="3" fill="#34d399"/>
  <circle cx="525" cy="150" r="3" fill="#ef4444"/>
  <line x1="175" y1="153" x2="175" y2="178" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="525" y1="153" x2="525" y2="178" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="100" y="167" text-anchor="end" font-size="9" font-weight="600" fill="#34d399">no reply</text>
  <text x="600" y="167" text-anchor="start" font-size="9" font-weight="600" fill="#ef4444">NA reply received</text>

  <!-- Outcomes -->
  <rect x="40" y="182" width="270" height="56" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="175" y="205" text-anchor="middle" font-size="12" font-weight="700" fill="#86efac">Address is unique</text>
  <text x="175" y="222" text-anchor="middle" font-size="9" fill="#34d399">2001:db8::a1 assigned, DAD complete</text>

  <rect x="390" y="182" width="270" height="56" fill="none" stroke="#ef4444" stroke-width="1.5" rx="5"/>
  <text x="525" y="205" text-anchor="middle" font-size="12" font-weight="700" fill="#fca5a5">Duplicate detected</text>
  <text x="525" y="222" text-anchor="middle" font-size="9" fill="#ef4444">another device already holds this address</text>
</svg>
