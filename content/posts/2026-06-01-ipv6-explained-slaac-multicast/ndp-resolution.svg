<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 240" width="700" height="240"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#64748b"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="700" height="240" fill="url(#bg)" rx="8"/>

  <!-- Device A (blue: sender) -->
  <rect x="30" y="30" width="140" height="44" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="100" y="51" text-anchor="middle" font-size="12" font-weight="700" fill="#bae6fd">Device A</text>
  <text x="100" y="66" text-anchor="middle" font-size="9" fill="#38bdf8" font-family="'Courier New',monospace">2001:db8::1</text>

  <!-- Solicited-node multicast (neutral network hop) -->
  <rect x="250" y="30" width="200" height="44" fill="none" stroke="#64748b" stroke-width="1.5" rx="5"/>
  <text x="350" y="49" text-anchor="middle" font-size="9" font-weight="600" fill="#cbd5e1">Solicited-node multicast</text>
  <text x="350" y="64" text-anchor="middle" font-size="8" fill="#94a3b8" font-family="'Courier New',monospace">ff02::1:ff00:0002</text>

  <!-- Device B (green: target/responder) -->
  <rect x="530" y="30" width="140" height="44" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="600" y="51" text-anchor="middle" font-size="12" font-weight="700" fill="#86efac">Device B</text>
  <text x="600" y="66" text-anchor="middle" font-size="9" fill="#34d399" font-family="'Courier New',monospace">2001:db8::2</text>

  <!-- A -> multicast -->
  <line x1="170" y1="52" x2="246" y2="52" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="208" y="45" text-anchor="middle" font-size="9" fill="#bae6fd">NS · who has ::2?</text>

  <!-- multicast -> B -->
  <line x1="450" y1="52" x2="526" y2="52" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-gray)"/>
  <text x="488" y="45" text-anchor="middle" font-size="9" fill="#94a3b8">multicast</text>

  <!-- NA: B -> A (unicast reply) -->
  <line x1="530" y1="110" x2="174" y2="110" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="350" y="103" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">NA — Neighbor Advertisement (unicast)</text>
  <text x="350" y="124" text-anchor="middle" font-size="9" fill="#94a3b8">I am ::2 · my MAC is aa:bb:cc:dd:ee:ff</text>

  <!-- Neighbor cache result -->
  <rect x="30" y="150" width="260" height="48" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="160" y="169" text-anchor="middle" font-size="10" font-weight="600" fill="#bae6fd">Neighbor Cache (Device A)</text>
  <text x="160" y="186" text-anchor="middle" font-size="9" fill="#38bdf8" font-family="'Courier New',monospace">2001:db8::2 → aa:bb:cc:dd:ee:ff</text>

  <text x="510" y="169" text-anchor="middle" font-size="10" fill="#94a3b8">Device A can now send frames</text>
  <text x="510" y="185" text-anchor="middle" font-size="10" fill="#94a3b8">directly to Device B's MAC</text>
</svg>
