<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" width="700" height="260"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-em" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="700" height="260" fill="url(#bg)" rx="8"/>

  <!-- Participants -->
  <rect x="60" y="14" width="140" height="32" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="130" y="35" text-anchor="middle" font-size="13" font-weight="700" fill="#86efac">Device</text>

  <rect x="500" y="14" width="140" height="32" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="570" y="35" text-anchor="middle" font-size="13" font-weight="700" fill="#86efac">Router</text>

  <!-- Lifelines -->
  <line x1="130" y1="46" x2="130" y2="246" stroke="#334155" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="570" y1="46" x2="570" y2="246" stroke="#334155" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Step 1: Router Solicitation (RS) — device to router -->
  <text x="350" y="68" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">Router Solicitation (RS)</text>
  <line x1="130" y1="78" x2="562" y2="78" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-em)"/>
  <text x="350" y="92" text-anchor="middle" font-size="9" fill="#34d399" opacity="0.85">ff02::2 — who is my router?</text>

  <!-- Step 2: Router Advertisement (RA) — router to device -->
  <text x="350" y="110" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">Router Advertisement (RA)</text>
  <line x1="570" y1="120" x2="138" y2="120" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-em)"/>
  <text x="350" y="134" text-anchor="middle" font-size="9" fill="#34d399" opacity="0.85">prefix 2001:db8::/64 · gateway fe80::1</text>

  <!-- Step 3: local address construction -->
  <rect x="45" y="150" width="170" height="34" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="130" y="164" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">construct address</text>
  <text x="130" y="177" text-anchor="middle" font-size="8" fill="#34d399" opacity="0.85" font-family="'Courier New',monospace">prefix + random IID</text>

  <!-- Step 4: DAD — device to solicited-node multicast -->
  <text x="350" y="196" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">DAD — Duplicate Address Detection</text>
  <line x1="130" y1="206" x2="562" y2="206" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-em)"/>
  <text x="350" y="220" text-anchor="middle" font-size="9" fill="#34d399" opacity="0.85">NS to solicited-node multicast — confirm uniqueness</text>
</svg>
