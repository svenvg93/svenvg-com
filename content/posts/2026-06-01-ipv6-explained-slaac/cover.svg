<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="hex-fill-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e4030"/>
      <stop offset="100%" stop-color="#072a1e"/>
    </linearGradient>
    <linearGradient id="hex-fill-center" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a2a20"/>
      <stop offset="100%" stop-color="#061810"/>
    </linearGradient>
    <linearGradient id="hex-fill-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e2040"/>
      <stop offset="100%" stop-color="#071428"/>
    </linearGradient>
    <radialGradient id="glow-left" cx="16%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-center" cx="50%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-right" cx="82%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <!-- RA: Router → NDP (blue → green) -->
    <linearGradient id="arr-ra-l" x1="281" y1="203" x2="529" y2="203" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <!-- RS: NDP → Router (green → blue) -->
    <linearGradient id="arr-rs-l" x1="529" y1="227" x2="281" y2="227" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-left)"/>
  <rect width="1200" height="630" fill="url(#glow-center)"/>
  <rect width="1200" height="630" fill="url(#glow-right)"/>

  <!-- Left hex: ROUTER (blue, cx=220 cy=215 r=70) -->
  <polygon points="220,145 281,180 281,250 220,285 159,250 159,180"
           fill="url(#hex-fill-blue)" stroke="#38bdf8" stroke-width="2.5"/>
  <polygon points="220,153 274,184 274,246 220,277 166,246 166,184"
           fill="none" stroke="#38bdf8" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="220" y="210" text-anchor="middle" font-size="13" font-weight="700" fill="#bae6fd">ROUTER</text>
  <text x="220" y="228" text-anchor="middle" font-size="9" fill="#38bdf8" letter-spacing="2" opacity="0.8">RA SENDER</text>

  <!-- Center hex: NDP (emerald, cx=600 cy=215 r=82) -->
  <polygon points="600,133 671,174 671,256 600,297 529,256 529,174"
           fill="url(#hex-fill-center)" stroke="#34d399" stroke-width="2.5"/>
  <polygon points="600,141 663,179 663,251 600,289 537,251 537,179"
           fill="none" stroke="#34d399" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="600" y="207" text-anchor="middle" font-size="16" font-weight="700" fill="#86efac" letter-spacing="1">NDP</text>
  <text x="600" y="226" text-anchor="middle" font-size="8" fill="#34d399" letter-spacing="1.5" opacity="0.9">RS · RA · NS · NA</text>

  <!-- Right hex: DEVICE (green, cx=940 cy=215 r=70) -->
  <polygon points="940,145 1001,180 1001,250 940,285 879,250 879,180"
           fill="url(#hex-fill-green)" stroke="#34d399" stroke-width="2.5"/>
  <polygon points="940,153 994,184 994,246 940,277 886,246 886,184"
           fill="none" stroke="#34d399" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="940" y="210" text-anchor="middle" font-size="13" font-weight="700" fill="#86efac">DEVICE</text>
  <text x="940" y="228" text-anchor="middle" font-size="9" fill="#34d399" letter-spacing="2" opacity="0.8">AUTOCONFIGURED</text>

  <!-- RA: Router → NDP (solid, blue→green gradient) -->
  <line x1="281" y1="203" x2="521" y2="203"
        stroke="url(#arr-ra-l)" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="405" y="194" text-anchor="middle" font-size="9" fill="#94a3b8" letter-spacing="1">RA · prefix · gateway</text>

  <!-- RS: NDP → Router (dashed, green→blue gradient) -->
  <line x1="521" y1="227" x2="281" y2="227"
        stroke="url(#arr-rs-l)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-blue)"/>
  <text x="405" y="242" text-anchor="middle" font-size="9" fill="#94a3b8" letter-spacing="1">RS · router solicitation</text>

  <!-- Address assigned: NDP → Device (solid, green) -->
  <line x1="679" y1="203" x2="871" y2="203"
        stroke="#34d399" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="775" y="194" text-anchor="middle" font-size="9" fill="#94a3b8" letter-spacing="1">address assigned</text>

  <!-- NS/NA: Device → NDP (dashed, green) -->
  <line x1="871" y1="227" x2="679" y2="227"
        stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-green)"/>
  <text x="775" y="242" text-anchor="middle" font-size="9" fill="#94a3b8" letter-spacing="1">NS · NA · DAD</text>

  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>
  <text x="600" y="500" text-anchor="middle" font-size="13"
        fill="#34d399" letter-spacing="3" font-weight="600">IPv6 EXPLAINED</text>
  <text x="600" y="538" text-anchor="middle" font-size="34"
        font-weight="700" fill="#f1f5f9">SLAAC and Neighbor Discovery</text>
</svg>
