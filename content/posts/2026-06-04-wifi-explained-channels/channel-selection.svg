<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" width="700" height="300" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">

  <!-- Background -->
  <rect width="700" height="300" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="350" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Channel Selection — 2.4, 5, and 6 GHz</text>

  <!-- ═══════════════════════════════════════════
       2.4 GHz — 13 individual channel slots
  ════════════════════════════════════════════ -->
  <text x="16" y="54" font-size="11" font-weight="700" fill="#374151">2.4 GHz</text>

  <!-- Overlap background — partial overlap zones shown in red -->
  <rect x="105" y="60" width="180" height="36" fill="#fee2e2" fill-opacity="0.5"/>
  <rect x="195" y="60" width="180" height="36" fill="#fee2e2" fill-opacity="0.5"/>
  <rect x="375" y="60" width="180" height="36" fill="#fee2e2" fill-opacity="0.5"/>

  <!-- ch1 green -->
  <rect x="60"  y="60" width="42" height="36" fill="#bbf7d0" stroke="#22c55e" stroke-width="2" rx="3"/>
  <text x="81"  y="82" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">1</text>
  <!-- ch2–5 grey -->
  <rect x="105" y="60" width="42" height="36" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1" rx="3"/>
  <text x="126" y="82" text-anchor="middle" font-size="10" fill="#9ca3af">2</text>
  <rect x="150" y="60" width="42" height="36" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1" rx="3"/>
  <text x="171" y="82" text-anchor="middle" font-size="10" fill="#9ca3af">3</text>
  <rect x="195" y="60" width="42" height="36" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1" rx="3"/>
  <text x="216" y="82" text-anchor="middle" font-size="10" fill="#9ca3af">4</text>
  <rect x="240" y="60" width="42" height="36" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1" rx="3"/>
  <text x="261" y="82" text-anchor="middle" font-size="10" fill="#9ca3af">5</text>
  <!-- ch6 green -->
  <rect x="285" y="60" width="42" height="36" fill="#bbf7d0" stroke="#22c55e" stroke-width="2" rx="3"/>
  <text x="306" y="82" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">6</text>
  <!-- ch7–10 grey -->
  <rect x="330" y="60" width="42" height="36" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1" rx="3"/>
  <text x="351" y="82" text-anchor="middle" font-size="10" fill="#9ca3af">7</text>
  <rect x="375" y="60" width="42" height="36" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1" rx="3"/>
  <text x="396" y="82" text-anchor="middle" font-size="10" fill="#9ca3af">8</text>
  <rect x="420" y="60" width="42" height="36" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1" rx="3"/>
  <text x="441" y="82" text-anchor="middle" font-size="10" fill="#9ca3af">9</text>
  <rect x="465" y="60" width="42" height="36" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1" rx="3"/>
  <text x="486" y="82" text-anchor="middle" font-size="10" fill="#9ca3af">10</text>
  <!-- ch11 green -->
  <rect x="510" y="60" width="42" height="36" fill="#bbf7d0" stroke="#22c55e" stroke-width="2" rx="3"/>
  <text x="531" y="82" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">11</text>
  <!-- ch12–13 grey -->
  <rect x="555" y="60" width="42" height="36" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1" rx="3"/>
  <text x="576" y="82" text-anchor="middle" font-size="10" fill="#9ca3af">12</text>
  <rect x="600" y="60" width="42" height="36" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1" rx="3"/>
  <text x="621" y="82" text-anchor="middle" font-size="10" fill="#9ca3af">13</text>

  <text x="350" y="110" text-anchor="middle" font-size="9" fill="#6b7280">Only channels 1, 6, and 11 are non-overlapping — use these exclusively</text>

  <!-- ═══════════════════════════════════════════
       5 GHz — three UNII sub-bands
       Total spectrum ~680 MHz, width 582px
       UNII-1: ~80 MHz → 68px
       UNII-2: ~400 MHz → 342px
       UNII-3: ~160 MHz → 137px (gap between 144 and 149 ~35px)
       Laid out: x=60..128 | x=163..505 | x=520..642
  ════════════════════════════════════════════ -->
  <text x="16" y="134" font-size="11" font-weight="700" fill="#374151">5 GHz</text>

  <!-- UNII-1: ch 36–48, no DFS -->
  <rect x="60" y="140" width="90" height="42" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="4"/>
  <text x="105" y="156" text-anchor="middle" font-size="9" font-weight="700" fill="#1d4ed8">UNII-1</text>
  <text x="105" y="169" text-anchor="middle" font-size="9" fill="#1d4ed8">ch 36–48</text>
  <text x="105" y="180" text-anchor="middle" font-size="8" fill="#3b82f6">no DFS</text>

  <!-- Gap between UNII-1 and UNII-2 (small guard band) -->
  <rect x="152" y="140" width="8" height="42" fill="#f3f4f6" stroke="none" rx="0"/>

  <!-- UNII-2: ch 52–144, DFS required -->
  <rect x="162" y="140" width="330" height="42" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" rx="4"/>
  <text x="327" y="156" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">UNII-2 (DFS required)</text>
  <text x="327" y="169" text-anchor="middle" font-size="9" fill="#92400e">ch 52–144  ·  16 channels</text>
  <text x="327" y="180" text-anchor="middle" font-size="8" fill="#b45309">AP must scan for radar — may cause 30–60 s interruption</text>

  <!-- Gap -->
  <rect x="494" y="140" width="8" height="42" fill="#f3f4f6" stroke="none" rx="0"/>

  <!-- UNII-3: ch 149–177, no DFS (most regions) -->
  <rect x="504" y="140" width="138" height="42" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="4"/>
  <text x="573" y="156" text-anchor="middle" font-size="9" font-weight="700" fill="#1d4ed8">UNII-3</text>
  <text x="573" y="169" text-anchor="middle" font-size="9" fill="#1d4ed8">ch 149–177</text>
  <text x="573" y="180" text-anchor="middle" font-size="8" fill="#3b82f6">no DFS (most regions)</text>

  <text x="350" y="198" text-anchor="middle" font-size="9" fill="#6b7280">~25 non-overlapping 20 MHz channels — auto channel selection works well here</text>

  <!-- ═══════════════════════════════════════════
       6 GHz — one clean wide band
  ════════════════════════════════════════════ -->
  <text x="16" y="220" font-size="11" font-weight="700" fill="#374151">6 GHz</text>

  <rect x="60" y="226" width="582" height="52" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" rx="4"/>
  <text x="351" y="243" text-anchor="middle" font-size="9" font-weight="700" fill="#15803d">5.925 – 7.125 GHz</text>
  <text x="351" y="256" text-anchor="middle" font-size="9" fill="#15803d">Up to 59 non-overlapping 20 MHz channels  ·  No DFS  ·  No legacy devices</text>
  <text x="351" y="267" text-anchor="middle" font-size="8" fill="#16a34a">Cleanest available band — wide channels viable without consuming the entire spectrum</text>

  <!-- Legend -->
  <rect x="160" y="284" width="12" height="10" fill="#bbf7d0" stroke="#22c55e" stroke-width="1" rx="2"/>
  <text x="178" y="293" font-size="9" fill="#15803d">Non-overlapping / no DFS</text>
  <rect x="360" y="284" width="12" height="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="2"/>
  <text x="378" y="293" font-size="9" fill="#92400e">DFS — radar detection required</text>
</svg>
