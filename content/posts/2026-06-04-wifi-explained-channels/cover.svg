<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0800"/>
      <stop offset="100%" stop-color="#190f00"/>
    </linearGradient>
    <linearGradient id="band24" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7c2d12" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="band5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#075985" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="band6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#064e3b" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0800" stop-opacity="0"/>
      <stop offset="60%" stop-color="#0a0800" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#0a0800" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#1a1000" stroke-width="1">
    <line x1="0" y1="78" x2="1200" y2="78"/>
    <line x1="0" y1="195" x2="1200" y2="195"/>
    <line x1="0" y1="335" x2="1200" y2="335"/>
  </g>

  <!-- Band labels on left -->
  <text x="155" y="138" text-anchor="end" font-size="15" font-weight="700" fill="#fb923c" letter-spacing="1">2.4 GHz</text>
  <text x="155" y="268" text-anchor="end" font-size="15" font-weight="700" fill="#38bdf8" letter-spacing="1">5 GHz</text>
  <text x="155" y="368" text-anchor="end" font-size="15" font-weight="700" fill="#34d399" letter-spacing="1">6 GHz</text>

  <!-- === 2.4 GHz band — 3 non-overlapping channels, narrow === -->
  <rect x="165" y="82" width="235" height="88" fill="#7c2d12" fill-opacity="0.15" rx="6"/>
  <!-- Channel 1 -->
  <rect x="175" y="90" width="52" height="72" fill="url(#band24)" rx="4"/>
  <text x="201" y="133" text-anchor="middle" font-size="11" fill="#fed7aa" font-weight="600">ch 1</text>
  <!-- Channel 6 -->
  <rect x="255" y="96" width="52" height="66" fill="url(#band24)" rx="4"/>
  <text x="281" y="136" text-anchor="middle" font-size="11" fill="#fed7aa" font-weight="600">ch 6</text>
  <!-- Channel 11 -->
  <rect x="335" y="92" width="52" height="70" fill="url(#band24)" rx="4"/>
  <text x="361" y="133" text-anchor="middle" font-size="11" fill="#fed7aa" font-weight="600">ch 11</text>
  <!-- Stat label -->
  <text x="283" y="190" text-anchor="middle" font-size="11" fill="#78350f" letter-spacing="1">3 NON-OVERLAPPING · 20 MHz</text>

  <!-- === 5 GHz band — more channels, medium width === -->
  <rect x="165" y="200" width="650" height="90" fill="#075985" fill-opacity="0.12" rx="6"/>
  <!-- UNII-1 (36-48): 4 channels, no DFS -->
  <g fill="url(#band5)">
    <rect x="175" y="208" width="36" height="74" rx="3"/>
    <rect x="215" y="214" width="36" height="68" rx="3"/>
    <rect x="255" y="209" width="36" height="73" rx="3"/>
    <rect x="295" y="217" width="36" height="65" rx="3"/>
  </g>
  <text x="257" y="306" text-anchor="middle" font-size="10" fill="#0369a1" letter-spacing="1">UNII-1 (no DFS)</text>

  <!-- UNII-2 (52-144): DFS required, greyed slightly -->
  <g fill="url(#band5)" opacity="0.5">
    <rect x="355" y="212" width="28" height="70" rx="3"/>
    <rect x="387" y="209" width="28" height="73" rx="3"/>
    <rect x="419" y="218" width="28" height="64" rx="3"/>
    <rect x="451" y="213" width="28" height="69" rx="3"/>
    <rect x="483" y="207" width="28" height="75" rx="3"/>
    <rect x="515" y="215" width="28" height="67" rx="3"/>
    <rect x="547" y="210" width="28" height="72" rx="3"/>
    <rect x="579" y="216" width="28" height="66" rx="3"/>
  </g>
  <text x="474" y="306" text-anchor="middle" font-size="10" fill="#0369a1" letter-spacing="1">UNII-2 (DFS)</text>

  <!-- UNII-3 (149-177): no DFS -->
  <g fill="url(#band5)">
    <rect x="645" y="209" width="34" height="73" rx="3"/>
    <rect x="683" y="214" width="34" height="68" rx="3"/>
    <rect x="721" y="206" width="34" height="76" rx="3"/>
    <rect x="759" y="212" width="34" height="70" rx="3"/>
  </g>
  <text x="702" y="306" text-anchor="middle" font-size="10" fill="#0369a1" letter-spacing="1">UNII-3 (no DFS)</text>

  <!-- Stat label -->
  <text x="465" y="323" text-anchor="middle" font-size="11" fill="#0c4a6e" letter-spacing="1">~25 NON-OVERLAPPING · 20–160 MHz</text>

  <!-- === 6 GHz band — wide, many channels === -->
  <rect x="165" y="340" width="800" height="85" fill="#064e3b" fill-opacity="0.12" rx="6"/>
  <!-- Many channels (59 total — dense bars) -->
  <g fill="url(#band6)">
    <rect x="175" y="348" width="30" height="50" rx="2"/>
    <rect x="201" y="353" width="30" height="45" rx="2"/>
    <rect x="227" y="348" width="30" height="50" rx="2"/>
    <rect x="253" y="357" width="30" height="41" rx="2"/>
    <rect x="279" y="351" width="30" height="47" rx="2"/>
    <rect x="305" y="346" width="30" height="52" rx="2"/>
    <rect x="331" y="356" width="30" height="42" rx="2"/>
    <rect x="357" y="349" width="30" height="49" rx="2"/>
    <rect x="383" y="352" width="30" height="46" rx="2"/>
    <rect x="409" y="344" width="30" height="54" rx="2"/>
    <rect x="435" y="356" width="30" height="42" rx="2"/>
    <rect x="461" y="349" width="30" height="49" rx="2"/>
    <rect x="487" y="353" width="30" height="45" rx="2"/>
    <rect x="513" y="348" width="30" height="50" rx="2"/>
    <rect x="539" y="351" width="30" height="47" rx="2"/>
    <rect x="565" y="346" width="30" height="52" rx="2"/>
    <rect x="591" y="357" width="30" height="41" rx="2"/>
    <rect x="617" y="349" width="30" height="49" rx="2"/>
    <rect x="643" y="352" width="30" height="46" rx="2"/>
    <rect x="669" y="344" width="30" height="54" rx="2"/>
    <rect x="695" y="356" width="30" height="42" rx="2"/>
    <rect x="721" y="348" width="30" height="50" rx="2"/>
    <rect x="747" y="353" width="30" height="45" rx="2"/>
    <rect x="773" y="349" width="30" height="49" rx="2"/>
    <rect x="799" y="346" width="30" height="52" rx="2"/>
    <rect x="825" y="356" width="30" height="42" rx="2"/>
    <rect x="851" y="351" width="30" height="47" rx="2"/>
    <rect x="877" y="346" width="30" height="52" rx="2"/>
    <rect x="903" y="352" width="30" height="46" rx="2"/>
    <rect x="929" y="348" width="30" height="50" rx="2"/>
  </g>
  <!-- Top glow caps on 6GHz bars -->
  <g fill="#6ee7b7">
    <rect x="175" y="346" width="30" height="4" rx="2"/>
    <rect x="305" y="344" width="30" height="4" rx="2"/>
    <rect x="409" y="342" width="30" height="4" rx="2"/>
    <rect x="565" y="344" width="30" height="4" rx="2"/>
    <rect x="669" y="342" width="30" height="4" rx="2"/>
    <rect x="877" y="344" width="30" height="4" rx="2"/>
  </g>
  <!-- Bottom gradient overlay -->
  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>

  <!-- Series label -->
  <text x="600" y="500" text-anchor="middle" font-size="13" fill="#38bdf8" letter-spacing="3" font-weight="600">WIFI EXPLAINED</text>

  <!-- Title -->
  <text x="600" y="538" text-anchor="middle" font-size="34" font-weight="700" fill="#f1f5f9">Channels and Channel Width</text>
</svg>
