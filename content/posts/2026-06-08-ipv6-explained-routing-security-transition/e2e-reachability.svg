<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 240" width="700" height="240"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="700" height="240" fill="url(#bg)" rx="8"/>

  <line x1="350" y1="50" x2="350" y2="145" stroke="#1e293b" stroke-width="1.5"/>

  <text x="175" y="40" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">IPv4 + NAT</text>
  <text x="525" y="40" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">IPv6</text>

  <!-- IPv4 side -->
  <rect x="30" y="60" width="90" height="48" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="75" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#86efac">Device</text>
  <text x="75" y="98" text-anchor="middle" font-size="9" fill="#34d399">192.168.1.10</text>

  <rect x="140" y="60" width="90" height="48" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="185" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#bae6fd">NAT</text>
  <text x="185" y="98" text-anchor="middle" font-size="9" fill="#38bdf8">blocks inbound</text>

  <rect x="250" y="60" width="90" height="48" fill="none" stroke="#ef4444" stroke-width="1.5" rx="5"/>
  <text x="295" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#fca5a5">Server</text>
  <text x="295" y="98" text-anchor="middle" font-size="9" fill="#ef4444">any : 443</text>

  <line x1="120" y1="84" x2="136" y2="84" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="230" y1="84" x2="246" y2="84" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <text x="175" y="132" text-anchor="middle" font-size="10" fill="#94a3b8">no unsolicited inbound without port forwarding</text>

  <!-- IPv6 side -->
  <rect x="380" y="60" width="90" height="48" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="425" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#86efac">Device</text>
  <text x="425" y="98" text-anchor="middle" font-size="9" fill="#34d399">2001:db8::10</text>

  <rect x="580" y="60" width="90" height="48" fill="none" stroke="#ef4444" stroke-width="1.5" rx="5"/>
  <text x="625" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#fca5a5">Server</text>
  <text x="625" y="98" text-anchor="middle" font-size="9" fill="#ef4444">2001:db8:1::80</text>

  <line x1="470" y1="84" x2="576" y2="84" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="525" y="77" text-anchor="middle" font-size="9" fill="#86efac">direct — no NAT</text>

  <text x="525" y="132" text-anchor="middle" font-size="10" fill="#94a3b8">directly reachable — no port forwarding needed</text>
</svg>
