<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 316" width="700" height="316"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
  </defs>

  <rect width="700" height="316" fill="url(#bg)" rx="8"/>

  <!-- WAN → LAN (inbound) -->
  <text x="350" y="26" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1">WAN &#8594; LAN — INBOUND</text>

  <rect x="20" y="36" width="205" height="54" fill="none" stroke="#ef4444" stroke-width="1.5" rx="5"/>
  <text x="122" y="58" text-anchor="middle" font-size="14" font-weight="700" fill="#fca5a5">DROP</text>
  <text x="122" y="76" text-anchor="middle" font-size="9" fill="#ef4444" opacity="0.8">default — new connections</text>

  <rect x="237" y="36" width="205" height="54" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="339" y="58" text-anchor="middle" font-size="14" font-weight="700" fill="#86efac">ACCEPT</text>
  <text x="339" y="76" text-anchor="middle" font-size="9" fill="#34d399" opacity="0.8">established / related</text>

  <rect x="454" y="36" width="226" height="54" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="567" y="58" text-anchor="middle" font-size="14" font-weight="700" fill="#86efac">ACCEPT</text>
  <text x="567" y="76" text-anchor="middle" font-size="9" fill="#34d399" opacity="0.8">specific services you expose</text>

  <!-- LAN → WAN (outbound) -->
  <text x="350" y="116" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1">LAN &#8594; WAN — OUTBOUND</text>

  <rect x="20" y="126" width="660" height="50" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="350" y="148" text-anchor="middle" font-size="14" font-weight="700" fill="#86efac">ACCEPT</text>
  <text x="350" y="166" text-anchor="middle" font-size="9" fill="#34d399" opacity="0.8">default — or apply egress filtering as needed</text>

  <!-- ICMPv6 — required types -->
  <text x="350" y="202" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1">ICMPV6 — REQUIRED TYPES</text>

  <rect x="20" y="212" width="320" height="64" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="180" y="234" text-anchor="middle" font-size="13" font-weight="700" fill="#bae6fd">Router &amp; Neighbor Discovery</text>
  <text x="180" y="252" text-anchor="middle" font-size="9" fill="#38bdf8" opacity="0.8">Types 133, 134, 135, 136 — SLAAC / NDP</text>

  <rect x="352" y="212" width="328" height="64" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="516" y="234" text-anchor="middle" font-size="13" font-weight="700" fill="#bae6fd">Error &amp; Diagnostic Signaling</text>
  <text x="516" y="252" text-anchor="middle" font-size="9" fill="#38bdf8" opacity="0.8">Types 1, 2, 3, 4 — errors, PMTUD, hop limit</text>

  <text x="350" y="298" text-anchor="middle" font-size="9" fill="#64748b">Blocking ICMPv6 breaks SLAAC, NDP, and Path MTU Discovery</text>
</svg>
