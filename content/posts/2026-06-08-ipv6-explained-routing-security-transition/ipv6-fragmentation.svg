<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="700" height="350"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="700" height="350" fill="url(#bg)" rx="8"/>

  <!-- Participants -->
  <rect x="40" y="30" width="120" height="44" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="100" y="52" text-anchor="middle" font-size="13" font-weight="700" fill="#86efac">Source</text>
  <text x="100" y="67" text-anchor="middle" font-size="9" fill="#34d399">MTU 1500</text>

  <rect x="290" y="30" width="120" height="44" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="350" y="52" text-anchor="middle" font-size="13" font-weight="700" fill="#86efac">Router</text>
  <text x="350" y="67" text-anchor="middle" font-size="9" fill="#34d399">MTU 1280</text>

  <rect x="540" y="30" width="120" height="44" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="600" y="52" text-anchor="middle" font-size="13" font-weight="700" fill="#86efac">Destination</text>
  <text x="600" y="67" text-anchor="middle" font-size="9" fill="#34d399">reassembles</text>

  <!-- Lifelines -->
  <line x1="100" y1="74" x2="100" y2="310" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="350" y1="74" x2="350" y2="310" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="600" y1="74" x2="600" y2="310" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Scenario A -->
  <text x="350" y="95" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">Scenario A — packet exceeds next-hop MTU</text>

  <text x="225" y="108" text-anchor="middle" font-size="10" fill="#86efac">2000 B packet</text>
  <line x1="106" y1="115" x2="344" y2="115" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <text x="350" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#ef4444">drop — never fragments</text>

  <text x="225" y="168" text-anchor="middle" font-size="10" fill="#fca5a5">ICMPv6 Packet Too Big — MTU 1280</text>
  <line x1="344" y1="175" x2="106" y2="175" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <text x="225" y="192" text-anchor="middle" font-size="9" fill="#94a3b8">source reduces size and retransmits</text>

  <line x1="30" y1="208" x2="670" y2="208" stroke="#1e293b" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Scenario B -->
  <text x="350" y="225" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">Scenario B — source fragments to fit 1280 B</text>

  <text x="225" y="238" text-anchor="middle" font-size="10" fill="#86efac">fragment 1 ≤ 1280 B</text>
  <line x1="106" y1="245" x2="344" y2="245" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="356" y1="245" x2="594" y2="245" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <text x="225" y="266" text-anchor="middle" font-size="10" fill="#86efac">fragment 2 ≤ 1280 B</text>
  <line x1="106" y1="273" x2="344" y2="273" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="356" y1="273" x2="594" y2="273" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <text x="600" y="296" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">reassembles into original packet</text>

  <text x="350" y="330" text-anchor="middle" font-size="9" fill="#64748b">Routers never fragment — only the source does · minimum link MTU is 1280 B (RFC 8200)</text>
</svg>
