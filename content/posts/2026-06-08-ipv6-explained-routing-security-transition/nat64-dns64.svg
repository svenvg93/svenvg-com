<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 234" width="700" height="234"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
    <marker id="arr-slate" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="700" height="234" fill="url(#bg)" rx="8"/>

  <text x="14" y="20" font-size="9" font-weight="600" fill="#64748b" letter-spacing="1">DNS RESOLUTION</text>

  <!-- Row 1: DNS resolution -->
  <rect x="14" y="30" width="108" height="44" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="68" y="48" text-anchor="middle" font-size="12" font-weight="700" fill="#86efac">IPv6 Client</text>
  <text x="68" y="64" text-anchor="middle" font-size="9" fill="#34d399">IPv6-only</text>

  <rect x="280" y="30" width="170" height="44" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="365" y="48" text-anchor="middle" font-size="12" font-weight="700" fill="#bae6fd">DNS64 Resolver</text>
  <text x="365" y="64" text-anchor="middle" font-size="8" fill="#38bdf8" font-family="'Courier New',monospace">synthesizes 64:ff9b::/96</text>

  <rect x="560" y="30" width="120" height="44" fill="none" stroke="#ef4444" stroke-width="1" stroke-opacity="0.5" rx="5"/>
  <text x="620" y="48" text-anchor="middle" font-size="12" font-weight="700" fill="#f87171" opacity="0.6">IPv4 Server</text>
  <text x="620" y="64" text-anchor="middle" font-size="9" fill="#ef4444" opacity="0.5">A record only</text>

  <line x1="126" y1="50" x2="276" y2="50" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="201" y="43" text-anchor="middle" font-size="8" fill="#86efac">AAAA? example.com</text>

  <line x1="454" y1="50" x2="556" y2="50" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3" stroke-opacity="0.5" marker-end="url(#arr-slate)"/>
  <text x="505" y="43" text-anchor="middle" font-size="8" fill="#475569">A only: 93.184.216.34</text>

  <line x1="276" y1="88" x2="126" y2="88" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="201" y="81" text-anchor="middle" font-size="8" fill="#bae6fd">64:ff9b::5db8:d822</text>

  <text x="350" y="104" text-anchor="middle" font-size="8" fill="#64748b">no native AAAA &#8594; synthesized from the A record using the NAT64 prefix</text>

  <line x1="20" y1="122" x2="680" y2="122" stroke="#1e293b" stroke-width="1" stroke-dasharray="6,4"/>

  <text x="14" y="144" font-size="9" font-weight="600" fill="#64748b" letter-spacing="1">DATA FLOW</text>

  <!-- Row 2: data flow -->
  <rect x="14" y="154" width="108" height="44" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="68" y="172" text-anchor="middle" font-size="12" font-weight="700" fill="#86efac">IPv6 Client</text>
  <text x="68" y="188" text-anchor="middle" font-size="9" fill="#34d399">IPv6-only</text>

  <rect x="280" y="154" width="170" height="44" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="365" y="172" text-anchor="middle" font-size="12" font-weight="700" fill="#bae6fd">NAT64 Gateway</text>
  <text x="365" y="188" text-anchor="middle" font-size="9" fill="#38bdf8" opacity="0.8">stateful, IPv6/IPv4</text>

  <rect x="560" y="154" width="120" height="44" fill="none" stroke="#ef4444" stroke-width="1.5" rx="5"/>
  <text x="620" y="172" text-anchor="middle" font-size="12" font-weight="700" fill="#fca5a5">IPv4 Server</text>
  <text x="620" y="188" text-anchor="middle" font-size="9" fill="#ef4444" font-family="'Courier New',monospace">93.184.216.34</text>

  <line x1="126" y1="176" x2="276" y2="176" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="201" y="169" text-anchor="middle" font-size="8" fill="#86efac">IPv6 &#8594; 64:ff9b::5db8:d822</text>

  <line x1="454" y1="176" x2="556" y2="176" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="505" y="169" text-anchor="middle" font-size="8" fill="#bae6fd">IPv4 &#8594; 93.184.216.34</text>

  <text x="350" y="214" text-anchor="middle" font-size="8" fill="#64748b">client uses IPv6 sockets throughout — NAT64 translates transparently</text>
</svg>
