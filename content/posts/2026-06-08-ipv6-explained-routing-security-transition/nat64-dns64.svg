<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" width="700" height="280"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="arr-query" x1="100" y1="0" x2="290" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="arr-reply" x1="290" y1="0" x2="100" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
    <linearGradient id="arr-data" x1="100" y1="0" x2="590" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <marker id="arr-teal" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#86efac"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#f87171"/>
    </marker>
    <marker id="arr-slate" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="700" height="280" fill="url(#bg)" rx="8"/>

  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0" y1="36" x2="700" y2="36"/>
    <line x1="0" y1="160" x2="700" y2="160"/>
  </g>

  <text x="350" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1">NAT64 + DNS64 — IPv6-ONLY CLIENT REACHING IPv4 SERVER</text>

  <!-- Section labels -->
  <text x="20" y="50" font-size="9" fill="#64748b" letter-spacing="1">DNS RESOLUTION</text>
  <text x="20" y="174" font-size="9" fill="#64748b" letter-spacing="1">DATA FLOW</text>

  <!-- Nodes (shared across both sections) -->
  <!-- IPv6 Client -->
  <rect x="14" y="58" width="100" height="44" fill="#071810" stroke="#166534" stroke-width="1.5" rx="5"/>
  <text x="64" y="76" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">IPv6 Client</text>
  <text x="64" y="92" text-anchor="middle" font-size="8" fill="#4ade80">IPv6-only</text>

  <!-- DNS64 box -->
  <rect x="268" y="58" width="164" height="44" fill="#071428" stroke="#0e4060" stroke-width="1.5" rx="5"/>
  <text x="350" y="76" text-anchor="middle" font-size="10" font-weight="600" fill="#bae6fd">DNS64 Resolver</text>
  <text x="350" y="92" text-anchor="middle" font-size="8" fill="#38bdf8" font-family="'Courier New',monospace">synthesizes 64:ff9b::/96</text>

  <!-- IPv4 Server (top section, dim) -->
  <rect x="572" y="58" width="114" height="44" fill="#150808" stroke="#7f1d1d" stroke-width="1" stroke-opacity="0.5" rx="5"/>
  <text x="629" y="76" text-anchor="middle" font-size="10" font-weight="600" fill="#f87171" opacity="0.6">IPv4 Server</text>
  <text x="629" y="92" text-anchor="middle" font-size="8" fill="#ef4444" opacity="0.5" font-family="'Courier New',monospace">93.184.216.34</text>

  <!-- DNS arrows -->
  <!-- Client → DNS64: query -->
  <line x1="116" y1="74" x2="264" y2="74"
        stroke="url(#arr-query)" stroke-width="1.5" marker-end="url(#arr-teal)"
        gradientTransform="translate(116,0)"/>
  <text x="190" y="67" text-anchor="middle" font-size="8" fill="#86efac">AAAA? example.com</text>

  <!-- DNS64 upstream (to IPv4 server, dashed dim) -->
  <line x1="434" y1="74" x2="568" y2="74"
        stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3" stroke-opacity="0.4" marker-end="url(#arr-slate)"/>
  <text x="501" y="67" text-anchor="middle" font-size="8" fill="#475569">A only: 93.184.216.34</text>

  <!-- DNS64 → Client: synthetic AAAA -->
  <line x1="266" y1="108" x2="118" y2="108"
        stroke="url(#arr-reply)" stroke-width="1.5" marker-end="url(#arr-green)"
        gradientTransform="translate(118,0)"/>
  <text x="192" y="102" text-anchor="middle" font-size="8" fill="#38bdf8">64:ff9b::5db8:d822</text>
  <text x="350" y="130" text-anchor="middle" font-size="8" fill="#475569">no native AAAA → synthesise from A using NAT64 prefix</text>

  <!-- Data flow section -->
  <!-- IPv6 Client (bottom) -->
  <rect x="14" y="182" width="100" height="44" fill="#071810" stroke="#166534" stroke-width="1.5" rx="5"/>
  <text x="64" y="200" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">IPv6 Client</text>
  <text x="64" y="216" text-anchor="middle" font-size="8" fill="#4ade80">IPv6-only</text>

  <!-- NAT64 Gateway -->
  <rect x="268" y="182" width="164" height="44" fill="#1a0e28" stroke="#5b21b6" stroke-width="1.5" rx="5"/>
  <text x="350" y="200" text-anchor="middle" font-size="10" font-weight="600" fill="#c4b5fd">NAT64 Gateway</text>
  <text x="350" y="216" text-anchor="middle" font-size="8" fill="#a78bfa">stateful IPv6↔IPv4</text>

  <!-- IPv4 Server (bottom) -->
  <rect x="572" y="182" width="114" height="44" fill="#150808" stroke="#7f1d1d" stroke-width="1.5" rx="5"/>
  <text x="629" y="200" text-anchor="middle" font-size="10" font-weight="600" fill="#f87171">IPv4 Server</text>
  <text x="629" y="216" text-anchor="middle" font-size="8" fill="#ef4444" font-family="'Courier New',monospace">93.184.216.34</text>

  <!-- Client → NAT64 -->
  <line x1="116" y1="204" x2="264" y2="204"
        stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <text x="190" y="197" text-anchor="middle" font-size="8" fill="#38bdf8">IPv6 → 64:ff9b::5db8:d822</text>

  <!-- NAT64 → Server -->
  <line x1="434" y1="204" x2="568" y2="204"
        stroke="#f87171" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="501" y="197" text-anchor="middle" font-size="8" fill="#f87171">IPv4 → 93.184.216.34</text>

  <text x="350" y="262" text-anchor="middle" font-size="9" fill="#475569">client uses IPv6 sockets throughout — NAT64 handles the translation transparently</text>
</svg>
