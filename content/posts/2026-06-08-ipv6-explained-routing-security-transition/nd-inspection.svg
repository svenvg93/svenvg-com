<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" width="700" height="300"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="700" height="300" fill="url(#bg)" rx="8"/>

  <!-- Binding table (plain text legend, not nested boxes) -->
  <rect x="190" y="20" width="320" height="140" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="350" y="38" text-anchor="middle" font-size="11" font-weight="700" fill="#bae6fd">Binding Table</text>

  <text x="205" y="54" font-size="8" font-weight="600" fill="#64748b">Address</text>
  <text x="345" y="54" font-size="8" font-weight="600" fill="#64748b">MAC</text>
  <text x="430" y="54" font-size="8" font-weight="600" fill="#64748b">Port</text>
  <text x="475" y="54" font-size="8" font-weight="600" fill="#64748b">VLAN</text>
  <line x1="200" y1="59" x2="500" y2="59" stroke="#1e293b" stroke-width="1"/>

  <text x="205" y="72" font-size="8" fill="#34d399" font-family="'Courier New',monospace">2001:db8::a</text>
  <text x="345" y="72" font-size="8" fill="#86efac" font-family="'Courier New',monospace">aa:bb:cc:01</text>
  <text x="430" y="72" font-size="8" fill="#86efac">3</text>
  <text x="475" y="72" font-size="8" fill="#86efac">10</text>

  <text x="205" y="86" font-size="8" fill="#34d399" font-family="'Courier New',monospace">2001:db8::b</text>
  <text x="345" y="86" font-size="8" fill="#86efac" font-family="'Courier New',monospace">aa:bb:cc:02</text>
  <text x="430" y="86" font-size="8" fill="#86efac">5</text>
  <text x="475" y="86" font-size="8" fill="#86efac">10</text>

  <text x="205" y="100" font-size="8" fill="#34d399" font-family="'Courier New',monospace">2001:db8::c</text>
  <text x="345" y="100" font-size="8" fill="#86efac" font-family="'Courier New',monospace">aa:bb:cc:03</text>
  <text x="430" y="100" font-size="8" fill="#86efac">7</text>
  <text x="475" y="100" font-size="8" fill="#86efac">10</text>

  <line x1="200" y1="107" x2="500" y2="107" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="350" y="121" text-anchor="middle" font-size="8" fill="#64748b">populated via DHCPv6 snooping or DAD Neighbor Solicitations</text>
  <text x="350" y="134" text-anchor="middle" font-size="8" fill="#64748b">static entries also supported</text>

  <!-- Case A: valid packet -->
  <rect x="20" y="40" width="140" height="60" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="90" y="62" text-anchor="middle" font-size="13" font-weight="700" fill="#86efac">Host A</text>
  <text x="90" y="80" text-anchor="middle" font-size="9" fill="#34d399" font-family="'Courier New',monospace">2001:db8::a &#183; port 3</text>

  <line x1="160" y1="70" x2="186" y2="70" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="173" y="64" text-anchor="middle" font-size="8" fill="#64748b">lookup</text>

  <rect x="560" y="40" width="120" height="60" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="620" y="62" text-anchor="middle" font-size="13" font-weight="700" fill="#86efac">Match</text>
  <text x="620" y="80" text-anchor="middle" font-size="9" fill="#34d399">forward — port 3</text>

  <line x1="514" y1="70" x2="556" y2="70" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Case B: spoofed packet -->
  <rect x="20" y="180" width="140" height="60" fill="none" stroke="#ef4444" stroke-width="1.5" rx="5"/>
  <text x="90" y="202" text-anchor="middle" font-size="13" font-weight="700" fill="#fca5a5">Attacker</text>
  <text x="90" y="220" text-anchor="middle" font-size="9" fill="#ef4444" opacity="0.8" font-family="'Courier New',monospace">claims 2001:db8::b</text>

  <line x1="160" y1="195" x2="205" y2="163" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-red)"/>
  <text x="182" y="175" text-anchor="middle" font-size="8" fill="#64748b">lookup</text>

  <rect x="560" y="180" width="120" height="60" fill="none" stroke="#ef4444" stroke-width="1.5" rx="5"/>
  <text x="620" y="202" text-anchor="middle" font-size="13" font-weight="700" fill="#fca5a5">Mismatch</text>
  <text x="620" y="220" text-anchor="middle" font-size="9" fill="#ef4444" opacity="0.8">drop — wrong port</text>

  <line x1="500" y1="163" x2="600" y2="178" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <text x="350" y="266" text-anchor="middle" font-size="9" fill="#64748b">Neighbor Advertisements or packets that don't match the table are dropped</text>
  <text x="350" y="282" text-anchor="middle" font-size="9" fill="#64748b">SLAAC has no DHCPv6 exchange to snoop — bindings come from DAD solicitations or static entries</text>
</svg>
