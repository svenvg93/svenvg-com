<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250" width="700" height="250"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="700" height="250" fill="url(#bg)" rx="8"/>

  <!-- Router (blue: central device) -->
  <rect x="40" y="40" width="150" height="50" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="115" y="62" text-anchor="middle" font-size="14" font-weight="700" fill="#bae6fd">Router</text>
  <text x="115" y="80" text-anchor="middle" font-size="10" fill="#38bdf8" opacity="0.8">DHCPv6-PD client</text>

  <!-- ISP (red: WAN-side actor) -->
  <rect x="510" y="40" width="150" height="50" fill="none" stroke="#ef4444" stroke-width="1.5" rx="5"/>
  <text x="585" y="62" text-anchor="middle" font-size="14" font-weight="700" fill="#fca5a5">ISP</text>
  <text x="585" y="80" text-anchor="middle" font-size="10" fill="#ef4444" opacity="0.8">DHCPv6-PD server</text>

  <!-- Lifelines -->
  <line x1="115" y1="90" x2="115" y2="228" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="585" y1="90" x2="585" y2="228" stroke="#1e293b" stroke-width="1.5"/>

  <!-- 1: Solicit + IA_PD -->
  <line x1="125" y1="112" x2="575" y2="112" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>
  <text x="350" y="105" text-anchor="middle" font-size="11" font-weight="600" fill="#7dd3fc">Solicit + IA_PD — requests a prefix</text>

  <!-- 2: Advertise -->
  <line x1="575" y1="147" x2="125" y2="147" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <text x="350" y="140" text-anchor="middle" font-size="11" font-weight="600" fill="#fca5a5">Advertise — offers 2001:db8:abcd:ab00::/56</text>

  <!-- 3: Request -->
  <line x1="125" y1="182" x2="575" y2="182" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>
  <text x="350" y="175" text-anchor="middle" font-size="11" font-weight="600" fill="#7dd3fc">Request — confirms the offered prefix</text>

  <!-- 4: Reply -->
  <line x1="575" y1="217" x2="125" y2="217" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <text x="350" y="210" text-anchor="middle" font-size="11" font-weight="600" fill="#fca5a5">Reply — delegation confirmed, /56 owned</text>
</svg>
