<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 275" width="700" height="275"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
  </defs>

  <rect width="700" height="275" fill="url(#bg)" rx="8"/>

  <!-- Delegated prefix -->
  <rect x="40" y="30" width="620" height="56" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="350" y="55" text-anchor="middle" font-size="14" font-weight="700" fill="#34d399" font-family="'Courier New',monospace">2001:db8:abcd:ab00::/56 delegated</text>
  <text x="350" y="74" text-anchor="middle" font-size="10" fill="#86efac">8 subnet bits (56–63) → 256 possible /64 subnets</text>

  <!-- Subnet rows -->
  <rect x="40" y="106" width="620" height="32" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="350" y="127" text-anchor="middle" font-size="12" font-weight="600" fill="#86efac" font-family="'Courier New',monospace">2001:db8:abcd:ab<tspan font-weight="700" fill="#34d399">00</tspan>::/64 — LAN</text>

  <rect x="40" y="146" width="620" height="32" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="350" y="167" text-anchor="middle" font-size="12" font-weight="600" fill="#86efac" font-family="'Courier New',monospace">2001:db8:abcd:ab<tspan font-weight="700" fill="#34d399">01</tspan>::/64 — IoT</text>

  <rect x="40" y="186" width="620" height="32" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="350" y="207" text-anchor="middle" font-size="12" font-weight="600" fill="#86efac" font-family="'Courier New',monospace">2001:db8:abcd:ab<tspan font-weight="700" fill="#34d399">02</tspan>::/64 — Servers</text>

  <rect x="40" y="226" width="620" height="32" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="350" y="247" text-anchor="middle" font-size="12" font-weight="600" fill="#86efac" font-family="'Courier New',monospace">2001:db8:abcd:ab<tspan font-weight="700" fill="#34d399">03</tspan>::/64 — Guest</text>
</svg>
