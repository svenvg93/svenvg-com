<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="hex-fill-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e4030"/>
      <stop offset="100%" stop-color="#072a1e"/>
    </linearGradient>
    <linearGradient id="hex-fill-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e2040"/>
      <stop offset="100%" stop-color="#071428"/>
    </linearGradient>
    <linearGradient id="hex-fill-center" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <radialGradient id="glow-left" cx="16%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-right" cx="82%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arr-e2e" x1="281" y1="215" x2="879" y2="215" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-left)"/>
  <rect width="1200" height="630" fill="url(#glow-right)"/>

  <!-- Left hex: DEVICE (GUA) -->
  <polygon points="220,145 281,180 281,250 220,285 159,250 159,180"
           fill="url(#hex-fill-green)" stroke="#34d399" stroke-width="2.5"/>
  <polygon points="220,153 274,184 274,246 220,277 166,246 166,184"
           fill="none" stroke="#34d399" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="220" y="205" text-anchor="middle" font-size="13" font-weight="700" fill="#86efac">DEVICE</text>
  <text x="220" y="222" text-anchor="middle" font-size="8" fill="#34d399" font-family="'Courier New',monospace" opacity="0.8">GUA address</text>
  <text x="220" y="237" text-anchor="middle" font-size="8" fill="#34d399" opacity="0.6">no NAT</text>

  <!-- Center: Internet globe (red — zone convention: Internet/WAN = red) -->
  <circle cx="600" cy="215" r="64" fill="#150808" stroke="#7f1d1d" stroke-width="1.5"/>
  <ellipse cx="600" cy="215" rx="32" ry="64" fill="none" stroke="#7f1d1d" stroke-width="1"/>
  <line x1="536" y1="215" x2="664" y2="215" stroke="#7f1d1d" stroke-width="1"/>
  <line x1="541" y1="183" x2="659" y2="183" stroke="#7f1d1d" stroke-width="1" opacity="0.4"/>
  <line x1="541" y1="247" x2="659" y2="247" stroke="#7f1d1d" stroke-width="1" opacity="0.4"/>
  <text x="600" y="220" text-anchor="middle" font-size="13" fill="#f87171" font-weight="600">Internet</text>

  <!-- Right hex: SERVER -->
  <polygon points="940,145 1001,180 1001,250 940,285 879,250 879,180"
           fill="url(#hex-fill-blue)" stroke="#38bdf8" stroke-width="2.5"/>
  <polygon points="940,153 994,184 994,246 940,277 886,246 886,184"
           fill="none" stroke="#38bdf8" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="940" y="205" text-anchor="middle" font-size="13" font-weight="700" fill="#bae6fd">SERVER</text>
  <text x="940" y="222" text-anchor="middle" font-size="8" fill="#38bdf8" font-family="'Courier New',monospace" opacity="0.8">GUA address</text>
  <text x="940" y="237" text-anchor="middle" font-size="8" fill="#38bdf8" opacity="0.6">end-to-end</text>

  <!-- End-to-end arrow (over globe) -->
  <line x1="281" y1="208" x2="534" y2="208"
        stroke="url(#arr-e2e)" stroke-width="2.5"/>
  <line x1="666" y1="208" x2="871" y2="208"
        stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arr-blue)"/>
  <text x="405" y="197" text-anchor="middle" font-size="9" fill="#4ade80" letter-spacing="1">src: 2001:db8::1</text>
  <text x="775" y="197" text-anchor="middle" font-size="9" fill="#7dd3fc" letter-spacing="1">dst: 2001:db8::2</text>

  <!-- "No NAT" badge below globe -->
  <rect x="538" y="291" width="124" height="24" fill="#150808" stroke="#ef4444" stroke-width="1" rx="3"/>
  <text x="600" y="307" text-anchor="middle" font-size="10" fill="#f87171" letter-spacing="2" font-weight="600">NO NAT</text>

  <!-- Firewall badge below -->
  <rect x="446" y="330" width="308" height="22" fill="#072a1e" stroke="#34d399" stroke-width="1" stroke-opacity="0.5" rx="3"/>
  <text x="600" y="345" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac" letter-spacing="1">STATEFUL FIREWALL · DEFAULT-DENY INBOUND</text>

  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>
  <text x="600" y="500" text-anchor="middle" font-size="13"
        fill="#34d399" letter-spacing="3" font-weight="600">IPv6 EXPLAINED</text>
  <text x="600" y="538" text-anchor="middle" font-size="34"
        font-weight="700" fill="#f1f5f9">Routing and Firewalling</text>
</svg>
