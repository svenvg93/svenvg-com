<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="hex-fill-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e2040"/>
      <stop offset="100%" stop-color="#071428"/>
    </linearGradient>
    <linearGradient id="hex-fill-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0f051e"/>
    </linearGradient>
    <linearGradient id="hex-fill-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e4030"/>
      <stop offset="100%" stop-color="#072a1e"/>
    </linearGradient>
    <radialGradient id="glow-blue" cx="16%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-purple" cx="50%" cy="50%" r="24%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-green" cx="82%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arr-left-center" x1="281" y1="215" x2="529" y2="215" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="arr-center-right" x1="671" y1="215" x2="879" y2="215" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#8b5cf6"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Zone glows -->
  <rect width="1200" height="630" fill="url(#glow-blue)"/>
  <rect width="1200" height="630" fill="url(#glow-purple)"/>
  <rect width="1200" height="630" fill="url(#glow-green)"/>

  <!-- Subtle dot grid texture -->
  <g fill="#0f1f44" opacity="0.6">
    <circle cx="200" cy="80" r="1.5"/><circle cx="300" cy="80" r="1.5"/>
    <circle cx="400" cy="80" r="1.5"/><circle cx="500" cy="80" r="1.5"/>
    <circle cx="600" cy="80" r="1.5"/><circle cx="700" cy="80" r="1.5"/>
    <circle cx="800" cy="80" r="1.5"/><circle cx="900" cy="80" r="1.5"/>
    <circle cx="1000" cy="80" r="1.5"/><circle cx="200" cy="360" r="1.5"/>
    <circle cx="300" cy="360" r="1.5"/><circle cx="400" cy="360" r="1.5"/>
    <circle cx="500" cy="360" r="1.5"/><circle cx="700" cy="360" r="1.5"/>
    <circle cx="800" cy="360" r="1.5"/><circle cx="900" cy="360" r="1.5"/>
    <circle cx="1000" cy="360" r="1.5"/>
  </g>

  <!-- ── LEFT HEX: CLIENT ── -->
  <polygon points="220,145 281,180 281,250 220,285 159,250 159,180"
           fill="url(#hex-fill-blue)" stroke="#38bdf8" stroke-width="2.5"/>
  <polygon points="220,153 274,184 274,246 220,277 166,246 166,184"
           fill="none" stroke="#38bdf8" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="220" y="210" text-anchor="middle" font-size="14" font-weight="700" fill="#bae6fd">CLIENT</text>
  <text x="220" y="228" text-anchor="middle" font-size="9" fill="#38bdf8" letter-spacing="2" opacity="0.8">STUB RESOLVER</text>

  <!-- ── CENTER HEX: ENCRYPTED DNS ── -->
  <polygon points="600,133 671,174 671,256 600,297 529,256 529,174"
           fill="url(#hex-fill-purple)" stroke="#8b5cf6" stroke-width="2.5"/>
  <polygon points="600,141 663,179 663,251 600,289 537,251 537,179"
           fill="none" stroke="#8b5cf6" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- Lock icon -->
  <path d="M 588,212 L 588,199 Q 588,183 600,183 Q 612,183 612,199 L 612,212"
        fill="none" stroke="#a78bfa" stroke-width="8" stroke-linecap="round"/>
  <rect x="580" y="212" width="40" height="30" rx="5" fill="#4c1d95"/>
  <circle cx="600" cy="226" r="4" fill="#0f051e"/>
  <rect x="597" y="226" width="6" height="10" fill="#0f051e" rx="1"/>

  <text x="600" y="258" text-anchor="middle" font-size="13" font-weight="700" fill="#c4b5fd" letter-spacing="3">DNS</text>

  <!-- ── RIGHT HEX: RESOLVER ── -->
  <polygon points="940,145 1001,180 1001,250 940,285 879,250 879,180"
           fill="url(#hex-fill-green)" stroke="#34d399" stroke-width="2.5"/>
  <polygon points="940,153 994,184 994,246 940,277 886,246 886,184"
           fill="none" stroke="#34d399" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="940" y="208" text-anchor="middle" font-size="13" font-weight="700" fill="#86efac" letter-spacing="1">RESOLVER</text>
  <text x="940" y="226" text-anchor="middle" font-size="8" fill="#34d399">1.1.1.1 · 8.8.8.8 · 9.9.9.9</text>

  <!-- ── ARROWS ── -->
  <line x1="281" y1="215" x2="521" y2="215"
        stroke="url(#arr-left-center)" stroke-width="2" stroke-dasharray="5,4"
        marker-end="url(#arr-purple)"/>
  <line x1="679" y1="215" x2="871" y2="215"
        stroke="url(#arr-center-right)" stroke-width="2" stroke-dasharray="5,4"
        marker-end="url(#arr-green)"/>

  <!-- ── PROTOCOL PILLS ── -->
  <!-- DoT -->
  <rect x="446" y="314" width="96" height="22" fill="#1a0a2e" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.7" rx="3"/>
  <text x="494" y="329" text-anchor="middle" font-size="10" font-weight="600" fill="#c4b5fd" letter-spacing="0.5">DoT · 853/TCP</text>
  <!-- DoH -->
  <rect x="552" y="314" width="96" height="22" fill="#071428" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.7" rx="3"/>
  <text x="600" y="329" text-anchor="middle" font-size="10" font-weight="600" fill="#bae6fd" letter-spacing="0.5">DoH · 443/TCP</text>
  <!-- DoQ -->
  <rect x="658" y="314" width="96" height="22" fill="#072a1e" stroke="#34d399" stroke-width="1" stroke-opacity="0.7" rx="3"/>
  <text x="706" y="329" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac" letter-spacing="0.5">DoQ · 853/UDP</text>

  <!-- Text overlay + title block -->
  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>

  <text x="600" y="500" text-anchor="middle" font-size="13"
        fill="#8b5cf6" letter-spacing="3" font-weight="600">NETWORKING · SECURITY</text>
  <text x="600" y="538" text-anchor="middle" font-size="34"
        font-weight="700" fill="#f1f5f9">Encrypted DNS</text>
</svg>
