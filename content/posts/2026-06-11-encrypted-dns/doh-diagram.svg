<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 190" width="700" height="190"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">

  <!-- Background -->
  <rect width="700" height="190" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="350" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">DNS-over-HTTPS (DoH) — DNS inside HTTPS, port 443</text>

  <!-- ── CLIENT ── -->
  <rect x="40" y="58" width="120" height="56" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" rx="6"/>
  <text x="100" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">CLIENT</text>
  <text x="100" y="101" text-anchor="middle" font-size="9" fill="#3b82f6">stub resolver</text>

  <!-- ── ARROW client → tunnel ── -->
  <line x1="160" y1="86" x2="228" y2="86" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ── HTTPS TUNNEL ── -->
  <!-- Outer HTTPS box -->
  <rect x="232" y="44" width="236" height="84" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2" rx="8"/>
  <!-- Port badge -->
  <rect x="290" y="36" width="120" height="18" fill="#0ea5e9" rx="4"/>
  <text x="350" y="49" text-anchor="middle" font-size="9" font-weight="700" fill="white">443 / TCP · HTTPS</text>
  <!-- HTTPS label -->
  <text x="248" y="62" font-size="9" font-weight="700" fill="#0ea5e9" letter-spacing="1">HTTPS</text>
  <!-- Inner DNS packet box -->
  <rect x="258" y="66" width="184" height="40" fill="white" stroke="#7dd3fc" stroke-width="1" rx="5"/>
  <text x="350" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#075985">DNS Query</text>
  <text x="350" y="98" text-anchor="middle" font-size="8" fill="#0ea5e9" font-family="'Courier New',monospace">POST /dns-query</text>

  <!-- ── ARROW tunnel → resolver ── -->
  <line x1="468" y1="86" x2="536" y2="86" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ── RESOLVER ── -->
  <rect x="540" y="58" width="120" height="56" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5" rx="6"/>
  <text x="600" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">RESOLVER</text>
  <text x="600" y="101" text-anchor="middle" font-size="9" fill="#10b981">1.1.1.1</text>

  <!-- ── Caption ── -->
  <text x="350" y="152" text-anchor="middle" font-size="10" fill="#6b7280">Runs on port 443 — indistinguishable from regular HTTPS traffic on the wire</text>
  <text x="350" y="166" text-anchor="middle" font-size="10" fill="#6b7280">Cannot be blocked without blocking HTTPS broadly, or using SNI-based filtering</text>
</svg>
