<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="hex-fill-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e4030"/>
      <stop offset="100%" stop-color="#072a1e"/>
    </linearGradient>
    <linearGradient id="hex-fill-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e2040"/>
      <stop offset="100%" stop-color="#071428"/>
    </linearGradient>
    <radialGradient id="glow-left" cx="16%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-center" cx="50%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-right" cx="84%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arr-dslite" x1="281" y1="200" x2="521" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="arr-nat64" x1="281" y1="228" x2="521" y2="228" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="arr-gw-inet" x1="679" y1="210" x2="913" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-left)"/>
  <rect width="1200" height="630" fill="url(#glow-center)"/>
  <rect width="1200" height="630" fill="url(#glow-right)"/>

  <!-- Subtle hex grid background -->
  <g stroke="#0a2016" stroke-width="1" fill="none" opacity="0.5">
    <polygon points="600,40 660,75 660,145 600,180 540,145 540,75"/>
    <polygon points="720,75 780,110 780,180 720,215 660,180 660,110"/>
    <polygon points="480,75 540,110 540,180 480,215 420,180 420,110"/>
    <polygon points="840,40 900,75 900,145 840,180 780,145 780,75"/>
    <polygon points="360,40 420,75 420,145 360,180 300,145 300,75"/>
    <polygon points="960,75 1020,110 1020,180 960,215 900,180 900,110"/>
    <polygon points="240,75 300,110 300,180 240,215 180,180 180,110"/>
  </g>

  <!-- Left hex: IPv6 HOST (green, r=70, cx=220, cy=215) -->
  <polygon points="220,145 281,180 281,250 220,285 159,250 159,180"
           fill="url(#hex-fill-green)" stroke="#34d399" stroke-width="2.5"/>
  <polygon points="220,153 274,184 274,246 220,277 166,246 166,184"
           fill="none" stroke="#34d399" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="220" y="207" text-anchor="middle" font-size="13" font-weight="700" fill="#86efac">IPv6</text>
  <text x="220" y="225" text-anchor="middle" font-size="13" font-weight="700" fill="#86efac">HOST</text>
  <text x="220" y="244" text-anchor="middle" font-size="8" fill="#34d399" font-family="'Courier New',monospace" opacity="0.8">IPv6-only network</text>

  <!-- Badge below left hex -->
  <rect x="140" y="299" width="160" height="22" fill="#072a1e" stroke="#34d399" stroke-width="1" rx="3"/>
  <text x="220" y="314" text-anchor="middle" font-size="10" fill="#86efac" letter-spacing="1">LAN · IPv6-only</text>

  <!-- Center hex: Transition GW (blue, r=90, cx=600, cy=210) -->
  <polygon points="600,120 678,165 678,255 600,300 522,255 522,165"
           fill="url(#hex-fill-blue)" stroke="#38bdf8" stroke-width="2.5"/>
  <polygon points="600,134 666,172 666,248 600,286 534,248 534,172"
           fill="none" stroke="#38bdf8" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="600" y="196" text-anchor="middle" font-size="14" font-weight="700" fill="#bae6fd" letter-spacing="1">TRANSITION</text>
  <text x="600" y="215" text-anchor="middle" font-size="14" font-weight="700" fill="#bae6fd" letter-spacing="1">GATEWAY</text>
  <text x="600" y="235" text-anchor="middle" font-size="8" fill="#38bdf8" letter-spacing="2" opacity="0.8">B4 / AFTR · NAT64</text>

  <!-- Config pills below center hex -->
  <g font-size="10" font-weight="600" letter-spacing="1" text-anchor="middle">
    <rect x="468" y="318" width="76" height="22" fill="#071428" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.5" rx="3"/>
    <text x="506" y="333" fill="#bae6fd">DS-LITE</text>
    <rect x="554" y="318" width="76" height="22" fill="#071428" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.5" rx="3"/>
    <text x="592" y="333" fill="#bae6fd">NAT64</text>
    <rect x="640" y="318" width="108" height="22" fill="#071428" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.5" rx="3"/>
    <text x="694" y="333" fill="#bae6fd">64:ff9b::/96</text>
  </g>

  <!-- Right: IPv4 Internet globe (red, cx=990, cy=210, r=74) -->
  <circle cx="990" cy="210" r="74" fill="#150808" stroke="#7f1d1d" stroke-width="1.5"/>
  <ellipse cx="990" cy="210" rx="37" ry="74" fill="none" stroke="#7f1d1d" stroke-width="1"/>
  <line x1="916" y1="210" x2="1064" y2="210" stroke="#7f1d1d" stroke-width="1"/>
  <line x1="922" y1="173" x2="1058" y2="173" stroke="#7f1d1d" stroke-width="1" opacity="0.4"/>
  <line x1="922" y1="247" x2="1058" y2="247" stroke="#7f1d1d" stroke-width="1" opacity="0.4"/>
  <text x="990" y="207" text-anchor="middle" font-size="12" fill="#f87171" font-weight="600">IPv4</text>
  <text x="990" y="224" text-anchor="middle" font-size="9" fill="#f87171" opacity="0.8">Internet</text>

  <!-- Badge below right globe -->
  <rect x="910" y="299" width="160" height="22" fill="#150808" stroke="#7f1d1d" stroke-width="1" rx="3"/>
  <text x="990" y="314" text-anchor="middle" font-size="10" fill="#f87171" letter-spacing="1">WAN · IPv4 only</text>

  <!-- DS-Lite arrow: HOST → GW (upper, solid) -->
  <line x1="281" y1="200" x2="521" y2="200"
        stroke="url(#arr-dslite)" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="401" y="191" text-anchor="middle" font-size="9" fill="#94a3b8" letter-spacing="1">DS-Lite · IPv4-in-IPv6</text>

  <!-- NAT64 arrow: HOST → GW (lower, dashed) -->
  <line x1="281" y1="228" x2="521" y2="228"
        stroke="url(#arr-nat64)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-blue)"/>
  <text x="401" y="244" text-anchor="middle" font-size="9" fill="#94a3b8" letter-spacing="1">NAT64 · IPv6 only</text>

  <!-- GW → Internet arrow (gradient blue → red) -->
  <line x1="679" y1="210" x2="913" y2="210"
        stroke="url(#arr-gw-inet)" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="796" y="200" text-anchor="middle" font-size="9" fill="#6b2020" letter-spacing="1">IPv4 · both mechanisms</text>

  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>
  <text x="600" y="500" text-anchor="middle" font-size="13"
        fill="#34d399" letter-spacing="3" font-weight="600">IPv6 EXPLAINED</text>
  <text x="600" y="538" text-anchor="middle" font-size="34"
        font-weight="700" fill="#f1f5f9">Transition Mechanisms</text>
</svg>
