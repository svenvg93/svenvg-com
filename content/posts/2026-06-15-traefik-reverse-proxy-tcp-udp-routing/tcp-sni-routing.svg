<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 216" width="700" height="216"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#ef4444"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="700" height="216" fill="url(#bg)" rx="8"/>

  <!-- TLS Client (external) -->
  <rect x="50" y="78" width="130" height="60" fill="none" stroke="#ef4444" stroke-width="1.5" rx="5"/>
  <text x="115" y="104" text-anchor="middle" font-size="13" font-weight="600" fill="#fca5a5">TLS Client</text>
  <text x="115" y="120" text-anchor="middle" font-size="10" fill="#ef4444" opacity="0.8">ClientHello + SNI</text>

  <line x1="180" y1="108" x2="255" y2="108" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="217" y="98" text-anchor="middle" font-size="8" fill="#94a3b8">TLS (SNI visible)</text>

  <!-- Traefik (central) -->
  <rect x="257" y="60" width="185" height="96" fill="none" stroke="#38bdf8" stroke-width="1.5" rx="5"/>
  <text x="349" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#bae6fd">Traefik</text>
  <text x="349" y="108" text-anchor="middle" font-size="10" fill="#38bdf8" opacity="0.8">reads SNI, no decrypt</text>
  <text x="349" y="124" text-anchor="middle" font-size="10" fill="#38bdf8" opacity="0.8">routes by HostSNI rule</text>

  <line x1="444" y1="82" x2="519" y2="82" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="444" y1="134" x2="519" y2="134" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- backend-a (trusted) -->
  <rect x="521" y="60" width="140" height="44" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="591" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#86efac">backend-a</text>
  <text x="591" y="97" text-anchor="middle" font-size="9" fill="#34d399" opacity="0.8">app-a.example.com</text>

  <!-- backend-b (trusted) -->
  <rect x="521" y="112" width="140" height="44" fill="none" stroke="#34d399" stroke-width="1.5" rx="5"/>
  <text x="591" y="134" text-anchor="middle" font-size="12" font-weight="600" fill="#86efac">backend-b</text>
  <text x="591" y="149" text-anchor="middle" font-size="9" fill="#34d399" opacity="0.8">app-b.example.com</text>
</svg>
