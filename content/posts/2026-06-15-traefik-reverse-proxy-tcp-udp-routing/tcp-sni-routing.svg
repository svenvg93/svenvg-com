<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" width="700" height="220"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="hex-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e3040"/>
      <stop offset="100%" stop-color="#071e2a"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#37BEC3"/>
    </marker>
    <marker id="arr-dim" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#37BEC3" fill-opacity="0.5"/>
    </marker>
  </defs>

  <rect width="700" height="220" fill="url(#bg)" rx="8"/>

  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0" y1="36" x2="700" y2="36"/>
  </g>

  <text x="350" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1">TCP TLS PASSTHROUGH — SNI-BASED ROUTING</text>

  <!-- TLS Client -->
  <rect x="14" y="66" width="108" height="88" fill="#0a1828" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="68" y="86" text-anchor="middle" font-size="10" font-weight="600" fill="#93c5fd">TLS Client</text>
  <!-- SNI highlight box -->
  <rect x="24" y="94" width="88" height="48" fill="#0e1a3a" stroke="#3b82f6" stroke-width="1" rx="3"/>
  <text x="68" y="108" text-anchor="middle" font-size="8" fill="#94a3b8">ClientHello</text>
  <text x="68" y="121" text-anchor="middle" font-size="8" fill="#60a5fa" font-weight="600" font-family="'Courier New',monospace">SNI:</text>
  <text x="68" y="134" text-anchor="middle" font-size="7" fill="#60a5fa" font-family="'Courier New',monospace">app-a.example.com</text>

  <!-- Incoming TLS arrow -->
  <line x1="124" y1="110" x2="224" y2="110"
        stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="174" y="104" text-anchor="middle" font-size="8" fill="#60a5fa">encrypted TLS</text>
  <text x="174" y="130" text-anchor="middle" font-size="8" fill="#475569">(Traefik reads SNI</text>
  <text x="174" y="141" text-anchor="middle" font-size="8" fill="#475569">without decrypting)</text>

  <!-- Traefik box -->
  <rect x="226" y="60" width="174" height="100" fill="url(#hex-fill)" stroke="#37BEC3" stroke-width="1.5" rx="5"/>
  <text x="313" y="80" text-anchor="middle" font-size="11" font-weight="700" fill="#67e8f9" letter-spacing="1">traefik</text>
  <!-- Routing table inside -->
  <rect x="236" y="88" width="154" height="62" fill="#040c14" rx="3"/>
  <text x="244" y="100" font-size="8" fill="#64748b">HostSNI(`app-a.example.com`)</text>
  <text x="244" y="112" font-size="8" fill="#37BEC3">→ backend-a :443</text>
  <line x1="236" y1="117" x2="390" y2="117" stroke="#1e293b" stroke-width="1"/>
  <text x="244" y="129" font-size="8" fill="#64748b">HostSNI(`app-b.example.com`)</text>
  <text x="244" y="141" font-size="8" fill="#37BEC3">→ backend-b :443</text>

  <!-- Arrow to backend A -->
  <line x1="402" y1="92" x2="484" y2="79"
        stroke="#37BEC3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow to backend B -->
  <line x1="402" y1="128" x2="484" y2="141"
        stroke="#37BEC3" stroke-width="1.5" stroke-opacity="0.5" marker-end="url(#arr-dim)"/>

  <!-- Backend A -->
  <rect x="486" y="58" width="196" height="44" fill="#071e2a" stroke="#37BEC3" stroke-width="1.5" rx="5"/>
  <rect x="486" y="58" width="5" height="44" fill="#37BEC3" rx="3"/>
  <text x="502" y="76" font-size="10" font-weight="700" fill="#67e8f9">app-a.example.com</text>
  <text x="502" y="92" font-size="9" fill="#64748b" font-family="'Courier New',monospace">192.168.1.10:443 · TLS intact</text>

  <!-- Backend B (dim) -->
  <rect x="486" y="120" width="196" height="44" fill="#071e2a" stroke="#37BEC3" stroke-width="1" stroke-opacity="0.4" rx="5"/>
  <rect x="486" y="120" width="5" height="44" fill="#37BEC3" fill-opacity="0.4" rx="3"/>
  <text x="502" y="138" font-size="10" font-weight="700" fill="#67e8f9" opacity="0.5">app-b.example.com</text>
  <text x="502" y="154" font-size="9" fill="#64748b" font-family="'Courier New',monospace" opacity="0.5">192.168.1.11:443 · TLS intact</text>

  <text x="350" y="202" text-anchor="middle" font-size="9" fill="#475569">passthrough: true — TLS is not terminated by Traefik, the backend decrypts the connection</text>
</svg>
