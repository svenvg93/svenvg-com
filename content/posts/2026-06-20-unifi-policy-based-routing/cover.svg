<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%" stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="hex-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1a3a"/>
      <stop offset="100%" stop-color="#07102a"/>
    </linearGradient>
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-orange" cx="82%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arr-dns" x1="326" y1="155" x2="522" y2="185" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="arr-web" x1="326" y1="265" x2="522" y2="235" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="arr-vpn" x1="680" y1="185" x2="869" y2="155" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="arr-wan" x1="680" y1="235" x2="869" y2="265" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#3b82f6"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#f97316"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-blue)"/>
  <rect width="1200" height="630" fill="url(#glow-orange)"/>

  <!-- DNS Traffic (port 53) — purple source -->
  <rect x="138" y="112" width="188" height="86" fill="#0a0a1a" stroke="#7c3aed" stroke-width="1.5" rx="6"/>
  <text x="232" y="142" text-anchor="middle" font-size="13" fill="#c4b5fd" font-weight="600">DNS Queries</text>
  <text x="232" y="160" text-anchor="middle" font-size="9" fill="#8b5cf6" letter-spacing="1">Port 53</text>
  <rect x="166" y="170" width="132" height="18" fill="#1a0a2e" stroke="#7c3aed" stroke-width="1" rx="3"/>
  <text x="232" y="183" text-anchor="middle" font-size="9" fill="#8b5cf6" font-family="'Courier New',monospace">resolv @ device</text>

  <!-- Web Traffic (ports 80/443) — orange source -->
  <rect x="138" y="212" width="188" height="86" fill="#130800" stroke="#9a3412" stroke-width="1.5" rx="6"/>
  <text x="232" y="242" text-anchor="middle" font-size="13" fill="#fed7aa" font-weight="600">Web Traffic</text>
  <text x="232" y="260" text-anchor="middle" font-size="9" fill="#f97316" letter-spacing="1">Port 80, 443</text>
  <rect x="166" y="270" width="132" height="18" fill="#1a0c00" stroke="#9a3412" stroke-width="1" rx="3"/>
  <text x="232" y="283" text-anchor="middle" font-size="9" fill="#f97316" font-family="'Courier New',monospace">http(s) @ app</text>

  <!-- Arrow DNS → Router -->
  <path d="M 326,155 C 400,155 460,185 522,190"
        fill="none" stroke="url(#arr-dns)" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Arrow Web → Router -->
  <path d="M 326,265 C 400,265 460,235 522,230"
        fill="none" stroke="url(#arr-web)" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Center: UniFi router hex, r=90, (600,210) -->
  <polygon points="600,120 678,165 678,255 600,300 522,255 522,165"
           fill="url(#hex-fill)" stroke="#3b82f6" stroke-width="2.5"/>
  <polygon points="600,134 666,172 666,248 600,286 534,248 534,172"
           fill="none" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="600" y="193" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd" letter-spacing="1">UniFi</text>
  <text x="600" y="213" text-anchor="middle" font-size="11" font-weight="600" fill="#60a5fa" letter-spacing="2">Policy Route</text>
  <text x="600" y="231" text-anchor="middle" font-size="9" fill="#475569" letter-spacing="1">Matches &amp; Routes</text>

  <!-- Config pills -->
  <g font-size="10" font-weight="600" letter-spacing="1" text-anchor="middle">
    <rect x="450" y="318" width="72" height="22" fill="#0e1a3a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5" rx="3"/>
    <text x="486" y="333" fill="#93c5fd">Port</text>
    <rect x="530" y="318" width="88" height="22" fill="#0e1a3a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5" rx="3"/>
    <text x="574" y="333" fill="#93c5fd">Application</text>
    <rect x="626" y="318" width="88" height="22" fill="#0e1a3a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5" rx="3"/>
    <text x="670" y="333" fill="#93c5fd">Network</text>
  </g>

  <!-- VPN Tunnel (orange) — top right -->
  <rect x="874" y="95" width="188" height="86" fill="#130800" stroke="#9a3412" stroke-width="1.5" rx="6"/>
  <text x="968" y="125" text-anchor="middle" font-size="13" fill="#fed7aa" font-weight="600">VPN Tunnel</text>
  <text x="968" y="143" text-anchor="middle" font-size="9" fill="#f97316" letter-spacing="1">Mullvad WireGuard</text>
  <rect x="902" y="153" width="132" height="18" fill="#1a0c00" stroke="#9a3412" stroke-width="1" rx="3"/>
  <text x="968" y="166" text-anchor="middle" font-size="9" fill="#f97316" font-family="'Courier New',monospace">UDP :13231</text>

  <!-- Arrow DNS → VPN -->
  <path d="M 680,185 L 869,145"
        fill="none" stroke="url(#arr-vpn)" stroke-width="2" marker-end="url(#arr-orange)"/>

  <!-- Primary WAN (red) — bottom right -->
  <rect x="874" y="212" width="188" height="86" fill="#1a0f0f" stroke="#7f1d1d" stroke-width="1.5" rx="6"/>
  <text x="968" y="242" text-anchor="middle" font-size="13" fill="#fca5a5" font-weight="600">Primary WAN</text>
  <text x="968" y="260" text-anchor="middle" font-size="9" fill="#ef4444" letter-spacing="1">ISP Fibre · 1 Gbps</text>
  <rect x="902" y="270" width="132" height="18" fill="#1a0808" stroke="#7f1d1d" stroke-width="1" rx="3"/>
  <text x="968" y="283" text-anchor="middle" font-size="9" fill="#ef4444" font-family="'Courier New',monospace">WAN0 · Active</text>

  <!-- Arrow Web → Primary WAN -->
  <path d="M 680,235 L 869,275"
        fill="none" stroke="url(#arr-wan)" stroke-width="2" marker-end="url(#arr-red)"/>

  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>
  <text x="600" y="500" text-anchor="middle" font-size="13" fill="#60a5fa" letter-spacing="3" font-weight="600">UNIFI</text>
  <text x="600" y="538" text-anchor="middle" font-size="34" font-weight="700" fill="#f1f5f9">Policy-Based Routing</text>
</svg>
