<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="hex-fill-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e4030"/>
      <stop offset="100%" stop-color="#072a1e"/>
    </linearGradient>
    <linearGradient id="hex-fill-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e2040"/>
      <stop offset="100%" stop-color="#071428"/>
    </linearGradient>
    <radialGradient id="glow-left" cx="16%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-center" cx="50%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-right" cx="82%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arr-src-grp" x1="281" y1="208" x2="521" y2="208" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="arr-grp-lst" x1="679" y1="222" x2="871" y2="222" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="arr-mld" x1="679" y1="240" x2="871" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
    <marker id="arr-green-rev" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <polygon points="8,0 0,3 8,6" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-left)"/>
  <rect width="1200" height="630" fill="url(#glow-center)"/>
  <rect width="1200" height="630" fill="url(#glow-right)"/>

  <!-- Left hex: SOURCE (green, cx=220 cy=215 r=70) -->
  <polygon points="220,145 281,180 281,250 220,285 159,250 159,180"
           fill="url(#hex-fill-green)" stroke="#34d399" stroke-width="2.5"/>
  <polygon points="220,153 274,184 274,246 220,277 166,246 166,184"
           fill="none" stroke="#34d399" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="220" y="210" text-anchor="middle" font-size="13" font-weight="700" fill="#86efac">SOURCE</text>
  <text x="220" y="228" text-anchor="middle" font-size="9" fill="#34d399" letter-spacing="1.5" opacity="0.8">SENDER</text>

  <!-- Center hex: MULTICAST GROUP (blue, cx=600 cy=215 r=82) -->
  <polygon points="600,133 671,174 671,256 600,297 529,256 529,174"
           fill="url(#hex-fill-blue)" stroke="#38bdf8" stroke-width="2.5"/>
  <polygon points="600,141 663,179 663,251 600,289 537,251 537,179"
           fill="none" stroke="#38bdf8" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="600" y="198" text-anchor="middle" font-size="14" font-weight="700" fill="#bae6fd" letter-spacing="1">MULTICAST</text>
  <text x="600" y="218" text-anchor="middle" font-size="8" fill="#38bdf8" font-family="'Courier New',monospace" opacity="0.9">ff02::1 · ff02::1:ffXX:XXXX</text>
  <text x="600" y="238" text-anchor="middle" font-size="9" fill="#38bdf8" letter-spacing="1.5" opacity="0.8">MLD · SNOOPING</text>

  <!-- Right hex: LISTENERS (green, cx=940 cy=215 r=70) -->
  <polygon points="940,145 1001,180 1001,250 940,285 879,250 879,180"
           fill="url(#hex-fill-green)" stroke="#34d399" stroke-width="2.5"/>
  <polygon points="940,153 994,184 994,246 940,277 886,246 886,184"
           fill="none" stroke="#34d399" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="940" y="205" text-anchor="middle" font-size="13" font-weight="700" fill="#86efac">LISTENERS</text>
  <text x="940" y="223" text-anchor="middle" font-size="9" fill="#34d399" letter-spacing="1.5" opacity="0.8">SUBSCRIBERS</text>

  <!-- Source → Group -->
  <line x1="281" y1="208" x2="521" y2="208"
        stroke="url(#arr-src-grp)" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="401" y="199" text-anchor="middle" font-size="9" fill="#94a3b8" letter-spacing="1">multicast traffic</text>

  <!-- Group → Listeners: delivery -->
  <line x1="679" y1="205" x2="871" y2="205"
        stroke="url(#arr-grp-lst)" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="775" y="196" text-anchor="middle" font-size="9" fill="#94a3b8" letter-spacing="1">delivered to subscribers</text>

  <!-- MLD: bidirectional query/report -->
  <line x1="679" y1="228" x2="871" y2="228"
        stroke="url(#arr-mld)" stroke-width="1.5" stroke-dasharray="4,3"
        marker-start="url(#arr-green-rev)" marker-end="url(#arr-green)"/>
  <text x="775" y="246" text-anchor="middle" font-size="9" fill="#94a3b8" letter-spacing="1">MLD query · report</text>

  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>
  <text x="600" y="500" text-anchor="middle" font-size="13"
        fill="#34d399" letter-spacing="3" font-weight="600">IPv6 EXPLAINED</text>
  <text x="600" y="538" text-anchor="middle" font-size="34"
        font-weight="700" fill="#f1f5f9">Multicast and MLD</text>
</svg>
