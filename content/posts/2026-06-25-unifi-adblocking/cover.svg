<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="hex-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1a3a"/>
      <stop offset="100%" stop-color="#07102a"/>
    </linearGradient>
    <radialGradient id="glow-blue" cx="35%" cy="50%" r="28%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arr-src" x1="281" y1="210" x2="522" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="arr-blocked" x1="678" y1="193" x2="880" y2="155" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="arr-allowed" x1="678" y1="227" x2="880" y2="265" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#3b82f6"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#ef4444"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-blue)"/>

  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0"   y1="100" x2="1200" y2="100"/>
    <line x1="0"   y1="210" x2="1200" y2="210"/>
    <line x1="0"   y1="320" x2="1200" y2="320"/>
    <line x1="400" y1="0"   x2="400"  y2="390"/>
    <line x1="800" y1="0"   x2="800"  y2="390"/>
  </g>

  <!-- Left: Client devices hex (cx=220, cy=210, r=70) -->
  <polygon points="220,140 281,175 281,245 220,280 159,245 159,175"
           fill="url(#hex-fill)" stroke="#3b82f6" stroke-width="2.5"/>
  <polygon points="220,148 274,179 274,241 220,272 166,241 166,179"
           fill="none" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="220" y="203" text-anchor="middle" font-size="13" font-weight="700" fill="#93c5fd" letter-spacing="1">Client</text>
  <text x="220" y="220" text-anchor="middle" font-size="10" fill="#60a5fa" letter-spacing="2">Devices</text>
  <text x="220" y="240" text-anchor="middle" font-size="8" fill="#475569" font-family="'Courier New',monospace">DNS query</text>

  <!-- Arrow: Clients → UniFi -->
  <line x1="281" y1="210" x2="522" y2="210"
        stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="401" y="200" text-anchor="middle" font-size="9" fill="#334155" letter-spacing="1">DNS query</text>

  <!-- Center: UniFi DNS Policy hex, r=90, (600,210) -->
  <polygon points="600,120 678,165 678,255 600,300 522,255 522,165"
           fill="url(#hex-fill)" stroke="#3b82f6" stroke-width="2.5"/>
  <polygon points="600,134 666,172 666,248 600,286 534,248 534,172"
           fill="none" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="600" y="193" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd" letter-spacing="1">UniFi</text>
  <text x="600" y="213" text-anchor="middle" font-size="11" font-weight="600" fill="#60a5fa" letter-spacing="2">DNS Policy</text>
  <text x="600" y="230" text-anchor="middle" font-size="9" fill="#475569" letter-spacing="1">Adblock Filter</text>

  <!-- Branch: Blocked (red) -->
  <path d="M 678,193 C 750,193 820,155 880,155"
        fill="none" stroke="url(#arr-blocked)" stroke-width="2" marker-end="url(#arr-red)"/>
  <rect x="882" y="135" width="168" height="40" fill="#150808" stroke="#7f1d1d" stroke-width="1.5" rx="4"/>
  <text x="966" y="151" text-anchor="middle" font-size="11" fill="#fca5a5" font-weight="600">Blocked</text>
  <text x="966" y="165" text-anchor="middle" font-size="8" fill="#ef4444" font-family="'Courier New',monospace">Ads · Trackers · Malware</text>

  <!-- Branch: Allowed (green) -->
  <path d="M 678,227 C 750,227 820,265 880,265"
        fill="none" stroke="url(#arr-allowed)" stroke-width="2" marker-end="url(#arr-green)"/>
  <rect x="882" y="245" width="168" height="40" fill="#071810" stroke="#166534" stroke-width="1.5" rx="4"/>
  <text x="966" y="261" text-anchor="middle" font-size="11" fill="#86efac" font-weight="600">Allowed</text>
  <text x="966" y="275" text-anchor="middle" font-size="8" fill="#4ade80" font-family="'Courier New',monospace">Clean DNS · NXDOMAIN</text>

  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>
  <text x="600" y="500" text-anchor="middle" font-size="13" fill="#60a5fa" letter-spacing="3" font-weight="600">UNIFI</text>
  <text x="600" y="538" text-anchor="middle" font-size="34" font-weight="700" fill="#f1f5f9">Network-Wide Adblocking on Unifi</text>
</svg>
