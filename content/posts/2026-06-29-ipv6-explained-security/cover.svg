<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="hex-fill-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e4030"/>
      <stop offset="100%" stop-color="#072a1e"/>
    </linearGradient>
    <linearGradient id="hex-fill-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e2040"/>
      <stop offset="100%" stop-color="#071428"/>
    </linearGradient>
    <linearGradient id="hex-fill-red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#200808"/>
      <stop offset="100%" stop-color="#140404"/>
    </linearGradient>
    <radialGradient id="glow-left" cx="16%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-center" cx="50%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-right" cx="82%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#ef4444"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-left)"/>
  <rect width="1200" height="630" fill="url(#glow-center)"/>
  <rect width="1200" height="630" fill="url(#glow-right)"/>

  <!-- Left hex: ATTACKER (red, cx=220 cy=215 r=70) -->
  <polygon points="220,145 281,180 281,250 220,285 159,250 159,180"
           fill="url(#hex-fill-red)" stroke="#ef4444" stroke-width="2.5"/>
  <polygon points="220,153 274,184 274,246 220,277 166,246 166,184"
           fill="none" stroke="#ef4444" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="220" y="212" text-anchor="middle" font-size="13" font-weight="700" fill="#fca5a5">ATTACKER</text>
  <text x="220" y="230" text-anchor="middle" font-size="9" fill="#ef4444" letter-spacing="1.5" opacity="0.8">ROGUE RA</text>

  <!-- Badge below left hex -->
  <rect x="140" y="299" width="160" height="22" fill="#250404" stroke="#ef4444" stroke-width="1" rx="3"/>
  <text x="220" y="314" text-anchor="middle" font-size="10" fill="#f87171" letter-spacing="1">host port · untrusted</text>

  <!-- Center hex: SWITCH (blue, cx=600 cy=215 r=82) -->
  <polygon points="600,133 671,174 671,256 600,297 529,256 529,174"
           fill="url(#hex-fill-blue)" stroke="#38bdf8" stroke-width="2.5"/>
  <polygon points="600,141 663,179 663,251 600,289 537,251 537,179"
           fill="none" stroke="#38bdf8" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="600" y="210" text-anchor="middle" font-size="14" font-weight="700" fill="#bae6fd" letter-spacing="1">SWITCH</text>
  <text x="600" y="230" text-anchor="middle" font-size="9" fill="#38bdf8" letter-spacing="1.5" opacity="0.9">RA GUARD</text>

  <!-- Right hex: HOSTS (green, cx=940 cy=215 r=70) -->
  <polygon points="940,145 1001,180 1001,250 940,285 879,250 879,180"
           fill="url(#hex-fill-green)" stroke="#34d399" stroke-width="2.5"/>
  <polygon points="940,153 994,184 994,246 940,277 886,246 886,184"
           fill="none" stroke="#34d399" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="940" y="210" text-anchor="middle" font-size="13" font-weight="700" fill="#86efac">HOSTS</text>
  <text x="940" y="228" text-anchor="middle" font-size="9" fill="#34d399" letter-spacing="1.5" opacity="0.8">PROTECTED</text>

  <!-- Badge below right hex -->
  <rect x="860" y="299" width="160" height="22" fill="#072a1e" stroke="#34d399" stroke-width="1" rx="3"/>
  <text x="940" y="314" text-anchor="middle" font-size="10" fill="#86efac" letter-spacing="1">host port · secured</text>

  <!-- Attacker → Switch: blocked red dashed arrow -->
  <line x1="281" y1="208" x2="520" y2="208"
        stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="401" y="199" text-anchor="middle" font-size="9" fill="#f87171" letter-spacing="1">rogue RA / DHCPv6</text>

  <!-- Block wall at switch boundary -->
  <line x1="527" y1="192" x2="527" y2="224" stroke="#ef4444" stroke-width="3"/>

  <!-- Switch → Hosts: legitimate green arrow -->
  <line x1="679" y1="208" x2="871" y2="208"
        stroke="#34d399" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="775" y="199" text-anchor="middle" font-size="9" fill="#94a3b8" letter-spacing="1">legitimate traffic only</text>

  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>
  <text x="600" y="500" text-anchor="middle" font-size="13"
        fill="#34d399" letter-spacing="3" font-weight="600">IPv6 EXPLAINED</text>
  <text x="600" y="538" text-anchor="middle" font-size="34"
        font-weight="700" fill="#f1f5f9">First-Hop Security</text>
</svg>
