<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="hex-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1a3a"/>
      <stop offset="100%" stop-color="#07102a"/>
    </linearGradient>
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-green" cx="82%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <!-- WAN1 (active, green) → Router -->
    <linearGradient id="arr-wan1" x1="300" y1="155" x2="522" y2="185" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- WAN2 (standby, orange) → Router -->
    <linearGradient id="arr-wan2" x1="300" y1="265" x2="522" y2="235" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- Router → LAN -->
    <linearGradient id="arr-lan" x1="680" y1="210" x2="870" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#3b82f6"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-blue)"/>
  <rect width="1200" height="630" fill="url(#glow-green)"/>

  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0"   y1="95"  x2="1200" y2="95"/>
    <line x1="0"   y1="315" x2="1200" y2="315"/>
    <line x1="400" y1="0"   x2="400"  y2="390"/>
    <line x1="800" y1="0"   x2="800"  y2="390"/>
  </g>

  <!-- WAN1: Primary / Active (green) -->
  <rect x="80" y="112" width="188" height="86" fill="#071810" stroke="#166534" stroke-width="1.5" rx="6"/>
  <text x="174" y="142" text-anchor="middle" font-size="13" fill="#86efac" font-weight="600">WAN 1 · Primary</text>
  <text x="174" y="160" text-anchor="middle" font-size="9" fill="#4ade80" letter-spacing="1">Fibre · 1 Gbps</text>
  <rect x="108" y="170" width="132" height="18" fill="#0a2010" stroke="#166534" stroke-width="1" rx="3"/>
  <text x="174" y="183" text-anchor="middle" font-size="9" fill="#4ade80" font-family="'Courier New',monospace">Active · Healthy</text>

  <!-- WAN2: Backup / Standby (orange) -->
  <rect x="80" y="212" width="188" height="86" fill="#130800" stroke="#9a3412" stroke-width="1.5" rx="6"/>
  <text x="174" y="242" text-anchor="middle" font-size="13" fill="#fed7aa" font-weight="600">WAN 2 · Backup</text>
  <text x="174" y="260" text-anchor="middle" font-size="9" fill="#fb923c" letter-spacing="1">LTE/5G · 200 Mbps</text>
  <rect x="108" y="270" width="132" height="18" fill="#1a0c00" stroke="#9a3412" stroke-width="1" rx="3"/>
  <text x="174" y="283" text-anchor="middle" font-size="9" fill="#fb923c" font-family="'Courier New',monospace">Standby · Ready</text>

  <!-- Arrow WAN1 → Router -->
  <path d="M 268,155 C 360,155 440,185 522,190"
        fill="none" stroke="url(#arr-wan1)" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Arrow WAN2 → Router -->
  <path d="M 268,255 C 360,255 440,235 522,230"
        fill="none" stroke="url(#arr-wan2)" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr-blue)"/>

  <!-- Center: UniFi Multi-WAN hex, r=90, (600,210) -->
  <polygon points="600,120 678,165 678,255 600,300 522,255 522,165"
           fill="url(#hex-fill)" stroke="#3b82f6" stroke-width="2.5"/>
  <polygon points="600,134 666,172 666,248 600,286 534,248 534,172"
           fill="none" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="600" y="193" text-anchor="middle" font-size="18" font-weight="700" fill="#93c5fd" letter-spacing="1">UniFi</text>
  <text x="600" y="213" text-anchor="middle" font-size="11" font-weight="600" fill="#60a5fa" letter-spacing="2">Multi-WAN</text>
  <text x="600" y="231" text-anchor="middle" font-size="9" fill="#475569" letter-spacing="1">Failover · Load Balance</text>

  <!-- Config pills -->
  <g font-size="10" font-weight="600" letter-spacing="1" text-anchor="middle">
    <rect x="450" y="318" width="72" height="22" fill="#0e1a3a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5" rx="3"/>
    <text x="486" y="333" fill="#93c5fd">Failover</text>
    <rect x="530" y="318" width="88" height="22" fill="#0e1a3a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5" rx="3"/>
    <text x="574" y="333" fill="#93c5fd">Load Balance</text>
    <rect x="626" y="318" width="88" height="22" fill="#0e1a3a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5" rx="3"/>
    <text x="670" y="333" fill="#93c5fd">Health Check</text>
    <rect x="722" y="318" width="48" height="22" fill="#0e1a3a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5" rx="3"/>
    <text x="746" y="333" fill="#93c5fd">PBR</text>
  </g>

  <!-- Router → LAN arrow -->
  <line x1="680" y1="210" x2="869" y2="210"
        stroke="url(#arr-lan)" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="775" y="198" text-anchor="middle" font-size="9" fill="#0a4040" letter-spacing="1">Always Online</text>

  <!-- Right: LAN (green) -->
  <rect x="874" y="180" width="168" height="58" fill="#071810" stroke="#166534" stroke-width="1.5" rx="5"/>
  <text x="958" y="205" text-anchor="middle" font-size="13" fill="#86efac" font-weight="600">LAN</text>
  <text x="958" y="224" text-anchor="middle" font-size="9" fill="#4ade80" letter-spacing="1">192.168.1.0/24</text>
  <line x1="918" y1="238" x2="918" y2="278" stroke="#14532d" stroke-width="1.5"/>
  <line x1="958" y1="238" x2="958" y2="278" stroke="#14532d" stroke-width="1.5"/>
  <line x1="998" y1="238" x2="998" y2="278" stroke="#14532d" stroke-width="1.5"/>
  <circle cx="918" cy="290" r="13" fill="#071810" stroke="#166534" stroke-width="1.5"/>
  <circle cx="958" cy="290" r="13" fill="#071810" stroke="#166534" stroke-width="1.5"/>
  <circle cx="998" cy="290" r="13" fill="#071810" stroke="#166534" stroke-width="1.5"/>
  <text x="918" y="294" text-anchor="middle" font-size="7" fill="#4ade80">PC</text>
  <text x="958" y="294" text-anchor="middle" font-size="7" fill="#4ade80">Phone</text>
  <text x="998" y="294" text-anchor="middle" font-size="7" fill="#4ade80">NAS</text>
  <text x="958" y="330" text-anchor="middle" font-size="10" fill="#166534" letter-spacing="1">Zero downtime failover</text>

  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>
  <text x="600" y="500" text-anchor="middle" font-size="13" fill="#60a5fa" letter-spacing="3" font-weight="600">UNIFI</text>
  <text x="600" y="538" text-anchor="middle" font-size="34" font-weight="700" fill="#f1f5f9">Multi-WAN: Load Balancing and Automatic Failover</text>
</svg>
