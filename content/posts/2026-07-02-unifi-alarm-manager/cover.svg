<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="hex-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1200"/>
      <stop offset="100%" stop-color="#0f0d00"/>
    </linearGradient>
    <radialGradient id="glow-amber" cx="50%" cy="45%" r="30%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arr-push" x1="678" y1="175" x2="870" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="arr-webhook" x1="678" y1="210" x2="870" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="arr-email" x1="678" y1="245" x2="870" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#3b82f6"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#a78bfa"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-amber)"/>

  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0"   y1="100" x2="1200" y2="100"/>
    <line x1="0"   y1="210" x2="1200" y2="210"/>
    <line x1="0"   y1="320" x2="1200" y2="320"/>
    <line x1="400" y1="0"   x2="400"  y2="390"/>
    <line x1="800" y1="0"   x2="800"  y2="390"/>
  </g>

  <!-- Left: Event sources -->
  <g text-anchor="middle">
    <rect x="90" y="148" width="220" height="30" fill="#0e1a1a" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5" rx="4"/>
    <text x="200" y="168" font-size="11" fill="#fcd34d" font-weight="600">IPS/IDS Threat Detected</text>

    <rect x="90" y="190" width="220" height="30" fill="#0e1a1a" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5" rx="4"/>
    <text x="200" y="210" font-size="11" fill="#fcd34d" font-weight="600">WAN Failover / Uplink Down</text>

    <rect x="90" y="232" width="220" height="30" fill="#0e1a1a" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5" rx="4"/>
    <text x="200" y="252" font-size="11" fill="#fcd34d" font-weight="600">VPN Tunnel State Change</text>
  </g>

  <!-- Arrows into center -->
  <line x1="310" y1="163" x2="518" y2="195" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,4" stroke-opacity="0.6"/>
  <line x1="310" y1="205" x2="520" y2="210" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,4" stroke-opacity="0.6"/>
  <line x1="310" y1="247" x2="518" y2="225" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,4" stroke-opacity="0.6"/>

  <!-- Center: Alarm Manager hex -->
  <polygon points="600,120 678,165 678,255 600,300 522,255 522,165"
           fill="url(#hex-fill)" stroke="#f59e0b" stroke-width="2.5"/>
  <polygon points="600,134 666,172 666,248 600,286 534,248 534,172"
           fill="none" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- Bell icon (simplified) -->
  <path d="M600,168 C588,168 578,178 578,192 L578,208 L570,216 L630,216 L622,208 L622,192 C622,178 612,168 600,168 Z"
        fill="none" stroke="#fbbf24" stroke-width="2"/>
  <line x1="595" y1="218" x2="605" y2="218" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="600" cy="222" r="3" fill="#fbbf24"/>

  <text x="600" y="248" text-anchor="middle" font-size="9" fill="#78716c" letter-spacing="1">Alarm Manager</text>

  <!-- Config pills -->
  <g font-size="10" font-weight="600" letter-spacing="1" text-anchor="middle">
    <rect x="454" y="318" width="68" height="22" fill="#1a1200" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5" rx="3"/>
    <text x="488" y="333" fill="#fcd34d">Security</text>
    <rect x="530" y="318" width="80" height="22" fill="#1a1200" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5" rx="3"/>
    <text x="570" y="333" fill="#fcd34d">Connectivity</text>
    <rect x="618" y="318" width="60" height="22" fill="#1a1200" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5" rx="3"/>
    <text x="648" y="333" fill="#fcd34d">Device</text>
    <rect x="686" y="318" width="56" height="22" fill="#1a1200" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5" rx="3"/>
    <text x="714" y="333" fill="#fcd34d">Client</text>
  </g>

  <!-- Output: Push -->
  <path d="M 678,185 C 750,185 820,140 870,140"
        fill="none" stroke="url(#arr-push)" stroke-width="2" marker-end="url(#arr-blue)"/>
  <rect x="872" y="120" width="158" height="40" fill="#07101f" stroke="#3b82f6" stroke-width="1.5" rx="4"/>
  <text x="951" y="136" text-anchor="middle" font-size="11" fill="#93c5fd" font-weight="600">Push</text>
  <text x="951" y="151" text-anchor="middle" font-size="8" fill="#60a5fa" font-family="'Courier New',monospace">UniFi App</text>

  <!-- Output: Webhook -->
  <path d="M 678,210 C 750,210 820,210 870,210"
        fill="none" stroke="url(#arr-webhook)" stroke-width="2" marker-end="url(#arr-purple)"/>
  <rect x="872" y="190" width="158" height="40" fill="#0f0a1f" stroke="#a78bfa" stroke-width="1.5" rx="4"/>
  <text x="951" y="206" text-anchor="middle" font-size="11" fill="#c4b5fd" font-weight="600">Webhook</text>
  <text x="951" y="221" text-anchor="middle" font-size="8" fill="#a78bfa" font-family="'Courier New',monospace">Discord · ntfy · Slack</text>

  <!-- Output: Email -->
  <path d="M 678,235 C 750,235 820,280 870,280"
        fill="none" stroke="url(#arr-email)" stroke-width="2" marker-end="url(#arr-green)"/>
  <rect x="872" y="260" width="158" height="40" fill="#071810" stroke="#34d399" stroke-width="1.5" rx="4"/>
  <text x="951" y="276" text-anchor="middle" font-size="11" fill="#86efac" font-weight="600">Email</text>
  <text x="951" y="291" text-anchor="middle" font-size="8" fill="#4ade80" font-family="'Courier New',monospace">SMTP · UI Relay</text>

  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>
  <text x="600" y="500" text-anchor="middle" font-size="13" fill="#f59e0b" letter-spacing="3" font-weight="600">UNIFI</text>
  <text x="600" y="538" text-anchor="middle" font-size="34" font-weight="700" fill="#f1f5f9">Alarm Manager: Network Alerts That Actually Matter</text>
</svg>
