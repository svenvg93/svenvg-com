<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="hex-fill-unifi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1a3a"/>
      <stop offset="100%" stop-color="#07102a"/>
    </linearGradient>
    <linearGradient id="hex-fill-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e4030"/>
      <stop offset="100%" stop-color="#072a1e"/>
    </linearGradient>
    <linearGradient id="hex-fill-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#042a40"/>
      <stop offset="100%" stop-color="#021828"/>
    </linearGradient>
    <radialGradient id="glow-green" cx="17%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="18%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-sky" cx="83%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arr-acme-unifi" x1="281" y1="215" x2="529" y2="215" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="arr-unifi-https" x1="671" y1="215" x2="879" y2="215" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#3b82f6"/>
    </marker>
    <marker id="arr-sky" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-green)"/>
  <rect width="1200" height="630" fill="url(#glow-blue)"/>
  <rect width="1200" height="630" fill="url(#glow-sky)"/>

  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0"    y1="100" x2="1200" y2="100"/>
    <line x1="0"    y1="200" x2="1200" y2="200"/>
    <line x1="0"    y1="300" x2="1200" y2="300"/>
    <line x1="200"  y1="0"   x2="200"  y2="390"/>
    <line x1="600"  y1="0"   x2="600"  y2="390"/>
    <line x1="1000" y1="0"   x2="1000" y2="390"/>
  </g>

  <!-- Left: ACME / Let's Encrypt hex (cx=220, cy=215, r=70) -->
  <polygon points="220,145 281,180 281,250 220,285 159,250 159,180"
           fill="url(#hex-fill-green)" stroke="#34d399" stroke-width="2.5"/>
  <polygon points="220,153 274,184 274,246 220,277 166,246 166,184"
           fill="none" stroke="#34d399" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="220" y="206" text-anchor="middle" font-size="14" font-weight="700" fill="#86efac" letter-spacing="1">ACME</text>
  <text x="220" y="224" text-anchor="middle" font-size="9" fill="#34d399" letter-spacing="2">Let's Encrypt</text>
  <text x="220" y="255" text-anchor="middle" font-size="8" fill="#4ade80" font-family="'Courier New',monospace">acme.sh</text>

  <!-- Arrow: ACME → UniFi -->
  <path d="M 281,215 L 529,215"
        fill="none" stroke="url(#arr-acme-unifi)" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="405" y="205" text-anchor="middle" font-size="9" fill="#334155" letter-spacing="1">cert import</text>

  <!-- Center: UniFi hex (cx=600, cy=215, r=82) -->
  <polygon points="600,133 671,174 671,256 600,297 529,256 529,174"
           fill="url(#hex-fill-unifi)" stroke="#3b82f6" stroke-width="2.5"/>
  <polygon points="600,141 663,179 663,251 600,289 537,251 537,179"
           fill="none" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="600" y="207" text-anchor="middle" font-size="20" font-weight="700" fill="#93c5fd" letter-spacing="1">UniFi</text>
  <text x="600" y="228" text-anchor="middle" font-size="11" font-weight="600" fill="#60a5fa" letter-spacing="2">TLS 1.3</text>
  <text x="600" y="279" text-anchor="middle" font-size="9" fill="#3b82f6" font-family="'Courier New',monospace">443/tcp</text>

  <!-- Arrow: UniFi → HTTPS -->
  <path d="M 671,215 L 879,215"
        fill="none" stroke="url(#arr-unifi-https)" stroke-width="2" marker-end="url(#arr-sky)"/>
  <text x="775" y="205" text-anchor="middle" font-size="9" fill="#334155" letter-spacing="1">HTTPS · TLS 1.3</text>

  <!-- Right: HTTPS Browser hex (cx=940, cy=215, r=70) -->
  <polygon points="940,145 1001,180 1001,250 940,285 879,250 879,180"
           fill="url(#hex-fill-sky)" stroke="#38bdf8" stroke-width="2.5"/>
  <polygon points="940,153 994,184 994,246 940,277 886,246 886,184"
           fill="none" stroke="#38bdf8" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="940" y="207" text-anchor="middle" font-size="14" font-weight="700" fill="#bae6fd" letter-spacing="1">HTTPS</text>
  <text x="940" y="225" text-anchor="middle" font-size="9" fill="#38bdf8" letter-spacing="2">Trusted Cert</text>
  <text x="940" y="256" text-anchor="middle" font-size="8" fill="#7dd3fc" font-family="'Courier New',monospace">Valid · 90d</text>

  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>
  <text x="600" y="500" text-anchor="middle" font-size="13" fill="#60a5fa" letter-spacing="3" font-weight="600">UNIFI</text>
  <text x="600" y="538" text-anchor="middle" font-size="34" font-weight="700" fill="#f1f5f9">Trusted HTTPS on Unifi with Let's Encrypt</text>
</svg>
