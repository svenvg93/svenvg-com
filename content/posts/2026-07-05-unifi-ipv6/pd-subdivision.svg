<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" width="700" height="280"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="arr-pd" x1="170" y1="80" x2="258" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="arr-lan" x1="308" y1="130" x2="190" y2="168" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="arr-iot" x1="392" y1="130" x2="510" y2="168" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#3b82f6"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#34d399"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="700" height="280" fill="url(#bg)" rx="8"/>

  <!-- subtle grid -->
  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0" y1="93" x2="700" y2="93"/>
    <line x1="350" y1="0" x2="350" y2="280"/>
  </g>

  <!-- title -->
  <text x="350" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1">PREFIX DELEGATION — /56 SUBDIVIDED INTO /64 PER VLAN</text>

  <!-- ISP box -->
  <rect x="20" y="36" width="150" height="56" fill="#150808" stroke="#7f1d1d" stroke-width="1.5" rx="5"/>
  <text x="95" y="57" text-anchor="middle" font-size="12" font-weight="600" fill="#f87171">ISP</text>
  <text x="95" y="73" text-anchor="middle" font-size="9" fill="#f87171" font-family="'Courier New',monospace">2001:db8::/56</text>
  <text x="95" y="85" text-anchor="middle" font-size="8" fill="#7f1d1d">256 × /64 available</text>

  <!-- ISP → Gateway arrow -->
  <line x1="170" y1="64" x2="256" y2="64" stroke="url(#arr-pd)" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>
  <text x="213" y="57" text-anchor="middle" font-size="8" fill="#6366f1" letter-spacing="1">DHCPv6-PD</text>

  <!-- Gateway box -->
  <rect x="260" y="36" width="180" height="56" fill="#0e1a3a" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="350" y="57" text-anchor="middle" font-size="12" font-weight="600" fill="#93c5fd">UniFi Gateway</text>
  <text x="350" y="73" text-anchor="middle" font-size="9" fill="#60a5fa">receives /56 · assigns</text>
  <text x="350" y="85" text-anchor="middle" font-size="8" fill="#3b82f6">Prefix ID per network</text>

  <!-- Gateway → LAN arrow -->
  <line x1="308" y1="92" x2="190" y2="168" stroke="url(#arr-lan)" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Gateway → IoT arrow -->
  <line x1="392" y1="92" x2="510" y2="168" stroke="url(#arr-iot)" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <!-- Prefix ID labels with dark bg -->
  <rect x="148" y="122" width="64" height="14" fill="#080c14" rx="2"/>
  <text x="180" y="133" text-anchor="middle" font-size="9" fill="#60a5fa">Prefix ID 0</text>
  <rect x="488" y="122" width="64" height="14" fill="#080c14" rx="2"/>
  <text x="520" y="133" text-anchor="middle" font-size="9" fill="#60a5fa">Prefix ID 1</text>

  <!-- LAN box -->
  <rect x="20" y="172" width="270" height="72" fill="#071810" stroke="#166534" stroke-width="1.5" rx="5"/>
  <text x="155" y="192" text-anchor="middle" font-size="11" font-weight="600" fill="#86efac">LAN</text>
  <text x="155" y="210" text-anchor="middle" font-size="9" fill="#4ade80" font-family="'Courier New',monospace">2001:db8:0000::/64</text>
  <text x="155" y="226" text-anchor="middle" font-size="8" fill="#166534">SLAAC — devices self-assign</text>
  <text x="155" y="238" text-anchor="middle" font-size="8" fill="#14532d">18 quintillion addresses</text>

  <!-- IoT box -->
  <rect x="410" y="172" width="270" height="72" fill="#1a1000" stroke="#92400e" stroke-width="1.5" rx="5"/>
  <text x="545" y="192" text-anchor="middle" font-size="11" font-weight="600" fill="#fcd34d">IoT</text>
  <text x="545" y="210" text-anchor="middle" font-size="9" fill="#f59e0b" font-family="'Courier New',monospace">2001:db8:0001::/64</text>
  <text x="545" y="226" text-anchor="middle" font-size="8" fill="#92400e">SLAAC — devices self-assign</text>
  <text x="545" y="238" text-anchor="middle" font-size="8" fill="#78350f">isolated from LAN</text>

  <!-- caption -->
  <text x="350" y="264" text-anchor="middle" font-size="9" fill="#94a3b8">Add more Prefix IDs for additional VLANs — up to 255 /64 subnets from a /56</text>
</svg>
