<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="hex-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1a3a"/>
      <stop offset="100%" stop-color="#07102a"/>
    </linearGradient>
    <radialGradient id="glow-red" cx="16%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-orange" cx="82%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arr-wan" x1="265" y1="210" x2="519" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="arr-vpn" x1="680" y1="210" x2="870" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#3b82f6"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#f97316"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-red)"/>
  <rect width="1200" height="630" fill="url(#glow-blue)"/>
  <rect width="1200" height="630" fill="url(#glow-orange)"/>

  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0"   y1="95"  x2="1200" y2="95"/>
    <line x1="0"   y1="315" x2="1200" y2="315"/>
    <line x1="400" y1="0"   x2="400"  y2="390"/>
    <line x1="800" y1="0"   x2="800"  y2="390"/>
  </g>

  <!-- Left: Internet / Hotel WiFi (red) -->
  <circle cx="190" cy="210" r="74" fill="#150808" stroke="#7f1d1d" stroke-width="1.5"/>
  <ellipse cx="190" cy="210" rx="37" ry="74" fill="none" stroke="#7f1d1d" stroke-width="1"/>
  <line x1="116" y1="210" x2="264" y2="210" stroke="#7f1d1d" stroke-width="1"/>
  <line x1="122" y1="173" x2="258" y2="173" stroke="#7f1d1d" stroke-width="1" opacity="0.4"/>
  <line x1="122" y1="247" x2="258" y2="247" stroke="#7f1d1d" stroke-width="1" opacity="0.4"/>
  <text x="190" y="216" text-anchor="middle" font-size="14" fill="#f87171" font-weight="600">Internet</text>
  <rect x="122" y="299" width="136" height="22" fill="#150808" stroke="#7f1d1d" stroke-width="1" rx="3"/>
  <text x="190" y="314" text-anchor="middle" font-size="10" fill="#f87171" letter-spacing="1">Hotel · Public WiFi</text>

  <!-- WAN arrow -->
  <line x1="265" y1="210" x2="519" y2="210"
        stroke="url(#arr-wan)" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr-blue)"/>
  <text x="392" y="198" text-anchor="middle" font-size="9" fill="#6b2020" letter-spacing="1">Repeater · DHCP</text>

  <!-- Center: UniFi Travel Router hex, r=90, (600,210) -->
  <polygon points="600,120 678,165 678,255 600,300 522,255 522,165"
           fill="url(#hex-fill)" stroke="#3b82f6" stroke-width="2.5"/>
  <polygon points="600,134 666,172 666,248 600,286 534,248 534,172"
           fill="none" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="600" y="197" text-anchor="middle" font-size="20" font-weight="700" fill="#93c5fd" letter-spacing="1">UniFi</text>
  <text x="600" y="218" text-anchor="middle" font-size="11" font-weight="600" fill="#60a5fa" letter-spacing="2">Travel Router</text>

  <!-- Config pills -->
  <g font-size="10" font-weight="600" letter-spacing="1" text-anchor="middle">
    <rect x="450" y="318" width="48" height="22" fill="#0e1a3a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5" rx="3"/>
    <text x="474" y="333" fill="#93c5fd">VPN</text>
    <rect x="506" y="318" width="88" height="22" fill="#0e1a3a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5" rx="3"/>
    <text x="550" y="333" fill="#93c5fd">WireGuard</text>
    <rect x="602" y="318" width="80" height="22" fill="#0e1a3a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5" rx="3"/>
    <text x="642" y="333" fill="#93c5fd">Repeater</text>
    <rect x="690" y="318" width="60" height="22" fill="#0e1a3a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5" rx="3"/>
    <text x="720" y="333" fill="#93c5fd">WiFi5</text>
  </g>

  <!-- VPN tunnel arrow (orange) -->
  <line x1="680" y1="210" x2="869" y2="210"
        stroke="url(#arr-vpn)" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr-orange)"/>
  <text x="775" y="198" text-anchor="middle" font-size="9" fill="#7c2d12" letter-spacing="1">WireGuard VPN</text>

  <!-- Right: Home Unifi (orange-tinted for VPN endpoint) -->
  <rect x="874" y="180" width="168" height="58" fill="#130800" stroke="#9a3412" stroke-width="1.5" rx="5"/>
  <text x="958" y="205" text-anchor="middle" font-size="13" fill="#fed7aa" font-weight="600">Home UniFi</text>
  <text x="958" y="224" text-anchor="middle" font-size="9" fill="#fb923c" letter-spacing="1">192.168.1.0/24</text>
  <line x1="918" y1="238" x2="918" y2="278" stroke="#7c2d12" stroke-width="1.5"/>
  <line x1="958" y1="238" x2="958" y2="278" stroke="#7c2d12" stroke-width="1.5"/>
  <line x1="998" y1="238" x2="998" y2="278" stroke="#7c2d12" stroke-width="1.5"/>
  <circle cx="918" cy="290" r="13" fill="#130800" stroke="#9a3412" stroke-width="1.5"/>
  <circle cx="958" cy="290" r="13" fill="#130800" stroke="#9a3412" stroke-width="1.5"/>
  <circle cx="998" cy="290" r="13" fill="#130800" stroke="#9a3412" stroke-width="1.5"/>
  <text x="918" y="294" text-anchor="middle" font-size="7" fill="#fb923c">NAS</text>
  <text x="958" y="294" text-anchor="middle" font-size="7" fill="#fb923c">PC</text>
  <text x="998" y="294" text-anchor="middle" font-size="7" fill="#fb923c">IoT</text>
  <text x="958" y="330" text-anchor="middle" font-size="10" fill="#9a3412" letter-spacing="1">VPN Endpoint · Home LAN</text>

  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>
  <text x="600" y="500" text-anchor="middle" font-size="13" fill="#60a5fa" letter-spacing="3" font-weight="600">UNIFI TRAVEL ROUTER</text>
  <text x="600" y="538" text-anchor="middle" font-size="34" font-weight="700" fill="#f1f5f9">Your Home Network Everywhere</text>
</svg>
