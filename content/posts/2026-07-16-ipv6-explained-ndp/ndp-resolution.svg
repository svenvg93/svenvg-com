<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 240" width="700" height="240"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <marker id="arr-r" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#10b981"/>
    </marker>
    <marker id="arr-l" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="700" height="240" fill="#f8fafc" rx="12"/>
  <text x="350" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">NDP Address Resolution — Neighbor Solicitation and Advertisement</text>

  <!-- Device A -->
  <rect x="30" y="50" width="130" height="50" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5" rx="6"/>
  <text x="95" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">DEVICE A</text>
  <text x="95" y="88" text-anchor="middle" font-size="8" fill="#10b981" font-family="'Courier New',monospace">2001:db8::1</text>

  <!-- Solicited-node multicast -->
  <rect x="270" y="50" width="160" height="50" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" rx="6"/>
  <text x="350" y="70" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">SOLICITED-NODE</text>
  <text x="350" y="83" text-anchor="middle" font-size="8" fill="#92400e" font-family="'Courier New',monospace">ff02::1:ff00:0002</text>
  <text x="350" y="96" text-anchor="middle" font-size="8" fill="#b45309">(last 24 bits of target)</text>

  <!-- Device B -->
  <rect x="540" y="50" width="130" height="50" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5" rx="6"/>
  <text x="605" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">DEVICE B</text>
  <text x="605" y="88" text-anchor="middle" font-size="8" fill="#10b981" font-family="'Courier New',monospace">2001:db8::2</text>

  <!-- NS: A → multicast -->
  <line x1="160" y1="75" x2="265" y2="75" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="213" y="68" text-anchor="middle" font-size="9" fill="#374151">NS · who has ::2?</text>

  <!-- Multicast → B (B is listening) -->
  <line x1="430" y1="75" x2="535" y2="75" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-r)"/>
  <text x="483" y="68" text-anchor="middle" font-size="9" fill="#374151">multicast</text>

  <!-- NA: B → A (unicast reply) -->
  <line x1="540" y1="145" x2="165" y2="145" stroke="#10b981" stroke-width="2" marker-end="url(#arr-l)" transform="rotate(180,352.5,145)"/>
  <line x1="165" y1="145" x2="540" y2="145" stroke="#10b981" stroke-width="2"/>
  <text x="350" y="138" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">NA — Neighbor Advertisement (unicast)</text>
  <text x="350" y="158" text-anchor="middle" font-size="9" fill="#64748b">I am ::2 · my MAC is aa:bb:cc:dd:ee:ff</text>

  <!-- Neighbor cache -->
  <rect x="30" y="180" width="200" height="42" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" rx="5"/>
  <text x="130" y="196" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">Neighbor Cache (A)</text>
  <text x="130" y="213" text-anchor="middle" font-size="9" fill="#64748b" font-family="'Courier New',monospace">2001:db8::2 → aa:bb:cc:dd:ee:ff</text>

  <text x="490" y="196" text-anchor="middle" font-size="10" fill="#94a3b8">A can now send frames</text>
  <text x="490" y="212" text-anchor="middle" font-size="10" fill="#94a3b8">directly to B's MAC</text>
</svg>
