<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" width="700" height="280"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <rect width="700" height="280" fill="#f8fafc" rx="12"/>
  <text x="350" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">IPv6 Firewall Policy — Default-Deny Inbound</text>

  <!-- WAN → LAN section -->
  <rect x="20" y="36" width="660" height="90" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" rx="8"/>
  <text x="40" y="56" font-size="11" font-weight="700" fill="#b91c1c">WAN → LAN (inbound)</text>

  <!-- Rules -->
  <rect x="36" y="63" width="300" height="22" fill="white" stroke="#fca5a5" stroke-width="1" rx="3"/>
  <text x="50" y="78" font-size="9" fill="#374151">DROP — default (new connections)</text>
  <rect x="36" y="91" width="300" height="22" fill="#f0fdf4" stroke="#86efac" stroke-width="1" rx="3"/>
  <text x="50" y="106" font-size="9" fill="#374151">ACCEPT — established / related (return traffic)</text>
  <rect x="344" y="63" width="320" height="50" fill="#fffbeb" stroke="#fde68a" stroke-width="1" rx="3"/>
  <text x="360" y="78" font-size="9" fill="#374151">ACCEPT — specific services</text>
  <text x="360" y="92" font-size="9" fill="#64748b">(only what you explicitly expose)</text>
  <text x="360" y="106" font-size="9" fill="#64748b">e.g. TCP 443 to 2001:db8::web</text>

  <!-- LAN → WAN section -->
  <rect x="20" y="136" width="660" height="50" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5" rx="8"/>
  <text x="40" y="156" font-size="11" font-weight="700" fill="#065f46">LAN → WAN (outbound)</text>
  <rect x="240" y="143" width="420" height="22" fill="white" stroke="#86efac" stroke-width="1" rx="3"/>
  <text x="256" y="158" font-size="9" fill="#374151">ACCEPT — default (or apply egress filtering as needed)</text>

  <!-- ICMPv6 section -->
  <rect x="20" y="196" width="660" height="70" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" rx="8"/>
  <text x="40" y="216" font-size="11" font-weight="700" fill="#1d4ed8">ICMPv6 — never block these types</text>

  <text x="40" y="234" font-size="9" fill="#374151">Type 133 Router Solicitation</text>
  <text x="40" y="248" font-size="9" fill="#374151">Type 134 Router Advertisement</text>
  <text x="40" y="262" font-size="9" fill="#374151">Type 135/136 Neighbor Sol/Adv (NDP)</text>

  <text x="260" y="234" font-size="9" fill="#374151">Type 2 Packet Too Big (PMTUD)</text>
  <text x="260" y="248" font-size="9" fill="#374151">Type 1 Destination Unreachable</text>
  <text x="260" y="262" font-size="9" fill="#64748b">Blocking these breaks SLAAC, NDP, and PMTUD</text>
</svg>
