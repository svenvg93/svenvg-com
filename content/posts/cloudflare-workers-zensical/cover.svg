<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%" stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="hex-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f0e04"/>
      <stop offset="100%" stop-color="#130800"/>
    </linearGradient>
    <radialGradient id="worker-glow" cx="50%" cy="34%" r="42%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#f97316"/>
    </marker>
    <marker id="arr-slate" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#worker-glow)"/>

  <!-- Line grid -->
  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0"    y1="100" x2="1200" y2="100"/>
    <line x1="0"    y1="200" x2="1200" y2="200"/>
    <line x1="0"    y1="300" x2="1200" y2="300"/>
    <line x1="200"  y1="0"   x2="200"  y2="390"/>
    <line x1="400"  y1="0"   x2="400"  y2="390"/>
    <line x1="600"  y1="0"   x2="600"  y2="390"/>
    <line x1="800"  y1="0"   x2="800"  y2="390"/>
    <line x1="1000" y1="0"   x2="1000" y2="390"/>
  </g>

  <!-- ── Deploy source node (zensical) ── -->
  <circle cx="280" cy="210" r="42" fill="#060e1c" stroke="#38bdf8" stroke-width="2"/>
  <circle cx="280" cy="210" r="32" fill="#081220" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4,3"/>
  <text x="280" y="205" text-anchor="middle" font-size="19" fill="#7dd3fc" font-weight="700">Z</text>
  <text x="280" y="219" text-anchor="middle" font-size="7"  fill="#38bdf8" letter-spacing="3">ENSICAL</text>
  <text x="280" y="264" text-anchor="middle" font-size="10" fill="#38bdf8" font-weight="700">zensical</text>
  <text x="280" y="277" text-anchor="middle" font-size="8"  fill="#7dd3fc">deploy source</text>

  <!-- Arrow: source → worker with deploy label -->
  <line x1="322" y1="210" x2="551" y2="210"
        stroke="#475569" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-slate)"/>
  <text x="436" y="200" text-anchor="middle" font-size="8" fill="#64748b" letter-spacing="1">wrangler deploy</text>

  <!-- ── Central CF Worker hexagon — center (600,210), r=52 ── -->
  <!-- Outer glow ring -->
  <circle cx="600" cy="210" r="85" fill="none" stroke="#f97316" stroke-width="1" stroke-opacity="0.10" stroke-dasharray="4,10"/>

  <!-- Hex body -->
  <polygon points="600,158 645,184 645,236 600,262 555,236 555,184"
           fill="url(#hex-fill)" stroke="#f97316" stroke-width="2.5"/>
  <!-- Inner ring -->
  <polygon points="600,168 636,189 636,231 600,252 564,231 564,189"
           fill="none" stroke="#f97316" stroke-width="0.8" stroke-opacity="0.35"/>

  <!-- Worker label -->
  <text x="600" y="204" text-anchor="middle" font-size="11" fill="#fb923c" font-weight="700" letter-spacing="1">CF WORKER</text>
  <text x="600" y="219" text-anchor="middle" font-size="8"  fill="#f97316" letter-spacing="2" opacity="0.8">workers.dev</text>

  <!-- Edge count badge -->
  <rect x="512" y="274" width="176" height="22" fill="#120800" stroke="#f97316" stroke-width="1" rx="11" stroke-opacity="0.45"/>
  <text x="600" y="289" text-anchor="middle" font-size="9" fill="#fb923c" letter-spacing="1">300+ edge locations</text>

  <!-- ── Arrows: worker → edge regions ── -->
  <line x1="645" y1="192" x2="826" y2="151" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <line x1="645" y1="210" x2="856" y2="210" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <line x1="645" y1="228" x2="826" y2="269" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <!-- ── Edge region nodes ── -->
  <!-- Americas (850, 152) -->
  <circle cx="850" cy="152" r="22" fill="#1a0c04" stroke="#f97316" stroke-width="2"/>
  <circle cx="850" cy="152" r="7"  fill="#f97316" fill-opacity="0.85"/>
  <text x="882" y="149" font-size="10" fill="#f97316" font-weight="700">Americas</text>
  <text x="882" y="161" font-size="8"  fill="#fed7aa">US · CA · SA</text>

  <!-- Europe (880, 210) -->
  <circle cx="880" cy="210" r="22" fill="#1a0c04" stroke="#f97316" stroke-width="2"/>
  <circle cx="880" cy="210" r="7"  fill="#f97316" fill-opacity="0.85"/>
  <text x="912" y="207" font-size="10" fill="#f97316" font-weight="700">Europe</text>
  <text x="912" y="219" font-size="8"  fill="#fed7aa">EU · UK · ME</text>

  <!-- Asia Pacific (850, 270) -->
  <circle cx="850" cy="270" r="22" fill="#1a0c04" stroke="#f97316" stroke-width="2"/>
  <circle cx="850" cy="270" r="7"  fill="#f97316" fill-opacity="0.85"/>
  <text x="882" y="267" font-size="10" fill="#f97316" font-weight="700">Asia Pacific</text>
  <text x="882" y="279" font-size="8"  fill="#fed7aa">AP · AU · IN</text>

  <!-- Bottom overlay -->
  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>

  <text x="600" y="500" text-anchor="middle" font-size="13" fill="#f97316" letter-spacing="3" font-weight="600">CLOUDFLARE WORKERS</text>
  <text x="600" y="538" text-anchor="middle" font-size="34" font-weight="700" fill="#f1f5f9">Deploying Zensical on Cloudflare Workers</text>
</svg>
