<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="hex-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a2820"/>
      <stop offset="100%" stop-color="#051a10"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%" stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <radialGradient id="hex-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/>
  </g>

  <!-- Glow — cy=250 -->
  <circle cx="600" cy="250" r="220" fill="url(#hex-glow)"/>

  <!-- Outer faint rings -->
  <polygon points="760,250 680,106 520,106 440,250 520,394 680,394"
           fill="none" stroke="#34d399" stroke-width="1" stroke-opacity="0.08"/>
  <polygon points="745,250 672,124 528,124 455,250 528,376 672,376"
           fill="none" stroke="#34d399" stroke-width="1" stroke-opacity="0.13"/>
  <polygon points="730,250 665,133 535,133 470,250 535,367 665,367"
           fill="none" stroke="#34d399" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Main hexagon — cy=250 -->
  <polygon points="720,250 660,142 540,142 480,250 540,358 660,358"
           fill="url(#hex-fill)" stroke="#34d399" stroke-width="2.5"/>
  <polygon points="700,250 644,150 556,150 500,250 556,350 644,350"
           fill="none" stroke="#34d399" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- Corner dots -->
  <circle cx="720" cy="250" r="5" fill="#34d399"/>
  <circle cx="660" cy="142" r="5" fill="#34d399" fill-opacity="0.8"/>
  <circle cx="540" cy="142" r="5" fill="#34d399" fill-opacity="0.8"/>
  <circle cx="480" cy="250" r="5" fill="#34d399"/>
  <circle cx="540" cy="358" r="5" fill="#34d399" fill-opacity="0.8"/>
  <circle cx="660" cy="358" r="5" fill="#34d399" fill-opacity="0.6"/>

  <!-- Radiating spokes -->
  <line x1="720" y1="250" x2="790" y2="250" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="660" y1="142" x2="700" y2="95"  stroke="#34d399" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="540" y1="142" x2="500" y2="95"  stroke="#34d399" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="480" y1="250" x2="410" y2="250" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="540" y1="358" x2="500" y2="405" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="660" y1="358" x2="700" y2="405" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Spoke endpoint dots -->
  <circle cx="790" cy="250" r="3" fill="#34d399" fill-opacity="0.6"/>
  <circle cx="700" cy="95"  r="3" fill="#34d399" fill-opacity="0.5"/>
  <circle cx="500" cy="95"  r="3" fill="#34d399" fill-opacity="0.5"/>
  <circle cx="410" cy="250" r="3" fill="#34d399" fill-opacity="0.6"/>
  <circle cx="500" cy="405" r="3" fill="#34d399" fill-opacity="0.5"/>
  <circle cx="700" cy="405" r="3" fill="#34d399" fill-opacity="0.3"/>

  <!-- Spoke labels -->
  <text x="800" y="254" font-size="9" fill="#34d399" fill-opacity="0.8" font-weight="600">Routing</text>
  <text x="703" y="91"  text-anchor="middle" font-size="9" fill="#34d399" fill-opacity="0.8" font-weight="600">SLAAC</text>
  <text x="497" y="91"  text-anchor="end" font-size="9" fill="#34d399" fill-opacity="0.8" font-weight="600">Addressing</text>
  <text x="402" y="254" text-anchor="end" font-size="9" fill="#34d399" fill-opacity="0.8" font-weight="600">NDP</text>
  <text x="497" y="413" text-anchor="end" font-size="9" fill="#34d399" fill-opacity="0.8" font-weight="600">Prefix Delegation</text>

  <!-- Wordmark -->
  <text x="600" y="241" text-anchor="middle" font-size="30" font-weight="700" fill="#34d399" letter-spacing="6">IPv6</text>
  <text x="600" y="265" text-anchor="middle" font-size="9" fill="#34d399" fill-opacity="0.35" font-family="'Courier New',monospace" letter-spacing="2">2001:db8::/32</text>

  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>

  <text x="600" y="500" text-anchor="middle" font-size="13" fill="#34d399" letter-spacing="3" font-weight="600">IPv6 EXPLAINED</text>
  <text x="600" y="538" text-anchor="middle" font-size="34" font-weight="700" fill="#f1f5f9">IPv6 Explained</text>
</svg>
