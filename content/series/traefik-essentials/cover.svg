<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="hex-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e3040"/>
      <stop offset="100%" stop-color="#071e2a"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%" stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <radialGradient id="hex-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#37BEC3" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#37BEC3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/>
  </g>

  <circle cx="600" cy="240" r="220" fill="url(#hex-glow)"/>

  <!-- Outer faint rings — cy=240 -->
  <polygon points="760,240 680,96 520,96 440,240 520,384 680,384"
           fill="none" stroke="#37BEC3" stroke-width="1" stroke-opacity="0.08"/>
  <polygon points="745,240 672,114 528,114 455,240 528,366 672,366"
           fill="none" stroke="#37BEC3" stroke-width="1" stroke-opacity="0.13"/>
  <polygon points="730,240 665,123 535,123 470,240 535,357 665,357"
           fill="none" stroke="#37BEC3" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Main hexagon -->
  <polygon points="720,240 660,132 540,132 480,240 540,348 660,348"
           fill="url(#hex-fill)" stroke="#37BEC3" stroke-width="2.5"/>
  <polygon points="700,240 644,140 556,140 500,240 556,340 644,340"
           fill="none" stroke="#37BEC3" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- Corner dots -->
  <circle cx="720" cy="240" r="5" fill="#37BEC3"/>
  <circle cx="660" cy="132" r="5" fill="#37BEC3" fill-opacity="0.8"/>
  <circle cx="540" cy="132" r="5" fill="#37BEC3" fill-opacity="0.8"/>
  <circle cx="480" cy="240" r="5" fill="#37BEC3"/>
  <circle cx="540" cy="348" r="5" fill="#37BEC3" fill-opacity="0.8"/>
  <circle cx="660" cy="348" r="5" fill="#37BEC3" fill-opacity="0.8"/>

  <!-- Radiating spokes -->
  <line x1="720" y1="240" x2="790" y2="240" stroke="#37BEC3" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="660" y1="132" x2="700" y2="85"  stroke="#37BEC3" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="540" y1="132" x2="500" y2="85"  stroke="#37BEC3" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="480" y1="240" x2="410" y2="240" stroke="#37BEC3" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="540" y1="348" x2="500" y2="395" stroke="#37BEC3" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="660" y1="348" x2="700" y2="395" stroke="#37BEC3" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Spoke endpoint dots -->
  <circle cx="790" cy="240" r="3" fill="#37BEC3" fill-opacity="0.6"/>
  <circle cx="700" cy="85"  r="3" fill="#37BEC3" fill-opacity="0.5"/>
  <circle cx="500" cy="85"  r="3" fill="#37BEC3" fill-opacity="0.5"/>
  <circle cx="410" cy="240" r="3" fill="#37BEC3" fill-opacity="0.6"/>
  <circle cx="500" cy="395" r="3" fill="#37BEC3" fill-opacity="0.5"/>
  <circle cx="700" cy="395" r="3" fill="#37BEC3" fill-opacity="0.5"/>

  <!-- Spoke labels -->
  <text x="800" y="244" font-size="9" fill="#37BEC3" fill-opacity="0.8" font-weight="600">Docker</text>
  <text x="703" y="81"  text-anchor="middle" font-size="9" fill="#37BEC3" fill-opacity="0.8" font-weight="600">TLS</text>
  <text x="402" y="244" text-anchor="end" font-size="9" fill="#37BEC3" fill-opacity="0.8" font-weight="600">Bare Metal</text>

  <!-- Wordmark -->
  <text x="600" y="250" text-anchor="middle" font-size="30" font-weight="700" fill="#37BEC3" letter-spacing="6">traefik</text>

  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>

  <text x="600" y="500" text-anchor="middle" font-size="13" fill="#37BEC3" letter-spacing="3" font-weight="600">EDGE ROUTING</text>
  <text x="600" y="538" text-anchor="middle" font-size="34" font-weight="700" fill="#f1f5f9">Traefik Essentials</text>
</svg>
