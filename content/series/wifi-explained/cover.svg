<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="arc-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#072030"/>
      <stop offset="100%" stop-color="#040e1c"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%" stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <radialGradient id="wifi-glow" cx="50%" cy="48%" r="40%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/>
  </g>

  <!-- Glow -->
  <rect width="1200" height="630" fill="url(#wifi-glow)"/>

  <!-- Faint outer arcs (upper semicircles, center 600,300) -->
  <!-- M (cx-r),cy A r,r 0 0 0 (cx+r),cy  →  upper dome arc -->
  <path d="M 375,300 A 225,225 0 0 0 825,300"
        fill="none" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.07"/>
  <path d="M 395,300 A 205,205 0 0 0 805,300"
        fill="none" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.12"/>

  <!-- Spoke lines from outer arc surface outward (drawn behind arcs) -->
  <!-- right (0°): arc point (770,300) → (840,300) -->
  <line x1="770" y1="300" x2="840" y2="300" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- upper-right (45°): arc point (720,180) → (763,137) -->
  <line x1="720" y1="180" x2="763" y2="137" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- top (90°): arc point (600,130) → (600,62) -->
  <line x1="600" y1="130" x2="600" y2="62"  stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- upper-left (135°): arc point (480,180) → (437,137) -->
  <line x1="480" y1="180" x2="437" y2="137" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- left (180°): arc point (430,300) → (360,300) -->
  <line x1="430" y1="300" x2="360" y2="300" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- WiFi arcs — upper semicircles, r=70/120/170, center (600,300) -->
  <!-- inner arc r=70 -->
  <path d="M 530,300 A 70,70 0 0 0 670,300"
        fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-opacity="0.95" stroke-linecap="round"/>
  <!-- mid arc r=120 -->
  <path d="M 480,300 A 120,120 0 0 0 720,300"
        fill="none" stroke="#38bdf8" stroke-width="1.8" stroke-opacity="0.75" stroke-linecap="round"/>
  <!-- outer arc r=170 -->
  <path d="M 430,300 A 170,170 0 0 0 770,300"
        fill="none" stroke="#38bdf8" stroke-width="1.2" stroke-opacity="0.55" stroke-linecap="round"/>

  <!-- Corner dots at spoke/arc intersections (on outer arc r=170) -->
  <circle cx="770" cy="300" r="5" fill="#38bdf8"/>
  <circle cx="720" cy="180" r="5" fill="#38bdf8" fill-opacity="0.8"/>
  <circle cx="600" cy="130" r="5" fill="#38bdf8" fill-opacity="0.8"/>
  <circle cx="480" cy="180" r="5" fill="#38bdf8" fill-opacity="0.8"/>
  <circle cx="430" cy="300" r="5" fill="#38bdf8"/>

  <!-- Center AP dot -->
  <circle cx="600" cy="300" r="15" fill="url(#arc-fill)" stroke="#38bdf8" stroke-width="2"/>
  <circle cx="600" cy="300" r="5"  fill="#38bdf8"/>

  <!-- Wordmark inside dome -->
  <text x="600" y="272" text-anchor="middle" font-size="22" font-weight="700" fill="#38bdf8" letter-spacing="5">WiFi</text>
  <text x="600" y="291" text-anchor="middle" font-size="8" fill="#38bdf8" fill-opacity="0.35" font-family="'Courier New',monospace" letter-spacing="2">2.4 · 5 · 6 GHz</text>

  <!-- Spoke endpoint dots -->
  <circle cx="848" cy="300" r="3" fill="#38bdf8" fill-opacity="0.6"/>
  <circle cx="770" cy="130" r="3" fill="#38bdf8" fill-opacity="0.5"/>
  <circle cx="600" cy="55"  r="3" fill="#38bdf8" fill-opacity="0.5"/>
  <circle cx="430" cy="130" r="3" fill="#38bdf8" fill-opacity="0.5"/>
  <circle cx="352" cy="300" r="3" fill="#38bdf8" fill-opacity="0.6"/>

  <!-- Spoke labels -->
  <text x="858" y="304" font-size="9" fill="#38bdf8" fill-opacity="0.8" font-weight="600">Roaming</text>
  <text x="778" y="127" font-size="9" fill="#38bdf8" fill-opacity="0.8" font-weight="600">Channels</text>
  <text x="600" y="49"  text-anchor="middle" font-size="9" fill="#38bdf8" fill-opacity="0.8" font-weight="600">WPA3</text>
  <text x="422" y="127" text-anchor="end" font-size="9" fill="#38bdf8" fill-opacity="0.8" font-weight="600">MLO</text>
  <text x="342" y="304" text-anchor="end" font-size="9" fill="#38bdf8" fill-opacity="0.8" font-weight="600">Medium Access</text>

  <!-- Bottom overlay -->
  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>

  <text x="600" y="500" text-anchor="middle" font-size="13" fill="#38bdf8" letter-spacing="3" font-weight="600">WIRELESS NETWORKING</text>
  <text x="600" y="538" text-anchor="middle" font-size="34" font-weight="700" fill="#f1f5f9">WiFi Explained</text>
</svg>
