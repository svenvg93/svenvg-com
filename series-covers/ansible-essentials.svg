<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080c14" stop-opacity="0"/>
      <stop offset="60%" stop-color="#080c14" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <radialGradient id="ctrl-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g stroke="#0d1a2a" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/>
  </g>

  <!-- === Centered Orbital network === -->
  <!-- Glow behind control center -->
  <circle cx="600" cy="210" r="180" fill="url(#ctrl-glow)"/>

  <!-- Orbit rings -->
  <circle cx="600" cy="210" r="150" fill="none" stroke="#dc2626" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="5,5"/>
  <circle cx="600" cy="210" r="152" fill="none" stroke="#dc2626" stroke-width="0.5" stroke-opacity="0.1"/>

  <!-- Connection lines to hosts (dashed) -->
  <!-- Host positions on ring r=150: top(300,60), upper-right(430,285) corrected -->
  <!-- 5 hosts at 72° intervals starting top: 270°,342°,54°,126°,198° in standard math -->
  <!-- top: (300, 60) -->
  <!-- upper-right: (300+150*sin72, 210-150*cos72) = (300+143, 210-46) = (443, 164) -->
  <!-- lower-right: (300+150*sin144, 210-150*cos144) = (300+88, 210+121) = (388, 331) -->
  <!-- lower-left: (300-88, 210+121) = (212, 331) -->
  <!-- upper-left: (300-143, 164) = (157, 164) -->
  <line x1="600" y1="210" x2="600" y2="60"  stroke="#dc2626" stroke-width="1.5" stroke-opacity="0.5" stroke-dasharray="6,3"/>
  <line x1="600" y1="210" x2="743" y2="164" stroke="#dc2626" stroke-width="1.5" stroke-opacity="0.5" stroke-dasharray="6,3"/>
  <line x1="600" y1="210" x2="688" y2="331" stroke="#dc2626" stroke-width="1.5" stroke-opacity="0.5" stroke-dasharray="6,3"/>
  <line x1="600" y1="210" x2="512" y2="331" stroke="#dc2626" stroke-width="1.5" stroke-opacity="0.5" stroke-dasharray="6,3"/>
  <line x1="600" y1="210" x2="457" y2="164" stroke="#dc2626" stroke-width="1.5" stroke-opacity="0.5" stroke-dasharray="6,3"/>

  <!-- Host nodes -->
  <circle cx="600" cy="60"  r="28" fill="#0d1e30" stroke="#dc2626" stroke-width="1.5"/>
  <text x="600" y="57"  text-anchor="middle" font-size="8" fill="#94a3b8" font-family="'Courier New',monospace">web</text>
  <text x="600" y="68"  text-anchor="middle" font-size="8" fill="#94a3b8" font-family="'Courier New',monospace">server</text>

  <circle cx="743" cy="164" r="28" fill="#0d1e30" stroke="#dc2626" stroke-width="1.5"/>
  <text x="743" y="161" text-anchor="middle" font-size="8" fill="#94a3b8" font-family="'Courier New',monospace">app</text>
  <text x="743" y="172" text-anchor="middle" font-size="8" fill="#94a3b8" font-family="'Courier New',monospace">server</text>

  <circle cx="688" cy="331" r="28" fill="#0d1e30" stroke="#dc2626" stroke-width="1.5"/>
  <text x="688" y="328" text-anchor="middle" font-size="8" fill="#94a3b8" font-family="'Courier New',monospace">db</text>
  <text x="688" y="339" text-anchor="middle" font-size="8" fill="#94a3b8" font-family="'Courier New',monospace">server</text>

  <circle cx="512" cy="331" r="28" fill="#0d1e30" stroke="#dc2626" stroke-width="1.5"/>
  <text x="512" y="328" text-anchor="middle" font-size="8" fill="#94a3b8" font-family="'Courier New',monospace">cache</text>
  <text x="512" y="339" text-anchor="middle" font-size="8" fill="#94a3b8" font-family="'Courier New',monospace">server</text>

  <circle cx="457" cy="164" r="28" fill="#0d1e30" stroke="#dc2626" stroke-width="1.5"/>
  <text x="457" y="161" text-anchor="middle" font-size="8" fill="#94a3b8" font-family="'Courier New',monospace">mon</text>
  <text x="457" y="172" text-anchor="middle" font-size="8" fill="#94a3b8" font-family="'Courier New',monospace">agent</text>

  <!-- Control center -->
  <circle cx="600" cy="210" r="48" fill="#130609" stroke="#dc2626" stroke-width="2.5"/>
  <circle cx="600" cy="210" r="42" fill="none" stroke="#dc2626" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="600" y="205" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626" letter-spacing="2">ANSIBLE</text>
  <text x="600" y="221" text-anchor="middle" font-size="9" fill="#64748b">control</text>

  <!-- Bottom overlay -->
  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>

  <text x="600" y="500" text-anchor="middle" font-size="13" fill="#dc2626" letter-spacing="3" font-weight="600">AUTOMATION</text>
  <text x="600" y="538" text-anchor="middle" font-size="34" font-weight="700" fill="#f1f5f9">Ansible Essentials</text>
</svg>
