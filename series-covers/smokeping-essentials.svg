  <circle cx="312" cy="132" r="9" fill="#0ea5e9"/>
  <text x="312" y="136" text-anchor="middle" font-size="8" fill="#08131f" font-weight="700">SRC</text>
  <path d="M 326,132 L 456,132" fill="none" stroke="#0ea5e9" stroke-width="2.5" stroke-dasharray="6,6"/>
  <circle cx="476" cy="132" r="8" fill="#4ade80"/>
  <text x="476" y="157" text-anchor="middle" font-size="9" fill="#4ade80" font-weight="600">gateway</text>
