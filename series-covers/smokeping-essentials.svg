  <text x="360" y="438" text-anchor="middle" font-size="11" fill="#4ade80" font-weight="600" letter-spacing="1">Target Selection</text>
  <rect x="490" y="418" width="220" height="30" fill="#0c1a2e" stroke="#f59e0b" stroke-width="1.5" rx="15"/>
  <text x="600" y="438" text-anchor="middle" font-size="11" fill="#f59e0b" font-weight="600" letter-spacing="1">CDN Targets</text>
  <rect x="730" y="418" width="220" height="30" fill="#0c1a2e" stroke="#0ea5e9" stroke-width="1.5" rx="15"/>
  <text x="840" y="438" text-anchor="middle" font-size="11" fill="#0ea5e9" font-weight="600" letter-spacing="1">Setup · Docker</text>

  <text x="600" y="500" text-anchor="middle" font-size="13" fill="#0ea5e9" letter-spacing="3" font-weight="600">LATENCY MONITORING</text>
  <text x="600" y="538" text-anchor="middle" font-size="34" font-weight="700" fill="#f1f5f9">Smokeping Essentials</text>
