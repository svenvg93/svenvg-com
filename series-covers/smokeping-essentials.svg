  <text x="430" y="277" font-size="8" fill="#475569">20ms</text>
  <text x="640" y="277" font-size="8" fill="#475569">80ms</text>
  <text x="870" y="277" font-size="8" fill="#475569">loss</text>

  <rect x="230" y="298" width="740" height="70" fill="#0b1624" stroke="#12324a" stroke-width="1.5" rx="6"/>
  <text x="256" y="321" font-size="10" fill="#64748b" letter-spacing="1">LATENCY STATES</text>
  <rect x="256" y="330" width="170" height="16" fill="#052e16" rx="8"/>
  <rect x="442" y="330" width="180" height="16" fill="#3a2505" rx="8"/>
  <rect x="638" y="330" width="210" height="16" fill="#3b1010" rx="8"/>
  <text x="341" y="342" text-anchor="middle" font-size="9" fill="#4ade80" font-weight="600">baseline</text>
  <text x="532" y="342" text-anchor="middle" font-size="9" fill="#f59e0b" font-weight="600">congestion</text>
  <text x="743" y="342" text-anchor="middle" font-size="9" fill="#ef4444" font-weight="600">packet loss</text>
  <text x="256" y="361" font-size="9" fill="#64748b">find clean targets, then watch drift over time</text>

  <!-- Bottom overlay -->
  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>

