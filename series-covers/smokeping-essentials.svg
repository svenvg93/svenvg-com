    <rect x="282" y="248" width="20" height="16" rx="2"/>
    <rect x="308" y="242" width="20" height="22" rx="2"/>
    <rect x="334" y="232" width="20" height="32" rx="2"/>
    <rect x="360" y="226" width="20" height="38" rx="2"/>
