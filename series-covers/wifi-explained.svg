<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050814"/>
      <stop offset="100%" stop-color="#0a1028"/>
    </linearGradient>
    <linearGradient id="textbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050814" stop-opacity="0"/>
      <stop offset="60%" stop-color="#050814" stop-opacity="0.93"/>
      <stop offset="100%" stop-color="#050814" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Dot grid -->
  <g fill="#0f1f44" opacity="0.55">
    <circle cx="150" cy="60" r="1.5"/><circle cx="300" cy="60" r="1.5"/><circle cx="450" cy="60" r="1.5"/><circle cx="600" cy="60" r="1.5"/><circle cx="750" cy="60" r="1.5"/><circle cx="900" cy="60" r="1.5"/><circle cx="1050" cy="60" r="1.5"/>
    <circle cx="150" cy="160" r="1.5"/><circle cx="300" cy="160" r="1.5"/><circle cx="450" cy="160" r="1.5"/><circle cx="600" cy="160" r="1.5"/><circle cx="750" cy="160" r="1.5"/><circle cx="900" cy="160" r="1.5"/><circle cx="1050" cy="160" r="1.5"/>
    <circle cx="150" cy="260" r="1.5"/><circle cx="300" cy="260" r="1.5"/><circle cx="450" cy="260" r="1.5"/><circle cx="600" cy="260" r="1.5"/><circle cx="750" cy="260" r="1.5"/><circle cx="900" cy="260" r="1.5"/><circle cx="1050" cy="260" r="1.5"/>
    <circle cx="150" cy="360" r="1.5"/><circle cx="300" cy="360" r="1.5"/><circle cx="450" cy="360" r="1.5"/><circle cx="600" cy="360" r="1.5"/><circle cx="750" cy="360" r="1.5"/><circle cx="900" cy="360" r="1.5"/><circle cx="1050" cy="360" r="1.5"/>
  </g>

  <!-- ═══ 2.4 GHz band (y=76 to y=168) ═══ -->
  <rect x="130" y="76" width="940" height="92" fill="#150b03" stroke="#f97316" stroke-width="1" stroke-opacity="0.35" rx="4"/>
  <!-- Baseline tick -->
  <line x1="130" y1="166" x2="1070" y2="166" stroke="#f97316" stroke-width="0.5" stroke-opacity="0.25"/>

  <!-- Bright bars: CH1, CH6, CH11 (r=0 is i=0, pitch=72, w=55, baseline y=164) -->
  <rect x="134" y="90"  width="55" height="74" fill="#f97316" fill-opacity="0.82" rx="3"/>
  <rect x="494" y="88"  width="55" height="76" fill="#f97316" fill-opacity="0.82" rx="3"/>
  <rect x="854" y="92"  width="55" height="72" fill="#f97316" fill-opacity="0.82" rx="3"/>

  <!-- Dim bars: channels 2-5, 7-10, 12-13 -->
  <rect x="206" y="140" width="55" height="24" fill="#f97316" fill-opacity="0.26" rx="3"/>
  <rect x="278" y="145" width="55" height="19" fill="#f97316" fill-opacity="0.26" rx="3"/>
  <rect x="350" y="138" width="55" height="26" fill="#f97316" fill-opacity="0.26" rx="3"/>
  <rect x="422" y="133" width="55" height="31" fill="#f97316" fill-opacity="0.26" rx="3"/>
  <rect x="566" y="143" width="55" height="21" fill="#f97316" fill-opacity="0.26" rx="3"/>
  <rect x="638" y="148" width="55" height="16" fill="#f97316" fill-opacity="0.26" rx="3"/>
  <rect x="710" y="141" width="55" height="23" fill="#f97316" fill-opacity="0.26" rx="3"/>
  <rect x="782" y="135" width="55" height="29" fill="#f97316" fill-opacity="0.26" rx="3"/>
  <rect x="926" y="143" width="55" height="21" fill="#f97316" fill-opacity="0.26" rx="3"/>
  <rect x="998" y="147" width="55" height="17" fill="#f97316" fill-opacity="0.26" rx="3"/>

  <!-- CH labels above bright bars -->
  <text x="161"  y="84"  text-anchor="middle" font-size="9" fill="#f97316" font-weight="700">CH 1</text>
  <text x="521"  y="82"  text-anchor="middle" font-size="9" fill="#f97316" font-weight="700">CH 6</text>
  <text x="881"  y="86"  text-anchor="middle" font-size="9" fill="#f97316" font-weight="700">CH 11</text>

  <!-- Band name + spec -->
  <text x="120" y="113" text-anchor="end" font-size="16" fill="#f97316" font-weight="700">2.4</text>
  <text x="120" y="127" text-anchor="end" font-size="9"  fill="#f97316" letter-spacing="1" opacity="0.8">GHz</text>
  <text x="1080" y="108" font-size="9" fill="#fed7aa">20 / 40 MHz</text>
  <text x="1080" y="120" font-size="9" fill="#fed7aa" opacity="0.7">3 non-overlap</text>

  <!-- ═══ 5 GHz band (y=188 to y=282) ═══ -->
  <rect x="130" y="188" width="940" height="94" fill="#040f1c" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.35" rx="4"/>
  <line x1="130" y1="280" x2="1070" y2="280" stroke="#38bdf8" stroke-width="0.5" stroke-opacity="0.25"/>

  <!-- UNII-1 bright bars (i=0-3, pitch=52, w=43, baseline y=278) -->
  <rect x="134" y="202" width="43" height="76" fill="#38bdf8" fill-opacity="0.82" rx="3"/>
  <rect x="186" y="208" width="43" height="70" fill="#38bdf8" fill-opacity="0.82" rx="3"/>
  <rect x="238" y="205" width="43" height="73" fill="#38bdf8" fill-opacity="0.82" rx="3"/>
  <rect x="290" y="210" width="43" height="68" fill="#38bdf8" fill-opacity="0.82" rx="3"/>

  <!-- DFS dim bars (i=4-12) -->
  <rect x="342" y="242" width="43" height="36" fill="#38bdf8" fill-opacity="0.20" rx="3"/>
  <rect x="394" y="247" width="43" height="31" fill="#38bdf8" fill-opacity="0.20" rx="3"/>
  <rect x="446" y="244" width="43" height="34" fill="#38bdf8" fill-opacity="0.20" rx="3"/>
  <rect x="498" y="252" width="43" height="26" fill="#38bdf8" fill-opacity="0.20" rx="3"/>
  <rect x="550" y="249" width="43" height="29" fill="#38bdf8" fill-opacity="0.20" rx="3"/>
  <rect x="602" y="254" width="43" height="24" fill="#38bdf8" fill-opacity="0.20" rx="3"/>
  <rect x="654" y="250" width="43" height="28" fill="#38bdf8" fill-opacity="0.20" rx="3"/>
  <rect x="706" y="256" width="43" height="22" fill="#38bdf8" fill-opacity="0.20" rx="3"/>
  <rect x="758" y="252" width="43" height="26" fill="#38bdf8" fill-opacity="0.20" rx="3"/>

  <!-- UNII-3 bright bars (i=13-17) -->
  <rect x="810" y="200" width="43" height="78" fill="#38bdf8" fill-opacity="0.82" rx="3"/>
  <rect x="862" y="196" width="43" height="82" fill="#38bdf8" fill-opacity="0.82" rx="3"/>
  <rect x="914" y="204" width="43" height="74" fill="#38bdf8" fill-opacity="0.82" rx="3"/>
  <rect x="966" y="202" width="43" height="76" fill="#38bdf8" fill-opacity="0.82" rx="3"/>
  <rect x="1018" y="208" width="43" height="70" fill="#38bdf8" fill-opacity="0.82" rx="3"/>

  <!-- Group labels -->
  <text x="213" y="196" text-anchor="middle" font-size="8" fill="#38bdf8" font-weight="700" letter-spacing="1">UNII-1</text>
  <text x="550" y="238" text-anchor="middle" font-size="8" fill="#38bdf8" fill-opacity="0.55" letter-spacing="1">DFS</text>
  <text x="916" y="194" text-anchor="middle" font-size="8" fill="#38bdf8" font-weight="700" letter-spacing="1">UNII-3</text>

  <!-- Band name + spec -->
  <text x="120" y="225" text-anchor="end" font-size="16" fill="#38bdf8" font-weight="700">5</text>
  <text x="120" y="239" text-anchor="end" font-size="9"  fill="#38bdf8" letter-spacing="1" opacity="0.8">GHz</text>
  <text x="1080" y="220" font-size="9" fill="#bae6fd">up to 160 MHz</text>
  <text x="1080" y="232" font-size="9" fill="#bae6fd" opacity="0.7">DFS available</text>

  <!-- ═══ 6 GHz band (y=302 to y=376) ═══ -->
  <rect x="130" y="302" width="940" height="74" fill="#041210" stroke="#34d399" stroke-width="1" stroke-opacity="0.35" rx="4"/>
  <line x1="130" y1="372" x2="1070" y2="372" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.25"/>

  <!-- 24 bars, all bright emerald (w=30, pitch=39, baseline y=370) -->
  <g fill="#34d399" fill-opacity="0.78" rx="3">
    <rect x="134" y="312" width="30" height="58" rx="3"/>
    <rect x="173" y="316" width="30" height="54" rx="3"/>
    <rect x="212" y="309" width="30" height="61" rx="3"/>
    <rect x="251" y="314" width="30" height="56" rx="3"/>
    <rect x="290" y="310" width="30" height="60" rx="3"/>
    <rect x="329" y="317" width="30" height="53" rx="3"/>
    <rect x="368" y="312" width="30" height="58" rx="3"/>
    <rect x="407" y="307" width="30" height="63" rx="3"/>
    <rect x="446" y="313" width="30" height="57" rx="3"/>
    <rect x="485" y="309" width="30" height="61" rx="3"/>
    <rect x="524" y="314" width="30" height="56" rx="3"/>
    <rect x="563" y="317" width="30" height="53" rx="3"/>
    <rect x="602" y="311" width="30" height="59" rx="3"/>
    <rect x="641" y="307" width="30" height="63" rx="3"/>
    <rect x="680" y="313" width="30" height="57" rx="3"/>
    <rect x="719" y="317" width="30" height="53" rx="3"/>
    <rect x="758" y="309" width="30" height="61" rx="3"/>
    <rect x="797" y="314" width="30" height="56" rx="3"/>
    <rect x="836" y="310" width="30" height="60" rx="3"/>
    <rect x="875" y="316" width="30" height="54" rx="3"/>
    <rect x="914" y="311" width="30" height="59" rx="3"/>
    <rect x="953" y="307" width="30" height="63" rx="3"/>
    <rect x="992" y="313" width="30" height="57" rx="3"/>
    <rect x="1031" y="317" width="30" height="53" rx="3"/>
  </g>

  <!-- 6 GHz annotation -->
  <text x="600" y="298" text-anchor="middle" font-size="8" fill="#34d399" font-weight="700" letter-spacing="1">59 NON-OVERLAPPING CHANNELS</text>

  <!-- Band name + spec -->
  <text x="120" y="334" text-anchor="end" font-size="16" fill="#34d399" font-weight="700">6</text>
  <text x="120" y="348" text-anchor="end" font-size="9"  fill="#34d399" letter-spacing="1" opacity="0.8">GHz</text>
  <text x="1080" y="330" font-size="9" fill="#a7f3d0">up to 320 MHz</text>
  <text x="1080" y="342" font-size="9" fill="#a7f3d0" opacity="0.7">WiFi 6E / 7</text>

  <!-- Bottom overlay -->
  <rect x="0" y="390" width="1200" height="240" fill="url(#textbg)"/>

  <text x="600" y="500" text-anchor="middle" font-size="13" fill="#38bdf8" letter-spacing="3" font-weight="600">WIRELESS NETWORKING</text>
  <text x="600" y="538" text-anchor="middle" font-size="34" font-weight="700" fill="#f1f5f9">WiFi Explained</text>
